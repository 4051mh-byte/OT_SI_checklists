<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>K-DTVP-2 결과 해석</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#9b7dc7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="K-DTVP-2">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --paper: #fbfbf8;
      --surface: #ffffff;
      --surface-soft: #f0f6f4;
      --ink: #1e2422;
      --muted: #65706b;
      --line: #d9e1dc;
      --teal: #0f766e;
      --teal-deep: #0b5f59;
      --gold: #b7791f;
      --rose: #a23b52;
      --blue: #315c8a;
      --shadow: 0 10px 26px rgba(23, 39, 35, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
    }
    button, input, select {
      font: inherit;
    }
    .app-header {
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-row {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
    }
    .meta {
      display: none;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: 8px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
      flex: 0 0 auto;
    }
    .btn.primary {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }
    .btn:hover {
      border-color: var(--teal);
    }
    .workspace {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 28px 42px;
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .panel-header {
      padding: 17px 18px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .result-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .result-actions .btn {
      padding: 5px 11px;
      font-size: 12px;
      gap: 5px;
    }
    .result-actions .btn svg {
      width: 14px;
      height: 14px;
    }
    .panel-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0;
    }
    .panel-body {
      padding: 18px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .12);
    }
    input[readonly] {
      background: #f5f8f7;
      color: #52605b;
    }
    .age-output-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .age-output-row .btn {
      min-height: 38px;
    }
    .age-status {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .subtest-grid {
      margin-top: 18px;
      display: grid;
      gap: 8px;
    }
    .raw-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
      align-items: center;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .raw-label {
      min-width: 0;
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 700;
      line-height: 1.35;
      word-break: keep-all;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 22px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--teal-deep);
      font-size: 11px;
      font-weight: 800;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .report-heading {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr);
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--teal);
    }
    .report-kicker {
      color: var(--teal-deep);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }
    .report-heading h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }
    .report-desc {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }
    .report-meta-grid {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 7px 12px;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfa;
      font-size: 13px;
    }
    .report-meta-grid dt {
      color: var(--muted);
      font-weight: 800;
    }
    .report-meta-grid dd {
      margin: 0;
      min-width: 0;
      font-weight: 700;
      word-break: keep-all;
    }
    .score-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      min-height: 118px;
    }
    .score-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.35;
    }
    .score-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .score-index {
      font-size: 30px;
      font-weight: 900;
      color: var(--teal-deep);
      line-height: 1;
    }
    .score-label {
      font-size: 13px;
      color: var(--muted);
    }
    .level {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
      background: #eef7f5;
      color: var(--teal-deep);
    }
    .level.low {
      background: #fff2e0;
      color: #8a4b05;
    }
    .level.high {
      background: #f2f6ff;
      color: var(--blue);
    }
    .interpretation {
      margin-top: 14px;
      border-left: 4px solid var(--teal);
      background: #f5faf8;
      padding: 13px 14px;
      line-height: 1.65;
      color: #23322e;
      border-radius: 0 8px 8px 0;
    }
    .interpretation p {
      margin: 0 0 9px;
    }
    .interpretation p:last-child {
      margin-bottom: 0;
    }
    .visual-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr);
      gap: 14px;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      min-width: 0;
    }
    .chart-card h2 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.35;
    }
    .chart-note {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .chart-shell {
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .chart-shell svg {
      width: 100%;
      min-width: 640px;
      height: auto;
      display: block;
    }
    .manual-note {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf0;
      color: #4f3a15;
      padding: 12px 13px;
      font-size: 12.5px;
      line-height: 1.65;
    }
    .tables {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      line-height: 1.35;
      font-size: 13px;
    }
    th {
      background: #f4f7f5;
      color: #38443f;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    tbody tr:last-child td {
      border-bottom: 0;
    }
    .section-title {
      margin: 0 0 9px;
      font-size: 16px;
      font-weight: 900;
    }
    .empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 28px;
    }
    .source-note {
      display: none;
    }
    .source-note code {
      font-family: Consolas, "Courier New", monospace;
      color: #48544f;
    }
    .summary-report {
      margin-top: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }
    .summary-report > h2 {
      font-size: 17px;
      font-weight: 900;
      margin: 0 0 16px;
      color: var(--teal-deep);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--teal);
    }
    .summary-section { margin-bottom: 16px; }
    .summary-section:last-child { margin-bottom: 0; }
    .summary-section h3 { font-size: 14px; font-weight: 900; margin: 0 0 8px; color: var(--ink); }
    .summary-section p { margin: 0 0 7px; line-height: 1.7; font-size: 13.5px; color: #23322e; }
    .summary-section p:last-child { margin-bottom: 0; }
    @media (max-width: 980px) {
      .header-row, .workspace {
        padding-left: 18px;
        padding-right: 18px;
      }
      .header-row {
        flex-direction: column;
        align-items: stretch;
      }
      .toolbar {
        justify-content: flex-start;
      }
      .workspace {
        grid-template-columns: 1fr;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .report-heading {
        grid-template-columns: 1fr;
      }
      .visual-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 560px) {
      .app-header {
        padding: 18px 0 14px;
      }
      h1 {
        font-size: 20px;
      }
      .workspace {
        padding: 16px 12px 32px;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .raw-row {
        grid-template-columns: 1fr 84px;
      }
      .age-output-row {
        grid-template-columns: 1fr;
      }
      .btn {
        flex: 1 1 auto;
        justify-content: center;
      }
    }
    @media print {
      @page {
        size: A4;
        margin: 14mm 12mm;
      }
      body {
        background: #fff;
        font-size: 10.5pt;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .app-header {
        position: static;
        padding: 0 0 7mm;
        margin-bottom: 6mm;
        border-bottom: 2px solid #25332f;
      }
      .toolbar, .input-panel {
        display: none;
      }
      .header-row {
        max-width: none;
        display: block;
        padding: 0;
      }
      h1 {
        font-size: 18pt;
      }
      .meta {
        font-size: 8.5pt;
      }
      .workspace {
        max-width: none;
        display: block;
        padding: 0;
      }
      .panel {
        box-shadow: none;
        border: 0;
        border-radius: 0;
      }
      .panel-header {
        display: none;
        padding-left: 0;
        padding-right: 0;
      }
      .panel-body {
        padding-left: 0;
        padding-right: 0;
      }
      .report-heading {
        grid-template-columns: 1.15fr .85fr;
        gap: 8mm;
        margin-bottom: 7mm;
        padding-bottom: 5mm;
        break-inside: avoid;
      }
      .report-heading h2 {
        font-size: 16pt;
      }
      .report-desc, .report-meta-grid, .source-note {
        font-size: 8.5pt;
      }
      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 5mm;
      }
      .score-card, .interpretation, .tables section {
        break-inside: avoid;
      }
      .visual-grid {
        grid-template-columns: 1fr;
        gap: 5mm;
      }
      .chart-card {
        padding: 8px;
        break-inside: avoid;
      }
      .chart-shell svg {
        min-width: 0;
      }
      .score-card {
        min-height: 0;
        padding: 8px;
      }
      .score-index {
        font-size: 20pt;
      }
      table {
        min-width: 0;
      }
      th, td {
        padding: 5px 6px;
        font-size: 8.5pt;
      }
      .tag, .level {
        border: 1px solid var(--line);
      }
    }
    /* === CHILD BAR === */
    .child-bar{background:#1565c0;color:#fff;padding:7px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px}
    .child-bar select{padding:4px 8px;border:none;border-radius:4px;font-size:13px;min-width:130px;color:#333}
    .cb-btn{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}
    .cb-add{background:#43a047;color:#fff}.cb-del{background:#e53935;color:#fff}
    .cb-st{font-size:11px;opacity:.75;margin-left:6px;white-space:nowrap}
    @media print{.child-bar{display:none!important}}
  </style>
</head>
<body>
<div id="child-bar" class="child-bar no-print">
  <span>👶 아동:</span>
  <select id="child-select" onchange="onChildChange()"><option value="">-- 아동 선택 --</option></select>
  <button class="cb-btn cb-add" onclick="addNewChild()">+ 새 아동</button>
  <button class="cb-btn cb-del" onclick="deleteCurrentChild()">삭제</button>
  <span class="cb-st" id="cb-status"></span>
</div>
  <header class="app-header">
    <div class="header-row">
      <div>
        <h1>K-DTVP-2 결과 해석</h1>
        <div class="meta">생성: 2026-04-23 12:55 · 규준 CSV: 프로파일 10개, 기록표 10개</div>
      </div>
    </div>
  </header>

  <main class="workspace">
    <section class="panel input-panel" aria-label="입력">
      <div class="panel-header">
        <p class="panel-title">검사 입력</p>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="field">
            <label for="clientName">이름</label>
            <input id="clientName" type="text" autocomplete="off">
          </div>
          <div class="field">
            <label for="clientSex">성별</label>
            <select id="clientSex">
              <option value=""></option>
              <option>남</option>
              <option>여</option>
            </select>
          </div>
          <div class="field">
            <label for="testDate">검사일자</label>
            <input id="testDate" type="date" oninput="scheduleAgeUpdate()" onchange="scheduleAgeUpdate()" onblur="scheduleAgeUpdate()">
          </div>
          <div class="field">
            <label for="birthDate">생년월일</label>
            <input id="birthDate" type="date" oninput="scheduleAgeUpdate()" onchange="scheduleAgeUpdate()" onblur="scheduleAgeUpdate()">
          </div>
          <div class="field full">
            <label for="computedAge">생활연령</label>
            <input id="computedAge" type="text" readonly placeholder="검사일자와 생년월일 입력 시 자동 산출">
            <div class="age-status" id="ageStatus"></div>
          </div>
          <div class="field full">
            <label for="ageBand">규준 연령대</label>
            <select id="ageBand"></select>
          </div>
        </div>

        <div class="subtest-grid" id="rawInputs"></div>

        <div class="actions">
          <button class="btn primary" id="calculateBtn" type="button" title="계산">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h10"/><path d="m17 16 3 3"/><path d="m20 16-3 3"/></svg>
            계산
          </button>
          <button class="btn" id="sampleBtn" type="button" title="예시값">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
            예시값
          </button>
          <button class="btn" id="clearBtn" type="button" title="초기화">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m7 10 1 10h8l1-10"/></svg>
            초기화
          </button>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="결과">
      <div class="panel-header">
        <p class="panel-title">해석 결과</p>
        <div class="result-actions" id="resultActions">
          <button class="btn" id="copyBtn" type="button" title="텍스트 복사">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            복사
          </button>
          <button class="btn" id="pdfBtn" type="button" title="PDF로 저장">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>
            PDF 저장
          </button>
          <button class="btn" id="printBtn2" type="button" title="인쇄">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            인쇄
          </button>
          <button class="btn" id="exportJsonBtn" type="button" title="JSON 내보내기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            JSON 내보내기
          </button>
          <button class="btn" id="importJsonBtn" type="button" title="JSON 불러오기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            JSON 불러오기
          </button>
          <button class="btn" id="resetBtn" type="button" title="초기화">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            초기화
          </button>
        </div>
      </div>
      <div class="panel-body" id="results">
        <div class="empty">원점수 입력 후 계산을 실행하세요.</div>
      </div>
    </section>

    const $ = (selector) => document.querySelector(selector);
    const rawInputs = $("#rawInputs");
    const ageBandSelect = $("#ageBand");
    const results = $("#results");
    const selectedSource = $("#selectedSource");

    function iconTags(domains) {
      return domains.map((domain) => `<span class="tag">${domain}</span>`).join("");
    }

    function fillAgeBands() {
      DTVP_DATA.ageBands.forEach((band, index) => {
        const option = document.createElement("option");
        option.value = band.key;
        option.textContent = band.label;
        if (index === 0) option.selected = true;
        ageBandSelect.appendChild(option);
      });
    }

    function fillRawInputs() {
      rawInputs.innerHTML = DTVP_DATA.subtests.map((subtest) => `
        <div class="raw-row">
          <div class="raw-label"><span>${subtest.id}. ${subtest.name}</span>${iconTags(subtest.domains)}</div>
          <input id="raw-${subtest.id}" inputmode="numeric" type="number" min="0" step="1">
        </div>
      `).join("");
    }

    function currentBand() {
      return DTVP_DATA.ageBands.find((band) => band.key === ageBandSelect.value) || DTVP_DATA.ageBands[0];
    }

    function updateSource() {
      const band = currentBand();
      if (selectedSource) selectedSource.textContent = band ? band.source : "";
    }

    function parseDateInput(value) {
      const text = String(value || "").trim();
      let match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) {
        match = text.match(/^(\d{4})[./](\d{1,2})[./](\d{1,2})$/);
      }
      if (!match) {
        match = text.match(/^(\d{4})(\d{2})(\d{2})$/);
      }
      if (!match) return null;
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      if (!year || month < 1 || month > 12 || day < 1 || day > daysInMonth(year, month)) {
        return null;
      }
      return {
        year,
        month,
        day,
      };
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function calculateChronologicalAge(birthValue, testValue) {
      const birth = parseDateInput(birthValue);
      const test = parseDateInput(testValue);
      if (!birth || !test) return null;

      const birthDate = new Date(birth.year, birth.month - 1, birth.day);
      const testDate = new Date(test.year, test.month - 1, test.day);
      if (testDate < birthDate) return null;

      let years = test.year - birth.year;
      let months = test.month - birth.month;
      let days = test.day - birth.day;

      if (days < 0) {
        months -= 1;
        const prevMonth = test.month === 1 ? 12 : test.month - 1;
        const prevYear = test.month === 1 ? test.year - 1 : test.year;
        days += daysInMonth(prevYear, prevMonth);
      }
      if (months < 0) {
        years -= 1;
        months += 12;
      }
      if (years < 0) return null;

      return {
        years,
        months,
        days,
        totalMonths: years * 12 + months,
        text: `만 ${years}세 ${months}개월 ${days}일`,
      };
    }

    function parseAgeBandRange(label) {
      const match = String(label).match(/(\d+)세\s*(\d+)개월\s*-\s*(\d+)세\s*(\d+)개월/);
      if (!match) return null;
      return {
        start: Number(match[1]) * 12 + Number(match[2]),
        end: Number(match[3]) * 12 + Number(match[4]),
      };
    }

    function updateAgeFromDates() {
      const age = calculateChronologicalAge($("#birthDate").value, $("#testDate").value);
      const computedAge = $("#computedAge");
      const ageStatus = $("#ageStatus");
      const hasAnyDate = $("#birthDate").value.trim() || $("#testDate").value.trim();

      if (!age) {
        computedAge.value = "";
        ageStatus.textContent = hasAnyDate ? "검사일자와 생년월일을 모두 입력하면 생활연령이 자동 산출됩니다." : "";
        return;
      }

      computedAge.value = age.text;
      const matchingBand = DTVP_DATA.ageBands.find((band) => {
        const range = parseAgeBandRange(band.label);
        return range && age.totalMonths >= range.start && age.totalMonths <= range.end;
      });

      if (matchingBand) {
        ageBandSelect.value = matchingBand.key;
        updateSource();
        ageStatus.textContent = `${matchingBand.label} 규준이 자동 선택되었습니다.`;
      } else {
        ageStatus.textContent = "생활연령이 현재 내장된 규준 범위를 벗어났습니다. 규준 연령대를 수동으로 확인하세요.";
      }
    }

    function scheduleAgeUpdate() {
      updateAgeFromDates();
      window.setTimeout(updateAgeFromDates, 0);
      window.setTimeout(updateAgeFromDates, 80);
      window.setTimeout(updateAgeFromDates, 250);
    }

    function registerDateAutoUpdate(selector) {
      const input = $(selector);
      for (const eventName of ["input", "change", "blur", "keyup", "click", "pointerup", "mouseup"]) {
        input.addEventListener(eventName, scheduleAgeUpdate);
      }
    }

    function watchDateInputs() {
      let lastValues = "";
      const sync = () => {
        const nextValues = `${$("#testDate").value}|${$("#birthDate").value}`;
        if (nextValues !== lastValues) {
          lastValues = nextValues;
          updateAgeFromDates();
        }
        requestAnimationFrame(sync);
      };
      requestAnimationFrame(sync);
    }

    function lookup(entries, raw) {
      const numericRaw = Number(raw);
      if (!Number.isFinite(numericRaw)) return "";
      let selected = entries[0];
      for (const entry of entries) {
        if (numericRaw >= Number(entry.raw)) selected = entry;
        else break;
      }
      return selected ? selected.value : "";
    }

    function numberValue(value) {
      if (value === null || value === undefined) return NaN;
      const text = String(value).replace(/[<>]/g, "");
      const numeric = Number(text);
      return Number.isFinite(numeric) ? numeric : NaN;
    }

    function compositeLevel(index) {
      const numericIndex = numberValue(index);
      if (!Number.isFinite(numericIndex)) return "";
      const found = DTVP_DATA.compositeLevels.find((item) => numericIndex >= item.min && numericIndex <= item.max);
      return found ? displayLevel(found.label) : "";
    }

    function levelClass(level) {
      const compact = String(level).replace(/\s/g, "");
      if (["매우열등", "열등", "평균이하"].includes(compact)) return "low";
      if (["평균이상", "우수", "매우우수"].includes(compact)) return "high";
      return "";
    }

    function scaledLevel(score) {
      const value = numberValue(score);
      if (!Number.isFinite(value)) return "";
      if (value <= 3) return "매우 열등";
      if (value <= 5) return "열등";
      if (value <= 7) return "평균 이하";
      if (value <= 12) return "평균";
      if (value <= 14) return "평균 이상";
      if (value <= 16) return "우수";
      return "매우 우수";
    }

    function displayLevel(level) {
      return String(level || "")
        .replace("매우우수", "매우 우수")
        .replace("평균이상", "평균 이상")
        .replace("평균이하", "평균 이하")
        .replace("매우열등", "매우 열등");
    }

    function getRawValues() {
      const values = {};
      for (const subtest of DTVP_DATA.subtests) {
        const input = document.getElementById(`raw-${subtest.id}`);
        const value = input.value === "" ? NaN : Number(input.value);
        values[subtest.id] = value;
      }
      return values;
    }

    function allRawScoresPresent(raws) {
      return DTVP_DATA.subtests.every((subtest) => Number.isFinite(raws[subtest.id]));
    }

    function calculate() {
      updateAgeFromDates();
      const band = currentBand();
      const raws = getRawValues();
      if (!band || !allRawScoresPresent(raws)) {
        results.innerHTML = `<div class="empty">8개 하위검사 원점수를 모두 입력하세요.</div>`;
        return;
      }

      const subtestRows = DTVP_DATA.subtests.map((subtest) => {
        const lookupSet = band.subtests[String(subtest.id)];
        const raw = raws[subtest.id];
        const standard = lookup(lookupSet.standard, raw);
        return {
          id: subtest.id,
          name: subtest.name,
          domains: subtest.domains,
          raw,
          standard,
          percentile: lookup(lookupSet.percentile, raw),
          age: lookup(lookupSet.age, raw),
          level: scaledLevel(standard),
        };
      });

      const standardById = Object.fromEntries(subtestRows.map((row) => [row.id, numberValue(row.standard)]));
      const compositeRows = DTVP_DATA.composites.map((composite) => {
        const sum = composite.tests.reduce((total, id) => total + standardById[id], 0);
        const table = composite.key === "GVP" ? band.composites.GVP : band.composites.FOUR;
        const index = lookup(table.index, sum);
        const percentile = lookup(table.percentile, sum);
        const level = compositeLevel(index);
        return {
          key: composite.key,
          name: composite.name,
          sum,
          index,
          percentile,
          level,
          tests: composite.tests,
        };
      });

      renderResults(band, subtestRows, compositeRows);
    }

    function renderResults(band, subtestRows, compositeRows) {
      const name = $("#clientName").value.trim();
      const sex = $("#clientSex").value;
      const testDate = $("#testDate").value;
      const birthDate = $("#birthDate").value;

        ["성별", sex || "-"],
        ["검사일자", testDate || "-"],
        ["생년월일", birthDate || "-"],
        ["생활연령", ageText || "-"],
        ["적용 규준", band.label],
      ];
      const profileBits = [
        name ? `이름: ${escapeHtml(name)}` : "",
        sex ? `성별: ${escapeHtml(sex)}` : "",
        testDate ? `검사일자: ${escapeHtml(testDate)}` : "",
        birthDate ? `생년월일: ${escapeHtml(birthDate)}` : "",
        ageText ? `생활연령: ${escapeHtml(ageText)}` : "",
        `규준: ${escapeHtml(band.label)}`,
      ].filter(Boolean).join(" · ");

      results.innerHTML = `

          </div>
          <dl class="report-meta-grid">
            ${profileItems.map(([label, value]) => `<dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value)}</dd>`).join("")}
          </dl>
        </div>
        <div class="summary-grid">
          ${compositeRows.map(renderCompositeCard).join("")}
        </div>
        <div class="visual-grid">
          <article class="chart-card">
            <h2>하위검사 표준점수 프로파일</h2>
            <p class="chart-note">매뉴얼 기준: 평균 10, 표준편차 3. 8-12점은 평균 범위입니다.</p>
            <div class="chart-shell">${renderSubtestProfileChart(subtestRows)}</div>
          </article>
          <article class="chart-card">
            <h2>종합척도 지수 프로파일</h2>
            <p class="chart-note">매뉴얼 기준: 평균 100, 표준편차 15. 90-110은 평균 범위입니다.</p>
            <div class="chart-shell">${renderCompositeIndexChart(compositeRows)}</div>
          </article>
        </div>
        <div class="interpretation">${renderInterpretation(compositeRows, subtestRows)}</div>
        ${renderSummaryReport(band, subtestRows, compositeRows)}
        <div class="manual-note">
          <strong>매뉴얼 반영 기준.</strong>
          결과 해석은 원점수 자체보다 표준점수, 백분위, 종합척도 지수를 중심으로 정리했습니다.
          하위검사 표준점수는 평균 10, 표준편차 3의 척도이며, 종합척도 지수는 평균 100, 표준편차 15의 척도입니다.
          하위검사 점수는 강점과 약점을 탐색하는 가설 자료로 사용하고, 진단적 판단은 더 신뢰로운 종합척도 지수와 관찰 정보를 함께 보아야 합니다.
        </div>
        <div class="tables">
          <section>
            <h2 class="section-title">하위검사 결과</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>하위검사</th>
                    <th>원점수</th>
                    <th>표준점수</th>

              <table>

                    <th>종합척도</th>

                    <th>구성 하위검사</th>

                <tbody>${compositeRows.map(renderCompositeRow).join("")}</tbody>
              </table>

    function renderCompositeCard(row) {
      return `
        <article class="score-card">
          <h3>${row.name} <span class="tag">${row.key}</span></h3>
          <div class="score-main"><span class="score-index">${escapeHtml(row.index)}</span><span class="score-label">지수</span></div>
          <span class="level ${levelClass(row.level)}">${escapeHtml(row.level)}</span>
          <div class="meta">백분위 ${escapeHtml(row.percentile)} · 합계 ${row.sum}</div>
        </article>
      `;
    }

    function renderSubtestRow(row) {
      return `
        <tr>
          <td>${row.id}. ${escapeHtml(row.name)}</td>
          <td>${row.raw}</td>
          <td>${escapeHtml(row.standard)}</td>
          <td>${escapeHtml(row.percentile)}</td>
          <td>${escapeHtml(row.age)}</td>
          <td>${escapeHtml(row.level)}</td>
          <td>${iconTags(row.domains)}</td>
        </tr>
      `;
    }

    function renderCompositeRow(row) {
      const testNames = row.tests.map((id) => {
        const subtest = DTVP_DATA.subtests.find((item) => item.id === id);
        return `${id}. ${subtest.name}`;
      }).join(", ");
      return `
        <tr>
          <td>${row.name} <span class="tag">${row.key}</span></td>
          <td>${row.sum}</td>
          <td>${escapeHtml(row.index)}</td>
          <td>${escapeHtml(row.percentile)}</td>
          <td><span class="level ${levelClass(row.level)}">${escapeHtml(row.level)}</span></td>
          <td>${escapeHtml(testNames)}</td>
        </tr>
      `;
    }

    function chartY(value, min, max, top, bottom) {
      const clamped = Math.max(min, Math.min(max, Number(value)));
      return bottom - ((clamped - min) / (max - min)) * (bottom - top);
    }

    function chartX(value, min, max, left, right) {
      const clamped = Math.max(min, Math.min(max, Number(value)));
      return left + ((clamped - min) / (max - min)) * (right - left);
    }

    function renderSubtestProfileChart(subtestRows) {
      const width = 760;
      const height = 300;
      const left = 52;
      const right = 735;
      const top = 18;
      const bottom = 218;
      const min = 1;
      const max = 20;
      const bands = [
        { from: 17, to: 20, label: "매우 우수", color: "#eef4ff" },
        { from: 15, to: 16.99, label: "우수", color: "#f4f7ff" },
        { from: 13, to: 14.99, label: "평균 이상", color: "#f5faf8" },
        { from: 8, to: 12.99, label: "평균", color: "#ffffff" },
        { from: 6, to: 7.99, label: "평균 이하", color: "#fff8eb" },
        { from: 4, to: 5.99, label: "열등", color: "#fff3e4" },
        { from: 1, to: 3.99, label: "매우 열등", color: "#fff0f2" },
      ];
      const xForIndex = (index) => left + (index / Math.max(1, subtestRows.length - 1)) * (right - left);
      const points = subtestRows.map((row, index) => ({
        x: xForIndex(index),
        y: chartY(numberValue(row.standard), min, max, top, bottom),
        score: numberValue(row.standard),
        label: `${row.id}. ${row.name}`,
      }));
      const path = points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
      const grid = [1, 4, 7, 10, 13, 16, 20].map((score) => {
        const y = chartY(score, min, max, top, bottom);
        return `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="#d9e1dc" stroke-width="1"/><text x="14" y="${y + 4}" font-size="11" fill="#65706b">${score}</text>`;
      }).join("");
      const bandSvg = bands.map((band) => {
        const y1 = chartY(band.to, min, max, top, bottom);
        const y2 = chartY(band.from, min, max, top, bottom);
        return `<rect x="${left}" y="${y1}" width="${right - left}" height="${Math.max(1, y2 - y1)}" fill="${band.color}"/><text x="${right - 74}" y="${y1 + Math.max(14, (y2 - y1) / 2)}" font-size="10" fill="#65706b">${band.label}</text>`;
      }).join("");
      const pointSvg = points.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4.5" fill="#0f766e"/><text x="${point.x}" y="${point.y - 8}" text-anchor="middle" font-size="11" font-weight="700" fill="#0b5f59">${point.score}</text>`).join("");
      const labels = points.map((point) => `<text x="${point.x}" y="242" text-anchor="middle" font-size="10" fill="#38443f">${escapeHtml(point.label.split(". ")[0])}</text><text x="${point.x}" y="258" text-anchor="middle" font-size="9" fill="#65706b">${escapeHtml(point.label.split(". ")[1].slice(0, 5))}</text>`).join("");
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="하위검사 표준점수 프로파일 차트">
          ${bandSvg}
          ${grid}
          <line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}" stroke="#65706b"/>
          <line x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}" stroke="#65706b"/>
          <path d="${path}" fill="none" stroke="#0f766e" stroke-width="3" stroke-linejoin="round"/>
          ${pointSvg}
          ${labels}
          <text x="${left}" y="288" font-size="10" fill="#65706b">1=눈-손 협응, 2=공간위치, 3=따라그리기, 4=도형-배경, 5=공간관계, 6=시각통합, 7=시각-운동속도, 8=형태항상성</text>
        </svg>
      `;
    }

    function renderCompositeIndexChart(compositeRows) {
      const width = 760;
      const height = 300;
      const left = 80;
      const right = 710;
      const min = 40;
      const max = 160;
      const bandTop = 26;
      const bandHeight = 26;
      const rowStart = 86;
      const rowGap = 52;
      const bands = [
        { from: 40, to: 69, label: "매우 열등", color: "#fff0f2" },
        { from: 70, to: 79, label: "열등", color: "#fff3e4" },
        { from: 80, to: 89, label: "평균 이하", color: "#fff8eb" },
        { from: 90, to: 110, label: "평균", color: "#ffffff" },
        { from: 111, to: 120, label: "평균 이상", color: "#f5faf8" },
        { from: 121, to: 130, label: "우수", color: "#f4f7ff" },
        { from: 131, to: 160, label: "매우 우수", color: "#eef4ff" },
      ];
      const bandSvg = bands.map((band) => {
        const x1 = chartX(band.from, min, max, left, right);
        const x2 = chartX(band.to, min, max, left, right);
        return `<rect x="${x1}" y="${bandTop}" width="${Math.max(1, x2 - x1)}" height="${bandHeight}" fill="${band.color}" stroke="#edf2ef"/><text x="${(x1 + x2) / 2}" y="${bandTop + 17}" text-anchor="middle" font-size="9" fill="#65706b">${band.label}</text>`;
      }).join("");
      const grid = [70, 80, 90, 100, 110, 120, 130].map((score) => {
        const x = chartX(score, min, max, left, right);
        return `<line x1="${x}" y1="56" x2="${x}" y2="236" stroke="#d9e1dc" stroke-width="1"/><text x="${x}" y="250" text-anchor="middle" font-size="10" fill="#65706b">${score}</text>`;
      }).join("");
      const bars = compositeRows.map((row, index) => {
        const y = rowStart + index * rowGap;
        const value = numberValue(row.index);
        const xValue = chartX(value, min, max, left, right);
        const color = row.key === "GVP" ? "#0f766e" : row.key === "MRP" ? "#315c8a" : "#b7791f";
        return `
          <text x="12" y="${y + 15}" font-size="12" font-weight="800" fill="#38443f">${row.key}</text>
          <rect x="${left}" y="${y}" width="${right - left}" height="22" fill="#f8fbfa" stroke="#d9e1dc"/>
          <rect x="${left}" y="${y}" width="${Math.max(2, xValue - left)}" height="22" fill="${color}" opacity=".9"/>
          <text x="${Math.min(right - 4, xValue + 8)}" y="${y + 15}" font-size="12" font-weight="900" fill="#1e2422">${escapeHtml(row.index)} · ${escapeHtml(row.level)}</text>
        `;
      }).join("");
      const byKey = Object.fromEntries(compositeRows.map((row) => [row.key, row]));
      const mrpVmiGap = Math.abs(numberValue(byKey.MRP.index) - numberValue(byKey.VMI.index));
      const gapText = mrpVmiGap >= 10.7
        ? `MRP-VMI 차이 ${mrpVmiGap.toFixed(1)}점: .01 기준에서 유의한 차이 가능`
        : mrpVmiGap >= 8.9
          ? `MRP-VMI 차이 ${mrpVmiGap.toFixed(1)}점: .05 기준에서 유의한 차이 가능`
          : `MRP-VMI 차이 ${mrpVmiGap.toFixed(1)}점: 매뉴얼의 .05 기준 차이점수 미만`;
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="종합척도 지수 프로파일 차트">
          ${bandSvg}
          ${grid}
          ${bars}
          <text x="${left}" y="276" font-size="11" fill="#65706b">${escapeHtml(gapText)}</text>
        </svg>
      `;
    }

    function renderInterpretation(compositeRows, subtestRows) {
      const byKey = Object.fromEntries(compositeRows.map((row) => [row.key, row]));
      const ordered = [...compositeRows].sort((a, b) => numberValue(b.index) - numberValue(a.index));
      const high = ordered[0];
      const low = ordered[ordered.length - 1];
      const gap = numberValue(high.index) - numberValue(low.index);
      const mrpVmiGap = Math.abs(numberValue(byKey.MRP.index) - numberValue(byKey.VMI.index));
      const strengths = subtestRows.filter((row) => numberValue(row.standard) >= 13);
      const weaknesses = subtestRows.filter((row) => numberValue(row.standard) <= 7);
      const standards = subtestRows.map((row) => numberValue(row.standard)).filter(Number.isFinite);
      const standardRange = Math.max(...standards) - Math.min(...standards);
      const allCompositeLow = compositeRows.every((row) => numberValue(row.index) < 90);
      const profileText = allCompositeLow
        ? "전반적으로 낮고 편평한 프로파일에 가까워 일반적 시지각 수행 전반의 어려움을 우선 검토해야 합니다."
        : standardRange >= 6
          ? `하위검사 표준점수 범위가 ${standardRange.toFixed(0)}점으로 산발적 프로파일 양상이 관찰됩니다. 능력 간 차이는 강점과 약점에 대한 가설로 해석하는 것이 적절합니다.`
          : "하위검사 간 점수 변산이 크지 않아 비교적 균형적인 프로파일입니다.";
      const strengthText = strengths.length
        ? `상대적으로 양호한 수행은 ${strengths.map((row) => `${row.name}(표준점수 ${row.standard})`).join(", ")}에서 관찰됩니다.`
        : "표준점수 13점 이상으로 두드러진 상대적 강점은 확인되지 않았습니다.";
      const weaknessText = weaknesses.length
        ? `추가 관찰이 필요한 낮은 수행은 ${weaknesses.map((row) => `${row.name}(표준점수 ${row.standard})`).join(", ")}입니다.`
        : "표준점수 7점 이하로 두드러진 상대적 약점은 확인되지 않았습니다.";
      const gapText = gap >= 15
        ? `${high.name} 지수(${high.index})가 ${low.name} 지수(${low.index})보다 높아 종합척도 간 차이가 임상적으로 검토될 필요가 있습니다.`
        : "세 종합척도 간 차이는 크게 두드러지지 않아 전반적 수행 양상이 비교적 균형적인 편입니다.";
      const mrpVmiText = mrpVmiGap >= 10.7
        ? `MRP와 VMI의 차이는 ${mrpVmiGap.toFixed(1)}점으로, 매뉴얼의 .01 수준 최소 차이점수 기준을 넘습니다. 운동 요소가 시각-운동통합 수행에 미친 영향을 면밀히 검토해야 합니다.`
        : mrpVmiGap >= 8.9
          ? `MRP와 VMI의 차이는 ${mrpVmiGap.toFixed(1)}점으로, 매뉴얼의 .05 수준 최소 차이점수 기준을 넘습니다. 운동 요구가 낮은 시지각 수행과 시각-운동통합 수행의 차이를 임상적으로 검토할 필요가 있습니다.`
          : `MRP와 VMI의 차이는 ${mrpVmiGap.toFixed(1)}점으로, 매뉴얼의 .05 수준 최소 차이점수 기준에는 미치지 않습니다.`;

      return `
        <p><strong>종합 소견.</strong> 일반시지각(GVP)은 지수 ${escapeHtml(byKey.GVP.index)}, 백분위 ${escapeHtml(byKey.GVP.percentile)}, ${escapeHtml(byKey.GVP.level)} 수준으로 산출되었습니다. 운동-감소시지각(MRP)은 지수 ${escapeHtml(byKey.MRP.index)}, 백분위 ${escapeHtml(byKey.MRP.percentile)}, ${escapeHtml(byKey.MRP.level)} 수준이며, 시각-운동통합(VMI)은 지수 ${escapeHtml(byKey.VMI.index)}, 백분위 ${escapeHtml(byKey.VMI.percentile)}, ${escapeHtml(byKey.VMI.level)} 수준입니다.</p>
        <p><strong>척도 간 비교.</strong> ${gapText} ${mrpVmiText}</p>
        <p><strong>하위검사 프로파일.</strong> ${profileText} ${strengthText} ${weaknessText}</p>
        <p><strong>해석상 유의점.</strong> 본 자동 요약은 채점표 기반 산출 결과를 정리한 자료입니다. 최종 해석은 검사 태도, 과제 이해도, 시각-운동 협응 관찰, 발달력 및 다른 평가 결과와 함께 통합하여 판단해야 합니다.</p>
      `;
    }

    function renderSummaryReport(band, subtestRows, compositeRows) {
      function descCompositeLevel(val) {
        if (val > 130) return '매우 우수';
        if (val >= 121) return '우수';
        if (val >= 111) return '평균 이상';
        if (val >= 90)  return '평균';
        if (val >= 80)  return '평균 이하';
        if (val >= 70)  return '열등';
        return '매우 열등';
      }

      const subtestDesc = {
        1: '눈과 손의 협응 능력(눈-손 응협)',
        2: '공간에서의 위치 지각 능력(공간위치)',
        3: '모양을 보고 그대로 따라 그리는 능력(따라그리기)',
        4: '복잡한 배경 속 목표 형태를 찾아내는 능력(형태-배경)',
        5: '공간적 관계를 파악하는 능력(공간관계)',
        6: '부분 단서로 전체 형태를 통합하는 능력(시각통합)',
        7: '시각 자극을 빠르고 정확하게 처리하는 속도(시각-운동속도)',
        8: '크기·방향이 달라도 같은 형태임을 인식하는 능력(형태항상성)',
      };

      const gvp = compositeRows.find(r => r.key === 'GVP');
      const mrp = compositeRows.find(r => r.key === 'MRP');
      const vmi = compositeRows.find(r => r.key === 'VMI');

      // 1. 검사 개요
      const sec1 = `<div class="summary-section">
        <h3>1. 검사 개요</h3>
        <p>한국판 시지각 발달검사(K-DTVP-2)는 Hammill 등(1993)의 DTVP-2를 문수백·여광응·조용태(2003)가 한국 아동(4~8세)을 대상으로 표준화한 도구입니다. 전국 1,000명의 규준 자료에 근거하며, 내적 일관성 신뢰도 계수는 대부분의 연령대에서 .80 이상입니다.</p>
        <p>본 검사는 8개 하위검사로 구성되며, 세 가지 종합척도—일반시지각(GVP), 동작감소시지각(MRP), 시각-운동통합(VMI)—를 산출합니다. 종합척도 지수는 평균 100, 표준편차 15의 표준점수입니다.</p>
      </div>`;

      // 2. 종합척도 해석
      let sec2parts = [];
      if (gvp) {
        let extra = '';
        if (gvp.index < 90) extra = ' 전반적인 시지각 발달에 어려움이 있을 수 있으며, 추가적인 평가와 지원이 권고됩니다.';
        sec2parts.push(`<p><strong>일반시지각(GVP) 지수 ${gvp.index}</strong>(백분위 ${gvp.pct}위)는 <strong>${descCompositeLevel(gvp.index)}</strong> 수준으로, 운동 요소를 포함한 전반적인 시지각 능력을 나타냅니다.${extra}</p>`);
      }
      if (mrp) {
        sec2parts.push(`<p><strong>동작감소시지각(MRP) 지수 ${mrp.index}</strong>(백분위 ${mrp.pct}위)는 <strong>${descCompositeLevel(mrp.index)}</strong> 수준입니다. MRP는 운동 반응을 최소화하여 순수한 시지각 처리 능력을 측정합니다.</p>`);
      }
      if (vmi) {
        sec2parts.push(`<p><strong>시각-운동통합(VMI) 지수 ${vmi.index}</strong>(백분위 ${vmi.pct}위)는 <strong>${descCompositeLevel(vmi.index)}</strong> 수준입니다. VMI는 시각 정보를 운동 반응과 통합하는 능력을 반영합니다.</p>`);
      }
      const sec2 = `<div class="summary-section"><h3>2. 종합척도 해석</h3>${sec2parts.join('')}</div>`;

      // 3. 척도 간 비교
      let sec3text = '';
      if (mrp && vmi) {
        const diff = Math.abs(mrp.index - vmi.index);
        if (diff >= 10.7) {
          const higher = mrp.index >= vmi.index ? 'MRP' : 'VMI';
          const lower  = mrp.index >= vmi.index ? 'VMI' : 'MRP';
          sec3text = `MRP와 VMI 간 지수 차이는 ${diff.toFixed(1)}점으로, .01 수준에서 통계적으로 유의미합니다(임계값 10.7). ${higher}가 ${lower}에 비해 유의하게 높아, 시각-운동 통합 능력과 순수 시지각 처리 능력 간 불균형이 시사됩니다.`;
        } else if (diff >= 8.9) {
          const higher = mrp.index >= vmi.index ? 'MRP' : 'VMI';
          const lower  = mrp.index >= vmi.index ? 'VMI' : 'MRP';
          sec3text = `MRP와 VMI 간 지수 차이는 ${diff.toFixed(1)}점으로, .05 수준에서 통계적으로 유의미합니다(임계값 8.9). ${higher}가 ${lower}보다 상대적으로 높은 수행을 보입니다.`;
        } else {
          sec3text = `MRP와 VMI 간 지수 차이는 ${diff.toFixed(1)}점으로, 통계적으로 유의미한 차이가 없습니다(임계값 .05 수준=8.9). 운동 요소의 유무와 무관하게 시지각 능력이 비교적 일관된 수준입니다.`;
        }
        if (mrp && vmi && mrp.index < 90 && vmi.index < 90) {
          sec3text += ' 두 척도 모두 평균 이하로, 지적 기능, 시력, 또는 신경학적 요인에 대한 종합적 검토가 필요할 수 있습니다.';
        }
      }
      const sec3 = `<div class="summary-section"><h3>3. 척도 간 비교</h3><p>${sec3text}</p></div>`;

      // 4. 하위검사 프로파일
      const scores = subtestRows.map(r => r.standard);
      const minS = Math.min(...scores);
      const maxS = Math.max(...scores);
      const range = maxS - minS;
      const strengths = subtestRows.filter(r => r.standard >= 13);
      const weaknesses = subtestRows.filter(r => r.standard <= 7);
      const allLow = compositeRows.every(r => r.index < 90);

      let profileText = '';
      if (allLow) {
        profileText += '모든 종합척도 지수가 평균(90) 미만으로, 전반적 저평균 프로파일이 관찰됩니다. ';
      }
      if (range >= 6) {
        profileText += `하위검사 환산점수 범위가 ${range}점(최저 ${minS}~최고 ${maxS})으로, 발달적 산포(scatter)가 나타납니다. `;
      } else {
        profileText += `하위검사 환산점수 범위는 ${range}점으로 비교적 고른 프로파일을 보입니다. `;
      }
      let strLine = '';
      if (strengths.length) {
        strLine = `<p><strong>상대적 강점:</strong> ${strengths.map(r => `${r.name}(${r.standard}점) — ${subtestDesc[r.id] || r.name}`).join('; ')}</p>`;
      }
      let weakLine = '';
      if (weaknesses.length) {
        weakLine = `<p><strong>상대적 약점:</strong> ${weaknesses.map(r => `${r.name}(${r.standard}점) — ${subtestDesc[r.id] || r.name}`).join('; ')}</p>`;
      }
      const sec4 = `<div class="summary-section"><h3>4. 하위검사 프로파일</h3><p>${profileText}</p>${strLine}${weakLine}</div>`;

      // 5. 종합 제언
      const hasDeficit = compositeRows.some(r => r.index < 80);
      const hasBorderline = !hasDeficit && compositeRows.some(r => r.index < 90);
      let rec = '';
      if (hasDeficit) {
        rec = '종합척도 지수가 열등 이하 수준으로 나타난 영역이 있어, 시지각 발달 지원 프로그램 또는 전문적 개입을 적극적으로 검토하시기 바랍니다. 시력 및 신경학적 요인에 대한 추가 평가도 고려하십시오.';
      } else if (hasBorderline) {
        rec = '종합척도 지수가 평균 이하 수준으로, 시지각 발달 지원 활동을 보완적으로 제공하는 것이 도움이 될 수 있습니다.';
      } else {
        rec = '전반적으로 연령에 적합한 시지각 발달 수준을 보이고 있습니다.';
      }
      rec += ' 본 검사 결과는 행동 관찰, 발달력, 기타 평가 자료와 종합적으로 해석되어야 하며, 단독으로 진단적 결론을 내리는 데 사용되어서는 안 됩니다.';
      const sec5 = `<div class="summary-section"><h3>5. 종합 제언</h3><p>${rec}</p></div>`;

      return `<div class="summary-report">
        <h2>총평</h2>
        ${sec1}${sec2}${sec3}${sec4}${sec5}
      </div>`;
    }

        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function exportDTVP2JSON() {
      updateAgeFromDates();
      const band = currentBand();
      const raws = getRawValues();
      const patient = {
        name: $("#clientName").value.trim(),
        sex: $("#clientSex").value,
        evalDate: $("#testDate").value,
        birth: $("#birthDate").value,
        age: $("#computedAge").value,
        ageBand: band ? band.key : ''
      };
      const data = { version: 'std2_dtvp2_v1', exportedAt: new Date().toISOString(), patient };
      if (!band || !allRawScoresPresent(raws)) {
        data.rawScores = raws;
        data.standardScores = null;
        data.note = '원점수 미완성 — 표준점수 미산출';
      } else {
        const subtestRows = DTVP_DATA.subtests.map((subtest) => {
          const lookupSet = band.subtests[String(subtest.id)];
          const raw = raws[subtest.id];
          const standard = lookup(lookupSet.standard, raw);
          return { id: subtest.id, name: subtest.name, domains: subtest.domains,
            raw, standard, percentile: lookup(lookupSet.percentile, raw),
            age: lookup(lookupSet.age, raw), level: scaledLevel(standard) };
        });
        const standardById = Object.fromEntries(subtestRows.map((r) => [r.id, numberValue(r.standard)]));
        const compositeRows = DTVP_DATA.composites.map((composite) => {
          const sum = composite.tests.reduce((total, id) => total + standardById[id], 0);
          const table = composite.key === 'GVP' ? band.composites.GVP : band.composites.FOUR;
          const idx = lookup(table.index, sum);
          return { key: composite.key, name: composite.name, sum, index: idx,
            percentile: lookup(table.percentile, sum), level: compositeLevel(idx) };
        });
        data.rawScores = Object.fromEntries(subtestRows.map((r) => [r.id, r.raw]));
        data.standardScores = { subtests: subtestRows, composites: compositeRows };
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `K-DTVP2_${patient.name || '이름없음'}_${patient.evalDate || new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── IndexedDB 공유 헬퍼 ─────────────────────────────────────
    const ChildDB=(()=>{
      const DN='si-cog-cda',V=1;let _db=null;
      function open(){
        if(_db)return Promise.resolve(_db);
        return new Promise((res,rej)=>{
          const r=indexedDB.open(DN,V);
          r.onupgradeneeded=e=>{
            const db=e.target.result;
            if(!db.objectStoreNames.contains('children'))
              db.createObjectStore('children',{keyPath:'id',autoIncrement:true});
            ['obs1','obs2','std1','std2','rpt','ace'].forEach(s=>{
              if(!db.objectStoreNames.contains(s))
                db.createObjectStore(s,{keyPath:'childId'});
            });
          };
          r.onsuccess=e=>{_db=e.target.result;res(_db);};
          r.onerror=e=>rej(e.target.error);
        });
      }
      function tx(store,mode,fn){
        return open().then(db=>new Promise((res,rej)=>{
          const t=db.transaction(store,mode);
          const req=fn(t.objectStore(store));
          req.onsuccess=e=>res(e.target.result);
          req.onerror=e=>rej(e.target.error);
        }));
      }
      return{
        listChildren:()=>tx('children','readonly',s=>s.getAll()),
        addChild:name=>tx('children','readwrite',s=>s.add({name,createdAt:new Date().toISOString()})),
        deleteChild:id=>tx('children','readwrite',s=>s.delete(id)),
        saveData:(store,childId,data)=>tx(store,'readwrite',s=>s.put({childId,data,savedAt:new Date().toISOString()})),
        loadData:(store,childId)=>tx(store,'readonly',s=>s.get(childId)).then(r=>r?r.data:null),
      };
    })();

    function resetDTVP2Form(){
      ["clientName","clientSex","testDate","birthDate"].forEach(id=>{const el=$("#"+id);if(el)el.value='';});
      for(const st of DTVP_DATA.subtests){const inp=document.getElementById('raw-'+st.id);if(inp)inp.value='';}
      ageBandSelect.value='';
    }

    async function saveToIDB(){
      if(!currentChildId)return;
      await ChildDB.saveData(STD2_STORE,currentChildId,collectDTVP2Data());
      setCbStatus('저장됨 '+new Date().toLocaleTimeString());
    }

    async function refreshChildList(selectId){
      const children=await ChildDB.listChildren();
      const sel=document.getElementById('child-select');
      sel.innerHTML='<option value="">-- 아동 선택 --</option>';
      children.forEach(c=>{
        const o=document.createElement('option');
        o.value=c.id;o.textContent=c.name;
        if(c.id===selectId)o.selected=true;
        sel.appendChild(o);
      });
    }

    async function onChildChange(){
      const sel=document.getElementById('child-select');
      const newId=sel.value?Number(sel.value):null;
      if(currentChildId)await saveToIDB().catch(()=>{});
      currentChildId=newId;
      resetDTVP2Form();
      if(newId){
        const data=await ChildDB.loadData(STD2_STORE,newId);
        restoreDTVP2Data(data);
        setCbStatus(data?'불러옴 '+new Date().toLocaleTimeString():'새 아동');
      }else{setCbStatus('');}
    }

    async function addNewChild(){
      const name=prompt('아동 이름을 입력하세요:');
      if(!name||!name.trim())return;
      const id=await ChildDB.addChild(name.trim());
      currentChildId=id;
      resetDTVP2Form();
      await refreshChildList(id);
      setCbStatus('새 아동 생성됨');
    }

    async function deleteCurrentChild(){
      const sel=document.getElementById('child-select');
      if(!sel.value){alert('삭제할 아동을 선택하세요.');return;}
      const name=sel.options[sel.selectedIndex].text;
      if(!confirm(`"${name}" 아동의 모든 데이터를 삭제합니다. 계속하시겠습니까?`))return;
      await ChildDB.deleteChild(Number(sel.value));
      currentChildId=null;
      await refreshChildList(null);
      resetDTVP2Form();
      setCbStatus('삭제됨');
    }

    // 입력 변경 시 IDB 자동저장 (debounce)
    document.addEventListener('input', e => {
      if (['clientName','clientSex','testDate','birthDate'].includes(e.target.id) ||
          (e.target.id && e.target.id.startsWith('raw-'))) {
        clearTimeout(window._dtvp2St);
        window._dtvp2St = setTimeout(()=>saveToIDB().catch(()=>{}), 600);
      }
    });
    ageBandSelect.addEventListener('change', () => {
      clearTimeout(window._dtvp2St);
      window._dtvp2St = setTimeout(()=>saveToIDB().catch(()=>{}), 300);
    });
    // 계산 버튼 클릭 시 저장
    $("#calculateBtn").addEventListener('click', () => setTimeout(()=>saveToIDB().catch(()=>{}), 100));
    // 초기화 시 현재 아동 데이터 IDB에서 리셋
    $("#resetBtn").addEventListener('click', () => {
      if(currentChildId) ChildDB.saveData(STD2_STORE,currentChildId,collectDTVP2Data()).catch(()=>{});
    });

    // 페이지 로드 시: IDB 초기화 + 레거시 마이그레이션 + 자동저장
    (async()=>{
      await ChildDB.listChildren().catch(()=>{});
      try{
        const raw=localStorage.getItem(DTVP2_LEGACY_KEY);
        if(raw){
          const d=JSON.parse(raw);
          const name=d.clientName||'가져온 데이터';
          if(confirm(`기존 저장 데이터(${name})를 IndexedDB로 이전하겠습니까?`)){
            const id=await ChildDB.addChild(name);
            await ChildDB.saveData(STD2_STORE,id,d);
            localStorage.removeItem(DTVP2_LEGACY_KEY);
            currentChildId=id;
            await refreshChildList(id);
            restoreDTVP2Data(d);
            setCbStatus('기존 데이터 이전 완료');
          }else{
            localStorage.removeItem(DTVP2_LEGACY_KEY);
            await refreshChildList(null);
          }
        }else{
          await refreshChildList(null);
        }
      }catch(e){await refreshChildList(null);}
      // 자동저장 30초마다
      setInterval(()=>saveToIDB().catch(()=>{}),30000);
    })();

  </script>
  <script>
    // PWA Service Worker 등록 + 자동 업데이트
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          reg.update().catch(()=>{});
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        }).catch(()=>{});
      });
    }
  </script>
