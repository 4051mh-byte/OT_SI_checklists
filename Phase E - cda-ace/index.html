order:1px solid var(--border);border-radius:var(--radius);padding:calc(var(--spacing)*1.5);margin-bottom:var(--spacing)}.activity-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:500}.activity-content{display:none;margin-top:var(--spacing)}.activity-content.show{display:block}.session-timeline{position:relative;padding-left:calc(var(--spacing)*4)}.timeline-item{position:relative;padding:calc(var(--spacing)*1.5) 0;margin-bottom:calc(var(--spacing)*2);border-left:2px solid var(--primary)}.timeline-item::before{content:'';position:absolute;left:calc(var(--spacing)*-.75);top:var(--spacing);width:12px;height:12px;background-color:var(--primary);border-radius:50%}.timeline-item .time{font-weight:600;color:var(--primary);font-size:.9rem}.timeline-item .phase{font-weight:500;margin-top:calc(var(--spacing)*.5)}.urgency-badge{padding:calc(var(--spacing)*.5) calc(var(--spacing)*1);border-radius:var(--radius-pill);font-size:.75rem;font-weight:600;margin-right:calc(var(--spacing)*.5)}.urgency-immediate{background-color:rgba(244,67,54,.2);color:#d32f2f}.urgency-priority{background-color:rgba(255,152,0,.2);color:#f57c00}.urgency-monitor{background-color:rgba(33,150,243,.2);color:#1976d2}.program-card{background-color:#fafafa;border:1px solid var(--border);border-radius:var(--radius);padding:calc(var(--spacing)*1.5);margin-bottom:var(--spacing)}.program-card h4{margin-bottom:calc(var(--spacing)*.5);color:var(--primary)}.program-card .tools{font-size:.85rem;color:var(--text-secondary)}.program-card .role{font-size:.85rem;margin-top:calc(var(--spacing)*.5);font-style:italic}.rf-table{width:100%;border-collapse:collapse;margin-top:var(--spacing)}.rf-table th{background-color:#f5f5f5;padding:calc(var(--spacing)*.75);border-bottom:2px solid var(--border);text-align:left;font-weight:600;font-size:.9rem}.rf-table td{padding:calc(var(--spacing)*.75);border-bottom:1px solid var(--border)}.rf-table tr:hover{background-color:#fafafa}@media (max-width:768px){:root{--spacing:6px}.form-grid{grid-template-columns:1fr}.domain-input-item{grid-template-columns:1fr}.top-bar-content{flex-direction:column;align-items:flex-start}.action-bar{flex-direction:column}}@media print{.top-bar,.tab-bar,.action-bar,.btn{display:none}body{background-color:#fff}.card{box-shadow:none;border:1px solid var(--border)}}

<body>

  <div class="top-bar">
    <div class="top-bar-content">
      <div class="top-bar-title">
        <h1>ACE - 중재 목표 & 활동 추천 엔진</h1>
        <p class="top-bar-subtitle">평가 데이터 기반 개인화된 중재 계획 수립</p>
      </div>
      <select id="childSelect" class="child-select">
        <option value="">+ 신규 아동</option>
      </select>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="profile">1. 프로필</button>
    <button class="tab-btn" data-tab="cascade">2. 캐스케이드</button>
    <button class="tab-btn" data-tab="redflags">3. Red Flag</button>
    <button class="tab-btn" data-tab="goals">4. 목표</button>
    <button class="tab-btn" data-tab="activities">5. 활동 & 세션</button>
    <button class="tab-btn" data-tab="export">6. 내보내기</button>
  </div>

  <div class="main-content">
    <div id="profile" class="tab-content active">
      <div class="card">
        <h2>아동 정보 입력</h2>
        <div class="form-grid">
          <div class="form-label">
            <label for="childName">아동 이름</label>
            <input type="text" id="childName" class="form-input" placeholder="예: 김철수">
          </div>
          <div class="form-label">
            <label for="childBirth">생년월일</label>
            <input type="date" id="childBirth" class="form-input">
          </div>
          <div class="form-label">
            <label for="evalDate">평가일</label>
            <input type="date" id="evalDate" class="form-input">
          </div>
          <div class="form-label">
            <label for="childDiagnosis">진단</label>
            <select id="childDiagnosis" class="form-select">
              <option value="">선택</option>
              <option value="ASD">ASD</option>
              <option value="ADHD">ADHD</option>
              <option value="DCD">DCD</option>
              <option value="ID">ID</option>
              <option value="CP">CP</option>
              <option value="SLD">SLD</option>
              <option value="DD">DD</option>
              <option value="GDD">GDD</option>
              <option value="DOWN">다운증후군</option>
              <option value="OTHER">기타</option>
            </select>
          </div>
          <div class="form-label">
            <label for="ageMonths">월령</label>
            <input type="number" id="ageMonths" class="form-input" readonly>
          </div>
          <div class="form-label">
            <label for="evaluator">평가자</label>
            <input type="text" id="evaluator" class="form-input" placeholder="홍길동 치료사">
          </div>
        </div>

        <div id="domainInputs" style="margin-top:calc(var(--spacing)*3)"></div>

        <div class="action-bar">
          <button class="btn btn-outline" id="importJSONBtn">📂 JSON 가져오기</button>
          <button class="btn btn-outline" id="mergeImportBtn" style="border-color:#E55D62;color:#E55D62;">📂 ①/③ 가져오기</button>
          <button class="btn btn-primary btn-large" id="saveBtnTop">저장</button>
          <button class="btn btn-success btn-large" id="generateBtnTop">▶ 추천 생성</button>
        </div>
      </div>
    </div>

    <div id="cascade" class="tab-content">
      <div id="cascadeContent" class="card placeholder">
        <p>먼저 프로필을 입력하고 [▶ 추천 생성]을 클릭하세요.</p>
      </div>
    </div>

    <div id="redflags" class="tab-content">
      <div id="redflagsContent" class="card placeholder">
        <p>먼저 프로필을 입력하고 [▶ 추천 생성]을 클릭하세요.</p>
      </div>
    </div>

    <div id="goals" class="tab-content">
      <div id="goalsContent" class="card placeholder">
        <p>먼저 프로필을 입력하고 [▶ 추천 생성]을 클릭하세요.</p>
      </div>
    </div>

    <div id="activities" class="tab-content">
      <div id="activitiesContent" class="card placeholder">
        <p>먼저 프로필을 입력하고 [▶ 추천 생성]을 클릭하세요.</p>
      </div>
    </div>

    <div id="export" class="tab-content">
      <div class="card">
        <h2>결과 내보내기</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing);margin-bottom:calc(var(--spacing)*2)">
          <button class="btn btn-primary" id="exportJSON">📥 JSON</button>
          <button class="btn btn-primary" id="exportPrint">🖨️ 인쇄</button>
          <button class="btn btn-primary" id="exportParent">👨‍👩‍👧 부모가이드</button>
        </div>
        <div class="mt-4">
          <h3>저장된 아동</h3>
          <div id="childrenList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  
  <script>

function achRateToLevel(achRate) {
  if (achRate >= 80) return 5;
  if (achRate >= 70) return 4;

// ── ENGINE: Cascade Analysis ──
/**
 * cascade.js — 캐스케이드 분석 모듈
 * 3개 도메인의 계층적 손상 위치를 분석하고 도메인 간 교차영향을 파악
 */


/**
 * 메인 캐스케이드 분석
 * @param {object} profile - importerr에서 생성한 ClientProfile
 * @returns {object} cascadeResult
 */
function analyzeCascade(profile) {
  const domains = profile.domains;

  // 1. 도메인별 캐스케이드 분석
  const si = domains.SI ? analyzeSI(domains.SI) : null;
  const gf = domains.GF ? analyzeGF(domains.GF) : null;
  const oc = domains.OC ? analyzeOC(domains.OC) : null;
  const cog = domains.COG ? analyzeCOG(domains.COG) : null;

  // 2. SP 전제조건 체크
  const spPremise = checkSPPremise(si, domains.SI);

  // 3. 도메인 간 교차영향 분석
  const crossDomain = findCrossDomainEffects(si, gf, oc, cog, domains);

  // 4. 통합 중재 순서 생성
  const interventionOrder = buildInterventionOrder(si, gf, oc, cog, spPremise, crossDomain);

  // 5. 전체 요약
  const summary = buildSummary(si, gf, oc, cog, spPremise, crossDomain);

  return {
    si, gf, oc, cog,
    spPremise,
    crossDomain,
    interventionOrder,
    summary
  };
}

// ── OC 캐스케이드 분석 ──
// Tier1(ATT) → Tier2(WM+INH) → Tier3(PO+SEQ+CF) → Tier4(SM+TM)
function analyzeOC(domain) {
  const areaMap = {};
  (domain.areas || []).forEach(a => { areaMap[a.code] = a; });

  // Tier별 집계
  const tiers = [
    {
      tier: 1, name: 'Tier1_기저주의',
      clusters: [{ id: 'OC1_ATT', code: 'OC-T1', label: '주의(ATT)' }]
    },
    {
      tier: 2, name: 'Tier2_핵심EF',
      clusters: [
        { id: 'OC2_WM', code: 'OC-T2', label: '작업기억(WM)' },
        { id: 'OC6_INH', code: 'OC-T2', label: '억제(INH)' }
      ]
    },
    {
      tier: 3, name: 'Tier3_복합EF',
      clusters: [
        { id: 'OC3_PO', code: 'OC-T3', label: '계획(PO)' },
        { id: 'OC4_SEQ', code: 'OC-T3', label: '순서화(SEQ)' },
        { id: 'OC5_CF', code: 'OC-T3', label: '전환(CF)' }
      ]
    },
    {
      tier: 4, name: 'Tier4_메타인지',
      clusters: [
        { id: 'OC7_SM', code: 'OC-T4', label: '자기점검(SM)' },
        { id: 'OC8_TM', code: 'OC-T4', label: '시간관리(TM)' }
      ]
    }
  ];

  // OC는 Tier 단위로 achRate를 받으므로, Tier 코드로 매핑
  const tierResults = tiers.map(t => {
    // Tier 코드(OC-T1 등)로 area 찾기
    const tierCode = t.clusters[0].code;
    const area = areaMap[tierCode];
    const achRate = area ? area.achRate : 0;
    const level = achRateToLevel(achRate);
    const rfCount = area ? (area.rfCount || 0) : 0;

    return {
      tier: t.tier,
      name: t.name,
      clusters: t.clusters.map(c => c.id),
      clusterLabels: t.clusters.map(c => c.label),
      achRate,
      level,
      rfCount,
      isImpaired: level <= 2
    };
  });

  // 최하위 손상 Tier 찾기
  const impairedTiers = tierResults.filter(t => t.isImpaired);
  const lowestImpaired = impairedTiers.length > 0
    ? impairedTiers.reduce((a, b) => a.tier < b.tier ? a : b)
    : null;

  return {
    domain: 'OC',
    tiers: tierResults,
    lowestImpaired,
    lowestTier: lowestImpaired ? lowestImpaired.tier : null,
    lowestLevel: lowestImpaired ? lowestImpaired.level : 5,
    cascadeType: 'tier'
  };
}

// ── SI 캐스케이드 분석 ──
// SR(감각조절) → MC(운동조절) → SD(감각변별)
function analyzeSI(domain) {
  const areaMap = {};
  (domain.areas || []).forEach(a => { areaMap[a.code] = a; });

  const stages = [
    {
      order: 1, code: 'SR', name: '감각조절',
      areas: ['SR-OR', 'SR-UR', 'SR-SK']
    },
    {
      order: 2, code: 'MC', name: '운동조절',
      areas: ['MC-PS', 'MC-PX', 'MC-BL']
    },
    {
      order: 3, code: 'SD', name: '감각변별',
      areas: ['SD']
    }
  ];

  const stageResults = stages.map(s => {
    const matchedAreas = s.areas.map(code => areaMap[code]).filter(Boolean);
    const achRate = matchedAreas.length > 0
      ? Math.round(matchedAreas.reduce((sum, a) => sum + a.achRate, 0) / matchedAreas.length)
      : 0;
    const rfCount = matchedAreas.reduce((sum, a) => sum + (a.rfCount || 0), 0);
    const level = achRateToLevel(achRate);

    return {
      order: s.order,
      code: s.code,
      name: s.name,
      achRate,
      level,
      rfCount,
      isImpaired: level <= 2,
      subAreas: matchedAreas.map(a => ({
        code: a.code,
        achRate: a.achRate,
        level: achRateToLevel(a.achRate),
        rfCount: a.rfCount || 0
      }))
    };
  });

  const impairedStages = stageResults.filter(s => s.isImpaired);
  const lowestImpaired = impairedStages.length > 0
    ? impairedStages.reduce((a, b) => a.order < b.order ? a : b)
    : null;

  return {
    domain: 'SI',
    stages: stageResults,
    lowestImpaired,
    lowestTier: lowestImpaired ? lowestImpaired.order : null,
    lowestLevel: lowestImpaired ? lowestImpaired.level : 5,
    cascadeType: 'stage'
  };
}

// ── G_F 캐스케이드 분석 ──
// SP → PS → GM → FM → VP/PC
function analyzeGF(domain) {
  const areaMap = {};
  (domain.areas || []).forEach(a => { areaMap[a.code] = a; });

  const stages = [
    { order: 1, code: 'SP', name: '감각처리', areas: ['SP'] },
    { order: 2, code: 'PS', name: '자세안정', areas: ['PS'] },
    { order: 3, code: 'GM', name: '대근육', areas: ['GM'] },
    { order: 4, code: 'FM', name: '소근육', areas: ['FM'] },
    { order: 5, code: 'VP_PC', name: '시지각', areas: ['VP_PC', 'VP'] }
  ];

  // GF는 간략한 2개 area(GM, FM)만 올 수 있음 — 유연하게 처리
  const stageResults = stages.map(s => {
    const matchedAreas = s.areas.map(code => areaMap[code]).filter(Boolean);
    const achRate = matchedAreas.length > 0
      ? Math.round(matchedAreas.reduce((sum, a) => sum + a.achRate, 0) / matchedAreas.length)
      : -1; // 데이터 없음
    const rfCount = matchedAreas.reduce((sum, a) => sum + (a.rfCount || 0), 0);
    const level = achRate >= 0 ? achRateToLevel(achRate) : -1;

    return {
      order: s.order,
      code: s.code,
      name: s.name,
      achRate: achRate >= 0 ? achRate : null,
      level: level >= 0 ? level : null,
      rfCount,
      isImpaired: level > 0 && level <= 2,
      hasData: achRate >= 0
    };
  });

  const impairedStages = stageResults.filter(s => s.isImpaired);
  const lowestImpaired = impairedStages.length > 0
    ? impairedStages.reduce((a, b) => a.order < b.order ? a : b)
    : null;

  return {
    domain: 'GF',
    stages: stageResults,
    lowestImpaired,
    lowestTier: lowestImpaired ? lowestImpaired.order : null,
    lowestLevel: lowestImpaired ? lowestImpaired.level : 5,
    cascadeType: 'stage'
  };
}

// ── COG 분석 (순수 인지 — 캐스케이드 없이 영역별 수준) ──
function analyzeCOG(domain) {
  const areas = (domain.areas || []).map(a => ({
    code: a.code,
    achRate: a.achRate || 0,
    level: achRateToLevel(a.achRate || 0),
    rfCount: a.rfCount || 0,
    isImpaired: achRateToLevel(a.achRate || 0) <= 2
  }));

  const impairedAreas = areas.filter(a => a.isImpaired);

  return {
    domain: 'COG',
    areas,
    lowestImpaired: impairedAreas.length > 0
      ? impairedAreas.reduce((a, b) => a.level < b.level ? a : b)
      : null,
    lowestLevel: impairedAreas.length > 0
      ? Math.min(...impairedAreas.map(a => a.level))
      : 5,
    cascadeType: 'flat'
  };
}

// ── SP 전제조건 체크 ──
function checkSPPremise(siResult, siDomain) {
  if (!siResult || !siDomain) return null;

  // SR(감각조절) 단계가 Level 2 이하이면 SP 전제조건 활성화
  const srStage = siResult.stages.find(s => s.code === 'SR');
  if (srStage && srStage.isImpaired) {
    // 어떤 하위영역이 가장 문제인지 파악
    const worstSub = srStage.subAreas.reduce(
      (worst, a) => (a.level < worst.level ? a : worst),
      { level: 5 }
    );
    return {
      active: true,
      reason: 'SR(감각조절) Level ≤ 2 — 모든 도메인에서 SP 배제/조절 먼저 실시',
      srLevel: srStage.level,
      worstArea: worstSub.code || 'SR',
      affects: ['OC.ATT', 'GF.PS', 'COG.ATT'] // 영향받는 영역
    };
  }

  return null;
}

// ── 도메인 간 교차영향 ──
function findCrossDomainEffects(si, gf, oc, cog, domains) {
  const effects = [];

  // 1. SI.SR → OC.ATT (감각→주의 캐스케이드)
  if (si && oc) {
    const srStage = si.stages.find(s => s.code === 'SR');
    const ocT1 = oc.tiers.find(t => t.tier === 1);
    if (srStage && srStage.isImpaired && ocT1 && ocT1.isImpaired) {
      effects.push({
        from: 'SI.SR', to: 'OC.ATT',
        type: 'sp_att_cascade',
        description: '감각조절 문제 → 주의력 저하: 감각식이로 주의력 기저선 먼저 확인',
        priority: 1
      });
    }
  }

  // 2. GF.FM → OC.PO (소근육→계획)
  if (gf && oc) {
    const fmStage = gf.stages.find(s => s.code === 'FM');
    const ocT3 = oc.tiers.find(t => t.tier === 3);
    if (fmStage && fmStage.isImpaired && ocT3 && ocT3.isImpaired) {
      effects.push({
        from: 'GF.FM', to: 'OC.PO',
        type: 'fm_po_cascade',
        description: '소근육 제한 → 과제 계획/조직화 저하: 도구과제 시 FM 보상 필요',
        priority: 2
      });
    }
  }

  // 3. OC.EF → GF.GM5 (실행기능→운동계획)
  if (oc && gf) {
    const ocT2 = oc.tiers.find(t => t.tier === 2);
    const gmStage = gf.stages.find(s => s.code === 'GM');
    if (ocT2 && ocT2.isImpaired && gmStage && gmStage.isImpaired) {
      effects.push({
        from: 'OC.EF', to: 'GF.GM5',
        type: 'ef_praxis_cascade',
        description: '핵심 EF 저하 → 운동계획(Praxis) 영향: CO-OP 기반 통합 접근',
        priority: 2
      });
    }
  }

  // 4. SI.SR → GF.PS (감각조절→자세안정)
  if (si && gf) {
    const srStage = si.stages.find(s => s.code === 'SR');
    const psStage = gf.stages.find(s => s.code === 'PS');
    if (srStage && srStage.isImpaired && psStage && psStage.isImpaired) {
      effects.push({
        from: 'SI.SR', to: 'GF.PS',
        type: 'sr_ps_cascade',
        description: '감각조절 → 자세안정: 감각기반 자세안정 중재 선행',
        priority: 1
      });
    }
  }

  // 5. COG.ATT → OC.T1 (기초인지 주의→작업인지 주의)
  if (cog && oc) {
    const cogATT = cog.areas.find(a => a.code === 'ATT');
    const ocT1 = oc.tiers.find(t => t.tier === 1);
    if (cogATT && cogATT.isImpaired && ocT1 && ocT1.isImpaired) {
      effects.push({
        from: 'COG.ATT', to: 'OC.T1',
        type: 'cog_oc_att_convergence',
        description: '기초인지+작업인지 주의력 동시 저하: 통합 주의력 중재 필요',
        priority: 1
      });
    }
  }

  return effects.sort((a, b) => a.priority - b.priority);
}

// ── 통합 중재 순서 ──
function buildInterventionOrder(si, gf, oc, cog, spPremise, crossDomain) {
  const order = [];

  // Phase 0: SP 전제조건
  if (spPremise && spPremise.active) {
    order.push({
      phase: 0,
      label: 'SP 배제/조절',
      domain: 'SI',
      cluster: 'SR',
      reason: spPremise.reason,
      priority: 'critical'
    });
  }

  // 각 도메인의 손상 영역 수집
  const impairments = [];

  if (si && si.lowestImpaired) {
    si.stages.filter(s => s.isImpaired).forEach(s => {
      impairments.push({
        domain: 'SI',
        cluster: s.code,
        label: `SI.${s.name}`,
        tier: s.order,
        level: s.level,
        rfCount: s.rfCount
      });
    });
  }

  if (gf && gf.lowestImpaired) {
    gf.stages.filter(s => s.isImpaired).forEach(s => {
      impairments.push({
        domain: 'GF',
        cluster: s.code,
        label: `GF.${s.name}`,
        tier: s.order,
        level: s.level,
        rfCount: s.rfCount
      });
    });
  }

  if (oc && oc.lowestImpaired) {
    oc.tiers.filter(t => t.isImpaired).forEach(t => {
      impairments.push({
        domain: 'OC',
        cluster: t.clusters.join('+'),
        label: t.name,
        tier: t.tier,
        level: t.level,
        rfCount: t.rfCount
      });
    });
  }

  if (cog && cog.lowestImpaired) {
    cog.areas.filter(a => a.isImpaired).forEach(a => {
      impairments.push({
        domain: 'COG',
        cluster: a.code,
        label: `COG.${a.code}`,
        tier: 1, // COG는 flat 구조, 동일 tier
        level: a.level,
        rfCount: a.rfCount || 0
      });
    });
  }

  // 정렬: Red Flag 우선 → Tier 낮은 것 우선 → Level 낮은 것 우선
  impairments.sort((a, b) => {
    if (b.rfCount !== a.rfCount) return b.rfCount - a.rfCount; // RF 많은 것 먼저
    if (a.tier !== b.tier) return a.tier - b.tier;             // Tier 낮은 것 먼저
    return a.level - b.level;                                   // Level 낮은 것 먼저
  });

  impairments.forEach((imp, idx) => {
    order.push({
      phase: idx + 1,
      label: imp.label,
      domain: imp.domain,
      cluster: imp.cluster,
      tier: imp.tier,
      level: imp.level,
      rfCount: imp.rfCount,
      reason: `Level ${imp.level} (${imp.rfCount > 0 ? 'RF ' + imp.rfCount + '건' : '관찰 필요'})`,
      priority: imp.rfCount > 0 ? 'high' : 'normal'
    });
  });

  return order;
}

// ── 전체 요약 ──
function buildSummary(si, gf, oc, cog, spPremise, crossDomain) {
  const lines = [];

  if (spPremise && spPremise.active) {
    lines.push(`🔴 SP 전제조건 활성: ${spPremise.reason}`);
  }

  [si, gf, oc].forEach(result => {
    if (!result) return;
    const domain = result.domain;
    if (result.lowestImpaired) {
      const imp = result.lowestImpaired;
      const tierLabel = result.cascadeType === 'tier'
        ? `Tier${imp.tier}`
        : imp.name || imp.code;
      lines.push(`🟡 ${domain}: 최하위 손상 = ${tierLabel} (Level ${imp.level})`);
    } else {
      lines.push(`🟢 ${domain}: 전체 양호`);
    }
  });

  if (crossDomain.length > 0) {
    lines.push(`⚡ 도메인 교차: ${crossDomain.map(e => `${e.from}→${e.to}`).join(', ')}`);
  }

  return lines;
}

// ── ENGINE: Red Flag Analyzer ──
/**
 * redFlagAnalyzer.js — Red Flag 판정 + 긴급도 분류
 * 평가 결과에서 Red Flag을 식별하고 긴급 조치를 생성
 */


/**
 * Red Flag 분석
 * @param {object} profile - ClientProfile
 * @param {object} cascadeResult - cascade.js 결과
 * @returns {object} redFlagResult
 */
function analyzeRedFlags(profile, cascadeResult) {
  const flags = [];

  // 1. 도메인별 RF 수집
  ['SI', 'GF', 'OC', 'COG'].forEach(domainCode => {
    const domain = profile.domains[domainCode];
    if (!domain) return;

    // 전체 도메인 RF
    if (domain.totalRfCount > 0) {
      (domain.areas || []).forEach(area => {
        if (area.rfCount > 0) {
          flags.push({
            domain: domainCode,
            areaCode: area.code,
            areaName: area.name || area.code,
            rfCount: area.rfCount,
            achRate: area.achRate,
            level: achRateToLevel(area.achRate)
          });
        }
      });
    }

    // achRate 기반 암묵적 RF: 40% 미만이면 '정밀평가' 수준
    (domain.areas || []).forEach(area => {
      if (area.achRate < 40 && area.rfCount === 0) {
        flags.push({
          domain: domainCode,
          areaCode: area.code,
          areaName: area.name || area.code,
          rfCount: 0,
          achRate: area.achRate,
          level: achRateToLevel(area.achRate),
          implicit: true // 명시적 RF는 아니지만 수준이 매우 낮음
        });
      }
    });
  });

  // 2. 긴급도 분류
  const actions = flags.map(flag => classifyUrgency(flag, profile, cascadeResult));

  // 3. 정렬: immediate → priority → monitor
  const urgencyOrder = { immediate: 0, priority: 1, monitor: 2 };
  actions.sort((a, b) => urgencyOrder[a.urgency] - urgencyOrder[b.urgency]);

  // 4. 요약
  const summary = {
    total: actions.length,
    immediate: actions.filter(a => a.urgency === 'immediate').length,
    priority: actions.filter(a => a.urgency === 'priority').length,
    monitor: actions.filter(a => a.urgency === 'monitor').length
  };

  return { flags: actions, summary };
}

/**
 * 개별 RF의 긴급도 분류
 */
function classifyUrgency(flag, profile, cascadeResult) {
  const diagnosis = profile.patient.diagnosis || '';
  const ageMonths = profile.patient.ageMonths || 0;

  let urgency = 'monitor';
  let action = '';
  let referral = '';

  // 긴급 (immediate): Level 1 + RF 있음 + 어린 연령
  if (flag.level === 1 && flag.rfCount > 0) {
    urgency = 'immediate';
    action = `${flag.areaName} 영역 즉시 정밀평가 필요`;
    referral = getReferralType(flag.domain, flag.areaCode, diagnosis);
  }
  // 우선 (priority): Level 1 or (Level 2 + RF 있음)
  else if (flag.level === 1 || (flag.level === 2 && flag.rfCount > 0)) {
    urgency = 'priority';
    action = `${flag.areaName} 영역 우선 중재 + 4주 후 재평가`;
    referral = getReferralType(flag.domain, flag.areaCode, diagnosis);
  }
  // 관찰 (monitor): Level 2 without RF, or implicit RF
  else {
    urgency = 'monitor';
    action = `${flag.areaName} 영역 관찰 지속, 6주 후 재평가`;
  }

  // 연령 보정: 36개월 미만이면 긴급도 한 단계 상승
  if (ageMonths > 0 && ageMonths < 36 && urgency === 'priority') {
    urgency = 'immediate';
    action += ' (36개월 미만 조기개입 권장)';
  }

  // 교차 도메인 영향 보정
  if (cascadeResult && cascadeResult.crossDomain) {
    const crossEffect = cascadeResult.crossDomain.find(
      e => e.from.includes(flag.areaCode) || e.to.includes(flag.areaCode)
    );
    if (crossEffect && urgency === 'monitor') {
      urgency = 'priority';
      action += ` (도메인 교차 영향: ${crossEffect.from}→${crossEffect.to})`;
    }
  }

  return {
    ...flag,
    urgency,
    action,
    referral,
    emoji: urgency === 'immediate' ? '🔴' : urgency === 'priority' ? '🟡' : '🔵'
  };
}

/**
 * 영역별 의뢰 유형 결정
 */
function getReferralType(domain, areaCode, diagnosis) {
  const referralMap = {
    // SI
    'SR-OR': '감각통합 전문가 정밀평가 (SP-2, SPM-2)',
    'SR-UR': '감각통합 전문가 정밀평가 + 신경발달 확인',
    'SR-SK': '감각통합 평가 + ADHD 감별 (SR-SK vs ADHD 구분)',
    'MC-PS': 'PT 의뢰 (자세안정/근력) + OT 감각통합',
    'MC-PX': 'DCD 정밀평가 (MABC-2, BOT-2)',
    'MC-BL': '양측협응 정밀평가 + 신경학적 검진 고려',
    'SD': '감각변별 정밀평가',
    // GF
    'GM': 'PT 의뢰 (대근육 정밀평가: MABC-2, PDMS-2)',
    'FM': 'OT 정밀평가 (소근육: BOT-2, Beery VMI)',
    // OC
    'OC-T1': 'ADHD 감별평가 (K-ARS-5, 연속수행검사)',
    'OC-T2': '작업기억/억제 정밀평가 (K-BRIEF-2)',
    'OC-T3': '실행기능 정밀평가 (K-BRIEF-2, WCST)',
    'OC-T4': '메타인지 평가 (Toglia DIA)',
    // COG
    'ATT': 'ADHD 감별평가 + 감각처리 확인',
    'MEM': '인지발달 정밀평가 (K-Bayley-4, K-WISC-V)',
    'PER': '시지각 정밀평가 (K-DTVP-3)',
    'THK': '인지발달 정밀평가',
    'EXF': '실행기능 정밀평가 (K-BRIEF-2)',
    'LNG': 'SLP 의뢰 (언어발달 정밀평가)',
    'NUM': '수 개념·작업기억 정밀평가 (K-WISC-V 산수/숫자)'
  };

  let referral = referralMap[areaCode] || '해당 영역 전문가 정밀평가';

  // 진단별 추가 의뢰
  if (diagnosis === 'ASD' && ['SR-OR', 'SR-SK'].includes(areaCode)) {
    referral += ' + ASD 감각프로파일 분석';
  }
  if (diagnosis === 'CP' && ['GM', 'MC-PS'].includes(areaCode)) {
    referral += ' + 재활의학과 협진';
  }

  return referral;
}

/**
 * RF 기반 목표 우선순위 조정
 * goalGenerator에서 호출하여 RF가 있는 영역의 목표를 우선 배치
 */
function prioritizeByRedFlags(goals, redFlagResult) {
  if (!redFlagResult || !redFlagResult.flags) return goals;

  return goals.map(goal => {
    const matchingRF = redFlagResult.flags.find(
      rf => rf.domain === goal.domain &&
        (goal.cluster.includes(rf.areaCode) || rf.areaCode.includes(goal.cluster.split('_')[0]))
    );

    if (matchingRF) {
      return {
        ...goal,
        rfUrgency: matchingRF.urgency,
        rfAction: matchingRF.action,
        boostedPriority: matchingRF.urgency === 'immediate' ? 0 : 1
      };
    }
    return { ...goal, boostedPriority: 2 };
  }).sort((a, b) => a.boostedPriority - b.boostedPriority);
}

// ── ENGINE: Goal Generator ──
/**
 * goalGenerator.js — 장/단기 목표 생성 모듈
 * 캐스케이드 분석 + RF 결과를 기반으로 GAS 형식 목표 자동 생성
 */


// 목표 템플릿 데이터 (런타임에 로드)
let goalTemplates = [];

/**
 * 목표 템플릿 초기화
 */
function initGoalTemplates(templates) {
  goalTemplates = templates;
}

/**
 * 장/단기 목표 생성
 * @param {object} profile - ClientProfile
 * @param {object} cascadeResult - cascade.js 결과
 * @param {object} redFlagResult - redFlagAnalyzer.js 결과
 * @returns {{ longTermGoals: Goal[], shortTermGoals: Goal[] }}
 */
function generateGoals(profile, cascadeResult, redFlagResult) {
  const longTermGoals = [];
  const shortTermGoals = [];
  let goalCounter = 0;

  const interventionOrder = cascadeResult.interventionOrder || [];
  const diagnosis = profile.patient.diagnosis || '';

  // 캐스케이드 순서대로 목표 생성
  interventionOrder.forEach(item => {
    if (item.phase === 0) {
      // SP 전제조건 — 특수 목표
      const spGoals = generateSPPremiseGoals(++goalCounter, item, diagnosis);
      longTermGoals.push(spGoals.longTerm);
      shortTermGoals.push(spGoals.shortTerm);
      return;
    }

    const level = item.level || 1;
    if (level >= 4) return; // 양호 이상은 목표 불필요

    // 도메인별 템플릿 찾기
    const template = findTemplate(item.domain, item.cluster);

    goalCounter++;
    const ltGoal = generateLongTermGoal(goalCounter, item, level, template, diagnosis);
    const stGoal = generateShortTermGoal(goalCounter, item, level, template, diagnosis);

    longTermGoals.push(ltGoal);
    shortTermGoals.push(stGoal);
  });

  // RF가 있지만 interventionOrder에 없는 영역도 보충
  if (redFlagResult && redFlagResult.flags) {
    redFlagResult.flags.forEach(rf => {
      if (rf.urgency !== 'immediate') return;
      const alreadyCovered = interventionOrder.some(
        item => item.domain === rf.domain && item.cluster.includes(rf.areaCode)
      );
      if (!alreadyCovered) {
        goalCounter++;
        const rfGoal = generateRFGoal(goalCounter, rf, diagnosis);
        longTermGoals.push(rfGoal.longTerm);
        shortTermGoals.push(rfGoal.shortTerm);
      }
    });
  }

  return { longTermGoals, shortTermGoals };
}

// ── 장기 목표 생성 (6개월) ──
function generateLongTermGoal(counter, item, currentLevel, template, diagnosis) {
  const targetLevel = Math.min(currentLevel + 2, 5);
  const targetDesc = template
    ? (template.levels[String(targetLevel)] || {}).description || ''
    : getLevelLabel(targetLevel);

  const currentDesc = template
    ? (template.levels[String(currentLevel)] || {}).description || ''
    : getLevelLabel(currentLevel);

  const clusterName = template ? template.clusterName : item.label;

  // GAS 형식 5단계
  const gasLevels = buildGASLevels(currentLevel, targetLevel, template);

  // 목표 텍스트 생성
  let text = template && template.longTermGoalTemplate
    ? template.longTermGoalTemplate
        .replace('{{cluster}}', clusterName)
        .replace('{{targetLevel}}', targetLevel)
        .replace('{{targetDesc}}', targetDesc)
    : `${clusterName}: 현재 Level ${currentLevel}에서 Level ${targetLevel}(${targetDesc})에 6개월 내 도달`;

  // 진단별 목표 변형
  text = applyDiagnosisModifier(text, item.domain, item.cluster, diagnosis, 'long');

  return {
    id: `LG-${counter}`,
    type: 'long_term',
    domain: item.domain,
    cluster: item.cluster,
    clusterName,
    currentLevel,
    targetLevel,
    currentDesc,
    targetDesc,
    text,
    gasLevels,
    linkedActivities: [],
    reviewWeeks: 24,
    rfRelated: item.rfCount > 0
  };
}

// ── 단기 목표 생성 (4~6주) ──
function generateShortTermGoal(counter, item, currentLevel, template, diagnosis) {
  const targetLevel = Math.min(currentLevel + 1, 5);
  const targetDesc = template
    ? (template.levels[String(targetLevel)] || {}).description || ''
    : getLevelLabel(targetLevel);

  const currentDesc = template
    ? (template.levels[String(currentLevel)] || {}).description || ''
    : getLevelLabel(currentLevel);

  const clusterName = template ? template.clusterName : item.label;

  let text = template && template.shortTermGoalTemplate
    ? template.shortTermGoalTemplate
        .replace('{{cluster}}', clusterName)
        .replace('{{targetLevel}}', targetLevel)
        .replace('{{targetDesc}}', targetDesc)
    : `${clusterName}: 4~6주 내 Level ${targetLevel}(${targetDesc})에 도달`;

  text = applyDiagnosisModifier(text, item.domain, item.cluster, diagnosis, 'short');

  return {
    id: `SG-${counter}`,
    type: 'short_term',
    domain: item.domain,
    cluster: item.cluster,
    clusterName,
    currentLevel,
    targetLevel,
    currentDesc,
    targetDesc,
    text,
    linkedGoalId: `LG-${counter}`,
    linkedActivities: [],
    reviewWeeks: 4,
    rfRelated: item.rfCount > 0
  };
}

// ── RF 기반 추가 목표 ──
function generateRFGoal(counter, rf, diagnosis) {
  return {

    },

      domain: rf.domain,
      cluster: rf.areaCode,
      clusterName: `${rf.areaName} (RF 긴급)`,
      currentLevel: rf.level,
      targetLevel: Math.min(rf.level + 1, 3),
      text: `${rf.areaName} RF 원인 감별 완료 + Level ${Math.min(rf.level + 1, 3)} 도달 (4~6주)`,
      linkedGoalId: `LG-${counter}`,
      linkedActivities: [],
      reviewWeeks: 4,
      rfRelated: true
    }
  };
}

// ── GAS 5단계 빌더 ──
function buildGASLevels(currentLevel, targetLevel, template) {
  if (!template || !template.levels) {
    return {
      1: getLevelLabel(1),
      2: getLevelLabel(2),
      3: getLevelLabel(3),
      4: getLevelLabel(4),
      5: getLevelLabel(5)
    };
  }

  const levels = {};
  for (let i = 1; i <= 5; i++) {
    levels[i] = template.levels[String(i)]
      ? template.levels[String(i)].description
      : getLevelLabel(i);
  }
  return levels;
}

    ID: {
      OC: ' (발달연령 기준, 최대촉구→점진소거, errorless learning)',
      GF: ' (backward chaining, 사진>그림>글자 시각위계)'
    },
    CP: {
      GF: ' (PT 협업 필수, NDT+감각통합 병행, 보조도구 고려)',
      SI: ' (SOR 고려 동의기반 접근, 포지셔닝 교육)'
    }
  };

  const modifier = modifiers[diagnosis]?.[domain];
  if (modifier && goalType === 'long') {
    return text + modifier;
  }
  return text;
}

// ── 유틸리티 ──
function findTemplate(domain, cluster) {
  // cluster에서 도메인 접두사 제거하여 매칭
  return goalTemplates.find(t =>
    t.domain === domain && (
      t.cluster === cluster ||
      cluster.includes(t.cluster) ||
      t.cluster.includes(cluster.split('+')[0])
    )
  ) || null;
}

function getLevelLabel(level) {
  const found = PROGRESS_LEVELS.find(p => p.level === level);
  return found ? `Level ${level} (${found.label})` : `Level ${level}`;
}

/**
 * 목표를 편집 가능한 형태로 내보내기
 */
function goalsToEditable(goals) {
  return goals.map(g => ({
    ...g,
    isEdited: false,
    originalText: g.text
  }));
}

/**
 * 편집된 목표 적용
 */
function applyGoalEdit(goal, newText) {
  return {
    ...goal,
    text: newText,
    isEdited: true
  };
}

// ── ENGINE: Activity Matcher ──
/**
 * activityMatcher.js — 활동 매칭 모듈
 * 생성된 목표에 대해 활동 DB에서 최적 활동을 스코어링하여 추천
 */


// 활동 DB (런타임에 로드)
let activitiesOC = [];
let activitiesSI = [];
let activitiesGF = [];
let activitiesCOG = [];

/**
 * 활동 DB 초기화
 */
function initActivities(oc, si, gf, cog) {
  activitiesOC = oc || [];
  activitiesSI = si || [];
  activitiesGF = gf || [];
  activitiesCOG = cog || [];
}

/**
 * 목표 목록에 대한 활동 매칭
 * @param {Goal[]} goals - 단기 목표 목록
 * @param {object} profile - ClientProfile
 * @returns {MatchResult[]}
 */
function matchActivities(goals, profile) {
  const allActivities = [...activitiesOC, ...activitiesSI, ...activitiesGF, ...activitiesCOG];
  const results = [];

  goals.forEach(goal => {
    // 도메인 필터
    const domainActivities = allActivities.filter(a => a.domain === goal.domain);

    // 스코어링
    const scored = domainActivities.map(activity => ({
      activity,
      score: calcMatchScore(activity, goal, profile),
      goalId: goal.id,
      goalCluster: goal.cluster
    }))
    .filter(m => m.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5); // 목표당 최대 5개

    results.push({
      goalId: goal.id,
      goalText: goal.text,
      domain: goal.domain,
      cluster: goal.cluster,
      matches: scored
    });
  });

  return results;
}

/**
 * 매칭 스코어 계산 (100점 만점)
 */
function calcMatchScore(activity, goal, profile) {
  let score = 0;

  // 1. 군집 매칭 (40점)
  score += calcClusterScore(activity, goal) * 40;

  // 2. 연령 매칭 (25점)
  score += calcAgeScore(activity, profile) * 25;

  // 3. 진단 매칭 (20점)
  score += calcDiagnosisScore(activity, profile) * 20;

  // 4. 환경 적합성 (15점)
  score += calcSettingScore(activity) * 15;

  return Math.round(score);
}

// ── 군집 매칭 (0~1.0) ──
function calcClusterScore(activity, goal) {
  const goalCluster = goal.cluster || '';
  const activityCluster = activity.cluster || '';

  // 정확 일치
  if (activityCluster === goalCluster) return 1.0;

  // 도메인별 세부 매칭
  if (activity.domain === 'OC') {
    return calcOCClusterScore(activityCluster, goalCluster);
  }
  if (activity.domain === 'SI') {
    return calcSIClusterScore(activity, goalCluster);
  }
  if (activity.domain === 'GF') {
    return calcGFClusterScore(activity, goalCluster);
  }
  if (activity.domain === 'COG') {
    return calcCOGClusterScore(activity.cluster, goalCluster);
  }

  return 0;
}

// ── COG 군집 매칭 ──
function calcCOGClusterScore(actCluster, goalCluster) {
  // 정확 일치
  if (actCluster === goalCluster) return 1.0;
  // 같은 영역 (ATT-SUS vs ATT-SEL 등)
  const actArea = actCluster.split('-')[0];
  const goalArea = goalCluster.split('-')[0];
  // 목표가 영역코드만일 때(예:'ATT') 같은 영역 활동은 정확매칭 취급
  if (!goalCluster.includes('-') && actArea === goalArea) return 1.0;
  if (actArea === goalArea) return 0.7;
  // COG 영역 간 관련성 (인접 영역)
  const cogAdjacent = {
    'ATT': ['MEM', 'EXF'],
    'MEM': ['ATT', 'LNG'],
    'PER': ['THK', 'MEM'],
    'THK': ['PER', 'EXF', 'NUM'],
    'EXF': ['ATT', 'THK'],
    'LNG': ['MEM', 'THK'],
    'NUM': ['THK', 'MEM']
  };
  if (cogAdjacent[actArea] && cogAdjacent[actArea].includes(goalArea)) return 0.3;
  return 0.1;
}

function calcOCClusterScore(actCluster, goalCluster) {
  // 같은 Tier인지 확인
  for (const [tierKey, clusters] of Object.entries(OC_CASCADE)) {
    const goalInTier = clusters.some(c => goalCluster.includes(c) || c.includes(goalCluster));
    const actInTier = clusters.some(c => actCluster.includes(c) || c.includes(actCluster));
    if (goalInTier && actInTier) return 0.7; // 같은 Tier
  }

  // 인접 Tier
  const tierOrder = ['tier1', 'tier2', 'tier3', 'tier4'];
  let goalTierIdx = -1, actTierIdx = -1;
  tierOrder.forEach((tk, idx) => {
    if (OC_CASCADE[tk].some(c => goalCluster.includes(c))) goalTierIdx = idx;
    if (OC_CASCADE[tk].some(c => actCluster.includes(c))) actTierIdx = idx;
  });
  if (goalTierIdx >= 0 && actTierIdx >= 0 && Math.abs(goalTierIdx - actTierIdx) === 1) {
    return 0.4; // 인접 Tier
  }

  return 0.1;
}

function calcSIClusterScore(activity, goalCluster) {
  const actCluster = activity.cluster || '';
  // SR 계열 매칭
  if (goalCluster.startsWith('SR') && actCluster.startsWith('SR')) return 0.7;
  if (goalCluster.startsWith('MC') && actCluster.startsWith('MC')) return 0.7;
  if (goalCluster === 'SD' && actCluster === 'SD') return 1.0;
  // 교차 셀 매칭
  if (activity.crossCell && activity.crossCell.includes(goalCluster)) return 0.5;
  return 0.1;
}

function calcGFClusterScore(activity, goalCluster) {
  const actCluster = activity.cluster || '';
  // 직접 매칭
  if (actCluster === goalCluster) return 1.0;
  // GM 계열
  if (goalCluster.startsWith('GM') && actCluster.startsWith('GM')) return 0.7;
  if (goalCluster.startsWith('FM') && actCluster.startsWith('FM')) return 0.7;
  // 관련 운동군집
  if (activity.relatedMotorClusters &&
      activity.relatedMotorClusters.some(c => goalCluster.includes(c))) return 0.6;
  // 캐스케이드 인접
  const cascadeOrder = ['SP', 'PS', 'GM', 'FM', 'VP'];
  const goalIdx = cascadeOrder.findIndex(c => goalCluster.includes(c));
  const actIdx = cascadeOrder.findIndex(c => actCluster.includes(c));
  if (goalIdx >= 0 && actIdx >= 0 && Math.abs(goalIdx - actIdx) === 1) return 0.4;
  return 0.1;
}

// ── 연령 매칭 (0~1.0) ──
function calcAgeScore(activity, profile) {
  const age = profile.patient.ageMonths || 0;
  if (!age) return 0.5; // 연령 정보 없으면 중간값

  const range = activity.ageRange || [24, 216];
  if (age >= range[0] && age <= range[1]) return 1.0;

  const distMin = Math.abs(age - range[0]);
  const distMax = Math.abs(age - range[1]);
  const dist = Math.min(distMin, distMax);

  if (dist <= 6) return 0.7;
  if (dist <= 12) return 0.4;
  return 0.1;
}

// ── 진단 매칭 (0~1.0) ──
function calcDiagnosisScore(activity, profile) {
  const diagnosis = profile.patient.diagnosis || '';
  if (!diagnosis) return 0.5;

  // variations에 해당 진단이 있으면 최고점
  if (activity.variations && activity.variations[diagnosis]) return 1.0;

  // crossCell에 진단이 포함되면
  if (activity.crossCell && activity.crossCell.includes(diagnosis)) return 0.9;

  // 관련 진단 그룹
  const relatedGroups = {
    ASD: ['ASD', 'PDD'],
    ADHD: ['ADHD', 'ADD'],
    DCD: ['DCD', 'DLD'],
    ID: ['ID', 'GDD', 'DOWN'],
    CP: ['CP'],
    GDD: ['GDD', 'ID', 'DOWN']
  };

  const related = relatedGroups[diagnosis] || [diagnosis];
  if (activity.variations) {
    const hasRelated = related.some(d => activity.variations[d]);
    if (hasRelated) return 0.7;
  }
  if (activity.crossCell) {
    const hasRelated = related.some(d => activity.crossCell.includes(d));
    if (hasRelated) return 0.6;
  }

  return 0.3; // 일반 활동
}

// ── 환경 적합성 (0~1.0) ──
function calcSettingScore(activity) {
  const settings = activity.setting || ['clinic'];
  // 다양한 환경에서 가능할수록 높은 점수
  if (settings.length >= 3) return 1.0;
  if (settings.length >= 2) return 0.8;
  if (settings.includes('clinic')) return 0.6;
  return 0.4;
}

/**
 * 매칭 결과를 세션 계획용으로 정리
 * 캐스케이드 순서에 맞게 활동을 배치
 */
function organizeForSession(matchResults, cascadeResult) {
  const organized = [];

  (cascadeResult.interventionOrder || []).forEach(orderItem => {
    const goalMatch = matchResults.find(
      m => m.domain === orderItem.domain && m.cluster === orderItem.cluster
    );
    if (!goalMatch) return;

    organized.push({
      phase: orderItem.phase,
      label: orderItem.label,
      domain: orderItem.domain,
      cluster: orderItem.cluster,
      tier: orderItem.tier,
      activities: goalMatch.matches.slice(0, 3), // 상위 3개
      reason: orderItem.reason
    });
  });

  return organized;
}

/**
 * 가정/학교용 활동 필터
 */
function filterBySettings(matchResults, setting) {
  return matchResults.map(goalMatch => ({
    ...goalMatch,
    matches: goalMatch.matches.filter(m =>
      m.activity.setting && m.activity.setting.includes(setting)
    )
  })).filter(gm => gm.matches.length > 0);
}

/**
 * 특정 활동의 상세 정보 조회
 */
function getActivityDetail(activityId) {
  const all = [...activitiesOC, ...activitiesSI, ...activitiesGF, ...activitiesCOG];
  return all.find(a => a.id === activityId) || null;
}

// ── ENGINE: Session Planner ──
/**
 * sessionPlanner.js — 세션 계획 + 가정/학교 프로그램 생성
 * 진단별 템플릿 × 40/50분 × 매칭 활동 → 완성된 세션 계획
 */


// 세션 템플릿 (런타임에 로드)
let sessionTemplates = [];

/**
 * 세션 템플릿 초기화
 */
function initSessionTemplates(templates) {
  sessionTemplates = templates;
}

/**
 * 세션 계획 생성
 * @param {object} profile - ClientProfile
 * @param {object} cascadeResult - cascade.js 결과
 * @param {object[]} organizedActivities - activityMatcher.organizeForSession 결과
 * @param {number} duration - 세션 시간 (40 or 50)
 * @returns {SessionPlan}
 */
function generateSessionPlan(profile, cascadeResult, organizedActivities, duration = 50) {
  const diagnosis = profile.patient.diagnosis || 'ADHD'; // 기본 ADHD
  const templateId = `${diagnosis}_${duration}`;

  // 템플릿 찾기
  let template = sessionTemplates.find(t => t.id === templateId);
  if (!template) {
    // fallback: 같은 진단의 다른 시간
    template = sessionTemplates.find(t => t.diagnosis === diagnosis);
  }
  if (!template) {
    // 최종 fallback: ADHD
    template = sessionTemplates.find(t => t.id === `ADHD_${duration}`);
  }
  if (!template) {
    template = sessionTemplates[0]; // 아무거나라도
  }

  // 템플릿의 phase에 실제 활동 매칭
  const phases = (template.phases || []).map(phase => {
    const matchedActivities = findActivitiesForPhase(
      phase, organizedActivities, cascadeResult
    );

    return {
      name: phase.name,
      timeRange: phase.timeRange,
      minutes: phase.minutes,
      description: phase.description,
      tier: phase.tier,
      activities: matchedActivities,
      isCustomized: matchedActivities.length > 0
    };
  });

  return {
    id: templateId,
    diagnosis,
    duration,
    templateName: template.id,
    phases,
    totalActivities: phases.reduce((sum, p) => sum + p.activities.length, 0),
    spPremise: cascadeResult.spPremise,
    notes: generateSessionNotes(profile, cascadeResult, diagnosis)
  };
}

/**
 * Phase에 맞는 활동 찾기
 */
function findActivitiesForPhase(phase, organizedActivities, cascadeResult) {
  const result = [];
  const phaseName = (phase.name || '').toLowerCase();
  const phaseTier = phase.tier || 0;

  // SP 배제 phase
  if (phaseName.includes('sp') || phaseName.includes('감각') || phaseName.includes('도입')) {
    if (cascadeResult.spPremise && cascadeResult.spPremise.active) {
      // SP 관련 활동 찾기
      const spActivities = organizedActivities.find(
        o => o.domain === 'SI' && o.cluster === 'SR'
      );
      if (spActivities) {
        result.push(...spActivities.activities.slice(0, 2));
      }
    }
    return result;
  }

  // Tier 매칭
  organizedActivities.forEach(org => {
    if (org.tier === phaseTier || phaseName.includes(`tier${org.tier}`)) {
      result.push(...org.activities.slice(0, 2));
    }
  });

  // 마무리/부모 phase
  if (phaseName.includes('마무리') || phaseName.includes('정리') || phaseName.includes('부모')) {
    // 자기점검(SM) 활동 추가
    const smActivities = organizedActivities.find(
      o => o.cluster.includes('SM') || o.cluster.includes('OC7')
    );
    if (smActivities) {
      result.push(...smActivities.activities.slice(0, 1));
    }
  }

  return result;
}

  // 관련 목표가 적어도 기본 4개는 포함
  if (programs.length < 4) {
    homeAreas.slice(0, 4).forEach(area => {
      if (!programs.find(p => p.area === area.area)) {
        programs.push(area);
      }
    });
  }

  return programs;
}

function applyHomeDiagnosisModifier(area, diagnosis) {
  const modified = { ...area };

  if (diagnosis === 'ASD') {
    if (area.area === '전환 연습') {
      modified.defaultActivity = '모든 전환에 시각 예고 + 사회적 이야기("바뀌어도 괜찮아")';
      modified.parentRole = '예고 일관성 + 점진 변화 비율 확대';
    }
    if (area.area === '감각 break') {
      modified.defaultTools = [...area.defaultTools, '이어폰(소음차단)', '씹기도구'];
    }
  }

  if (diagnosis === 'ADHD') {
    if (area.area === '숙제 시간') {
      modified.parentRole = 'MPH 투약 시간 맞춤, 과도개입↓, Timer 상시';
    }
  }

  if (diagnosis === 'ID') {
    if (area.area === '아침 루틴') {
      modified.defaultActivity = '사진순서카드(실물사진 우선) + backward chaining';
      modified.parentRole = '마지막 단계부터 독립 → 전체 확장';
    }
  }

  return modified;
}

/**
 * 전체 추천 결과 조합
 */
function buildFullRecommendation(profile, cascadeResult, redFlagResult, goals, matchResults) {
  const sessionPlan40 = generateSessionPlan(profile, cascadeResult,
    matchResults.organized || [], 40);
  const sessionPlan50 = generateSessionPlan(profile, cascadeResult,
    matchResults.organized || [], 50);

  const homeProgram = generateHomeProgram(profile, goals.shortTermGoals, matchResults.raw || []);
  const schoolProgram = generateSchoolProgram(profile, goals.shortTermGoals, matchResults.raw || []);

  return {
    clientId: profile.patient.name || 'unknown',
    generatedAt: new Date().toISOString(),
    patient: profile.patient,
    cascadeAnalysis: {
      summary: cascadeResult.summary,
      interventionOrder: cascadeResult.interventionOrder,
      spPremise: cascadeResult.spPremise,
      crossDomain: cascadeResult.crossDomain
    },
    redFlags: redFlagResult,
    goals: goals,
    activities: matchResults,
    sessionPlans: { '40': sessionPlan40, '50': sessionPlan50 },
    homeProgram,
    schoolProgram
  };
}

// ── ENGINE: JSON Importer ──
/**
 * importer.js — JSON 가져오기 모듈
 * 3개 앱(profile-report, cognitive, si-motor) JSON → 통합 ClientProfile 변환
 */


// ── profile-report (cprg_v1) 가져오기 ──
// 가장 완전한 소스: 4개 도메인(SI/GF/OC/COG) 통합 데이터
function importCPRG(json) {
  if (json.version !== 'cprg_v1') {
    throw new Error('지원하지 않는 프로필 보고서 버전입니다: ' + json.version);
  }

  const p = json.patient || {};
  const d = json.domains || {};
  const ageMonths = calcMonthAge(p.birth, p.evalDate);

  return {
    source: 'cprg_v1',
    patient: {
      name: p.name || '',
      birth: p.birth || '',
      evalDate: p.evalDate || '',
      evaluator: p.evaluator || '',
      diagnosis: p.diagnosis || '',
      gender: p.gender || '',
      ageMonths,
      ageLabel: formatAge(ageMonths)
    },
    domains: {
      SI: parseCPRGDomain(d.SI, 'SI'),
      GF: parseCPRGDomain(d.GF, 'GF'),
      OC: parseCPRGDomain(d.OC, 'OC'),
      COG: parseCPRGDomain(d.COG, 'COG')
    }
  };
}

function parseCPRGDomain(domainData, code) {
  if (!domainData) return null;
  const areas = (domainData.areas || []).map(a => ({
    code: a.code,
    name: a.name || a.code,
    achRate: a.achRate || 0,
    rfCount: a.rfCount || 0,
    level: achRateToLevel(a.achRate || 0)
  }));

  return {
    code,
    totalAchRate: domainData.totalAchRate || 0,
    totalRfCount: domainData.totalRfCount || 0,
    totalLevel: achRateToLevel(domainData.totalAchRate || 0),
    areas
  };
}

// ── cognitive (v5) 가져오기 ──
// COG + OC(T1/T2) 도메인 생성. sectionScores 우선, 없으면 항목별 키워드 계산.
function importCognitive(json) {
  if (!json.version || !json.version.startsWith('v')) {
    throw new Error('지원하지 않는 인지 체크리스트 버전입니다.');
  }

  const p = json.patient || {};
  const checks = json.checks || {};
  const ageMonths = calcMonthAge(p.dob, p.edate);

  // 인지 6개 영역의 키워드 매핑 (탭 내 섹션 식별용)
  const cogAreas = [
    { code: 'ATT', keywords: ['주의', 'att', '집중'] },
    { code: 'MEM', keywords: ['기억', 'mem', 'wm', '작업기억'] },
    { code: 'PER', keywords: ['지각', 'per', '변별', '시지각'] },
    { code: 'THK', keywords: ['사고', 'thk', '추론', '패턴'] },
    { code: 'EXF', keywords: ['실행', 'exf', 'ef', '억제', '계획', '전환'] },
    { code: 'LNG', keywords: ['언어', 'lng', 'lan', '수용', '표현'] },
    { code: 'NUM', keywords: ['수', 'num', '수세기', '수량', '연산', '덧셈', '뺄셈', '수개념'] }
  ];

  // 각 탭의 모든 항목을 순회하여 영역별 점수 집계
  const areaTotals = {};
  cogAreas.forEach(a => {
    areaTotals[a.code] = { total: 0, max: 0, rf: 0 };
  });

  Object.keys(checks).forEach(tabKey => {
    const tabChecks = checks[tabKey];
    if (!tabChecks || typeof tabChecks !== 'object') return;

    Object.keys(tabChecks).forEach(itemKey => {
      const val = tabChecks[itemKey];
      const mapped = SCORE_MAP[val];
      if (!mapped || mapped.score === null) return; // 미평가 제외

      // 항목 키에서 영역 추정 (키워드 매칭)
      const lowerKey = itemKey.toLowerCase();
      let matchedArea = null;
      for (const area of cogAreas) {
        if (area.keywords.some(kw => lowerKey.includes(kw))) {
          matchedArea = area.code;
          break;
        }
      }
      // 매칭 안 되면 일반적으로 모든 영역에 분산 (보수적)
      if (!matchedArea) matchedArea = 'ATT'; // 기본값

      areaTotals[matchedArea].total += mapped.score;
      areaTotals[matchedArea].max += 2; // 최대 2점
    });
  });

  // sectionScores 우선 사용 (OBS2 export에 포함된 경우 키워드 매칭보다 정확)
  const ss = json.sectionScores || {};
  const secKeyMap = {
    'ATT': '주의력', 'MEM': '기억력', 'PER': '지각/변별',
    'THK': '사고/추론', 'EXF': '실행기능', 'LNG': '언어인지'
  };

  // 달성률 계산 — sectionScores 있으면 우선, 없으면 키워드 매칭 결과 사용
  const areas = cogAreas.map(a => {
    const secKey = secKeyMap[a.code];
    if (secKey && ss[secKey]) {
      const achRate = ss[secKey].achRate;
      const rfCount = ss[secKey].rfCount || 0;
      return { code: a.code, name: a.code, achRate, rfCount, level: achRateToLevel(achRate) };
    }
    const t = areaTotals[a.code];
    const achRate = t.max > 0 ? Math.round((t.total / t.max) * 100) : 0;
    return {
      code: a.code,
      name: a.code,
      achRate,
      rfCount: t.rf,
      level: achRateToLevel(achRate)
    };
  });

  const totalAchRate = areas.length > 0
    ? Math.round(areas.reduce((s, a) => s + a.achRate, 0) / areas.length)
    : 0;

  // OC-T1(주의력), OC-T2(실행기능): sectionScores 우선, 없으면 areas에서 추출
  function ocArea(code, secKey, areaCode) {
    const fromSec = ss[secKey];
    const fromArea = areas.find(a => a.code === areaCode);
    const achRate = fromSec ? fromSec.achRate : (fromArea ? fromArea.achRate : 0);
    const rfCount = fromSec ? fromSec.rfCount  : (fromArea ? fromArea.rfCount  : 0);
    return { code, name: code, achRate, rfCount, level: achRateToLevel(achRate) };
  }
  const ocAreas = [
    ocArea('OC-T1', '주의력',  'ATT'),
    ocArea('OC-T2', '실행기능', 'EXF')
  ];
  const ocTotalAchRate = Math.round(ocAreas.reduce((s, a) => s + a.achRate, 0) / ocAreas.length);

  return {
    source: 'cognitive_v5',
    patient: {
      name: p.name || '',
      birth: p.dob || '',
      evalDate: p.edate || '',
      evaluator: p.evaluator || '',
      diagnosis: '',
      gender: '',
      ageMonths,
      ageLabel: formatAge(ageMonths),
      stage: p.stage || ''
    },
    domains: {
      SI: null,
      GF: null,
      OC: {
        code: 'OC',
        totalAchRate: ocTotalAchRate,
        totalRfCount: ocAreas.reduce((s, a) => s + a.rfCount, 0),
        totalLevel: achRateToLevel(ocTotalAchRate),
        areas: ocAreas
      },
      COG: {
        code: 'COG',
        totalAchRate,
        totalRfCount: areas.reduce((s, a) => s + a.rfCount, 0),
        totalLevel: achRateToLevel(totalAchRate),
        areas
      }
    }
  };
}

// ── si-motor (v3) 가져오기 ──
// SI + GF 부분 도메인 생성.
function importSIMotor(json) {
  if (json.version !== 'si_motor_v3' && json.version !== 'si_motor_v3_sr') {
    throw new Error('지원하지 않는 SI-Motor 버전입니다: ' + json.version);
  }

  const p = json.patient || {};
  const scores = json.scores || {};
  const ageMonths = json.currentAge || calcMonthAge(p.birth, p.evalDate);

  // si-motor 영역 매핑
  const siAreas = [
    { code: 'SR-OR', keywords: ['sr-or', 'sor', '과반응', '촉각방어'] },
    { code: 'SR-UR', keywords: ['sr-ur', 'sur', '저반응', '둔감'] },
    { code: 'SR-SK', keywords: ['sr-sk', 'ss', '추구', '감각추구'] },
    { code: 'MC-PS', keywords: ['mc-ps', 'postural', '자세', '항중력'] },
    { code: 'MC-PX', keywords: ['mc-px', 'praxis', '운동계획', '모방'] },
    { code: 'MC-BL', keywords: ['mc-bl', 'bilateral', '양측', '정중선'] },
    { code: 'SD', keywords: ['sd', 'discrimin', '변별', '체성'] }
  ];

  const gfAreas = [
    { code: 'GM', keywords: ['gm', 'gross', '대근육', '이동', '점프', '균형'] },
    { code: 'FM', keywords: ['fm', 'fine', '소근육', '파지', '서사', '가위'] }
  ];

  function calcAreaScores(areaDefs) {
    return areaDefs.map(area => {
      let total = 0, max = 0;
      Object.keys(scores).forEach(key => {
        const lk = key.toLowerCase();
        if (area.keywords.some(kw => lk.includes(kw))) {
          const mapped = SCORE_MAP[scores[key]];
          if (mapped && mapped.score !== null) {
            total += mapped.score;
            max += 2;
          }
        }
      });
      const achRate = max > 0 ? Math.round((total / max) * 100) : 0;
      return {
        code: area.code,
        name: area.code,
        achRate,
        rfCount: 0, // RF는 별도 분석 필요
        level: achRateToLevel(achRate)
      };
    });
  }

  const siAreaResults = calcAreaScores(siAreas);
  const gfAreaResults = calcAreaScores(gfAreas);

  function domainSummary(areas, code) {
    if (areas.every(a => a.achRate === 0)) return null;
    const totalAchRate = Math.round(areas.reduce((s, a) => s + a.achRate, 0) / areas.length);
    return {
      code,
      totalAchRate,
      totalRfCount: areas.reduce((s, a) => s + a.rfCount, 0),
      totalLevel: achRateToLevel(totalAchRate),
      areas
    };
  }

  return {
    source: 'si_motor_v3',
    patient: {
      name: p.name || '',
      birth: p.birth || '',
      evalDate: p.evalDate || '',
      evaluator: p.evaluator || '',
      diagnosis: p.diagnosis || '',
      gender: '',
      ageMonths,
      ageLabel: formatAge(ageMonths)
    },
    domains: {
      SI: domainSummary(siAreaResults, 'SI'),
      GF: domainSummary(gfAreaResults, 'GF'),
      OC: null,
      COG: null
    }
  };
}

// ── 자동 감지 + 가져오기 ──
function autoImport(json) {
  if (json.version === 'cprg_v1') return importCPRG(json);
  if (json.version === 'si_motor_v3' || json.version === 'si_motor_v3_sr') return importSIMotor(json);
  if (json.version && json.version.startsWith('v') && json.checks) return importCognitive(json);
  throw new Error('인식할 수 없는 JSON 형식입니다.');
}

// ── 다중 소스 병합 ──
// 여러 JSON에서 가져온 결과를 하나의 ClientProfile로 병합
function mergeProfiles(...profiles) {
  const merged = {
    source: 'merged',
    patient: {},
    domains: { SI: null, GF: null, OC: null, COG: null }
  };

  profiles.forEach(p => {
    if (!p) return;
    // patient: 비어있지 않은 필드 우선
    Object.keys(p.patient || {}).forEach(k => {
      if (p.patient[k] && !merged.patient[k]) {
        merged.patient[k] = p.patient[k];
      }
    });
    // domains: null이 아닌 것 우선, 이미 있으면 achRate 높은 쪽 (더 최근 평가)
    ['SI', 'GF', 'OC', 'COG'].forEach(d => {
      if (p.domains[d]) {
        if (!merged.domains[d]) {
          merged.domains[d] = p.domains[d];
        }
        // 이미 있으면 유지 (첫 번째 우선)
      }
    });
  });

  return merged;
}

// ── 수동 입력 → ClientProfile 변환 ──
function fromManualInput(patientData, domainInputs) {
  const ageMonths = calcMonthAge(patientData.birth, patientData.evalDate);

  function buildDomain(code, areaInputs) {
    if (!areaInputs || areaInputs.length === 0) return null;
    const areas = areaInputs.map(a => ({
      code: a.code,
      name: a.code,
      achRate: a.achRate || 0,
      rfCount: a.rfCount || 0,
      level: achRateToLevel(a.achRate || 0)
    }));
    const totalAchRate = Math.round(areas.reduce((s, a) => s + a.achRate, 0) / areas.length);
    return {
      code,
      totalAchRate,
      totalRfCount: areas.reduce((s, a) => s + a.rfCount, 0),
      totalLevel: achRateToLevel(totalAchRate),
      areas
    };
  }

  return {
    source: 'manual',
    patient: {
      ...patientData,
      ageMonths,
      ageLabel: formatAge(ageMonths)
    },
    domains: {
      SI: buildDomain('SI', domainInputs.SI),
      GF: buildDomain('GF', domainInputs.GF),
      OC: buildDomain('OC', domainInputs.OC),
      COG: buildDomain('COG', domainInputs.COG)
    }
  };
}

// ── 유틸리티 ──
function calcMonthAge(birth, evalDate) {
  if (!birth || !evalDate) return 0;
  const b = new Date(birth);
  const e = new Date(evalDate);
  return (e.getFullYear() - b.getFullYear()) * 12 + (e.getMonth() - b.getMonth());
}

function formatAge(months) {
  if (!months) return '';
  const y = Math.floor(months / 12);
  const m = months % 12;
  return `${y}세 ${m}개월 (${months}M)`;
}

const _ACE_ALL_STORES = ['children','obs1','obs2','std1','std2','rpt','ace'];
let db = null;
let currentAceChildId = null; // 현재 선택된 아동의 numeric ID

async function initStorage() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open(_ACE_DB, _ACE_DB_VER);
    r.onerror = () => reject(r.error);
    r.onsuccess = e => { db = e.target.result; resolve(db); };
    r.onupgradeneeded = e => {
      const d = e.target.result;
      _ACE_ALL_STORES.forEach(s => {
        if (!d.objectStoreNames.contains(s))
          d.createObjectStore(s, s === 'children'
            ? { keyPath: 'id', autoIncrement: true }
            : { keyPath: 'childId' });
      });
    };
  });
}

// profile._childId : 기존 아동 ID (numeric). 없으면 신규 등록.
// 반환값: 저장된 childId (number)
async function saveChild(profile) {
  if (!db) throw new Error('DB not init');
  const now = new Date().toISOString();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['children', 'ace'], 'readwrite');
    tx.onerror = () => reject(tx.error);
    const cSt = tx.objectStore('children');
    const aSt = tx.objectStore('ace');
    const saveAce = id => {
      const rec = {
        childId: id,
        patient:  profile.patient  || {},
        domains:  profile.domains  || {},
        results:  profile.results  || null,
        createdAt: profile.createdAt || now,
        updatedAt: now
      };
      const r2 = aSt.put(rec);
      r2.onerror = () => reject(r2.error);
      r2.onsuccess = () => resolve(id);
    };
    const childId = profile._childId;
    if (childId) {
      const r1 = cSt.get(childId);
      r1.onerror = () => reject(r1.error);
      r1.onsuccess = () => {
        const row = r1.result || { id: childId, createdAt: now };
        row.name = profile.patient.name || row.name;
        row.updatedAt = now;
        cSt.put(row);
        saveAce(childId);
      };
    } else {
      const r1 = cSt.add({ name: profile.patient.name || '', createdAt: now, updatedAt: now });
      r1.onerror = () => reject(r1.error);
      r1.onsuccess = () => saveAce(r1.result);
    }
  });
}

async function loadChildren() {
  if (!db) throw new Error('DB not init');
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['children', 'ace'], 'readonly');
    const cSt = tx.objectStore('children');
    const aSt = tx.objectStore('ace');
    const r1 = cSt.getAll();
    r1.onerror = () => reject(r1.error);
    r1.onsuccess = () => {
      const rows = r1.result || [];
      const out = [];
      let pending = rows.length;
      if (pending === 0) { resolve([]); return; }
      rows.forEach(child => {
        const r2 = aSt.get(child.id);
        r2.onsuccess = () => {
          if (r2.result) out.push({ ...r2.result, _childId: child.id });
          if (--pending === 0) {
            out.sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
            resolve(out);
          }
        };
        r2.onerror = () => { if (--pending === 0) { out.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)); resolve(out); } };
      });
    };
  });
}

async function loadChild(id) {
  if (!db) throw new Error('DB not init');
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['ace'], 'readonly');
    const st = tx.objectStore('ace');
    const r = st.get(id);
    r.onerror = () => reject(r.error);
    r.onsuccess = () => resolve(r.result ? { ...r.result, _childId: id } : null);
  });
}

async function deleteChild(id) {
  if (!db) throw new Error('DB not init');
  return new Promise((resolve, reject) => {
    const tx = db.transaction(['children', 'ace'], 'readwrite');
    tx.onerror = () => reject(tx.error);
    tx.objectStore('children').delete(id);
    tx.objectStore('ace').delete(id);
    tx.oncomplete = () => resolve();
  });
}

// ace_db → si-cog-cda 레거시 마이그레이션
async function migrateLegacyAceDB() {
  return new Promise(resolve => {
    const r = indexedDB.open('ace_db', 1);
    r.onerror = () => resolve(0);
    r.onsuccess = async e => {
      const legacyDb = e.target.result;
      try {
        if (!legacyDb.objectStoreNames.contains('children')) { legacyDb.close(); resolve(0); return; }
        const tx = legacyDb.transaction(['children'], 'readonly');
        const req = tx.objectStore('children').getAll();
        req.onerror = () => { legacyDb.close(); resolve(0); };
        req.onsuccess = async () => {
          const items = req.result || [];
          legacyDb.close();
          if (!items.length) { resolve(0); return; }
          if (!confirm(`이전 데이터(ace_db)에 ${items.length}명의 아동이 있습니다.\n공유 DB(si-cog-cda)로 이전하시겠습니까?`)) { resolve(0); return; }
          let count = 0;
          for (const item of items) {
            try { await saveChild({ ...item, _childId: null }); count++; } catch(e) {}
          }
          resolve(count);
        };
      } catch(e) { legacyDb.close(); resolve(0); }
    };
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  const btn = document.querySelector(`[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
}

// ── UI: Build Profile from Form ──
function buildProfileFromUI() {
  const p = {
    patient: {
      name: document.getElementById('childName').value || '(미입력)',
      birth: document.getElementById('childBirth').value || '',
      evalDate: document.getElementById('evalDate').value || new Date().toISOString().split('T')[0],
      diagnosis: document.getElementById('childDiagnosis').value || '',
      evaluator: document.getElementById('evaluator').value || '',
      ageMonths: 0
    },
    domains: {}
  };
  p.patient.ageMonths = calcMonthAge(p.patient.birth, p.patient.evalDate);
  
  DOMAINS.forEach(code => {
    const areas = [];
    document.querySelectorAll(`input.achRate[data-domain="${code}"]`).forEach(inp => {
      const c = inp.dataset.code;
      const achR = parseInt(inp.value) || 0;
      const rfC = parseInt(document.querySelector(`input.rfCount[data-domain="${code}"][data-code="${c}"]`).value) || 0;
      areas.push({ code: c, name: c, achRate: achR, rfCount: rfC, level: achRateToLevel(achR) });
    });
    if (areas.length > 0) {
      const tachRate = Math.round(areas.reduce((s, a) => s + a.achRate, 0) / areas.length);
      p.domains[code] = {
        code, areas, totalAchRate: tachRate,
        totalRfCount: areas.reduce((s, a) => s + a.rfCount, 0),
        totalLevel: achRateToLevel(tachRate)
      };
    } else {
      p.domains[code] = null;
    }
  });
  return p;
}

    html += `<div class="goal-card" style="border-left-color:${dc}">

    if (g.gasLevels) {
      html += '<div style="margin-top:var(--spacing);font-size:.85rem">';

  stg.forEach(g => {

  }
  
  // School Program
  if (schoolProgram && schoolProgram.length > 0) {
    html += '<h2 class="mt-4">🏫 학교 프로그램</h2>';
    schoolProgram.forEach(p => {
      html += `<div class="program-card">
        <h4>${p.area}</h4>
        <p>${p.activity}</p>
        <div class="tools">📦 도구: ${(p.tools || []).join(', ')}</div>
        <div class="role">👩‍🏫 교사 역할: ${p.teacherRole || ''}</div>
      </div>`;
    });
  }
  
  html += '</div>';
  c.innerHTML = html;
  c.classList.remove('placeholder');
}

// ── CORE: Generate Recommendation ──
async function handleGenerateRecommendation() {
  const profile = buildProfileFromUI();
  if (!profile.patient.name || profile.patient.name === '(미입력)') {
    showToast('아동 이름을 입력하세요.', 'warning'); return;
  }
  if (!profile.patient.birth || !profile.patient.evalDate) {
    showToast('생년월일과 평가일을 입력하세요.', 'warning'); return;
  }
  document.getElementById('ageMonths').value = profile.patient.ageMonths;
  
  try {
    // 1. Cascade Analysis
    const cascadeResult = analyzeCascade(profile);
    
    // 2. Red Flag Analysis
    const redFlagResult = analyzeRedFlags(profile, cascadeResult);
    
    // 3. Goal Generation
    const goals = generateGoals(profile, cascadeResult, redFlagResult);
    
    // 4. Activity Matching
    const matchResults = matchActivities(goals.shortTermGoals, profile);
    const organized = organizeForSession(matchResults, cascadeResult);
    
    // 5. Session Planning
    const sessionPlan40 = generateSessionPlan(profile, cascadeResult, organized, 40);
    const sessionPlan50 = generateSessionPlan(profile, cascadeResult, organized, 50);
    
    // 6. Home & School Programs
    const homeProgram = generateHomeProgram(profile, goals.shortTermGoals, matchResults);
    const schoolProgram = generateSchoolProgram(profile, goals.shortTermGoals, matchResults);
    
    // Render all tabs
    renderCascadeTab(cascadeResult);
    renderRedFlagsTab(redFlagResult);
    renderGoalsTab(goals);
    renderActivitiesTab(matchResults, sessionPlan40, sessionPlan50, homeProgram, schoolProgram);
    
    // Store for export
    window.currentProfile = profile;
    window.currentResults = {
      cascade: cascadeResult,
      redFlags: redFlagResult,
      goals,
      matchResults,
      sessionPlans: { '40': sessionPlan40, '50': sessionPlan50 },
      homeProgram,
      schoolProgram
    };
    
    switchTab('cascade');
    showToast('추천 생성 완료!', 'success');
  } catch (err) {
    console.error('Recommendation error:', err);
    showToast('추천 생성 실패: ' + err.message, 'error');
  }
}

// ── HANDLERS: Save / Load / Delete / Export ──
async function handleSaveChild() {
  const profile = buildProfileFromUI();
  if (!profile.patient.name || profile.patient.name === '(미입력)') {
    showToast('아동 이름을 입력하세요.', 'warning'); return;
  }
  try {
    if (window.currentResults) profile.results = window.currentResults;
    profile._childId = currentAceChildId;
    const savedId = await saveChild(profile);
    currentAceChildId = savedId;
    showToast(`${profile.patient.name} 저장 완료!`, 'success');
    await refreshChildrenList();
  } catch (err) {
    showToast('저장 실패: ' + err.message, 'error');
  }
}

async function refreshChildrenList() {
  try {
    const children = await loadChildren();
    const select = document.getElementById('childSelect');
    select.innerHTML = '<option value="">+ 신규 아동</option>';
    children.forEach(child => {
      const option = document.createElement('option');
      option.value = child._childId;
      option.textContent = `${child.patient.name} (${formatAgeUI(child.patient.ageMonths) || ''})`;
      if (child._childId === currentAceChildId) option.selected = true;
      select.appendChild(option);
    });
    const childrenList = document.getElementById('childrenList');
    if (children.length === 0) {
      childrenList.innerHTML = '<p class="text-muted">저장된 아동이 없습니다.</p>';
    } else {
      childrenList.innerHTML = children.map(child => `
        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${child.patient.name}</strong><br>
            <span class="text-muted">${formatAgeUI(child.patient.ageMonths)} | ${child.patient.diagnosis} | ${child.patient.birth}</span>
          </div>
          <div style="display:flex;gap:var(--spacing)">
            <button class="btn btn-sm btn-outline" onclick="loadChildData(${child._childId})">불러오기</button>
            <button class="btn btn-sm btn-danger" onclick="delChild(${child._childId})">삭제</button>
          </div>
        </div>`).join('');
    }
  } catch (err) {
    console.error('Failed to load children:', err);
  }
}

async function loadChildData(childId) {
  try {
    const child = await loadChild(Number(childId));
    if (child) {
      currentAceChildId = child._childId;
      document.getElementById('childName').value = child.patient.name || '';
      document.getElementById('childBirth').value = child.patient.birth || '';
      document.getElementById('evalDate').value = child.patient.evalDate || '';
      document.getElementById('childDiagnosis').value = child.patient.diagnosis || '';
      document.getElementById('evaluator').value = child.patient.evaluator || '';
      document.getElementById('ageMonths').value = child.patient.ageMonths || '';
      DOMAINS.forEach(code => {
        const domain = child.domains ? child.domains[code] : null;
        if (domain && domain.areas) {
          domain.areas.forEach(area => {
            const achInput = document.querySelector(`input.achRate[data-domain="${code}"][data-code="${area.code}"]`);
            const rfInput = document.querySelector(`input.rfCount[data-domain="${code}"][data-code="${area.code}"]`);
            if (achInput) achInput.value = area.achRate || 0;
            if (rfInput) rfInput.value = area.rfCount || 0;
          });
        }
      });
      switchTab('profile');
      showToast(`${child.patient.name} 불러오기 완료!`, 'success');
    }
  } catch (err) {
    showToast('불러오기 실패: ' + err.message, 'error');
  }
}

async function delChild(childId) {
  if (confirm('정말 삭제하시겠습니까?')) {
    try {
      await deleteChild(childId);
      showToast('삭제 완료!', 'success');
      await refreshChildrenList();
    } catch (err) {
      showToast('삭제 실패: ' + err.message, 'error');
    }
  }
}

function handleExportJSON() {
  if (!window.currentProfile) {
    showToast('먼저 추천을 생성하세요.', 'warning'); return;
  }
  const exportData = {
    ...window.currentProfile,
    results: window.currentResults,
    exportedAt: new Date().toISOString()
  };
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ace_${window.currentProfile.patient.name || 'export'}_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  showToast('JSON 내보내기 완료!', 'success');
}

function fillFormFromProfile(profile) {
  document.getElementById('childName').value = profile.patient.name || '';
  document.getElementById('childBirth').value = profile.patient.birth || '';
  document.getElementById('evalDate').value = profile.patient.evalDate || '';
  document.getElementById('childDiagnosis').value = profile.patient.diagnosis || '';
  document.getElementById('evaluator').value = profile.patient.evaluator || '';
  document.getElementById('ageMonths').value = profile.patient.ageMonths || '';

  DOMAINS.forEach(code => {
    const domain = profile.domains[code];
    if (domain && domain.areas) {
      domain.areas.forEach(area => {
        const achInput = document.querySelector(`input.achRate[data-domain="${code}"][data-code="${area.code}"]`);
        const rfInput  = document.querySelector(`input.rfCount[data-domain="${code}"][data-code="${area.code}"]`);
        if (achInput) achInput.value = area.achRate || 0;
        if (rfInput)  rfInput.value  = area.rfCount || 0;
      });
    }
  });
}

function handleImportJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const json = JSON.parse(await file.text());
      const profile = autoImport(json);
      fillFormFromProfile(profile);
      showToast(`${profile.source} 형식 가져오기 완료!`, 'success');
    } catch (err) {
      showToast('JSON 가져오기 실패: ' + err.message, 'error');
    }
  };
  input.click();
}

function handleMergeImportJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    try {
      const profiles = await Promise.all(
        files.map(async (f) => {
          const json = JSON.parse(await f.text());
          return autoImport(json);
        })
      );
      const merged = mergeProfiles(...profiles);
      fillFormFromProfile(merged);

      const sources = profiles.map(p => {
        if (p.source === 'si_motor_v3')   return '① SI운동';
        if (p.source === 'cognitive_v5')  return '③ 인지';
        if (p.source === 'cprg_v1')       return '⑦ 프로파일';
        return p.source;
      }).join(' + ');
      showToast(`${sources} 병합 완료!`, 'success');
    } catch (err) {
      showToast('병합 가져오기 실패: ' + err.message, 'error');
    }
  };
  input.click();
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    await initStorage();
    const migrated = await migrateLegacyAceDB();
    if (migrated > 0) showToast(`이전 데이터 ${migrated}명 이전 완료!`, 'success');
    await refreshChildrenList();
  } catch (err) {
    console.error('Storage init failed:', err);
  }

  // childSelect 드롭다운으로 아동 전환
  document.getElementById('childSelect').addEventListener('change', async e => {
    const val = e.target.value;
    if (val) {
      await loadChildData(Number(val));
    } else {
      currentAceChildId = null;
    }
  });

  renderDomainInputs();

  // ── IndexedDB 자동저장 (30초마다, 기존 저장 아동만) ──────
  setInterval(async () => {
    if (!currentAceChildId) return;
    const name = document.getElementById('childName')?.value?.trim();
    if (name) {
      try {
        const profile = buildProfileFromUI();
        if (window.currentResults) profile.results = window.currentResults;
        profile._childId = currentAceChildId;
        await saveChild(profile);
      } catch(e) {}
    }
  }, 30000);

  // Event listeners
  document.getElementById('saveBtnTop').addEventListener('click', handleSaveChild);
  document.getElementById('generateBtnTop').addEventListener('click', handleGenerateRecommendation);
  document.getElementById('importJSONBtn').addEventListener('click', handleImportJSON);
  document.getElementById('mergeImportBtn').addEventListener('click', handleMergeImportJSON);
  document.getElementById('exportJSON').addEventListener('click', handleExportJSON);
  document.getElementById('exportPrint').addEventListener('click', () => window.print());
  document.getElementById('exportParent').addEventListener('click', () => {
    // Generate parent-friendly print view
    switchTab('activities');
    setTimeout(() => window.print(), 300);
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
});
