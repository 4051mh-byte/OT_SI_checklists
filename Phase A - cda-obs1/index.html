{code:'PC04-02',desc:'높은 평균대(높이 약 10-15cm) 위 보행 (예: 바닥에서 10-15cm 높이로 올려진 평균대(폭 약 10cm) 위를 따라 걷되, PC03-02의 바닥 선 위 보행에서 높이가 추가된 과제. 높이로 인한 전정 입력 변화에서도 자세를 유지하며 보행하는 능력을 관찰)',acqTime:'3세-3세 6개월',redFlag:'4세까지 낮은 평균대(높이 약 10-15cm) 위에 올라서는 것 자체를 거부하거나, 올라서도 한 걸음도 떼지 못하는 양상이 지속될 경우. 만약 바닥 선 위 보행(PC03-02)은 가능하나 높이가 추가되면 수행이 붕괴한다면, 높이에 대한 전정 과반응(중력 불안)과의 감별이 선행되어야 함',unit:'질적',s1:'평균대 위에 올라서는 것 자체를 거부하거나, 올라선 뒤 즉시 내려오며 한 걸음도 떼지 못함',s2:'평균대 위에서 1-2걸음을 떼나 양팔을 높이 들거나 양육자의 손을 잡아야 진행이 가능하며, 3걸음 이상에서 내려옴',s3:'양육자의 손잡이 없이 평균대 위를 4-5걸음 연속으로 걸으며 간헐적으로 발이 벗어나면 교정하여 복귀하나, 보행 속도가 현저히 느리고 시선이 발에 고정됨',s4:'평균대 전체를 따라 연속으로 걸으며, 간헐적으로만 발이 벗어나고 시선을 전방으로 유지하는 시간이 길어짐'},
{code:'PC04-03',desc:'바로 누운 자세 굴곡(supine flexion) 유지 시간 연장 (예: 바닥에 등을 대고 누운 자세에서 머리와 양다리를 동시에 들어올려 몸을 공처럼 말며, PC03-03보다 긴 시간 동안 놀이 상호작용을 유지하는 체간 굴곡근 지구력 과제)',acqTime:'3세-3세 6개월',redFlag:'4세까지 놀이 상호작용 한 차례 동안에도 바로 누운 자세 굴곡 자세가 유지되지 않거나, 머리만 들고 다리는 바닥에 남는 분절적 활성화만 관찰될 경우',unit:'질적',s1:'머리와 다리를 동시에 들어올리는 동작이 성립하나 놀이 상호작용 한 차례 이전에 자세가 무너짐(PC03-03 s2 수준과 동일하면 진전 없음)',s2:'놀이 상호작용 한 차례 동안 자세 유지가 가능하나, 좌우 비대칭(머리 또는 다리 한쪽이 먼저 떨어짐)이 관찰됨(PC03-03 s3 수준)',s3:'놀이 상호작용 여러 차례 동안 자세가 안정적으로 유지되며, 자세 유지 중 양손으로 물건을 잡는 부가 동작이 가능',s4:'자세 유지 중 양손으로 물건을 조작하거나 던지는 동작이 가능'},
{code:'PC04-04',desc:'엎드린 자세 신전(prone extension) 유지 시간 연장 (예: 바닥에 엎드려 양팔·양다리를 들어올려 "비행기 자세"를 유지하며, PC03-04보다 긴 시간 동안 안정적 유지가 가능한 체간 신전근 지구력 과제)',acqTime:'3세-3세 6개월',redFlag:'4세까지 엎드린 자세에서 팔과 다리를 동시에 들어올리는 동작이 놀이 시작 전에 무너져 자세 유지 자체가 성립하지 않을 경우',unit:'질적',s1:'팔과 다리를 동시에 들어올리는 동작이 성립하나 놀이 상호작용이 시작되기 전에 자세가 무너짐(PC03-04 s1-s2 수준과 동일하면 진전 없음)',s2:'놀이 상호작용 동안 자세 유지가 가능하나, 팔과 다리의 활성화가 고르지 않아 좌우 흔들림이 관찰됨(PC03-04 s3 수준)',s3:'놀이 상호작용 여러 차례 동안 양팔·양다리·체간 신전이 안정적으로 유지되며, 자세 유지 중 머리를 좌우로 돌리는 동작이 가능',s4:'자세 유지 중 양손으로 물건을 잡거나 양팔을 번갈아 움직이는 동작이 가능'},
{code:'PC04-05',desc:'계단 교대발 오르기 — 자세 조절 관점 (예: 난간을 한 손으로 잡고 한 칸에 한 발씩 번갈아 올라가되, GM03-02의 marking time 방식에서 교대발(alternating feet) 방식으로 전환하는 과제. 여기서는 오르기 시 체간의 직립 유지와 좌우 무게 중심 이동의 대칭성을 관찰)',acqTime:'3세-3세 6개월',redFlag:'4세까지 계단 오르기에서 교대발 시도가 전혀 관찰되지 않고, marking time 방식에서만 수행하는 양상이 지속될 경우 — CDC(2025) "3세까지 교대발 계단 오르기 시도" 기준 참조. 만약 교대발 시도 시 일관되게 한쪽으로만 체간이 기울어진다면, 편측 하지 근력 또는 일측 전정 기능과의 감별이 선행되어야 함',unit:'질적',s1:'계단을 오를 때 한 칸에 양발을 모으는 marking time 방식에서 벗어나지 않으며, 교대발 시도가 관찰되지 않음(GM03-02 수준에 머무름)',s2:'교대발로 1-2칸을 오르려는 시도는 있으나, 한쪽 다리를 올릴 때 체간이 반대쪽으로 크게 기울어져 난간을 양손으로 잡는 보상이 필요',s3:'난간 한 손 지지로 교대발 오르기가 대부분 성공하나, 중간에 marking time으로 회귀하는 칸이 간헐적으로 관찰되며 체간이 전방으로 기울어짐',s4:'난간 한 손 지지로 교대발 오르기를 한 층 전체에서 일관되게 수행하며, 체간 직립이 유지되고 좌우 무게 중심 이동이 대칭적'}
],
bilateral:[
{code:'BI04-01',desc:'양손으로 큰 공 받기(가슴에 안기) (예: 양육자가 약 1.5-2m 거리에서 아동 가슴 폭 정도 크기의 공을 부드럽게 던지면, 아동이 양팔을 벌려 공을 가슴에 안아 받는 양측 대칭 동작. BI03-01의 던지기에서 받기로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 양육자가 가슴 높이로 부드럽게 던진 큰 공을 양팔로 안아 받으려는 준비 동작(양팔 벌리기)이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'공이 날아올 때 양팔을 벌리거나 공을 향해 손을 내미는 준비 동작이 관찰되지 않고, 공이 가슴에 부딪히거나 옆으로 지나감',s2:'공이 다가오면 양팔을 벌리는 준비 동작은 있으나, 팔을 오므리는 타이밍이 맞지 않아 공을 끼워잡지 못하고 떨어뜨림',s3:'가슴 높이로 부드럽게 던진 공을 양팔로 안아 받는 동작이 대부분 성공하나, 공의 궤도가 좌우로 벗어나면 팔의 위치를 조절하지 못해 실패',s4:'공의 궤도에 맞추어 양팔의 위치를 조절하여 받으며, 던지기-받기 상호작용이 연속적으로 가능'},
{code:'BI04-02',desc:'세발자전거 페달 밟기 (예: 세발자전거 안장에 앉아 양발을 페달에 올리고, 양발을 교대로 밟아 자전거를 전진시키는 양측 교대 동작. GM03-05의 발로 밀기에서 페달 구동으로 전환)',acqTime:'3세-3세 6개월',redFlag:'4세까지 세발자전거에서 양발 교대 페달링이 관찰되지 않고, 바닥을 발로 밀어 전진하는 방식에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'양발을 페달에 올리나 교대로 밟는 동작이 성립하지 않아, 양발을 동시에 밟거나 바닥을 발로 밀어 전진하는 방식(GM03-05 수준)에 머무름',s2:'페달을 교대로 밟으려는 시도가 간헐적으로 관찰되나, 한쪽 발의 밀기 이후 반대쪽 발로의 전환에서 멈추거나 페달에서 발이 빠짐',s3:'양발 교대 페달링이 성립하여 직선으로 수 미터 전진하나, 페달링 리듬이 불규칙하고 핸들 조작과의 동시 수행이 어려워 방향 전환 시 멈춤',s4:'양발 교대 페달링이 리듬적으로 안정되어 연속 전진하며, 핸들을 돌려 방향 전환도 가능'},
{code:'BI04-03',desc:'블록 9-10개 쌓기 — 양손 역할 교대 (예: 나무·플라스틱 블록(약 2.5-3cm 크기)을 9-10개까지 쌓아올리되, BI03-03에서의 양손 역할 교대(한 손 고정-다른 손 올리기)가 더 높은 탑에서도 유지되는 양측 협응 과제. FM04-02와 동일 과제이나 FM=놓기 정밀성, BI=역할 교대의 유창성을 관찰)',acqTime:'3세-3세 6개월',redFlag:'4세까지 블록 6개 이상 쌓기에서 양손의 역할 교대(고정-올리기)가 관찰되지 않고, 한 손으로만 쌓거나 양손이 동일한 역할을 수행하는 양상이 지속될 경우 — Bayley-III 기준 36개월에 9-10개 쌓기가 기대됨',unit:'개',s1:'블록 5-6개까지만 양손 역할 교대가 유지되고, 7개 이상에서 한 손만 사용하여 올리거나 고정 손이 참여하지 않음(BI03-03 s3 수준과 동일하면 진전 없음)',s2:'블록 7-8개까지 양손 역할 교대가 관찰되나, 탑이 높아지면 고정 손이 탑을 꽉 잡아 블록이 움직이거나 올리는 손과 고정 손의 타이밍이 어긋남(7-8개)',s3:'블록 9개까지 양손 역할 교대가 유창하게 유지되며, 기울어진 탑을 고정 손으로 교정하는 시도가 관찰됨(9개)',s4:'블록 10개 이상을 양손 역할 교대가 유창하게 유지된 상태로 쌓으며, 고정 손의 교정이 능숙하여 탑의 안정성이 높음(10개 이상)'},
{code:'BI04-04',desc:'한 손으로 종이 잡고 다른 손으로 가위 자르기 시도 (예: 한 손(비우세손)으로 종이를 잡아 고정하고, 반대 손(우세손)으로 아동용 가위를 열고 닫아 종이를 자르려는 양측 비대칭 동작. BI03-04의 찢기(양손 반대 방향)에서 가위 사용(도구 매개 비대칭)으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 아동용 가위를 열고 닫아 종이를 자르려는 시도가 관찰되지 않을 경우. 만약 가위 열기-닫기는 가능하나 종이를 잡은 손과의 협응이 실패한다면, 양측 비대칭 협응의 어려움으로 BI 영역 전반의 확인이 필요',unit:'질적',s1:'가위를 쥐고 열고 닫는 동작 자체가 성립하지 않거나, 가위를 잡은 손과 종이를 잡은 손의 역할이 분화되지 않아 양손으로 가위를 잡으려 함',s2:'가위를 열고 닫는 동작은 가능하나, 종이를 잡은 손이 가위 진행 방향으로 종이를 이동시키지 못해 한 번 자른 후 진행이 멈추거나 종이가 구겨짐',s3:'종이를 잡은 손이 가위 진행 방향으로 종이를 이동시키며 2-3번 연속 자르기가 가능하나, 직선을 따라 자르기는 아직 어렵고 자른 선이 불규칙',s4:'종이를 잡은 손과 가위 손의 역할 분화가 안정적이며, 종이의 가장자리를 따라 여러 번 연속 자르기가 가능'},
{code:'BI04-05',desc:'양손 동시 조작 — 점토 굴리기/누르기 (예: 양손 손바닥 사이에 점토를 넣고 양손을 동시에 앞뒤로 굴려 기다란 막대를 만들거나, 양손으로 동시에 눌러 납작하게 만드는 양측 대칭 동작. BI03-01의 공 던지기(순간적 대칭)에서 지속적 양측 대칭 조작으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 양손 손바닥 사이에서 점토를 굴리는 양측 대칭 동작이 관찰되지 않고, 한 손으로만 조작하거나 테이블에 대고 한 손으로 밀어 변형시키는 방식에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'점토를 양손 사이에 넣고 굴리거나 누르는 동작이 성립하지 않아, 한 손으로만 점토를 만지거나 테이블에 대고 한 손으로 굴림',s2:'양손 사이에 점토를 넣고 굴리려는 시도는 있으나, 양손의 힘과 속도가 맞지 않아 점토가 한쪽으로 밀려나거나 납작해지지 않고 찢어짐',s3:'양손으로 점토를 굴려 기다란 막대를 만들거나 눌러 납작하게 만드는 동작이 성립하나, 막대 굵기가 고르지 않거나 납작한 면이 비대칭',s4:'양손의 힘과 속도가 대칭적으로 조절되어 점토를 고르게 굴리거나 납작하게 만들며, 다양한 형태(공, 막대, 납작판)를 만들어낼 수 있음'}
],
praxis:[
{code:'PX04-01',desc:'3단계 동작 모방(시범 → 따라하기) (예: 양육자가 "손뼉 치기 → 만세 → 앉기"를 순서대로 시연하면, 아동이 세 가지 동작을 동일 순서로 연속 수행하는 과제. PX03-01의 2단계에서 3단계로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 양육자가 반복 시연한 3단계 동작 순서에서, 두 번째 동작까지만 모방하고 세 번째 동작으로의 전환이 관찰되지 않는 양상이 지속될 경우. 만약 각 동작을 개별적으로는 모방하나 3개의 순서적 연결이 실패한다면, 운동 순서화(motor sequencing)의 어려움과의 감별이 필요',unit:'질적',s1:'양육자의 시연 후 첫 번째 동작만 모방하고 나머지 동작으로의 전환이 관찰되지 않음(PX03-01 s2 수준과 동일하면 진전 없음)',s2:'첫 두 동작은 순서대로 모방하나 세 번째 동작이 누락되거나, 두 번째 동작을 반복하며 세 번째로 전환되지 않음(PX03-01 s4 수준)',s3:'세 가지 동작을 모두 산출하나 순서가 뒤바뀌거나, 동작 사이에 긴 정지가 필요하여 연속성이 부족',s4:'세 가지 동작을 시연된 순서대로 연속적으로 수행하며, 동작 조합이 달라져도 적용 가능'},
{code:'PX04-02',desc:'복잡한 장애물 코스 수행(3-4개 장애물) (예: 터널 통과 → 낮은 평균대 위 걷기 → 매트 위 점프 → 원뿔 돌아오기의 3-4개 장애물로 구성된 연속 이동 과제. PX03-02의 2-3개에서 3-4개로 확장되며, 장애물의 난이도도 상승)',acqTime:'3세-3세 6개월',redFlag:'4세까지 3개 장애물로 구성된 코스에서 첫 장애물만 수행하고 나머지로의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'첫 번째 장애물만 수행하고 두 번째부터 코스를 이탈하거나 양육자의 안내 없이는 진행되지 않음(PX03-02 s1-s2 수준과 동일하면 진전 없음)',s2:'장애물 2-3개까지 순서대로 수행하나, 마지막 장애물에서 전략이 성립하지 않아 양육자의 방향 안내나 시범이 필요',s3:'3-4개 장애물을 순서대로 수행하여 코스를 완주하나, 장애물 사이 전환에서 정지가 필요하고 반복 시에도 속도 향상이 미미',s4:'코스를 유창하게 완주하며, 반복 시 속도와 동작 효율이 향상되고 장애물 순서를 바꾸어도 적응 가능'},
{code:'PX04-03',desc:'역할놀이 시퀀스 구성 (예: "병원 놀이"에서 인형을 환자로 설정하고, 청진기 대기 → 주사 놓기 → 약 주기 등 3가지 이상의 역할 관련 행위를 순서적으로 구성하는 놀이. PX03-03의 상징놀이에서 역할(의사, 요리사 등)을 설정하고 시퀀스를 구성하는 단계로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 상징놀이에서 역할을 설정하여 행위를 순서적으로 연결하는 시퀀스가 관찰되지 않고, 단일 상징 행위(먹이기, 재우기)의 반복에만 머무를 경우',unit:'질적',s1:'물건을 기능적으로 사용(청진기 대기, 숟가락 먹이기)하나 역할을 설정하여 행위를 연결하는 시퀀스가 관찰되지 않음(PX03-03 s1-s2 수준에 머무름)',s2:'역할 설정("나 의사야")이 선언되나 관련 행위가 1-2가지에 그치고 시퀀스가 확장되지 않음',s3:'역할에 맞는 3가지 행위를 순서대로 수행하나, 양육자의 놀이 제안("이제 약 줘볼까?")이 있어야 다음 행위로 전환',s4:'자발적으로 역할에 맞는 3가지 이상의 행위를 순서적으로 구성하며, 상황을 변형하여 새로운 시나리오로 확장(예: "환자가 또 아프대요")'},
{code:'PX04-04',desc:'3단계 언어 지시에 따른 운동 수행 (예: "공 집어서 바구니에 넣고 의자에 앉아"라는 3단계 언어 지시를 듣고, 세 가지 운동 순서를 계획하고 실행하는 과제. PX03-04의 2단계에서 3단계로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 3단계 언어 지시에서 첫 단계만 수행하고 두 번째 이후로의 전환이 관찰되지 않는 양상이 지속될 경우. 만약 2단계 지시(PX03-04)는 유창하나 3단계에서만 실패한다면 운동 순서화 또는 작업기억과의 감별이 필요하며, 2단계도 여전히 실패한다면 수용 언어 이해와의 감별이 선행되어야 함',unit:'질적',s1:'3단계 지시 후 첫 번째 단계만 수행하고 나머지가 누락됨(PX03-04 s2 수준과 동일하면 진전 없음)',s2:'첫 두 단계는 수행하나 세 번째 단계가 누락되어 멈추거나 양육자를 바라봄',s3:'세 단계를 모두 수행하나 순서가 뒤바뀌거나, 두 번째 완료 후 "그 다음 뭐야?"와 같은 확인이 필요',s4:'3단계 지시를 순서대로 유창하게 수행하며, 유사한 구조의 다른 3단계 지시에도 적용 가능'},
{code:'PX04-05',desc:'새로운 구성 놀이 방법 자발적 고안(관념화, ideation) (예: 블록·레고·자석 타일 등 구성 놀잇감을 이전에 시연받지 않은 새로운 방식으로 조합하여 구조물을 만들거나, 익숙한 놀잇감을 새로운 용도로 전용하는 자발적 문제 해결. PX03-05의 놀이 기구 탐색에서 창의적 구성으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 구성 놀잇감(블록, 레고 등)을 사용할 때 양육자가 시연한 방식의 모방에만 머물고, 새로운 조합이나 구성을 자발적으로 시도하는 관념화가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'놀잇감을 양육자가 시연한 방식 또는 이전에 경험한 방식으로만 사용하며, 새로운 조합이나 용도의 시도가 관찰되지 않음',s2:'간헐적으로 새로운 방식(블록을 세우던 것을 옆으로 눕히기)을 시도하나, 한 번의 시도 후 익숙한 방식으로 복귀',s3:'새로운 조합을 여러 가지 시도하며 "이것도 되나?" 식의 탐색이 관찰되나, 시도가 산발적이고 완성된 구조물로 이어지지 않음',s4:'자발적으로 새로운 구조물(다리, 집, 울타리 등)을 고안하여 조합하며, 실패 시 다른 방법을 시도하는 유연한 문제 해결이 관찰됨'}
],
vmi:[
{code:'VM04-01',desc:'원(circle) 모방 그리기 (예: 평가자가 종이에 원을 또렷하게 그려 보여준 뒤, 아동이 크레용으로 시작점과 끝점이 만나는 폐합 원형을 모방하여 그리는 과제. VM03-03의 원형 끼적이기에서 의도적인 폐합 원 모방으로 진전)',acqTime:'3세-3세 6개월',redFlag:'4세까지 평가자가 시연한 원을 모방하여 시작점과 끝점이 만나는 폐합 도형을 그으려는 시도에서, 원형 끼적이기(나선형)만 산출되는 양상이 지속될 경우 — Beery VMI 기준 원 모방은 3세 전후 참조',unit:'질적',s1:'평가자의 시연을 관찰한 뒤에도 원형 끼적이기(나선형·반복 원)와 구분되지 않는 흔적만 산출됨(VM03-03 수준에 머무름)',s2:'폐합을 시도하나 시작점과 끝점이 크게 벗어나 열린 곡선에 머물거나, 원의 형태가 심하게 찌그러져 도형으로 인식되기 어려움',s3:'시작점과 끝점이 대략적으로 만나는 폐합 원이 산출되나, 원의 크기가 불규칙하거나 형태가 타원·달걀 모양으로 비대칭',s4:'시작점과 끝점이 분명하게 만나는 폐합 원을 안정적으로 그리며, 반복하여 비슷한 크기의 원을 재현 가능'},
{code:'VM04-02',desc:'6-8조각 그림 퍼즐 완성 (예: 동물·탈것 등 그림이 인쇄된 6-8조각 직소 퍼즐을 그림 단서를 참조하여 완성하는 과제. VM03-04의 4-6조각에서 6-8조각으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 4조각 그림 퍼즐에서 그림 단서를 참조하여 조각을 맞추는 동작이 관찰되지 않고, 무작위로 대어보는 수준에 머무를 경우',unit:'질적',s1:'퍼즐 조각을 맞추려는 시도에서 그림 단서를 활용하지 않고 무작위로 대어보는 수준에 머무름(VM03-04 s2 수준과 동일하면 진전 없음)',s2:'그림 단서를 참조하여 4-5조각까지 맞추나 나머지 조각에서 시행착오가 과도하여 양육자의 힌트가 필요',s3:'6조각 퍼즐을 그림 단서를 참조하여 독립적으로 완성하며, 7-8조각에서는 간헐적으로 양육자의 힌트가 필요',s4:'8조각 퍼즐을 그림 단서를 참조하여 대부분 독립적으로 완성하며, 시행착오가 줄어들고 효율적 전략(가장자리 먼저, 같은 색 모으기)이 간헐적으로 관찰됨'},
{code:'VM04-03',desc:'십자(+) 모방 그리기 시도 (예: 평가자가 종이에 십자 모양(+)을 그려 보여준 뒤, 아동이 세로선과 가로선이 교차하는 도형을 모방하여 그리는 과제. VM03-01의 세로선·가로선 개별 모방에서 두 선의 교차 배치로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 평가자가 시연한 십자 모양에서 두 선이 교차하는 구조를 시도하지 않고, 개별 선(세로 또는 가로)만 그리는 수준에 머무를 경우 — Beery VMI 기준 십자 모방은 3세 6개월-4세 전후 참조',unit:'질적',s1:'시연 후 세로선 또는 가로선 한 가지만 그리고 두 번째 선을 추가하지 않거나, 두 선이 교차하지 않는 평행선으로 산출',s2:'세로선과 가로선 두 가지를 모두 그리나 교차점이 형성되지 않아 T자나 L자 형태에 머무름',s3:'세로선과 가로선이 교차하는 십자 형태가 대략적으로 산출되나, 두 선의 길이 비율이 크게 불균형하거나 교차점이 중심에서 벗어남',s4:'세로선과 가로선이 대략적 중심에서 교차하는 십자가 산출되며, 시도할 때마다 교차 구조가 대체로 재현됨'},
{code:'VM04-04',desc:'사람 그리기(두족인, tadpole figure) (예: 큰 동그라미로 머리를 그리고 그 아래로 막대 선 2개를 다리로 그려 사람을 표현하는 자발적 그리기. 이 연령에서는 머리+다리의 2부분 또는 머리+다리+팔의 3부분이 기대됨)',acqTime:'3세-3세 6개월',redFlag:'4세까지 "사람 그려봐"라는 요청에 인체 부분을 의도적으로 표현하려는 시도가 관찰되지 않을 경우',unit:'질적',s1:'"사람 그려봐"라는 요청에 원형·선 등 형태를 그리나, 인체의 부분을 의도적으로 표현하려는 시도가 관찰되지 않음',s2:'큰 원(머리)을 그리고 "이게 사람이야"라고 말하나, 팔다리 등 다른 신체 부분이 추가되지 않아 단일 도형에 머무름(1부분)',s3:'머리(원)와 다리(2개의 선)로 구성된 두족인이 산출되어 2-3부분이 표현됨',s4:'머리·다리·팔 또는 머리·몸통·다리가 구분되어 3부분 이상이 표현되며, 눈·입 등 얼굴 세부가 머리 안에 그려짐'},
{code:'VM04-05',desc:'도형 안 색칠하기 (예: 종이에 그려진 큰 원이나 네모 안에 크레용으로 색칠하되, 도형의 윤곽선 안쪽에 색을 채우려는 의도적 조절이 관찰되는 과제)',acqTime:'3세-3세 6개월',redFlag:'4세까지 도형 안에 색칠하라는 지시에서 윤곽선 안쪽에 색을 채우려는 의도적 조절이 관찰되지 않고, 도형과 무관한 자유 끼적이기만 지속될 경우',unit:'질적',s1:'도형의 윤곽선과 무관하게 종이 전체에 걸쳐 자유롭게 끼적이며, 도형 안에 색칠하려는 의도가 관찰되지 않음',s2:'도형 안에 색칠하려는 의도는 있으나 윤곽선 밖으로 크게 벗어나는 빈도가 높고, 도형 내부의 일부만 채워짐',s3:'도형 내부의 대부분을 색칠하며 윤곽선 밖으로의 이탈이 간헐적이나, 색칠 방향이 불규칙하고 빈 공간이 남음',s4:'도형 내부를 고르게 색칠하며 윤곽선 밖으로의 이탈이 최소화되고, 한 방향으로 일관되게 칠하는 패턴이 관찰됨'}
],
fine:[
{code:'FM04-01',desc:'정적 삼지잡기(static tripod grasp) 안정화 (예: 엄지·검지·중지의 세 손가락 끝으로 크레용을 잡되, 손가락은 고정된 채 손목·전완 단위로 크레용을 움직여 그리는 파지 패턴. FM03-04의 간헐적 출현에서 안정적 사용으로 진전)',acqTime:'3세-3세 6개월',redFlag:'4세까지 크레용을 세 손가락(엄지·검지·중지)으로 잡는 삼지잡기 패턴이 관찰되지 않고, 주먹 잡기나 손바닥 감싸기에서 벗어나지 않는 양상이 지속될 경우',unit:'질적',s1:'크레용을 주먹이나 손바닥 전체로 감싸 쥐는 패턴(fist/palmar grasp)에서 벗어나지 않음(FM03-04 s1 수준)',s2:'세 손가락으로 크레용을 잡으려는 시도가 간헐적으로 나타나나 곧 digital-pronate 패턴으로 회귀(FM03-04 s3 수준과 동일하면 진전 없음)',s3:'정적 삼지잡기가 그리기 세션의 대부분에서 유지되며, 손목 단위의 움직임으로 선을 그으나 손가락 내 움직임(intrinsic movement)은 아직 관찰되지 않음',s4:'정적 삼지잡기가 안정적으로 유지되며, 그리기·색칠하기 등 다양한 과제에서 일관되게 사용됨'},
{code:'FM04-02',desc:'블록 9-10개 쌓기 — 놓기 정밀성 (예: 나무·플라스틱 블록(약 2.5-3cm 크기)을 9-10개까지 쌓되, BI04-03의 양손 역할 교대가 아닌 놓기 동작의 힘 조절과 수직 정렬 정밀성이 관찰 핵심. FM03-02의 6-8개에서 9-10개로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 블록 6개 미만으로만 쌓기가 가능하고, 놓기 동작에서 블록의 중심을 맞추려는 정밀 조절이 관찰되지 않을 경우 — Bayley-III 기준 36개월에 9-10개 쌓기가 기대됨',unit:'개',s1:'블록 5-6개까지만 쌓기 가능하며, 놓는 순간 과도한 힘으로 밀거나 중심에서 벗어나 7개 이상 진행이 반복적으로 실패(5-6개, FM03-02 s3 수준과 동일하면 진전 없음)',s2:'블록 7-8개까지 쌓으나 높아질수록 놓는 위치의 오차가 커져 탑이 기울어지거나 무너짐(7-8개)',s3:'블록 9개까지 수직 정렬을 유지하며 쌓기 성공하나, 10개에서 손의 미세한 떨림이나 놓는 각도 오차로 무너짐(9개, 해당 연령 정상 수준)',s4:'블록 10개 이상을 수직 정렬이 유지되는 안정적인 탑으로 쌓으며, 놓는 동작이 부드럽고 힘 조절이 정밀(10개 이상)'},
{code:'FM04-03',desc:'구슬 끈 꿰기 — 중간 크기 구슬 (예: 중간 두께의 끈(지름 약 2-3mm)에 중간 크기 나무 구슬(구멍 지름 약 5-7mm)을 한 손으로 잡고, 반대쪽 손으로 끈 끝을 구슬 구멍에 통과시키는 양손 정밀 협응 과제. FM03-03의 큰 구슬에서 중간 크기로 난이도 상승)',acqTime:'3세-3세 6개월',redFlag:'4세까지 큰 구슬(구멍 지름 약 8-10mm)에서도 끈을 구멍에 통과시키는 동작이 관찰되지 않을 경우',unit:'질적',s1:'끈 끝을 구슬 구멍에 대려는 시도에서 끈과 구멍의 정렬이 맞지 않아 반복 실패하며, 큰 구슬(FM03-03)에서도 여전히 어려움이 있음',s2:'큰 구슬은 안정적으로 꿰나 중간 크기 구슬에서는 구멍 정렬에 시간이 오래 걸리고, 끈을 통과시켜도 반대쪽에서 잡아당기지 못해 빠져나오는 빈도가 높음',s3:'중간 크기 구슬을 안정적으로 꿰어 3-4개 연속 꿰기가 가능하나, 구슬을 잡는 손의 고정이 간헐적으로 불안정',s4:'중간 크기 구슬을 유창하게 연속 꿰기하며, 양손의 역할(고정-통과)이 안정적이고 5개 이상 연속 꿰기가 가능'},
{code:'FM04-04',desc:'큰 단추 끼우기 시도 (예: 인형 옷이나 자신의 겉옷에 달린 큰 단추(지름 약 2-2.5cm)를 단추구멍에 밀어넣는 양손 정밀 과제. 한 손으로 단추를 잡고 다른 손으로 구멍을 열어 밀어넣는 양측 비대칭 협응이 요구됨)',acqTime:'3세-3세 6개월',redFlag:'4세까지 큰 단추(지름 약 2-2.5cm)를 단추구멍에 밀어넣으려는 시도 자체가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'단추를 잡으나 단추구멍에 밀어넣으려는 시도 자체가 관찰되지 않거나, 양손이 단추와 구멍에 각각 배치되지 않음',s2:'단추를 구멍 쪽으로 가져가는 시도는 있으나, 단추를 구멍에 밀어넣는 방향이 맞지 않아(옆에서 밀기, 구멍 위에서 누르기) 통과하지 못함',s3:'단추를 구멍에 밀어넣는 방향을 파악하여 한두 개의 큰 단추를 끼우나, 시간이 오래 걸리고 양손의 힘 조절이 미숙하여 단추가 빠져나오는 경우가 있음',s4:'큰 단추를 독립적으로 끼우며, 여러 개의 단추를 순서대로 끼울 수 있음'},
{code:'FM04-05',desc:'포크 사용하여 찔러 먹기 (예: 아동용 포크로 과일 조각·반찬 등을 찔러서 입으로 가져가는 도구 사용 과제. FM03-01의 숟가락에서 포크로 도구가 전환되며, 찌르기 동작의 힘 조절과 정확도가 요구됨)',acqTime:'3세-3세 6개월',redFlag:'4세까지 포크로 음식을 찔러 먹으려는 시도가 관찰되지 않고, 손가락 섭식이나 숟가락에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'포크를 잡으나 음식을 찌르려는 시도가 관찰되지 않거나, 포크를 숟가락처럼 사용하여 퍼올리려 함',s2:'포크로 음식을 찌르려는 시도는 있으나, 찌르는 힘이 부족하여 포크가 미끄러지거나 음식이 바닥에 떨어짐',s3:'크고 단단한 음식(과일 조각, 삶은 감자)은 포크로 찔러 먹으나, 작거나 미끄러운 음식(콩, 두부)에서는 찌르기 실패가 빈번',s4:'다양한 크기·질감의 음식을 포크로 찔러 먹으며, 찌르는 힘과 각도를 음식에 맞게 조절'}
],
gross:[
{code:'GM04-01',desc:'앞으로 점프 이동(standing broad jump) (예: 양발을 모아 바닥에서 뛰어올라 전방으로 이동하여 착지하되, GM03-04의 제자리 점프 착지 안정화에서 전방 이동 거리와 착지 안정성의 결합으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 양발 모아 점프에서 전방 이동이 관찰되지 않고 제자리 점프에만 머무르거나, 착지 시 매번 넘어지는 양상이 지속될 경우',unit:'질적',s1:'양발 모아 점프 시 전방 이동이 거의 없어 제자리 점프에 머물거나, 전방으로 뛰려다 한쪽 발만 먼저 착지(GM03-04 수준)',s2:'양발로 이륙하여 전방으로 약간 이동하나, 착지 시 양손을 바닥에 짚거나 앞으로 넘어짐',s3:'양발 동시 이륙-전방 이동-양발 동시 착지가 성립하며 착지 후 넘어지지 않고 자세를 유지하나, 이동 거리가 짧고 착지 시 체간이 전방으로 기울어짐',s4:'전방으로 안정적으로 점프 이동하며 착지가 균형 잡히고, 반복 시 일정한 거리를 유지'},
{code:'GM04-02',desc:'한발 뛰기(hopping) 시도 (예: 한쪽 발로만 연속으로 뛰어오르려는 시도. PC04-01의 한발서기 안정화를 기반으로, 정적 균형에서 동적 균형(한발 뛰기)으로 확장되는 대근육 과제)',acqTime:'3세-3세 6개월',redFlag:'4세까지 한쪽 발로 1회라도 뛰어오르는 동작이 관찰되지 않는 양상이 지속될 경우. PC04-01 한발서기와 교차 확인하여, 한발서기는 가능하나 뛰기에서만 실패한다면 동적 균형(전정-고유수용 통합)의 어려움과의 감별이 필요',unit:'질적',s1:'한쪽 발로 뛰어오르려는 시도가 관찰되지 않거나, 한발서기(PC04-01) 자체가 아직 불안정하여 한발 뛰기의 전제가 성립하지 않음',s2:'한쪽 발로 1회 뛰어오르는 동작이 간헐적으로 성공하나, 착지 후 즉시 반대쪽 발을 내려놓아 연속 뛰기로 이어지지 않음',s3:'한쪽 발로 2-3회 연속 뛰기가 가능하나, 뛰기 높이가 낮고 리듬이 불규칙하며 한쪽 발(우세 발)에서만 성공',s4:'우세 발에서 3-5회 연속 한발 뛰기가 리듬적으로 가능하며, 비우세 발에서도 시도가 관찰됨'},
{code:'GM04-03',desc:'한 손 오버핸드 공 던지기 (예: 한 손으로 작은 공(테니스공 크기)을 머리 위에서 앞으로 던지되, BI03-01의 양손 던지기에서 한 손 던지기로 전환된 비대칭 대근육 과제)',acqTime:'3세-3세 6개월',redFlag:'4세까지 한 손으로 머리 위에서 공을 전방으로 던지는 동작이 관찰되지 않고, 양손 던지기(BI03-01 수준)나 가슴 앞 밀어내기에만 머무를 경우',unit:'질적',s1:'공을 한 손으로 잡으나 머리 위에서 던지는 동작으로 이어지지 않고, 가슴 앞에서 밀어내거나 아래로 놓아 떨어뜨림',s2:'한 손으로 머리 위에서 던지려는 시도는 있으나 공이 뒤로 빠지거나 바닥으로 떨어지며, 던지는 팔의 궤적이 불규칙',s3:'한 손 오버핸드 동작으로 공이 전방으로 이동하는 던지기가 성립하나, 방향이 불규칙하고 던지기 시 반대쪽 발의 내딛기(stepping)가 관찰되지 않음',s4:'공을 한 손으로 전방에 안정적으로 던지며, 던지는 팔의 반대쪽 발을 앞으로 내딛는 대각선 패턴(contralateral stepping)이 출현'},
{code:'GM04-04',desc:'계단 교대발 오르기-내려오기 (예: 난간을 한 손으로 잡고 한 칸에 한 발씩 번갈아 오르고 내려오는 동작. PC04-05가 오르기 시 자세 조절(체간 직립, 무게 중심 이동)에 초점을 두는 것과 달리, 여기서는 오르기와 내려오기 모두에서의 교대발 보행 패턴의 성숙을 관찰)',acqTime:'3세-3세 6개월',redFlag:'4세까지 계단 오르기에서 교대발 시도가 관찰되지 않고, 오르기와 내려오기 모두 marking time 방식에만 의존하는 양상이 지속될 경우. 오르기 시 자세 조절(체간 기울어짐, 편측 편향)에 대해서는 PC04-05와 교차 확인',unit:'질적',s1:'오르기에서 교대발 시도가 간헐적으로만 나타나고, 내려오기는 marking time이나 엉덩이 대고 내려오기에 머무름(PC04-05 s2 수준 이하)',s2:'오르기에서 교대발이 대부분 성공하나, 내려오기에서는 marking time으로 회귀하며 양손 난간 지지가 필요',s3:'오르기에서 교대발이 안정적이고, 내려오기에서도 교대발 시도가 관찰되나 중간에 marking time으로 전환하는 칸이 있으며 속도가 느림',s4:'오르기와 내려오기 모두 교대발로 안정적으로 수행하며, 보행 속도가 일정하고 난간에 대한 의존이 가벼운 접촉 수준으로 감소'},
{code:'GM04-05',desc:'세발자전거 독립 주행 (예: 세발자전거에 앉아 양발 교대 페달링으로 연속 전진하며, 핸들을 돌려 목적지를 향해 방향을 조절하는 독립 주행 과제. BI04-02의 페달 밟기에서 주행(페달링+조향+멈추기의 통합)으로 확장)',acqTime:'3세-3세 6개월',redFlag:'4세까지 세발자전거에서 페달링과 핸들 조향을 동시에 수행하는 통합 주행이 관찰되지 않고, 페달링만 가능하거나 발로 밀기(GM03-05 수준)에 머무를 경우',unit:'질적',s1:'페달링은 가능하나 직선으로만 전진하며, 핸들을 돌려 방향을 바꾸는 동작이 성립하지 않거나 장애물 앞에서 멈추지 못함(BI04-02 s3 수준)',s2:'직선 주행 중 핸들을 돌려 대략적 방향 전환이 가능하나, 좁은 공간에서의 회전이나 곡선 경로에서 핸들 조작이 과도하여 넘어지거나 멈춤',s3:'직선 주행·방향 전환·멈추기가 모두 가능하나, 장애물을 피하며 주행하는 복합 상황에서는 멈추어야 판단 가능',s4:'직선 주행·방향 전환·멈추기·장애물 회피를 통합하여 독립적으로 주행하며, 목적지를 향해 경로를 계획하는 양상이 관찰됨'}
],
oral:[
{code:'OM04-01',desc:'회전 씹기(rotary chewing) 성숙 — 질긴 음식 적용 (예: 질긴 고기·마른 오징어·채소 줄기 등 저항이 큰 음식에서도 좌우 회전 씹기로 분쇄하여 삼키되, OM03-01의 단단한 고형식 적용에서 질기고 섬유질이 많은 음식으로 적용 범위가 확대된 단계)',acqTime:'3세-3세 6개월',redFlag:'4세까지 질긴 음식(고기 등)을 회전 씹기로 분쇄하지 못하고, 분쇄하지 않은 채 삼키거나 뱉어내는 양상이 지속되어 부드러운 음식에만 의존하는 식이 패턴이 유지될 경우',unit:'질적',s1:'단단한 고형식(사과, 당근)에서 회전 씹기가 가능하나, 질긴 음식(고기, 오징어)은 입에 넣은 뒤 오래 씹다가 뱉거나 분쇄하지 않은 채 삼키려 함(OM03-01 s3 수준과 동일하면 진전 없음)',s2:'질긴 음식을 회전 씹기로 씹으려는 시도는 있으나, 씹기 횟수가 부족하여 큰 덩어리째 삼키거나 씹기 중 상하 씹기(munching)로 회귀',s3:'대부분의 질긴 음식에서 회전 씹기로 분쇄하여 삼키나, 특히 섬유질이 많은 채소 줄기에서는 씹다가 뱉는 양상이 간헐적으로 관찰됨',s4:'다양한 질감·경도의 음식을 회전 씹기로 분쇄하여 삼키며, 음식의 저항에 따라 씹기 강도·횟수·좌우 위치를 조절'},
{code:'OM04-02',desc:'촛불 끄기 — 강도 조절 (예: 생일 케이크의 촛불을 입술을 오므려 한 번의 불기로 끄되, OM03-03의 불기 시도에서 강도를 조절하여 한 번에 끄는 단계로 진전)',acqTime:'3세-3세 6개월',redFlag:'4세까지 촛불을 향해 입술을 오므려 불어도 촛불이 꺼지지 않는 양상이 지속될 경우',unit:'질적',s1:'입술을 오므려 불려는 시도는 있으나 호기 강도가 부족하여 촛불이 흔들리기만 하고 꺼지지 않음(OM03-03 s1-s2 수준과 동일하면 진전 없음)',s2:'촛불을 끌 수 있으나 여러 번의 시도가 필요하며, 호기 강도가 불규칙하여 첫 시도에서 끄지 못함',s3:'한 번의 불기로 촛불을 끌 수 있으나, 2-3개의 촛불을 한 번에 끄려면 호기 강도가 부족하거나 방향이 벗어남',s4:'한 번의 불기로 여러 개의 촛불을 끌 수 있으며, 호기 강도와 방향을 의도적으로 조절'},
{code:'OM04-03',desc:'비눗방울 불기 — 크기·지속 조절 (예: 비눗방울 도구에 입술을 오므려 불어 방울을 만들되, OM03-03의 불기 시도에서 호기 강도를 조절하여 방울을 터뜨리지 않고 크게 만드는 단계로 진전)',acqTime:'3세-3세 6개월',redFlag:'4세까지 비눗방울 도구에 불어도 방울이 형성되지 않는 양상이 지속될 경우',unit:'질적',s1:'비눗방울 도구에 불려는 시도에서 호기 강도가 과도하여 비눗물이 흩어지거나, 호기가 너무 약하여 방울이 형성되지 않음(OM03-03 s3 수준과 동일하면 진전 없음)',s2:'비눗방울이 간헐적으로 형성되나, 크기가 작고 불규칙하며 연속으로 2-3개 이상 만들기가 어려움',s3:'호기 강도를 조절하여 비눗방울을 연속으로 여러 개 만들 수 있으나, 크게 만들려고 하면 터지거나 작은 방울만 나옴',s4:'호기 강도를 과제에 맞게 조절하여 크고 작은 비눗방울을 의도적으로 만들며, 연속 불기가 안정적'},
{code:'OM04-04',desc:'한 손 컵 마시기 — 흘림 없음 (예: 한 손으로 열린 컵(open cup)을 잡고 마시되, OM03-02의 양손/한 손 컵 마시기에서 한 손 컵 사용이 안정적이고 흘림이 거의 관찰되지 않는 단계)',acqTime:'3세-3세 6개월',redFlag:'4세까지 열린 컵을 한 손으로 잡고 마시는 동작에서 컵이 기울어져 매 모금 흘림이 지속되고, 양손으로 잡아야만 안정적으로 마실 수 있는 양상이 유지될 경우',unit:'질적',s1:'열린 컵을 한 손으로 잡으나 컵이 기울어져 흘림이 빈번하며, 양손으로 잡아야 안정적으로 마실 수 있음(OM03-02 s3 이전 수준)',s2:'한 손으로 컵을 잡고 마시는 동작이 대부분 성공하나, 컵을 기울이는 각도 조절이 미숙하여 마지막 모금에서 과도하게 기울여 흘림이 발생',s3:'한 손 컵 마시기에서 흘림이 거의 관찰되지 않으나, 양이 많은 컵(무거운 컵)에서는 한 손 안정성이 저하됨',s4:'한 손으로 다양한 크기의 컵을 잡고 흘림 없이 마시며, 컵을 테이블에 놓는 동작도 안정적'},
{code:'OM04-05',desc:'침 흘림(drooling) — 거의 소실 (예: 깨어 있는 시간 동안 모든 활동에서 침 흘림이 거의 관찰되지 않으며, OM03-05의 전반적 감소에서 거의 완전한 소실로 진전된 단계)',acqTime:'3세-3세 6개월',redFlag:'4세 이후에도 이 나는 시기가 아닌 때에 대근육 활동이나 집중 과제 시 침 흘림이 반복적으로 관찰되는 양상이 지속될 경우. 만약 안정 시에는 침 흘림이 없으나 이중과제(운동+인지) 시에만 재출현한다면, 구강 자동성(oral automaticity)의 지연과의 감별이 필요',unit:'질적',s1:'안정 시와 식사 시에는 침 흘림이 관찰되지 않으나, 대근육 활동·집중 과제 시 재출현(OM03-05 s2 수준과 동일하면 진전 없음)',s2:'대부분의 활동에서 침 흘림이 관찰되지 않으나, 과도한 신체 활동 후 또는 피로 시 간헐적으로 관찰됨(OM03-05 s3 수준)',s3:'모든 활동에서 침 흘림이 거의 관찰되지 않으며, 피로 시에도 최소화됨',s4:'깨어 있는 시간 동안 어떠한 활동에서도 침 흘림이 관찰되지 않음'}
]
},
'4y':{
postural:[
{code:'PC05-01',desc:'한발서기 유지 시간 연장 (예: 평평한 바닥에서 지지 없이 한쪽 발을 들고 반대쪽 발로만 서서, PC04-01의 안정화에서 유지 시간이 더 길어지고 상체 동요가 줄어드는 단계. 이 연령에서는 양쪽 발 모두에서 안정적 한발서기가 기대됨)',acqTime:'4세-4세 6개월',redFlag:'5세까지 지지 없이 한쪽 발로 서서 양팔을 벌려도 잠시 유지가 어렵고, 즉시 반대쪽 발을 내려놓는 양상이 지속될 경우',unit:'질적',s1:'한발서기 시 상체 동요가 커서 잠시만 유지되고, 들어올린 발이 지지 발에 기대는 보상이 필요(PC04-01 s2 수준과 동일하면 진전 없음)',s2:'양팔을 벌려 균형을 잡으며 한발서기를 유지하나, 양쪽 발 간 유지 시간의 비대칭이 관찰됨(PC04-01 s3 수준)',s3:'양쪽 발 모두에서 안정적 한발서기가 가능하며, 한발서기 중 머리를 돌리거나 양손으로 물건을 잡는 부가 동작이 가능',s4:'한발서기 중 양팔을 체간에 붙인 상태에서도 자세가 유지되며, 유지 시간이 길어져 양육자와의 놀이 상호작용(예: "동상 놀이") 동안 한발서기를 지속 가능'},
{code:'PC05-02',desc:'평균대 위 안정 보행(폭 약 8cm) (예: 폭 약 8cm의 좁은 평균대(높이 약 10-15cm) 위를 따라 연속으로 걸되, PC04-02의 폭 10cm 평균대에서 폭이 좁아진 과제. 보행 시 양발이 평균대 위에 유지되며 전방을 응시하는 안정적 보행이 관찰 핵심)',acqTime:'4세-4세 6개월',redFlag:'5세까지 폭 약 8cm 평균대 위에서 양육자의 손잡이 없이 3걸음 이상 연속 보행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'좁은 평균대 위에서 1-2걸음 이상 진행하지 못하거나, 양육자의 손을 잡아야 진행이 가능(PC04-02 s2 수준 이하)',s2:'양육자 손잡이 없이 3-4걸음 걸으나 시선이 발에 고정되고, 발이 평균대 밖으로 자주 벗어남',s3:'평균대 전체를 따라 연속으로 걸으며 시선을 전방으로 유지하는 시간이 길어지나, 속도가 느리고 양팔을 벌려 균형을 잡음',s4:'평균대 전체를 따라 안정적 속도로 걸으며, 양팔을 체간에 가까이 유지하면서도 발이 벗어나는 빈도가 최소'},
{code:'PC05-03',desc:'바로 누운 자세 굴곡(supine flexion) — 부가 동작 중 자세 유지 (예: 등을 대고 누워 머리와 양다리를 동시에 들어올린 자세에서, PC04-03의 시간 연장에서 양손 조작·물건 던지기 등 부가 동작을 수행하면서도 자세가 안정적으로 유지되는 체간 굴곡근 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 바로 누운 자세 굴곡 자세에서 양손으로 물건을 잡는 정도의 부가 동작에도 자세가 무너지는 양상이 지속될 경우',unit:'질적',s1:'놀이 상호작용 여러 차례 동안 자세 유지는 가능하나, 양손으로 물건을 조작하면 머리나 다리가 떨어짐(PC04-03 s3 수준과 동일하면 진전 없음)',s2:'양손으로 물건을 잡는 동작에서는 자세가 유지되나, 물건을 던지거나 조작하는 역동적 동작에서 자세가 무너짐',s3:'양손으로 물건을 조작하거나 던지는 동작 중에도 자세가 대부분 유지되나, 좌우 비대칭이 간헐적으로 관찰됨',s4:'역동적 부가 동작 중에도 체간 굴곡 자세가 안정적이며, 좌우 대칭적 활성화가 유지됨'},
{code:'PC05-04',desc:'엎드린 자세 신전(prone extension) — 부가 동작 중 자세 유지 (예: 엎드려 양팔·양다리를 들어올린 "비행기 자세"에서, PC04-04의 시간 연장에서 머리 돌리기·양손 조작 등 부가 동작을 수행하면서도 자세가 안정적으로 유지되는 체간 신전근 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 엎드린 자세 신전 자세에서 머리를 돌리는 정도의 부가 동작에도 자세가 무너지는 양상이 지속될 경우',unit:'질적',s1:'놀이 상호작용 여러 차례 동안 자세 유지는 가능하나, 머리를 좌우로 돌리면 팔이나 다리가 떨어짐(PC04-04 s3 수준과 동일하면 진전 없음)',s2:'머리 돌리기에서는 자세가 유지되나, 양손으로 물건을 잡거나 조작하면 체간 신전이 무너짐',s3:'양손으로 물건을 잡는 동작 중에도 자세가 대부분 유지되나, 물건을 이동시키는 역동적 동작에서 좌우 흔들림이 관찰됨',s4:'역동적 부가 동작 중에도 체간 신전 자세가 안정적이며, 양팔을 번갈아 움직이면서도 양다리·체간 신전이 유지됨'},
{code:'PC05-05',desc:'계단 교대발 오르기/내려가기 — 난간 의존 감소 (예: 계단을 교대발로 오르고 내려올 때 난간에 대한 의존이 줄어들어, 난간에 가볍게 접촉하거나 손을 대지 않고도 교대발 보행이 가능해지는 자세 조절 과제. PC04-05의 난간 한 손 지지에서 난간 독립으로 전환)',acqTime:'4세-4세 6개월',redFlag:'5세까지 계단 교대발 오르기에서 난간을 한 손으로 잡지 않으면 수행이 불가능한 양상이 지속될 경우',unit:'질적',s1:'교대발 오르기에서 여전히 난간을 한 손으로 잡아야 수행이 가능하며, 난간이 없으면 marking time으로 회귀(PC04-05 s3 수준 이하)',s2:'오르기에서 난간에 가볍게 접촉하는 수준으로 의존이 줄었으나, 내려오기에서는 여전히 난간을 잡아야 교대발이 가능',s3:'오르기에서 난간 없이 교대발이 가능하며, 내려오기에서도 난간에 가볍게 접촉하는 수준으로 수행',s4:'오르기와 내려오기 모두 난간 없이 교대발로 안정적으로 수행하며, 체간 직립이 유지되고 보행 속도가 일정'}
],
bilateral:[
{code:'BI05-01',desc:'중간 크기 공 받기 — 양손 (예: 양육자가 약 2m 거리에서 중간 크기 공(소프트볼 정도, 지름 약 10cm)을 던지면, 아동이 양손을 모아 공을 잡는 과제. BI04-01의 큰 공(가슴에 안기)에서 중간 크기 공(양손 잡기)으로 난이도 상승)',acqTime:'4세-4세 6개월',redFlag:'5세까지 양육자가 정면에서 부드럽게 던진 중간 크기 공을 양손으로 잡으려는 시도에서, 양손을 모아 공을 감싸는 동작이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'공이 다가오면 양손을 내미나, 공이 양손 사이를 통과하거나 가슴에 부딪혀 떨어뜨림(BI04-01의 큰 공 수준에 머무름)',s2:'중간 크기 공을 양손으로 잡으려는 시도에서 간헐적으로 성공하나, 공의 궤도가 정면에서 벗어나면 양손의 위치를 조절하지 못해 실패',s3:'정면으로 던진 공을 양손으로 잡는 동작이 대부분 성공하며, 공의 궤도가 약간 벗어나도 양손의 위치를 조절하여 잡는 시도가 관찰됨',s4:'다양한 궤도의 공을 양손으로 안정적으로 잡으며, 받기 후 즉시 던지기로 이어지는 연속 상호작용이 가능'},
{code:'BI05-02',desc:'가위로 직선 자르기 (예: 종이에 그려진 직선(굵은 선, 약 15cm)을 따라 가위로 연속 자르되, BI04-04의 자르기 시도에서 직선을 따라 자르는 정밀성으로 확장. 한 손(비우세손)이 종이를 잡고 가위 진행 방향으로 이동시키는 양측 비대칭 협응이 핵심)',acqTime:'4세-4세 6개월',redFlag:'5세까지 종이에 그려진 직선을 따라 가위로 자르려는 시도에서, 직선 방향과 무관하게 무작위로 자르는 양상이 지속될 경우',unit:'질적',s1:'가위를 열고 닫아 종이를 자르는 동작은 가능하나, 직선을 따르지 못하고 무작위 방향으로 자름(BI04-04 s3 수준 이하)',s2:'직선을 따라 자르려는 시도가 관찰되나 자른 선이 직선에서 크게 벗어나며, 종이를 잡은 손이 가위 진행 방향으로 종이를 회전시키는 협응이 부족',s3:'직선을 따라 자르는 동작이 대부분 성공하며 자른 선이 직선 근처에 유지되나, 종이 끝 부분에서 벗어나거나 속도가 불규칙',s4:'직선을 따라 안정적으로 자르며, 종이를 잡은 손이 가위 진행에 맞추어 종이를 회전시키는 협응이 유창'},
{code:'BI05-03',desc:'블록으로 간단한 구조물 만들기 (예: 블록 10개 이상을 사용하여 집·다리·울타리 등 의도한 구조물을 만들되, 단순 수직 쌓기(BI04-03)를 넘어 수평·사선 배치를 조합하는 양측 협응 구성 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 블록을 수직으로 쌓기만 하고, 수평·사선 배치를 조합하여 구조물을 구성하려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'블록을 수직으로 쌓기만 하며, 수평이나 사선 방향으로 배치하여 구조물을 구성하려는 시도가 관찰되지 않음',s2:'수직 쌓기에 수평 배치를 추가하려는 시도(블록을 눕혀 놓기)는 있으나, 의도한 구조물의 형태가 드러나지 않고 배치가 산발적',s3:'의도한 구조물(집, 다리)의 대략적 형태가 인식 가능하며, 수직·수평 배치를 조합하나 구조의 안정성이 낮아 쉽게 무너짐',s4:'의도한 구조물을 안정적으로 만들며, 수직·수평·사선 배치를 조합하고 구조물의 기능(문 열기, 차 통과)을 설명'},
{code:'BI05-04',desc:'한 손 종이 고정, 다른 손 풀칠/접기 (예: 한 손(비우세손)으로 종이를 누르거나 잡아 고정한 상태에서, 반대 손(우세손)으로 풀을 바르거나 종이를 반으로 접는 양측 비대칭 동작. BI04-04의 가위(도구 매개)에서 풀칠·접기(비도구+도구 혼합)로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 한 손으로 종이를 고정한 채 반대 손으로 풀을 바르는 양측 비대칭 동작에서, 고정 손이 종이를 놓치거나 양손이 동일한 동작을 수행하는 양상이 지속될 경우',unit:'질적',s1:'종이를 한 손으로 고정한 채 반대 손으로 풀을 바르려는 시도에서, 고정하는 손이 놓이거나 종이가 밀려나 풀칠이 종이 밖으로 벗어남',s2:'한 손 고정-다른 손 풀칠이 간헐적으로 성공하나, 종이를 접을 때 양 끝을 맞추지 못하여 접힌 면이 크게 어긋남',s3:'풀칠은 안정적이며, 종이를 반으로 접을 때 양 끝이 대략적으로 맞아 접힌 형태가 인식 가능하나, 접힌 선이 또렷하지 않음',s4:'한 손 고정-다른 손 풀칠이 안정적이고, 종이 접기에서 양 끝이 정확히 맞으며 접힌 선을 손가락으로 눌러 또렷하게 만드는 마무리 동작이 관찰됨'},
{code:'BI05-05',desc:'갤럽(gallop) 수행 (예: 한 발(우세 발)을 앞으로 내딛고, 뒷발이 앞발 옆으로 따라오며 양발이 동시에 공중에 뜨는 비대칭 리듬 이동 패턴. GM04-02의 한발 뛰기(제자리)에서 이동하면서의 비대칭 교대 패턴으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 갤럽의 비대칭 패턴(한쪽 발이 항상 앞에 유지)이 관찰되지 않고, 달리기나 양발 점프로만 대체하는 양상이 지속될 경우',unit:'질적',s1:'갤럽을 시연받은 뒤에도 달리기나 양발 점프로 대체하며, 한쪽 발이 항상 앞에 유지되는 비대칭 패턴이 관찰되지 않음',s2:'한쪽 발을 앞에 유지하며 뒷발이 따라오는 시도가 간헐적으로 나타나나, 2-3보 뒤에 달리기로 전환되거나 양발이 교대로 앞에 나와 스킵(skip)에 가까운 패턴으로 변형',s3:'우세 발을 앞에 유지하며 뒷발이 따라오는 갤럽 패턴이 성립하여 5-6보 연속 수행이 가능하나, 속도가 빨라지면 패턴이 무너져 달리기로 전환',s4:'우세 발 앞 갤럽이 리듬적으로 안정되어 연속 수행이 가능하며, 비우세 발을 앞으로 전환하려는 시도가 관찰됨'}
],
praxis:[
{code:'PX05-01',desc:'4단계 동작 모방(시범 → 따라하기) (예: 양육자가 "손뼉 → 만세 → 돌기 → 앉기"를 순서대로 시연하면 아동이 네 가지 동작을 동일 순서로 연속 수행하는 과제. PX04-01의 3단계에서 4단계로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 4단계 동작 순서에서 세 번째 동작까지만 모방하고 네 번째로의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'시연 후 첫 두 동작만 모방하고 나머지가 누락됨(PX04-01 s2 수준과 동일하면 진전 없음)',s2:'세 가지 동작까지 순서대로 모방하나 네 번째 동작이 누락되거나, 세 번째와 네 번째 순서가 뒤바뀜(PX04-01 s4 수준)',s3:'네 가지 동작을 모두 산출하나 동작 사이에 정지가 필요하여 연속성이 부족',s4:'네 가지 동작을 시연된 순서대로 연속적으로 수행하며, 동작 조합이 달라져도 적용 가능'},
{code:'PX05-02',desc:'장애물 코스 순차 수행(4-5개 장애물) (예: 평균대 위 걷기 → 터널 통과 → 매트 위 전방 구르기 → 원뿔 사이 지그재그 달리기 → 점프 착지의 4-5개 장애물로 구성된 코스. PX04-02의 3-4개에서 4-5개로 확장되며 전방 구르기 등 복잡한 동작이 포함)',acqTime:'4세-4세 6개월',redFlag:'5세까지 4개 장애물 코스에서 2개 이하만 수행하고 나머지로의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'장애물 2-3개까지만 순서대로 수행하고 나머지에서 코스를 이탈(PX04-02 s2 수준과 동일하면 진전 없음)',s2:'4개까지 순서대로 수행하나 복잡한 동작(구르기, 지그재그)에서 전략이 성립하지 않아 양육자의 시범이 필요',s3:'4-5개 장애물을 순서대로 완주하나, 복잡한 동작에서 속도가 현저히 느려지고 장애물 간 전환에서 정지가 필요',s4:'코스를 유창하게 완주하며 반복 시 속도·효율이 향상되고, 장애물 순서를 바꾸어도 즉시 적응'},
{code:'PX05-03',desc:'블록/레고 모델 보고 따라 만들기 (예: 완성된 블록·레고 모델(5-8개 부품)을 관찰한 뒤, 같은 부품으로 동일한 구조물을 재현하는 시각적 모방 구성 과제. PX04-05의 자발적 고안(ideation)과 달리 외부 모델의 3차원 구조를 분석하고 재현하는 운동 기획)',acqTime:'4세-4세 6개월',redFlag:'5세까지 완성된 모델을 관찰하고도 유사한 구조물을 재현하려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'완성된 모델을 관찰하나 같은 부품으로 재현하려는 시도가 관찰되지 않거나, 부품을 무작위로 조합하여 모델과 유사성이 없는 구조물을 만듦',s2:'모델의 일부 특징(색상, 전체 형태)을 참조하여 유사한 구조물을 시도하나, 부품의 배치 순서와 방향이 모델과 크게 다름',s3:'모델의 전체 구조를 대략적으로 재현하며, 주요 부품의 위치와 방향이 모델과 일치하나 세부(기울기, 간격)에서 차이가 관찰됨',s4:'모델을 정확하게 재현하며, 부품의 위치·방향·순서가 모델과 일치하고 세부까지 주의를 기울임'},
{code:'PX05-04',desc:'3-4단계 언어 지시에 따른 운동 수행 (예: "의자에서 일어나 문까지 걸어가서 문을 열고 불을 꺼줘"라는 3-4단계 언어 지시를 듣고 순서대로 실행. PX04-04의 3단계에서 3-4단계로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 3단계 언어 지시에서 두 단계까지만 수행하고 세 번째로의 전환이 관찰되지 않는 양상이 지속될 경우. 수용 언어 이해와의 감별이 선행되어야 함',unit:'질적',s1:'3단계 지시에서도 두 단계까지만 수행하고 세 번째 이후가 누락됨(PX04-04 s2 수준과 동일하면 진전 없음)',s2:'3단계는 유창하게 수행하나 4단계에서 마지막 단계가 누락되거나 순서가 뒤바뀜',s3:'4단계 지시를 모두 수행하나 중간에 확인("그 다음 뭐야?")이 필요',s4:'3-4단계 지시를 순서대로 유창하게 수행하며, 유사한 구조의 다른 지시에도 적용 가능'},
{code:'PX05-05',desc:'새로운 놀이 기구에서 다양한 사용법 고안 (예: 처음 보는 정글짐·암벽 등반 구조물에서 올라가는 경로를 여러 가지 시도하거나, 미끄럼틀을 거꾸로 올라가는 등 기존 방식이 아닌 새로운 사용법을 자발적으로 시도하는 관념화(ideation) 과제. PX04-05의 구성 놀이 관념화에서 대근육 놀이 기구의 다양한 사용법으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 놀이 기구를 양육자가 시연한 한 가지 방식으로만 사용하고, 다른 경로나 사용법을 자발적으로 시도하는 관념화가 관찰되지 않는 양상이 지속될 경우. 만약 기구 접근 자체를 거부한다면 감각 방어(높이·질감)와의 감별이 선행되어야 함',unit:'질적',s1:'놀이 기구를 양육자가 시연한 방식(올라가기-미끄러지기)으로만 사용하며, 다른 경로나 방법을 시도하지 않음',s2:'간헐적으로 다른 경로(다른 쪽에서 올라가기)를 시도하나, 한 번의 시도 후 익숙한 방식으로 복귀',s3:'여러 가지 경로와 사용법을 자발적으로 시도하며, 실패해도 다른 방법을 탐색하나 성공하는 방법의 수가 제한적',s4:'다양한 경로와 사용법을 유연하게 시도하며, 성공한 방법을 조합하여 새로운 놀이 루틴을 만듦'}
],
vmi:[
{code:'VM05-01',desc:'십자(+) 모방 그리기 안정화 (예: 평가자가 종이에 십자 모양(+)을 그려 보여준 뒤, 세로선과 가로선이 대략적 중심에서 교차하는 십자를 안정적으로 그리는 과제. VM04-03의 시도에서 안정적 산출로 진전)',acqTime:'4세-4세 6개월',redFlag:'5세까지 십자 모방에서 세로선과 가로선이 교차하는 구조가 산출되지 않는 양상이 지속될 경우 — Beery VMI 기준 십자 모방은 4세 전후 참조',unit:'질적',s1:'세로선과 가로선이 교차하지 않는 평행선이나 T자/L자 형태에 머무름(VM04-03 s2 수준과 동일하면 진전 없음)',s2:'십자 형태가 산출되나 두 선의 길이 비율이 크게 불균형하거나 교차점이 중심에서 벗어남(VM04-03 s3 수준)',s3:'대략적 중심에서 교차하는 십자가 안정적으로 산출되며, 반복 시에도 교차 구조가 재현됨',s4:'십자의 두 선이 대칭적 길이로 중심에서 교차하며, 다양한 크기로 재현 가능'},
{code:'VM05-02',desc:'사각형(□) 모방 그리기 (예: 평가자가 종이에 사각형을 그려 보여준 뒤, 네 개의 직선으로 이루어진 폐합 사각형을 모방하여 그리는 과제. VM04-01의 원 모방(곡선 폐합)에서 직선 4개의 각도 조절과 폐합으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 사각형 모방에서 직선 4개로 폐합되는 도형을 시도하지 않는 양상이 지속될 경우 — Beery VMI 기준 사각형 모방은 4세 6개월-5세 전후 참조',unit:'질적',s1:'시연 후 원이나 타원을 그리며, 직선으로 구성된 도형으로의 전환이 관찰되지 않음',s2:'직선 2-3개를 그리나 폐합이 이루어지지 않아 열린 도형에 머무르거나, 네 번째 선이 누락됨',s3:'네 개의 직선으로 폐합되는 사각형이 산출되나, 꼭짓점의 각도가 불규칙하여 마름모나 사다리꼴에 가까운 형태',s4:'네 개의 직선이 대략적 직각으로 만나는 사각형이 안정적으로 산출되며, 크기를 조절하여 반복 가능'},
{code:'VM05-03',desc:'10-12조각 퍼즐 완성 (예: 그림이 인쇄된 10-12조각 직소 퍼즐을 그림 단서와 조각 형태를 참조하여 완성하는 과제. VM04-02의 6-8조각에서 10-12조각으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 8조각 퍼즐을 독립적으로 완성하지 못하는 양상이 지속될 경우',unit:'질적',s1:'퍼즐 조각 8개 이하에서만 맞추기가 가능하고, 9개 이상에서 시행착오가 과도(VM04-02 수준에 머무름)',s2:'10조각 퍼즐에서 그림 단서를 참조하여 절반 이상 맞추나 나머지에서 양육자의 힌트가 필요',s3:'10조각 퍼즐을 독립적으로 완성하며, 12조각에서는 간헐적으로 힌트가 필요',s4:'12조각 퍼즐을 그림 단서와 조각 형태를 참조하여 독립적으로 완성하며, 가장자리-먼저 전략 등 효율적 방법이 관찰됨'},
{code:'VM05-04',desc:'사람 그리기(4-6부분 이상) (예: 머리·몸통·양팔·양다리가 구분되고, 얼굴 세부(눈·코·입)가 표현되는 사람 그리기. VM04-04의 두족인(2-3부분)에서 몸통이 분리된 4-6부분으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 사람 그리기에서 머리와 몸통이 구분되지 않고, 두족인(머리+다리) 수준에 머무르는 양상이 지속될 경우',unit:'질적',s1:'머리와 다리만 표현되는 두족인(VM04-04 s3 수준)에 머무르며, 몸통이 별도로 그려지지 않음',s2:'머리·몸통·다리가 구분되어 3부분이 표현되나, 팔이 머리에서 직접 나오거나 몸통의 크기가 매우 작아 비례가 맞지 않음(3-4부분)',s3:'머리·몸통·양팔·양다리가 구분되어 4-5부분이 표현되며, 얼굴 세부(눈·입)가 머리 안에 그려짐',s4:'6부분 이상이 표현되며(머리·몸통·양팔·양다리·얼굴 세부), 손가락·머리카락 등 추가 세부가 간헐적으로 관찰됨'},
{code:'VM05-05',desc:'가위로 원 따라 자르기 시도 (예: 종이에 그려진 큰 원(지름 약 10cm)의 윤곽선을 따라 가위로 자르되, BI05-02의 직선 자르기에서 곡선(원)을 따라 자르는 과제로 확장. 가위 손의 연속 자르기와 종이 잡은 손의 회전이 동시에 요구됨)',acqTime:'4세-4세 6개월',redFlag:'5세까지 원의 윤곽선을 따라 자르려는 시도에서, 곡선 방향으로 종이를 회전시키는 동작이 관찰되지 않고 직선 방향으로만 자르는 양상이 지속될 경우',unit:'질적',s1:'원의 윤곽선을 따르지 못하고 직선 방향으로만 자르며, 종이를 잡은 손이 회전하지 않음(BI05-02 수준에 머무름)',s2:'원의 윤곽선 방향으로 자르려는 시도는 있으나, 곡선을 따라 종이를 회전시키는 협응이 부족하여 자른 선이 다각형에 가까움',s3:'원의 윤곽선을 대략적으로 따라 자르며, 종이를 잡은 손이 회전하여 곡선이 인식 가능하나, 윤곽선에서 벗어나는 구간이 있음',s4:'원의 윤곽선을 대부분 정확하게 따라 자르며, 가위 손과 종이 손의 협응이 유창하여 잘라낸 형태가 원에 가까움'}
],
fine:[
{code:'FM05-01',desc:'동적 삼지잡기(dynamic tripod grasp) 출현 (예: 엄지·검지·중지의 세 손가락 끝으로 크레용을 잡되, FM04-01의 정적 삼지잡기(손목 단위 움직임)에서 손가락 내 움직임(intrinsic finger movement)이 출현하여 선의 방향과 크기를 손가락으로 조절하는 단계)',acqTime:'4세-4세 6개월',redFlag:'5세까지 크레용을 삼지잡기로 잡되 손가락은 완전히 고정된 채 손목·전완 단위로만 움직이는 정적 삼지잡기에서 벗어나지 않는 양상이 지속될 경우',unit:'질적',s1:'크레용을 삼지잡기로 잡으나 손가락은 고정된 채 손목·전완 단위로만 움직여 선을 그음(FM04-01 s3-s4 수준, 정적 삼지잡기에 머무름)',s2:'그리기 중 간헐적으로 손가락이 크레용 위에서 미세하게 움직이나, 의도적 방향 조절로 이어지지 않음',s3:'손가락 내 움직임이 출현하여 작은 원·짧은 선을 손가락 단위로 그리나, 큰 동작에서는 여전히 손목 단위로 전환',s4:'손가락 내 움직임이 대부분의 그리기 과제에서 관찰되며, 선의 방향·크기·곡률을 손가락으로 조절'},
{code:'FM05-02',desc:'작은 구슬 끈 꿰기 (예: 가는 끈(지름 약 1-2mm)에 작은 나무 구슬(구멍 지름 약 3-4mm)을 한 손으로 잡고, 반대쪽 손으로 끈 끝을 구슬 구멍에 통과시키는 양손 정밀 협응 과제. FM04-03의 중간 구슬에서 작은 구슬로 난이도 상승)',acqTime:'4세-4세 6개월',redFlag:'5세까지 중간 크기 구슬(구멍 지름 약 5-7mm)에서도 끈을 통과시키는 동작이 불안정한 양상이 지속될 경우',unit:'질적',s1:'작은 구슬을 손가락 끝으로 잡는 동작이 불안정하거나, 가는 끈 끝을 구멍에 대는 정렬이 맞지 않아 반복 실패(FM04-03 수준에서 중간 구슬도 아직 불안정하면 진전 없음)',s2:'작은 구슬을 잡고 끈을 구멍에 통과시키나, 정렬에 시간이 오래 걸리고 1-2개 후 집중력이 저하됨',s3:'작은 구슬을 안정적으로 꿰어 3-4개 연속 꿰기가 가능하나, 구슬이 더 작아지면(지름 2mm 미만) 어려움이 관찰됨',s4:'작은 구슬을 유창하게 연속 꿰기하며 5개 이상 연속 가능, 양손 역할(고정-통과)이 안정적'},
{code:'FM05-03',desc:'단추 잠그기/풀기 — 중간 크기 (예: 셔츠·조끼의 중간 크기 단추(지름 약 1.5-2cm)를 단추구멍에 끼우고 빼는 과제. FM04-04의 큰 단추(지름 2-2.5cm) 끼우기에서 중간 크기로 난이도 상승하며, 풀기도 포함)',acqTime:'4세-4세 6개월',redFlag:'5세까지 큰 단추(지름 2-2.5cm)를 단추구멍에 끼우는 동작이 여전히 성립하지 않는 양상이 지속될 경우',unit:'질적',s1:'큰 단추는 끼우나 중간 크기 단추에서는 구멍에 밀어넣는 방향이 맞지 않아 실패(FM04-04 수준에 머무름)',s2:'중간 크기 단추를 끼우는 동작이 간헐적으로 성공하나 시간이 오래 걸리며, 풀기(빼기)에서는 단추가 구멍에 걸려 당기다 포기',s3:'중간 크기 단추 끼우기와 풀기 모두 가능하나, 셔츠의 여러 단추를 순서대로 끼울 때 위치가 한 칸씩 어긋나는 오류가 관찰됨',s4:'중간 크기 단추를 순서대로 정확하게 끼우고 풀 수 있으며, 양손의 협응이 유창'},
{code:'FM05-04',desc:'이름 글자 따라쓰기/모방쓰기 시도 (예: 점선으로 인쇄된 자기 이름의 한글/영문 글자를 따라 쓰거나, 평가자가 쓴 글자를 보고 모방하여 쓰는 과제. VM04-01(원)·VM05-01(십자)·VM05-02(사각형)의 도형 모방 기술이 글자 형태 재현으로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 점선으로 인쇄된 글자를 따라 쓰려는 시도에서 글자 형태를 따르지 못하고 자유 끼적이기에 머무르는 양상이 지속될 경우',unit:'질적',s1:'점선 위에 크레용을 대고 흔적을 남기나, 글자의 형태를 따르지 못하고 자유 끼적이기에 가까움',s2:'점선의 일부 구간을 따라 쓰나 글자의 전체 형태가 인식되기 어렵고, 획의 시작점-끝점이 점선에서 크게 벗어남',s3:'점선을 따라 글자의 전체 형태가 인식 가능하게 쓰며, 모방쓰기(점선 없이 보고 쓰기)에서도 대략적 형태 재현 시도가 관찰됨',s4:'점선 따라쓰기가 또렷하고 모방쓰기에서도 글자의 주요 획이 재현되며, 자기 이름의 첫 글자를 독립적으로 쓰기 시도가 관찰됨'},
{code:'FM05-05',desc:'지퍼 올리기/내리기 (예: 점퍼·조끼의 지퍼를 한 손으로 지퍼 시작점을 잡아 고정하고, 반대 손으로 슬라이더를 잡아 올리거나 내리는 양측 비대칭 정밀 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 지퍼 슬라이더를 잡아 올리거나 내리는 동작이 성립하지 않는 양상이 지속될 경우',unit:'질적',s1:'지퍼 슬라이더를 잡으나 올리거나 내리는 동작이 성립하지 않거나, 양손이 지퍼의 양쪽에 배치되지 않음',s2:'슬라이더를 잡아 올리거나 내리는 동작은 있으나, 지퍼 시작점을 고정하는 손이 놓여 지퍼가 틀어지거나 걸림',s3:'지퍼를 올리고 내리는 동작이 대부분 성공하나, 지퍼 시작점에 슬라이더를 끼우는 동작(분리형 지퍼)에서는 양육자의 도움이 필요',s4:'분리형 지퍼의 시작점 끼우기를 포함하여 지퍼 올리기/내리기를 독립적으로 수행'}
],
gross:[
{code:'GM05-01',desc:'앞으로 멀리뛰기 — 착지 안정성 향상 (예: 양발 모아 바닥에서 뛰어올라 전방으로 이동하여 착지하되, GM04-01의 전방 이동에서 착지 안정성과 이동 거리가 더 향상된 단계. 착지 시 양발 동시 착지와 체간 직립 유지가 관찰 핵심)',acqTime:'4세-4세 6개월',redFlag:'5세까지 전방 점프 착지 시 매번 양손을 바닥에 짚거나 넘어지는 양상이 지속될 경우',unit:'질적',s1:'전방 점프 시 이동 거리가 짧고, 착지 시 체간이 전방으로 무너지거나 양손을 짚음(GM04-01 s2 수준과 동일하면 진전 없음)',s2:'전방으로 이동하여 양발 동시 착지가 성립하나, 착지 후 1-2걸음 앞으로 나가야 균형을 유지',s3:'착지 후 그 자리에서 체간 직립을 유지하며, 이동 거리가 길어지나 반복 시 거리가 불규칙',s4:'안정적 착지와 함께 반복 시 일정한 거리를 유지하며, 착지 직후 즉시 다른 동작(달리기, 방향 전환)으로 전환 가능'},
{code:'GM05-02',desc:'한발 뛰기(hopping) 연속 수행 (예: 한쪽 발로 연속으로 뛰어오르되, GM04-02의 시도(1-3회)에서 연속 수행(5회 이상)으로 확장. 우세 발과 비우세 발 모두에서의 수행이 관찰 대상)',acqTime:'4세-4세 6개월',redFlag:'5세까지 우세 발에서도 한발 뛰기 3회 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'한쪽 발로 1-2회 뛰어오른 후 반대쪽 발을 내려놓아 연속 뛰기가 3회 미만(GM04-02 s2 수준과 동일하면 진전 없음)',s2:'우세 발에서 3-5회 연속 한발 뛰기가 가능하나 리듬이 불규칙하고, 비우세 발에서는 1-2회에 그침(GM04-02 s3-s4 수준)',s3:'우세 발에서 5회 이상 연속 한발 뛰기가 리듬적으로 가능하며, 비우세 발에서도 3-4회 연속 뛰기가 관찰됨',s4:'양쪽 발 모두에서 5회 이상 연속 한발 뛰기가 가능하며, 한발 뛰기로 전방 이동도 가능'},
{code:'GM05-03',desc:'공 던지기 정확도 향상 (예: 약 2m 거리에 놓인 큰 바구니를 향해 작은 공(테니스공 크기)을 한 손으로 던져 넣되, GM04-03의 한 손 오버핸드 던지기에서 목표물을 향한 방향 정확도로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 목표물을 향해 공을 던지려는 방향 조준 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'공을 던지나 목표물(바구니) 방향과 무관한 방향으로 날아가며, 목표를 향해 조준하는 시도가 관찰되지 않음',s2:'목표물을 향해 던지려는 시도가 관찰되나, 방향이 좌우로 크게 벗어나거나 거리가 짧아/길어 바구니에 도달하지 못함',s3:'목표물 방향으로 공이 날아가 바구니 근처에 도달하며, 간헐적으로 바구니에 들어가는 성공이 관찰됨',s4:'목표물을 향해 안정적으로 던져 바구니에 넣는 성공률이 높아지며, 던지는 팔의 반대쪽 발 내딛기(contralateral stepping)가 안정적'},
{code:'GM05-04',desc:'전방 구르기(forward roll) 시도 (예: 매트 위에서 양손을 짚고 머리를 숙여 앞으로 한 바퀴 구르는 동작. 체간 굴곡·체중 이동·머리 접기·다리 차올리기의 운동 순서가 요구되는 대근육 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 매트 위에서 양손을 짚고 머리를 숙여 앞으로 구르려는 시도 자체가 관찰되지 않는 양상이 지속될 경우. 만약 자세는 취하나 구르기를 거부한다면, 전정 과반응(회전에 대한 불안)과의 감별이 선행되어야 함',unit:'질적',s1:'매트 위에서 양손을 짚고 머리를 숙이나, 다리를 차올려 구르는 동작으로 이어지지 않거나 옆으로 넘어짐',s2:'머리를 숙이고 다리를 차올려 앞으로 구르는 시도가 간헐적으로 성공하나, 몸이 비스듬히 굴러 직선에서 벗어나거나 도중에 멈춤',s3:'전방으로 한 바퀴 구르는 동작이 대부분 성공하나, 구른 뒤 서기까지의 연결이 미숙하여 엎드린 채 멈추거나 옆으로 쓰러짐',s4:'전방 구르기 후 일어서기까지 유창하게 연결되며, 반복 시 일관된 동작이 관찰됨'},
{code:'GM05-05',desc:'큰 공 바운스 후 잡기(bounce-catch) (예: 큰 공(지름 약 15-20cm)을 바닥에 세게 튕긴 뒤, 바운스되어 올라오는 공을 양손으로 잡는 과제. 던지기 힘 조절과 바운스 타이밍 예측, 양손 잡기의 통합이 요구됨)',acqTime:'4세-4세 6개월',redFlag:'5세까지 공을 바닥에 튕긴 뒤 올라오는 공을 잡으려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'공을 바닥에 던지나 바운스가 일어나지 않을 정도로 약하게 놓거나, 바운스 후 잡으려는 시도가 관찰되지 않음',s2:'공을 바닥에 던져 바운스시키나, 바운스 타이밍을 예측하지 못하여 공이 올라오기 전이나 후에 양손을 닫아 잡기에 실패',s3:'바운스 타이밍을 대략적으로 예측하여 공을 잡는 동작이 간헐적으로 성공하나, 바운스 높이가 불규칙하여 연속 바운스-잡기가 어려움',s4:'바운스 높이와 타이밍을 예측하여 공을 안정적으로 잡으며, 2-3회 연속 바운스-잡기가 가능'}
],
oral:[
{code:'OM05-01',desc:'다양한 질감 식품 안전 섭취 — 식이 범위 확대 (예: 생채소·견과류·말린 과일·고기 등 다양한 질감·크기의 식품을 안전하게 씹어 삼키되, OM04-01의 질긴 음식 적용에서 더 넓은 범위의 질감으로 확대. 새로운 질감의 음식에 대한 구강 적응이 관찰 핵심)',acqTime:'4세-4세 6개월',redFlag:'5세까지 식이 범위가 익숙한 소수의 질감에만 제한되어 새로운 질감의 음식을 입에 넣는 것 자체를 지속적으로 거부하는 양상이 유지될 경우. 만약 특정 질감만 거부한다면, 구강 촉각 과민과의 감별이 필요',unit:'질적',s1:'익숙한 음식의 질감에서만 안전 섭취가 가능하고, 새로운 질감의 음식(견과류, 생채소 등)은 입에 넣는 것을 거부하거나 뱉어냄',s2:'새로운 질감의 음식을 입에 넣으려는 시도는 있으나, 씹기 시작 후 분쇄가 불충분하여 큰 덩어리째 삼키거나 뱉어냄',s3:'대부분의 새로운 질감 음식을 회전 씹기로 분쇄하여 삼키나, 특히 복합 질감(질긴+바삭한: 닭껍질 등)에서는 어려움이 관찰됨',s4:'다양한 질감·크기의 음식을 안전하게 씹어 삼키며, 새로운 음식에 대한 구강 적응이 빠르고 식이 범위가 넓음'},
{code:'OM05-02',desc:'비눗방울/호루라기 — 호기 지속 조절 (예: 비눗방울 도구에 불어 연속으로 여러 개의 방울을 만들거나, 호루라기를 물고 지속적으로 소리를 내되, OM04-02/03의 호기 강도 조절에서 호기 지속 시간의 조절로 확장)',acqTime:'4세-4세 6개월',redFlag:'5세까지 비눗방울을 연속으로 2개 이상 만들지 못하거나, 호루라기 소리를 지속적으로 내지 못하는 양상이 지속될 경우',unit:'질적',s1:'비눗방울을 간헐적으로 만들거나 호루라기 소리를 잠시 내나, 호기가 짧아 지속적 산출이 안 됨(OM04-02/03 수준에 머무름)',s2:'비눗방울을 연속으로 2-3개 만들거나 호루라기 소리를 짧게 지속하나, 호기가 중단되어 재시작이 필요',s3:'비눗방울을 연속으로 5개 이상 만들거나 호루라기 소리를 지속적으로 내며, 호기 지속 시간이 연장되나 강도 조절과 지속의 동시 수행이 아직 미숙',s4:'호기 강도와 지속 시간을 동시에 조절하여 비눗방울 크기·수량을 의도적으로 변화시키거나, 호루라기를 길게·짧게 번갈아 불기가 가능'},
{code:'OM05-03',desc:'하모니카 불기 시도 (예: 하모니카를 입에 대고 불어서/빨아서 소리를 내되, 호루라기의 단순 불기에서 입술 위치 이동과 흡기-호기 교대로 확장되는 구강 호흡 조절 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 하모니카를 입에 대고 불어도 소리가 나지 않는 양상이 지속될 경우',unit:'질적',s1:'하모니카를 입에 대고 불려는 시도에서 소리가 나지 않거나, 입술이 구멍을 제대로 덮지 않아 공기가 새어나감',s2:'불기(호기)로 소리를 내나 한 위치에서만 가능하며, 빨기(흡기)로 소리를 내는 동작은 관찰되지 않음',s3:'불기와 빨기 모두로 소리를 내며, 입술을 좌우로 이동시켜 다른 음을 내려는 시도가 관찰되나 이동이 부정확',s4:'불기·빨기를 교대하며 입술을 이동시켜 여러 음을 산출하고, 간단한 멜로디를 시도'},
{code:'OM05-04',desc:'입 다물고 씹기(closed-mouth chewing) (예: 식사 중 입을 다물고 음식을 씹어, 씹는 동안 입안의 음식이 보이지 않는 구순 폐쇄+회전 씹기의 통합 과제)',acqTime:'4세-4세 6개월',redFlag:'5세까지 식사 중 입을 다물고 씹는 동작이 관찰되지 않고, 대부분의 씹기에서 입이 열려 음식이 보이는 양상이 지속될 경우',unit:'질적',s1:'식사 중 대부분의 씹기에서 입이 열려 음식이 보이며, 입을 다물고 씹으라는 안내에도 즉시 열림',s2:'입을 다물고 씹으려는 시도가 관찰되나, 3-4회 씹기 후 입이 열리며 특히 단단한 음식에서 open-mouth chewing으로 회귀',s3:'대부분의 음식에서 입을 다물고 씹기가 가능하나, 큰 덩어리를 씹을 때나 대화 중에는 입이 열리는 양상이 간헐적으로 관찰됨',s4:'다양한 음식에서 입을 다물고 씹기가 안정적이며, 씹는 중 대화를 시작하면 삼킨 뒤 말하는 순서가 정착'},
{code:'OM05-05',desc:'활동 중 침 흘림(drooling) 없음 (예: 대근육 활동·집중 과제·이중과제 등 모든 활동에서 침 흘림이 관찰되지 않는 단계. OM04-05의 거의 소실에서 완전 소실로 진전)',acqTime:'4세-4세 6개월',redFlag:'5세 이후에도 대근육 활동이나 집중 과제 시 침 흘림이 간헐적으로 관찰되는 양상이 지속될 경우',unit:'질적',s1:'대근육 활동이나 집중 과제 시 침 흘림이 반복적으로 관찰됨(OM04-05 s1-s2 수준과 동일하면 진전 없음)',s2:'대부분의 활동에서 침 흘림이 관찰되지 않으나, 과도한 피로 시 간헐적으로 관찰됨(OM04-05 s3 수준)',s3:'모든 활동에서 침 흘림이 거의 관찰되지 않으며, 피로 시에도 최소',s4:'어떠한 활동·상황에서도 침 흘림이 관찰되지 않음'}
]
},
'5y':{
postural:[
{code:'PC06-01',desc:'한발서기 — 감각 입력 제한 조건에서의 유지 (예: 평평한 바닥에서 지지 없이 한쪽 발로 서되, 눈을 감거나 양팔을 체간에 붙이는 등 감각 입력이 제한된 조건에서도 자세를 유지하는 과제. PC05-01의 양팔 체간 부착 조건에서 눈 감기 조건으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 양팔을 체간에 붙인 상태(눈은 뜬 채)에서 한발서기가 잠시도 유지되지 않는 양상이 지속될 경우',unit:'질적',s1:'양팔을 체간에 붙인 상태에서 한발서기가 잠시만 유지되고 즉시 양팔을 벌리는 보상이 필요(PC05-01 s3 이하 수준)',s2:'양팔을 체간에 붙인 상태에서 안정적 한발서기가 가능하나, 눈을 감으면 즉시 균형을 잃어 반대쪽 발을 내려놓음',s3:'눈을 감은 상태에서 한발서기가 잠시 유지되며, 상체 동요가 크지만 넘어지지 않음',s4:'눈을 감은 상태에서 한발서기가 안정적으로 유지되며, 양쪽 발 모두에서 수행 가능'},
{code:'PC06-02',desc:'평균대 위 전진/후진 보행 (예: 폭 약 8cm 평균대(높이 약 10-15cm) 위를 전방으로 걸어간 뒤, 뒤돌아서지 않고 후진으로 되돌아오는 과제. PC05-02의 전방 보행에서 후방 보행이 추가되며, 후진 시 시각 정보 없이 고유수용+전정에 의존하는 자세 조절이 요구됨)',acqTime:'5세-5세 6개월',redFlag:'6세까지 평균대 위에서 후방으로 1걸음도 떼지 못하고, 뒤돌아서 전방으로 되돌아오는 방식에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'평균대 위 전방 보행은 안정적이나, 후진 시 즉시 내려오거나 뒤돌아서 전방으로 다시 걸어옴',s2:'후진 시도가 관찰되나 1-2걸음 후 발이 평균대 밖으로 벗어나거나, 시선을 뒤로 돌려 확인하는 보상이 필요',s3:'후진으로 3-4걸음 연속 걸으며 평균대 위에 유지되나, 속도가 매우 느리고 양팔을 크게 벌림',s4:'전진과 후진 모두 안정적으로 수행하며, 후진 시에도 양팔을 체간에 가까이 유지'},
{code:'PC06-03',desc:'바로 누운 자세 굴곡(supine flexion) — 사지 조합 동작 중 유지 (예: 등을 대고 누워 머리와 양다리를 들어올린 자세에서, PC05-03의 양손 조작에서 양발을 번갈아 차거나 양손-양발을 동시에 교차 움직이는 사지 조합 동작 중에도 자세가 유지되는 체간 굴곡근 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 바로 누운 자세 굴곡 자세에서 양손 조작과 양발 차기를 동시에 수행하는 사지 조합 동작이 관찰되지 않을 경우',unit:'질적',s1:'양손 조작 중 자세 유지는 가능하나, 양발을 번갈아 차는 동작을 추가하면 머리 또는 다리가 떨어짐(PC05-03 s3 수준과 동일하면 진전 없음)',s2:'양손 조작과 양발 차기를 동시에 수행하려는 시도는 있으나, 한쪽(상지 또는 하지)의 동작이 시작되면 다른 쪽의 동작이 멈춤',s3:'양손-양발을 동시에 움직이는 사지 조합 동작 중에도 자세가 대부분 유지되나, 좌우 교차 동작(오른손-왼발)에서 좌우 비대칭이 관찰됨',s4:'사지 조합 동작(교차 포함) 중에도 체간 굴곡 자세가 안정적이며, 다양한 동작 조합에 적응 가능'},
{code:'PC06-04',desc:'엎드린 자세 신전(prone extension) — 사지 조합 동작 중 유지 (예: 엎드려 양팔·양다리를 들어올린 자세에서, PC05-04의 양손 조작에서 양팔-양다리를 번갈아 움직이는 사지 조합 동작 중에도 자세가 유지되는 체간 신전근 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 엎드린 자세 신전 자세에서 양팔을 번갈아 움직이는 동작에도 체간 신전이 무너지는 양상이 지속될 경우',unit:'질적',s1:'양손으로 물건을 잡는 동작 중 자세 유지는 가능하나, 양팔을 번갈아 움직이면 체간 신전이 무너짐(PC05-04 s3 수준과 동일하면 진전 없음)',s2:'양팔을 번갈아 움직이는 동작 중에는 자세가 유지되나, 양다리를 동시에 추가 동작(교대 차기)하면 무너짐',s3:'양팔-양다리를 번갈아 움직이는 사지 조합 동작 중에도 자세가 대부분 유지되나, 빠른 속도에서는 좌우 흔들림이 증가',s4:'사지 조합 동작 중에도 체간 신전 자세가 안정적이며, 속도를 변화시켜도 유지 가능'},
{code:'PC06-05',desc:'탠덤 보행(heel-to-toe walking) 시도 (예: 평평한 바닥에서 한쪽 발의 뒤꿈치를 반대쪽 발의 발끝에 붙여 일직선으로 걷는 과제. 좁은 지지면에서의 전정-고유수용 통합과 좌우 무게 중심 이동의 정밀한 조절이 요구됨)',acqTime:'5세-5세 6개월',redFlag:'6세까지 뒤꿈치를 반대쪽 발끝에 붙여 걸으려는 시도에서, 2걸음 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'뒤꿈치를 반대쪽 발끝에 붙이려는 시도가 관찰되지 않고, 일반적인 보행 패턴으로만 걸음',s2:'뒤꿈치를 발끝에 붙이려는 시도는 있으나, 발 사이에 간격이 남거나 발이 일직선에서 벗어나 2-3걸음 내에 균형을 잃음',s3:'뒤꿈치-발끝을 붙여 4-5걸음 연속으로 걸으며, 간헐적으로 간격이 벌어지나 즉시 교정하여 일직선으로 복귀',s4:'뒤꿈치-발끝 보행을 연속적으로 안정하게 수행하며, 양팔을 체간에 가까이 유지하면서도 일직선이 유지됨'}
],
bilateral:[
{code:'BI06-01',desc:'중간 크기 공 받기 — 다양한 궤도 (예: 양육자가 약 2-3m 거리에서 중간 크기 공(지름 약 10cm)을 가슴·무릎·좌우 등 다양한 높이와 방향으로 던지면, 아동이 양손을 이동시켜 공을 잡는 과제. BI05-01의 정면 받기에서 다양한 궤도 적응으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 정면 가슴 높이로 부드럽게 던진 공조차 양손으로 안정적으로 잡지 못하는 양상이 지속될 경우',unit:'질적',s1:'정면 가슴 높이로 던진 공은 양손으로 잡으나, 궤도가 좌우·상하로 벗어나면 양손의 위치를 조절하지 못해 실패(BI05-01 s3 수준에 머무름)',s2:'좌우로 약간 벗어난 궤도의 공은 양손 위치를 조절하여 잡으나, 위나 아래로 벗어난 궤도에서는 실패',s3:'가슴·무릎·좌우 등 다양한 높이·방향의 공을 양손으로 잡는 동작이 대부분 성공하나, 빠르게 던진 공에서는 타이밍이 맞지 않음',s4:'다양한 궤도와 속도의 공을 양손으로 안정적으로 잡으며, 받기 후 즉시 던지기로 이어지는 연속 상호작용이 유창'},
{code:'BI06-02',desc:'가위로 곡선/원 따라 자르기 정교화 (예: 종이에 그려진 원·물결선 등 곡선을 따라 가위로 자르되, VM05-05의 원 자르기 시도에서 정밀성이 향상된 단계. 윤곽선과 자른 선의 오차가 줄어들고 다양한 곡선에 적용)',acqTime:'5세-5세 6개월',redFlag:'6세까지 원의 윤곽선을 따라 자르는 시도에서 자른 선이 직선 방향으로만 진행하여 곡선이 형성되지 않는 양상이 지속될 경우',unit:'질적',s1:'원의 윤곽선을 대략적으로 따라 자르나, 자른 형태가 다각형에 가까움(VM05-05 s2 수준에 머무름)',s2:'원의 윤곽선을 따라 자른 선이 곡선으로 인식되나, 윤곽선에서 크게 벗어나는 구간이 있고 물결선 같은 다른 곡선에서는 어려움',s3:'원·물결선 등 다양한 곡선을 따라 자르며, 윤곽선에서의 이탈이 줄어들고 자른 형태가 원본에 가까움',s4:'다양한 곡선을 정밀하게 따라 자르며, 가위 손과 종이 손의 협응이 유창하여 속도가 빨라짐'},
{code:'BI06-03',desc:'점핑잭(jumping jacks) 수행 (예: 양팔을 머리 위로 올리면서 양발을 벌려 뛰고, 양팔을 내리면서 양발을 모아 뛰는 동작을 리듬적으로 교대하는 양측 대칭+사지 협응 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 양팔 올리기와 양발 벌리기를 동시에 수행하는 동작이 관찰되지 않고, 팔과 다리를 분절적으로만 움직이는 양상이 지속될 경우',unit:'질적',s1:'팔 벌리기와 다리 벌리기가 동시에 이루어지지 않아, 팔만 움직이고 다리는 가만히 있거나 그 반대로 분절적 수행에 머무름',s2:'팔과 다리를 동시에 벌리는 동작이 간헐적으로 성공하나, 벌리기→모으기의 교대 전환에서 타이밍이 어긋나 2-3회 후 무너짐',s3:'벌리기→모으기 교대가 리듬적으로 5-6회 연속 가능하나, 속도가 빨라지면 팔과 다리의 타이밍이 어긋남',s4:'점핑잭을 리듬적으로 8회 이상 연속 수행하며, 속도를 변화시켜도 팔-다리 협응이 유지됨'},
{code:'BI06-04',desc:'스킵(skip) 수행 (예: 한 발로 깡충 뛰고(hop) 다음 발로 한 걸음 딛기(step)를 양발 교대로 반복하는 비대칭 리듬 이동 패턴. BI05-05의 갤럽(한쪽 발만 앞)에서 양발 교대 스킵으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 양발 교대 hop-step 패턴이 관찰되지 않고, 갤럽이나 달리기로만 대체하는 양상이 지속될 경우',unit:'질적',s1:'스킵을 시연받은 뒤에도 갤럽(한쪽 발만 앞)이나 달리기로 대체하며, 양발 교대 hop-step 패턴이 관찰되지 않음',s2:'한쪽 발에서 hop-step 후 다른 발로 전환하려는 시도가 있으나, 전환 시 패턴이 무너져 걸음이나 갤럽으로 회귀',s3:'양발 교대 hop-step이 성립하여 5-6보 연속 스킵이 가능하나, 리듬이 불규칙하고 hop 높이가 좌우 비대칭',s4:'양발 교대 스킵이 리듬적으로 안정되어 연속 수행 가능하며, 좌우 hop 높이가 대칭적'},
{code:'BI06-05',desc:'한 손 도구 + 다른 손 보조 — 칼+포크 사용 (예: 한 손(비우세손)으로 포크를 음식에 찔러 고정하고, 반대 손(우세손)으로 아동용 칼로 음식을 자르는 양측 비대칭 도구 사용 과제. BI05-04의 풀칠/접기에서 두 도구를 동시 사용하는 고도 비대칭 협응으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 포크로 음식을 고정한 채 칼로 자르는 동시 동작이 관찰되지 않고, 한 도구를 놓고 다른 도구만 사용하는 교대 방식에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'포크와 칼을 각 손에 잡으나, 포크로 고정하는 동작과 칼로 자르는 동작을 동시에 수행하지 못하고 한 도구를 놓고 다른 도구만 사용',s2:'포크로 음식을 찔러 고정하려는 시도와 칼로 자르는 시도가 교대로 관찰되나, 동시에 수행되지 않아 포크가 빠지거나 칼이 미끄러짐',s3:'포크로 고정한 채 칼로 자르는 동시 동작이 성립하여 부드러운 음식(바나나, 두부)을 자르나, 단단한 음식에서는 힘 조절이 미숙',s4:'부드러운 음식(바나나, 두부)에서 포크 고정+칼 자르기 동시 동작이 안정적이며, 톱질 동작(sawing)이 출현'}
],
praxis:[
{code:'PX06-01',desc:'5단계 동작 시퀀스 모방 (예: 양육자가 "손뼉 → 만세 → 돌기 → 앉기 → 일어서기"를 순서대로 시연하면, 아동이 다섯 가지 동작을 동일 순서로 연속 수행하는 과제. PX05-01의 4단계에서 5단계로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 5단계 동작 순서에서 네 번째 동작까지만 모방하고 다섯 번째로의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'시연 후 세 가지 동작까지만 모방하고 네 번째 이후가 누락됨(PX05-01 s2 수준과 동일하면 진전 없음)',s2:'네 가지 동작까지 순서대로 모방하나 다섯 번째가 누락되거나 네 번째와 뒤바뀜(PX05-01 s4 수준)',s3:'다섯 가지 동작을 모두 산출하나 동작 사이에 정지가 필요하여 연속성이 부족',s4:'다섯 가지 동작을 시연된 순서대로 연속적으로 수행하며, 동작 조합이 달라져도 적용 가능'},
{code:'PX06-02',desc:'장애물 코스 5-6개 순차 수행 (예: 평균대 → 터널 → 전방 구르기 → 원뿔 지그재그 → 점프 착지 → 달리기 복귀의 5-6개 장애물 코스. PX05-02의 4-5개에서 확장되며 코스 복잡도 증가)',acqTime:'5세-5세 6개월',redFlag:'6세까지 5개 장애물 코스에서 3개 미만만 수행하는 양상이 지속될 경우',unit:'질적',s1:'장애물 3-4개까지만 순서대로 수행하고 나머지에서 코스를 이탈(PX05-02 s2 수준과 동일하면 진전 없음)',s2:'5개까지 수행하나 마지막 장애물에서 전략이 성립하지 않아 시범이 필요',s3:'5-6개 장애물을 완주하나 전환에서 정지가 필요하고 반복 시 속도 향상이 미미',s4:'코스를 유창하게 완주하며, 반복 시 속도·효율이 현저히 향상되고 장애물 순서를 바꾸어도 즉시 적응'},
{code:'PX06-03',desc:'규칙 기반 집단 운동 놀이 참여 (예: "무궁화 꽃이 피었습니다", "얼음땡" 등 언어 또는 신호 기반 규칙을 듣고 해당 규칙에 따라 달리기-멈추기-숨기 등의 운동을 수행하는 과제. PX05-04의 언어 지시 수행에서 규칙 이해+운동 실행+사회적 맥락의 통합으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 간단한 규칙 기반 놀이(멈추기-달리기)에서 규칙에 따른 행동 변화가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'규칙을 구두로 설명받은 뒤에도 규칙에 따른 행동 변화가 관찰되지 않고, 자유롭게 달리거나 자기 놀이를 함',s2:'규칙의 핵심(예: "멈춰야 함")은 이해하나 신호에 대한 반응이 지연되어, 다른 아동이 멈춘 뒤에도 계속 움직이거나 타이밍이 맞지 않음',s3:'신호에 맞추어 달리기-멈추기를 수행하며 규칙을 대부분 따르나, 규칙 변형(예: "술래가 바뀜")에 즉시 적응하지 못함',s4:'규칙에 따른 운동 수행이 유창하며, 규칙 변형에도 즉시 적응하고 또래와의 상호작용 중에도 규칙을 유지'},
{code:'PX06-04',desc:'2D 그림 보고 3D 블록 구성(모방 구성) (예: 완성된 블록 구조물의 사진(2D)을 보고, 동일한 블록으로 3D 구조물을 재현하는 과제. PX05-03의 3D 모델 보고 따라 만들기에서 2D→3D 변환이 추가)',acqTime:'5세-5세 6개월',redFlag:'6세까지 완성된 블록 구조물 사진을 보고 유사한 구조물을 재현하려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'사진을 보고 블록을 조합하려는 시도가 관찰되지 않거나, 사진과 무관한 구조물을 만듦',s2:'사진의 전체 형태를 참조하여 유사한 구조물을 시도하나, 2D→3D 변환에서 깊이·방향이 사진과 크게 다름',s3:'사진의 주요 특징을 3D로 재현하며, 블록의 위치와 방향이 사진과 대략적으로 일치하나 세부(기울기, 중첩)에서 차이가 관찰됨',s4:'2D 사진을 정확하게 3D로 재현하며, 깊이·방향·중첩까지 사진과 일치'},
{code:'PX06-05',desc:'일상생활 복합 자조 동작 순서 계획/수행 (예: "화장실 가기 → 손 씻기 → 수건으로 닦기 → 제자리에 걸기"와 같은 4-5단계 자조 루틴을 양육자의 단계별 안내 없이 자발적으로 계획하고 수행하는 과제. PX05-04의 언어 지시 수행에서 자발적 계획+실행으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 매일 반복되는 자조 루틴(손 씻기, 양치)에서 양육자의 단계별 안내 없이는 순서대로 수행하지 못하는 양상이 지속될 경우',unit:'질적',s1:'자조 루틴의 첫 단계(화장실 가기)만 자발적으로 수행하고 나머지 단계에서 양육자의 단계별 안내가 필요',s2:'2-3단계까지 자발적으로 수행하나 마지막 단계(수건 걸기 등)가 누락되거나, 순서가 뒤바뀜(손 닦기 전 화장실 나옴)',s3:'4-5단계 자조 루틴을 대부분 자발적으로 순서대로 수행하나, 새로운 환경(낯선 화장실)에서는 단계가 혼란됨',s4:'익숙한 환경과 새로운 환경 모두에서 자조 루틴을 자발적으로 계획하고 순서대로 수행'}
],
vmi:[
{code:'VM06-01',desc:'삼각형(△) 모방 그리기 (예: 평가자가 종이에 삼각형을 그려 보여준 뒤, 세 개의 직선이 세 꼭짓점에서 만나는 폐합 삼각형을 모방하여 그리는 과제. VM05-02의 사각형(직각 4개)에서 삼각형(예각/둔각 조합)으로 확장되며, 대각선 방향 선 조절이 요구됨)',acqTime:'5세-5세 6개월',redFlag:'6세까지 삼각형 모방에서 세 개의 직선이 세 꼭짓점에서 만나는 폐합 도형을 시도하지 않는 양상이 지속될 경우 — Beery VMI 기준 삼각형 모방은 5세 전후 참조',unit:'질적',s1:'시연 후 사각형이나 원을 그리며, 세 꼭짓점으로 구성된 도형을 시도하지 않음',s2:'세 개의 선을 그리나 꼭짓점에서 만나지 않아 열린 도형에 머무르거나, 한 변이 크게 휘어져 삼각형으로 인식되기 어려움',s3:'세 개의 직선이 세 꼭짓점에서 대략적으로 만나는 폐합 삼각형이 산출되나, 변의 길이나 각도가 불규칙하여 시연된 삼각형과 형태 차이가 큼',s4:'세 개의 직선이 세 꼭짓점에서 분명하게 만나는 삼각형을 안정적으로 그리며, 반복 시 비슷한 형태 재현 가능'},
{code:'VM06-02',desc:'이름 쓰기(자기 이름 독립 쓰기) (예: 점선이나 모델 없이 자기 이름의 한글/영문 글자를 종이에 독립적으로 쓰는 과제. FM05-04의 따라쓰기/모방쓰기에서 독립 쓰기로 진전)',acqTime:'5세-5세 6개월',redFlag:'6세까지 점선 없이 자기 이름의 첫 글자조차 인식 가능하게 쓰지 못하는 양상이 지속될 경우',unit:'질적',s1:'점선 없이 자기 이름을 쓰려는 시도에서 글자 형태가 인식되지 않는 흔적만 산출되거나, 첫 글자만 쓰고 나머지를 쓰지 못함',s2:'이름의 글자 대부분을 쓰나 획의 방향이나 순서가 부정확하여 일부 글자가 인식되기 어려움',s3:'이름 전체를 독립적으로 쓰며 글자가 인식 가능하나, 글자 크기가 불규칙하거나 줄에서 벗어남',s4:'이름 전체를 또렷하게 쓰며, 글자 크기가 일정하고 줄 위에 배치됨'},
{code:'VM06-03',desc:'20조각 이상 퍼즐 완성 (예: 그림이 인쇄된 20조각 이상 직소 퍼즐을 그림 단서·조각 형태·가장자리 전략 등을 활용하여 완성하는 과제. VM05-03의 10-12조각에서 20조각으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 12조각 퍼즐을 독립적으로 완성하지 못하는 양상이 지속될 경우',unit:'질적',s1:'12조각 이하 퍼즐에서만 독립적 완성이 가능하고, 13조각 이상에서 시행착오가 과도(VM05-03 수준에 머무름)',s2:'15-18조각까지 독립적으로 맞추나, 20조각에서 양육자의 힌트가 필요',s3:'20조각 퍼즐을 독립적으로 완성하며, 가장자리-먼저·같은 색 모으기 전략이 관찰됨',s4:'20조각 이상 퍼즐을 효율적 전략으로 독립 완성하며, 소요 시간이 줄어듦'},
{code:'VM06-04',desc:'사람 그리기(8-10부분 이상) (예: 머리·몸통·양팔·양다리·얼굴 세부(눈·코·입)·머리카락·목 등이 구분되는 사람 그리기. VM05-04의 4-6부분에서 8-10부분으로 세부가 추가)',acqTime:'5세-5세 6개월',redFlag:'6세까지 사람 그리기에서 6부분 미만이 표현되고, 얼굴 세부(눈·코·입)가 머리 안에 배치되지 않는 양상이 지속될 경우',unit:'질적',s1:'머리·몸통·양팔·양다리가 구분되나 얼굴 세부(눈·코·입)가 추가되지 않음(VM05-04 s3 수준 이하)',s2:'6-7부분이 표현되며 얼굴 세부가 머리 안에 그려지나, 손가락·목·옷 등의 추가 세부는 없음',s3:'8-9부분이 표현되며 목·손가락 또는 옷 등 추가 세부가 간헐적으로 관찰됨',s4:'10부분 이상이 표현되며 머리카락·옷·손가락·신발 등 다양한 세부가 안정적으로 포함됨'},
{code:'VM06-05',desc:'간단한 미로 풀기 (예: A4 종이에 인쇄된 단순 경로 미로를 연필로 시작점에서 도착점까지 선을 그어 풀되, 벽에 닿지 않도록 시각적으로 경로를 미리 확인하고 손의 이동을 조절하는 시각-운동 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 단순 미로에서 벽을 따라 경로를 그으려는 시도가 관찰되지 않고, 벽을 무시하고 직선으로 그리는 양상이 지속될 경우',unit:'질적',s1:'미로의 시작점에서 연필을 대나 벽을 무시하고 직선으로 도착점을 향해 그으며, 미로 경로를 따르려는 시도가 관찰되지 않음',s2:'미로 경로를 따르려는 시도가 있으나 분기점에서 벽을 넘어가거나, 막다른 길에서 되돌아오지 않고 벽을 관통',s3:'미로 경로를 따라 벽에 닿지 않으며 시작점→도착점까지 도달하나, 분기점에서 오래 멈추거나 잘못된 길로 들어갔다 되돌아오는 빈도가 높음',s4:'분기점에서 미리 경로를 시각적으로 확인하고 올바른 방향을 선택하여, 벽에 닿지 않고 효율적으로 미로를 완성'}
],
fine:[
{code:'FM06-01',desc:'동적 삼지잡기(dynamic tripod grasp) 안정화 (예: 연필을 엄지·검지·중지의 세 손가락 끝으로 잡고, FM05-01의 출현에서 손가락 내 움직임(intrinsic finger movement)이 안정화되어 글씨 쓰기·그리기 전반에서 일관되게 사용되는 단계)',acqTime:'5세-5세 6개월',redFlag:'6세까지 연필을 잡되 손가락 내 움직임이 관찰되지 않고, 손목·전완 단위로만 움직이는 정적 삼지잡기에서 벗어나지 않는 양상이 지속될 경우',unit:'질적',s1:'손가락 내 움직임이 간헐적으로만 관찰되고, 큰 동작에서 손목 단위로 전환됨(FM05-01 s3 수준과 동일하면 진전 없음)',s2:'대부분의 그리기 과제에서 손가락 내 움직임이 관찰되나, 글자 쓰기처럼 정밀한 과제에서는 손목 단위로 회귀(FM05-01 s4 수준)',s3:'글자 쓰기를 포함한 정밀한 과제에서도 손가락 내 움직임이 유지되나, 오래 쓰면 피로로 인해 파지가 변형됨',s4:'연필을 동적 삼지잡기로 일관되게 사용하며, 장시간 쓰기에서도 파지가 안정적으로 유지됨'},
{code:'FM06-02',desc:'작은 구슬 끈 꿰기 — 속도 향상 (예: 가는 끈(지름 약 1-2mm)에 작은 구슬(구멍 지름 약 3-4mm)을 연속으로 꿰되, FM05-02의 정확도에서 속도가 향상되어 유창한 연속 꿰기가 가능한 단계)',acqTime:'5세-5세 6개월',redFlag:'6세까지 작은 구슬(구멍 지름 약 3-4mm)을 끈에 연속으로 3개 이상 꿰지 못하는 양상이 지속될 경우',unit:'질적',s1:'작은 구슬 꿰기가 가능하나 한 개 꿰는 데 시간이 오래 걸려 연속성이 부족(FM05-02 s3 수준과 동일하면 진전 없음)',s2:'연속으로 5-6개 꿰기가 가능하나, 속도가 느리고 구슬을 떨어뜨려 재시작하는 빈도가 있음',s3:'연속으로 8개 이상 유창하게 꿰며, 구슬을 떨어뜨리는 빈도가 줄어들고 속도가 빨라짐',s4:'작은 구슬을 빠르고 안정적으로 연속 꿰며, 양손 역할(고정-통과)이 매우 유창'},
{code:'FM06-03',desc:'잠금장치 독립 조작(단추·똑딱이·지퍼) (예: 셔츠 단추(중간-작은 크기), 바지 똑딱이, 점퍼 분리형 지퍼를 모두 독립적으로 잠그고 풀 수 있는 자조 과제. FM05-03의 단추+FM05-05의 지퍼에서 모든 잠금장치의 통합적 독립 조작으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 중간 크기 단추를 독립적으로 끼우지 못하는 양상이 지속될 경우',unit:'질적',s1:'중간 크기 단추와 지퍼는 독립 조작 가능하나, 작은 단추(지름 1cm 미만)나 똑딱이에서는 양손 협응이 부족하여 실패(FM05-03/FM05-05 수준에 머무름)',s2:'작은 단추와 똑딱이에서 간헐적으로 성공하나 시간이 오래 걸리고, 아침 등원 준비 등 시간 압박 상황에서는 양육자의 도움을 요청',s3:'모든 잠금장치(작은 단추·똑딱이·분리형 지퍼)를 독립적으로 조작하나, 특히 똑딱이에서 양손의 힘 조절이 간헐적으로 미숙',s4:'모든 잠금장치를 유창하게 독립 조작하며, 시간 압박 상황에서도 안정적'},
{code:'FM06-04',desc:'가위로 복잡한 모양 오리기 (예: 별·하트·동물 윤곽 등 직선과 곡선이 혼합된 복잡한 도형을 가위로 오리되, BI06-02의 곡선 자르기에서 방향 전환이 잦은 복잡한 윤곽으로 확장. 가위 손의 방향 전환과 종이 손의 회전이 빈번하게 교대됨)',acqTime:'5세-5세 6개월',redFlag:'6세까지 가위로 직선과 단순 곡선(원)을 따라 자르는 것은 가능하나, 방향이 급변하는 도형에서 방향 전환 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'원이나 직선을 따라 자르는 것은 가능하나, 방향이 급변하는 꼭짓점(별의 뾰족한 부분)에서 자르기가 중단되거나 윤곽을 크게 벗어남',s2:'꼭짓점에서 가위 방향을 전환하려는 시도는 있으나, 전환 시 종이가 찢어지거나 윤곽에서 크게 벗어남',s3:'별·하트 등의 윤곽을 대략적으로 따라 오리며 전체 형태가 인식 가능하나, 꼭짓점이나 급곡선에서 정밀도가 저하됨',s4:'복잡한 도형의 윤곽을 정밀하게 따라 오리며, 방향 전환이 부드럽고 잘라낸 형태가 원본에 가까움'},
{code:'FM06-05',desc:'신발 끈 묶기 시도 (예: 운동화 끈을 양손으로 교차시켜 매듭을 짓는 양측 비대칭 정밀 과제. 좌우 끈을 각 손으로 잡고 교차-통과-당기기의 순서를 양손으로 동시에 수행하는 고도 운동 기획+미세운동 과제)',acqTime:'5세-6세',redFlag:'6세까지 양손으로 끈을 교차시키려는 시도 자체가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'양손으로 끈을 각각 잡으나, 교차시키려는 시도가 관찰되지 않거나 교차 방향이 성립하지 않음',s2:'끈을 교차시키나 교차된 끈 사이로 한쪽을 통과시키는 동작이 성립하지 않아 매듭이 지어지지 않음',s3:'교차-통과-당기기의 순서로 기본 매듭(한 번 묶기)이 성립하나, 나비 매듭(리본)까지는 아직 어려움',s4:'기본 매듭과 나비 매듭(리본)이 모두 가능하며, 독립적으로 신발 끈을 묶을 수 있음'}
],
gross:[
{code:'GM06-01',desc:'앞으로 멀리뛰기 — 거리·착지 통합 성숙 (예: 양발 모아 전방으로 뛰어 안정적으로 착지하되, GM05-01의 착지 안정성에서 이동 거리와 착지가 모두 성숙한 단계)',acqTime:'5세-5세 6개월',redFlag:'6세까지 전방 점프 착지 시 매번 양손을 짚거나 넘어지는 양상이 지속될 경우',unit:'질적',s1:'전방 점프 시 착지 후 양손을 짚거나 1-2걸음 앞으로 나가야 균형을 유지(GM05-01 s2 수준과 동일하면 진전 없음)',s2:'착지 후 그 자리에서 체간 직립을 유지하나, 이동 거리가 짧고 반복 시 불규칙(GM05-01 s3 수준)',s3:'안정적 착지와 함께 이동 거리가 일정하며, 착지 후 즉시 다른 동작으로 전환 가능',s4:'팔 흔들기를 이용한 추진과 무릎 굽혀 착지의 성숙한 패턴이 관찰되며, 연속 전방 점프(2-3회)도 리듬적으로 가능'},
{code:'GM06-02',desc:'한발 뛰기(hopping) — 양쪽 발 연속 수행 (예: 한쪽 발로 연속 뛰기를 양쪽 발 모두에서 10회 이상 수행하되, GM05-02의 연속 수행(5회+, 우세 발 중심)에서 양쪽 발 대칭 수행과 횟수 증가로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 비우세 발에서 한발 뛰기 3회 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'우세 발에서 5회 이상 한발 뛰기가 가능하나, 비우세 발에서 3회 미만(GM05-02 s3 수준과 동일하면 진전 없음)',s2:'양쪽 발 모두에서 5회 이상 연속 한발 뛰기가 가능하나, 비우세 발에서 리듬이 불규칙하고 hop 높이가 낮음',s3:'양쪽 발 모두에서 8-10회 연속 한발 뛰기가 리듬적으로 가능하며, 한발 뛰기로 전방 이동도 안정적',s4:'양쪽 발 10회 이상 연속 한발 뛰기가 가능하며, 발을 교대하며 연속 뛰기(교대 hopping)도 시도'},
{code:'GM06-03',desc:'공 바운스-캐치 연속 (예: 큰 공(지름 약 15-20cm)을 바닥에 튕기고 잡는 동작을 연속으로 반복하되, GM05-05의 간헐적 바운스-캐치에서 연속 수행으로 확장)',acqTime:'5세-5세 6개월',redFlag:'6세까지 바운스 후 잡기를 2회 이상 연속으로 수행하지 못하는 양상이 지속될 경우',unit:'질적',s1:'바운스 후 잡기가 간헐적으로만 성공하며, 2회 이상 연속은 어려움(GM05-05 s3 수준과 동일하면 진전 없음)',s2:'2-3회 연속 바운스-캐치가 가능하나, 바운스 높이가 불규칙하여 잡기 타이밍이 맞지 않는 빈도가 높음',s3:'4-5회 연속 바운스-캐치가 가능하며, 바운스 높이를 대략적으로 조절하여 잡기 타이밍이 안정적',s4:'6회 이상 연속 바운스-캐치가 리듬적으로 가능하며, 바운스 높이와 힘을 의도적으로 조절'},
{code:'GM06-04',desc:'스킵(skip) — 연속 수행과 방향 전환 (예: 양발 교대 hop-step 패턴을 연속으로 수행하며, 직선뿐 아니라 원형·지그재그 경로에서도 스킵을 유지하는 과제. BI06-04의 스킵 수행에서 여기서는 연속성과 경로 변환의 대근육 측면을 관찰)',acqTime:'5세-5세 6개월',redFlag:'6세까지 직선 경로에서도 양발 교대 스킵이 5보 이상 연속으로 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'직선 경로에서 양발 교대 hop-step이 5-6보 가능하나, 원형이나 지그재그 경로에서는 패턴이 무너져 달리기로 전환(BI06-04 s3 수준에서 경로 변환 시 미성숙)',s2:'원형 경로에서 스킵을 유지하려는 시도는 있으나, 방향 전환 시 hop이 없어지거나 걸음으로 전환',s3:'원형·지그재그 경로에서도 스킵 패턴을 대부분 유지하나, 급격한 방향 전환에서 리듬이 흐트러짐',s4:'다양한 경로에서 스킵을 유창하게 유지하며, 속도·방향 전환에서도 패턴이 안정적'},
{code:'GM06-05',desc:'달리기 — 민첩성(속도·방향 전환) (예: 달리다가 양육자의 신호(소리, 손짓)에 반응하여 빠르게 멈추기·방향 바꾸기·속도 변화를 수행하는 과제. GM05-01~04의 개별 대근육 기술이 통합되어 반응적 운동 조절이 관찰됨)',acqTime:'5세-5세 6개월',redFlag:'6세까지 달리기 중 양육자의 신호에 반응하여 멈추거나 방향을 전환하는 동작이 현저히 지연되는 양상이 지속될 경우',unit:'질적',s1:'달리기 중 멈추기는 가능하나, 신호에 반응한 방향 전환에서 2-3걸음 미끄러지거나 넓은 호를 그리며 전환',s2:'신호에 반응한 멈추기·방향 전환이 가능하나, 속도 변화(빠르게→느리게) 조절에서 갑작스런 멈춤이나 가속이 관찰됨',s3:'멈추기·방향 전환·속도 변화가 신호에 맞추어 대부분 적절하게 수행되나, 좁은 공간에서 장애물을 피하며 전환하는 복합 상황에서는 충돌이 간헐적으로 관찰됨',s4:'멈추기·방향 전환·속도 변화가 유연하고 빠르며, 장애물 회피와 결합된 복합 상황에서도 민첩하게 수행'}
],
oral:[
{code:'OM06-01',desc:'모든 질감 식품 안전 섭취 — 성숙 패턴 (예: 생채소·견과류·말린 과일·고기·복합 질감 식품 등 모든 질감을 안전하게 씹어 삼키며, OM05-01의 식이 범위 확대에서 새로운 음식에 대한 구강 적응이 빠르고 씹기 패턴이 성숙한 단계)',acqTime:'5세-5세 6개월',redFlag:'6세까지 식이 범위가 특정 질감에 제한되어 여러 질감의 음식을 지속적으로 거부하는 양상이 유지될 경우',unit:'질적',s1:'대부분의 질감에서 안전 섭취가 가능하나, 복합 질감(질긴+바삭: 닭껍질 등)에서 어려움이 관찰됨(OM05-01 s3 수준과 동일하면 진전 없음)',s2:'복합 질감 음식에서도 회전 씹기로 분쇄하여 삼키나, 새로운 음식에 대한 적응이 느려 첫 시도에서 뱉어내는 양상이 관찰됨',s3:'새로운 질감의 음식에도 빠르게 적응하며, 음식의 질감에 따라 씹기 강도·횟수를 자동적으로 조절',s4:'모든 질감·크기의 음식을 성숙한 씹기 패턴으로 안전하게 섭취하며, 식이 범위에 제한이 관찰되지 않음'},
{code:'OM06-02',desc:'비눗방울 길게 불기 — 강도·지속 정밀 조절 (예: 비눗방울 도구에 천천히 약한 호기로 불어 큰 방울을 만들되, OM05-02의 호기 지속 조절에서 강도와 지속을 동시에 정밀 조절하는 단계)',acqTime:'5세-5세 6개월',redFlag:'6세까지 비눗방울을 연속으로 2개 이상 만들지 못하는 양상이 지속될 경우',unit:'질적',s1:'비눗방울을 연속으로 만들 수 있으나, 천천히 약하게 불어 큰 방울을 만드는 강도 조절이 미숙하여 방울이 작거나 터짐(OM05-02 s3 수준과 동일하면 진전 없음)',s2:'약한 호기로 큰 방울을 만들려는 시도는 있으나, 호기 강도를 유지하지 못해 방울이 중간에 터지거나 떨어짐',s3:'약한 호기를 지속하여 큰 방울을 만드는 동작이 간헐적으로 성공하며, 방울 크기를 의도적으로 변화시키려는 시도가 관찰됨',s4:'호기 강도와 지속을 동시에 정밀 조절하여 의도한 크기의 방울을 안정적으로 만듦'},
{code:'OM06-03',desc:'풍선 불기 시도 (예: 풍선 입구를 입에 물고, 구강 내 압력을 높여 풍선을 부풀리는 과제. 비눗방울·호루라기보다 훨씬 높은 호기 저항을 이기고 지속적 호기를 유지하는 구강 호흡 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 풍선 입구에 불어도 풍선이 전혀 부풀지 않는 양상이 지속될 경우',unit:'질적',s1:'풍선 입구를 입에 물고 불려는 시도에서 풍선이 전혀 부풀지 않으며, 공기가 풍선으로 들어가지 않고 볼 옆으로 새어나감',s2:'풍선이 약간 부풀어오르나 2-3회 불기 후 구강 피로로 중단되거나, 입에서 풍선이 빠짐',s3:'풍선을 중간 크기까지 부풀릴 수 있으나, 풍선 크기가 커질수록 호기 저항이 증가하여 최대 크기에 도달하기 전 중단',s4:'풍선을 안정적으로 부풀려 묶을 수 있는 크기까지 도달하며, 호기 지속과 입술 밀폐가 안정적'},
{code:'OM06-04',desc:'식사 시 한 입 크기 자기 조절 (예: 음식을 입에 넣을 때 적당한 크기로 베어물거나 숟가락에 적당량을 떠서 넣되, OM05-04의 입 다물고 씹기에서 한 입 크기의 자발적 조절이 추가된 식사 자율성 과제)',acqTime:'5세-5세 6개월',redFlag:'6세까지 양육자의 안내 없이는 한 입 크기를 조절하지 못하여, 과도한 양을 입에 넣는 양상이 반복적으로 관찰될 경우',unit:'질적',s1:'음식을 한 번에 너무 많이 입에 넣어 볼이 부풀어오르거나, 너무 크게 베어물어 씹기가 어려워 뱉어냄',s2:'양육자의 안내("조금만 넣어")가 있으면 적당량을 입에 넣으나, 안내 없이는 과도한 양을 넣는 양상이 반복',s3:'대부분의 식사에서 적당한 한 입 크기를 자발적으로 조절하나, 좋아하는 음식이나 급하게 먹을 때 과도한 양을 넣는 양상이 간헐적으로 관찰됨',s4:'다양한 음식에서 한 입 크기를 자발적으로 안정하게 조절하며, 음식의 크기·질감에 따라 베어무는 양을 조절'},
{code:'OM06-05',desc:'모든 상황에서 침 흘림(drooling) 없음 — 완전 소실 (예: 격렬한 운동·고도 집중 과제·피로 등 모든 상황에서 침 흘림이 관찰되지 않는 단계. OM05-05의 활동 중 침 흘림 없음에서 완전 소실로 확정)',acqTime:'5세-5세 6개월',redFlag:'6세 이후에도 어떠한 활동 상황에서든 침 흘림이 간헐적으로 관찰되는 양상이 지속될 경우 — 구강운동 정밀 평가 필요',unit:'질적',s1:'대부분의 활동에서 침 흘림이 관찰되지 않으나, 과도한 피로 시 간헐적으로 관찰됨(OM05-05 s2-s3 수준과 동일하면 진전 없음)',s2:'피로 시에도 침 흘림이 관찰되지 않으나, 격렬한 운동 후 구강 개방 시 간헐적으로 타액 유출이 관찰됨',s3:'모든 활동·피로·운동 상황에서 침 흘림이 관찰되지 않으며, 의식적 통제 없이 자동적으로 타액 관리가 이루어짐',s4:'어떠한 상황에서도 침 흘림이 관찰되지 않음'}
]
},
'6y':{
postural:[
{code:'PC07-01',desc:'눈 감고 한발서기 안정화 (예: 평평한 바닥에서 눈을 감고 한쪽 발로 서되, PC06-01의 눈 감기 시도에서 유지 시간이 연장되고 상체 동요가 줄어드는 단계. 시각 정보 차단 시 전정-고유수용-체성감각 통합에 의존하는 자세 조절이 관찰 핵심)',acqTime:'6세-6세 6개월',redFlag:'7세까지 눈을 감은 상태에서 한쪽 발로 잠시라도 서 있는 자세가 유지되지 않는 양상이 지속될 경우',unit:'질적',s1:'눈을 감으면 한발서기가 잠시만 유지되고 즉시 눈을 뜨거나 반대쪽 발을 내려놓음(PC06-01 s3 수준과 동일하면 진전 없음)',s2:'눈을 감은 상태에서 한발서기가 유지되나 상체 동요가 크고, 한쪽 발(우세 발)에서만 가능',s3:'양쪽 발 모두에서 눈 감고 한발서기가 가능하며, 상체 동요가 줄어들어 안정적으로 유지',s4:'눈 감고 한발서기 중 양팔을 체간에 붙인 상태에서도 자세가 유지되며, 유지 시간이 더 길어짐'},
{code:'PC07-02',desc:'평균대 위 후진 보행(폭 약 6cm) (예: 폭 약 6cm의 좁은 평균대(높이 약 10-15cm) 위에서 전방으로 걸어간 뒤, 뒤돌아서지 않고 후진으로 되돌아오는 과제. PC06-02의 폭 8cm에서 6cm로 좁아져 더 정밀한 좌우 무게 중심 조절이 요구됨)',acqTime:'6세-6세 6개월',redFlag:'7세까지 폭 약 6cm 평균대 위에서 후진 1걸음도 떼지 못하는 양상이 지속될 경우',unit:'질적',s1:'폭 6cm 평균대에서 전방 보행은 가능하나, 후진 시 즉시 발이 벗어나거나 내려옴(PC06-02 수준에 머무름)',s2:'후진 시도가 관찰되나 2-3걸음 후 발이 평균대 밖으로 벗어나며, 양팔을 높이 들어 균형을 잡음',s3:'후진으로 4-5걸음 연속 걸으며 평균대 위에 유지되나, 전방 보행보다 현저히 느리고 간헐적으로 벗어남',s4:'전진과 후진 모두 좁은 평균대 위에서 안정적으로 수행하며, 전환(전진→후진) 시 내려오지 않고 연속적으로 수행'},
{code:'PC07-03',desc:'바로 누운 자세 굴곡(supine flexion) — 사지 교차 조합 동작 중 유지 (예: 등을 대고 누워 머리와 양다리를 들어올린 자세에서, PC06-03의 사지 조합에서 좌우 교차 동작(오른손-왼발 터치, 왼손-오른발 터치)을 교대하면서도 자세가 유지되는 과제)',acqTime:'6세-6세 6개월',redFlag:'7세까지 바로 누운 자세 굴곡 자세에서 좌우 교차 동작 시도 자체가 관찰되지 않을 경우',unit:'질적',s1:'사지 동시 동작 중 자세 유지는 가능하나, 좌우 교차 동작(오른손-왼발)을 시도하면 체간이 한쪽으로 회전하여 자세가 무너짐(PC06-03 s3 수준과 동일하면 진전 없음)',s2:'좌우 교차 동작이 간헐적으로 성공하나, 교대(오른손-왼발 → 왼손-오른발)에서 정지가 필요하고 리듬적 교대가 성립하지 않음',s3:'좌우 교차 동작을 리듬적으로 교대하면서 자세가 대부분 유지되나, 속도가 빨라지면 교차가 동측(같은 쪽 손-발)으로 회귀',s4:'좌우 교차 동작을 리듬적으로 빠르게 교대하면서도 체간 굴곡 자세가 안정적으로 유지됨'},
{code:'PC07-04',desc:'엎드린 자세 신전(prone extension) — 사지 교차 조합 동작 중 유지 (예: 엎드려 양팔·양다리를 들어올린 자세에서, PC06-04의 사지 조합에서 좌우 교차(오른팔-왼다리 들기, 왼팔-오른다리 들기)를 교대하면서도 자세가 유지되는 과제)',acqTime:'6세-6세 6개월',redFlag:'7세까지 엎드린 자세 신전 자세에서 좌우 교차 동작 시도 자체가 관찰되지 않을 경우',unit:'질적',s1:'사지 번갈아 동작 중 자세 유지는 가능하나, 좌우 교차(오른팔-왼다리)를 시도하면 체간이 한쪽으로 회전하여 자세가 무너짐(PC06-04 s3 수준과 동일하면 진전 없음)',s2:'교차 동작이 간헐적으로 성공하나 교대에서 리듬이 성립하지 않음',s3:'좌우 교차 동작을 리듬적으로 교대하면서 자세가 대부분 유지되나, 빠른 속도에서 교차가 동측으로 회귀',s4:'좌우 교차 동작을 리듬적으로 빠르게 교대하면서도 체간 신전 자세가 안정적으로 유지됨'},
{code:'PC07-05',desc:'탠덤 보행 — 후진(backward tandem walking) (예: 뒤꿈치를 반대쪽 발끝에 붙여 후진으로 일직선 걷기. PC06-05의 전방 탠덤에서 후방 탠덤으로 확장되며, 시각 정보 없이 고유수용+전정에 의존하는 정밀한 자세 조절이 요구됨)',acqTime:'6세-6세 6개월',redFlag:'7세까지 후방 탠덤 보행에서 1걸음도 뒤꿈치-발끝 접촉이 성립하지 않는 양상이 지속될 경우',unit:'질적',s1:'전방 탠덤 보행은 안정적이나, 후방 탠덤 시 즉시 발이 벗어나거나 일반 후방 보행으로 전환',s2:'후방 탠덤 시도가 관찰되나 1-2걸음 후 발 사이 간격이 벌어지거나 일직선에서 벗어남',s3:'후방 탠덤으로 3-4걸음 연속 걸으며 대략적 일직선이 유지되나, 전방 탠덤보다 현저히 느림',s4:'후방 탠덤 보행이 전방과 유사한 안정성으로 수행되며, 전방→후방 전환이 연속적으로 가능'}
],
bilateral:[
{code:'BI07-01',desc:'줄넘기(1인) — 연속 수행 (예: 혼자 줄을 양손으로 돌리면서 줄이 발 밑을 지날 때 양발로 뛰어넘는 동작을 연속으로 수행하는 양측 협응+타이밍 과제. 양팔의 줄 돌리기(회전)와 양발의 점프(수직)가 동시에 리듬적으로 협응되어야 함)',acqTime:'6세-6세 6개월',redFlag:'7세까지 줄을 양손으로 돌리면서 점프하는 동시 동작이 관찰되지 않고, 줄을 돌린 뒤 멈추고 넘는 분절적 수행에만 머무를 경우',unit:'질적',s1:'줄을 양손으로 돌리는 동작과 점프를 동시에 수행하지 못하여, 줄을 돌린 뒤 멈추고 넘거나 줄이 발에 걸림',s2:'줄 돌리기와 점프의 타이밍이 간헐적으로 맞아 1-2회 연속 넘기에 성공하나, 3회 이상 연속에서 타이밍이 어긋남',s3:'줄넘기 5-8회 연속 수행이 가능하나, 줄 돌리기 속도가 불규칙하여 리듬이 흐트러지면 걸림',s4:'줄넘기 10회 이상 연속 수행이 리듬적으로 가능하며, 속도를 조절할 수 있음'},
{code:'BI07-02',desc:'가위로 복잡한 모양 정확히 자르기 (예: 별·하트·동물 윤곽 등 방향 전환이 잦은 복잡한 도형의 윤곽선을 따라 정밀하게 가위로 자르되, FM06-04의 대략적 오리기에서 정밀성이 향상된 단계. 꼭짓점·급곡선에서의 방향 전환이 부드럽고 자른 선이 윤곽선에 근접)',acqTime:'6세-6세 6개월',redFlag:'7세까지 별·하트 등 복잡한 도형의 윤곽선을 따라 자르는 시도에서, 방향 전환 시 종이가 찢어지거나 윤곽에서 크게 벗어나는 양상이 지속될 경우',unit:'질적',s1:'별·하트의 전체 형태를 따라 오리나 꼭짓점에서 크게 벗어나거나 종이가 찢어짐(FM06-04 s3 수준과 동일하면 진전 없음)',s2:'꼭짓점에서의 방향 전환이 이전보다 부드러워졌으나, 자른 선이 윤곽선에서 여전히 떨어져 있는 구간이 있음',s3:'복잡한 도형의 윤곽선을 대부분 정확하게 따라 자르며, 자른 형태가 원본과 유사하나 미세한 꼭짓점에서 약간의 오차가 있음',s4:'복잡한 도형의 윤곽선을 정밀하게 따라 자르며, 꼭짓점·급곡선에서의 방향 전환이 부드럽고 자른 형태가 원본에 가까움'},
{code:'BI07-03',desc:'점핑잭(jumping jacks) — 리듬 변화 적응 (예: 팔 벌려 뛰기를 다양한 속도(느리게→빠르게→느리게)로 리듬을 변화시키며 수행하는 과제. BI06-03의 연속 수행에서 리듬 변화 적응으로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 점핑잭을 일정 속도로 5회 이상 연속 수행하지 못하는 양상이 지속될 경우',unit:'질적',s1:'점핑잭을 일정 속도로 8회 이상 연속 수행 가능하나, 속도 변화 지시에 적응하지 못하여 리듬이 무너짐(BI06-03 s4 수준에 머무름)',s2:'느리게→빠르게 변화에는 적응하나, 빠르게→느리게 전환에서 급정지하거나 팔-다리 타이밍이 어긋남',s3:'느리게↔빠르게 변화에 대부분 적응하며 팔-다리 협응이 유지되나, 급격한 속도 변화에서 1-2회 어긋남',s4:'다양한 속도 변화에 유연하게 적응하며 팔-다리 협응이 일관되게 유지됨'},
{code:'BI07-04',desc:'자전거(보조바퀴 없이) 주행 (예: 두 바퀴 자전거에 앉아 양발 교대 페달링+양손 핸들 조향+체간 균형을 동시에 수행하며 안정적으로 주행하는 복합 양측 협응 과제)',acqTime:'6세-7세',redFlag:'7세까지 보조바퀴 없이 두 바퀴 자전거에서 독립적 직선 주행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'보조바퀴 없이 앉아 페달을 밟으나 균형을 잡지 못하여 즉시 넘어지거나, 양발을 바닥에 대고 밀어 전진하는 방식에 머무름',s2:'양육자가 뒤에서 잡아주면 페달링+조향이 가능하나, 놓으면 균형을 잃어 넘어지거나 2-3m 내에 멈춤',s3:'독립적으로 직선 주행이 가능하며, 방향 전환(완만한 커브)이 간헐적으로 성공하나 급커브에서 넘어짐',s4:'직선 주행·방향 전환·멈추기가 안정적이며, 장애물을 피하며 주행하는 복합 상황에서도 균형을 유지'},
{code:'BI07-05',desc:'칼+포크 — 다양한 경도의 음식 자르기 (예: BI06-05의 칼+포크 동시 사용에서 부드러운 음식(바나나, 두부)뿐 아니라 단단한 음식(고기, 당근)으로 적용 범위가 확대된 단계)',acqTime:'6세-6세 6개월',redFlag:'7세까지 부드러운 음식에서도 칼+포크 동시 사용(포크 고정+칼 자르기)이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'부드러운 음식에서는 칼+포크 동시 사용이 가능하나, 단단한 음식에서 칼의 힘이 부족하여 자르지 못하거나 포크가 빠짐(BI06-05 s3 수준과 동일하면 진전 없음)',s2:'단단한 음식을 자르려는 시도에서 톱질 동작(sawing)을 사용하나, 힘 조절이 미숙하여 음식이 접시 밖으로 밀려남',s3:'대부분의 음식을 칼+포크로 자르며, 톱질 동작이 안정적이나 매우 단단한 음식(두꺼운 고기)에서는 양육자의 보조가 필요',s4:'다양한 경도의 음식을 칼+포크로 독립적으로 자르며, 음식의 경도에 따라 칼의 힘과 각도를 조절'}
],
praxis:[
{code:'PX07-01',desc:'6단계 이상 복합 동작 모방 (예: 평가자가 여섯 가지 이상의 동작을 순서대로 시연하면 아동이 동일 순서로 연속 수행하는 과제. PX06-01의 5단계에서 6단계로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 6단계 동작 순서에서 다섯 번째 이후의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'시연 후 네 가지 동작까지만 모방하고 나머지가 누락(PX06-01 s2 수준과 동일하면 진전 없음)',s2:'다섯 가지 동작까지 순서대로 모방하나 여섯 번째가 누락(PX06-01 s4 수준)',s3:'여섯 가지 동작을 모두 산출하나 동작 사이에 정지가 필요',s4:'여섯 가지 이상의 동작을 시연 순서대로 유창하게 연속 수행'},
{code:'PX07-02',desc:'복합 스포츠 규칙 이해 후 참여 (예: 피구·축구 미니게임 등 공격/수비/경계/역할 전환이 포함된 규칙을 이해하고 게임에 참여하는 과제. PX06-03의 단순 규칙(멈추기-달리기)에서 복합 규칙(역할 전환+공간 인식)으로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 간단한 집단 스포츠에서 공격-수비 역할 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'게임의 기본 규칙(공 던지기/피하기)은 이해하나, 공격-수비 역할 전환이나 경계선 인식이 되지 않아 규칙 위반이 빈번',s2:'역할 전환(공격→수비)은 지시에 따라 가능하나, 공간 인식(경계선, 진영)이 부족하여 자기 진영을 벗어남',s3:'규칙 전반을 이해하고 역할 전환·공간 인식이 대부분 적절하나, 예외 상황(동시 맞춤, 경계선 판정)에서 혼란이 관찰됨',s4:'복합 규칙을 이해하고 적용하며, 예외 상황에서도 규칙에 따라 행동을 조정하고 또래와 규칙 합의가 가능'},
{code:'PX07-03',desc:'종이접기 3단계 이상 따라하기 (예: 종이비행기·배 등 3-4단계 접기를 시범 보고 순서대로 따라 접는 과제. BI07-02의 가위질(절단)과 달리 접기(3D 변환)의 운동 순서화가 요구됨)',acqTime:'6세-6세 6개월',redFlag:'7세까지 시범을 보고 종이를 반으로 접는 것 이상의 접기 단계를 따라 하지 못하는 양상이 지속될 경우',unit:'질적',s1:'첫 번째 접기(반으로 접기)는 시범을 보고 따라 하나, 두 번째 접기에서 방향이나 위치가 시범과 달라 결과물이 시범과 상이',s2:'2단계까지 시범을 따라 접으나, 세 번째 접기에서 이전 접기와의 방향 관계를 파악하지 못해 시범과 달라짐',s3:'3단계 접기를 시범 순서대로 따라 접으며 결과물이 시범과 대략적으로 일치하나, 접은 선이 또렷하지 않거나 모서리가 어긋남',s4:'3-4단계 접기를 정확하게 따라 접으며, 접은 선이 또렷하고 결과물이 시범과 일치'},
{code:'PX07-04',desc:'복합 자조 루틴 독립 수행 — 시간 관리 포함 (예: 아침 등원 준비(세수→양치→옷 입기→가방 챙기기)를 정해진 시간 내에 양육자의 단계별 안내 없이 독립적으로 수행하는 과제. PX06-05의 자조 루틴에서 시간 관리가 추가)',acqTime:'6세-6세 6개월',redFlag:'7세까지 매일 반복되는 아침 준비 루틴에서 양육자의 단계별 안내 없이는 순서대로 진행하지 못하는 양상이 지속될 경우',unit:'질적',s1:'자조 루틴의 각 단계를 독립적으로 수행하나, 양육자가 "다음은 양치야"와 같이 단계별 안내를 해야 순서가 진행됨(PX06-05 s2 수준)',s2:'자조 루틴을 자발적으로 순서대로 수행하나, 정해진 시간 내에 완료하지 못하여 양육자가 "빨리"를 반복해야 함',s3:'자조 루틴을 정해진 시간 내에 대부분 완료하나, 새로운 순서 추가(예: 마스크 챙기기)에 즉시 적응하지 못함',s4:'자조 루틴을 정해진 시간 내에 독립적으로 완료하며, 새로운 단계가 추가되어도 순서에 통합'},
{code:'PX07-05',desc:'새로운 운동 기술 시연 보고 따라하기 (예: 배드민턴 서브, 줄넘기 교차 넘기 등 이전에 경험하지 않은 운동 기술을 시연받고, 시행착오를 통해 동작을 재현하려는 운동 기획 과제)',acqTime:'6세-6세 6개월',redFlag:'7세까지 새로운 운동 기술의 시연을 관찰하고도 유사한 동작을 시도하지 않는 양상이 지속될 경우',unit:'질적',s1:'시연을 관찰한 뒤에도 시연된 동작과 유사한 시도가 관찰되지 않고, 이전에 알던 동작으로 대체',s2:'시연된 동작의 일부 요소(팔 휘두르기)를 모방하나, 전체 동작 순서(팔 휘두르기+공 접촉 타이밍)가 통합되지 않음',s3:'전체 동작 순서를 모방하여 시도하며, 시행착오를 통해 점차 시연에 가까워지나 아직 미숙',s4:'시연을 관찰하고 전체 동작을 빠르게 재현하며, 시행착오 횟수가 적고 자기 교정이 관찰됨'}
],
vmi:[
{code:'VM07-01',desc:'마름모(◇) 모방 그리기 시도 (예: 평가자가 종이에 마름모를 그려 보여준 뒤, 네 개의 사선이 네 꼭짓점에서 만나는 폐합 마름모를 모방하여 그리는 과제. VM06-01의 삼각형(3개 사선)에서 마름모(4개 사선, 대칭)로 확장되며, 대각선 방향의 대칭적 선 조절이 요구됨 — Beery VMI 기준 마름모 모방은 6-7세)',acqTime:'6세-6세 6개월',redFlag:'7세까지 마름모 모방에서 사선으로 구성된 폐합 도형을 시도하지 않는 양상이 지속될 경우',unit:'질적',s1:'시연 후 사각형(직각)이나 원을 그리며, 사선으로 구성된 도형을 시도하지 않음',s2:'사선 2-3개를 그리나 폐합이 이루어지지 않거나, 상하 또는 좌우 대칭이 크게 무너져 마름모로 인식되기 어려움',s3:'네 개의 사선이 네 꼭짓점에서 대략적으로 만나는 폐합 마름모가 산출되나, 상하 또는 좌우 대칭이 불규칙',s4:'네 개의 사선이 대칭적으로 만나는 마름모를 안정적으로 그리며, 반복 시 형태가 유지됨'},
{code:'VM07-02',desc:'글씨 크기·간격 조절하여 쓰기 (예: 줄이 있는 노트에 한글/숫자를 쓸 때, 글자가 줄 안에 배치되고 글자 간 간격이 대략적으로 균일한 과제. VM06-02의 이름 독립 쓰기에서 크기·간격 조절이 추가)',acqTime:'6세-6세 6개월',redFlag:'7세까지 줄이 있는 노트에 쓸 때 글자가 줄을 전혀 따르지 않고, 크기가 극도로 불규칙한 양상이 지속될 경우',unit:'질적',s1:'글자를 쓸 수 있으나 줄을 무시하고 종이 전체에 걸쳐 크기가 불규칙하게 산출됨',s2:'줄 위에 글자를 배치하려는 시도는 있으나, 글자가 줄 위·아래로 크게 벗어나고 간격이 과도하게 넓거나 겹침',s3:'글자가 대부분 줄 안에 배치되며 간격이 대략적으로 균일하나, 글자 크기가 단어 내에서 변동됨',s4:'글자 크기·간격·줄 배치가 안정적이며, 또래가 읽을 수 있는 가독성을 유지'},
{code:'VM07-03',desc:'30조각 이상 퍼즐 완성 (예: 30조각 이상 직소 퍼즐을 가장자리 전략·색상 그룹핑·형태 매칭 등 효율적 전략을 활용하여 완성하는 과제. VM06-03의 20조각에서 30조각으로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 20조각 퍼즐을 독립적으로 완성하지 못하는 양상이 지속될 경우',unit:'질적',s1:'20조각 이하에서만 독립 완성이 가능하고, 25조각 이상에서 시행착오가 과도(VM06-03 수준에 머무름)',s2:'25-28조각까지 독립적으로 맞추나, 30조각에서 양육자의 힌트가 필요',s3:'30조각 퍼즐을 독립적으로 완성하며, 가장자리-먼저·색상 그룹핑 전략이 관찰됨',s4:'30조각 이상 퍼즐을 효율적으로 독립 완성하며, 소요 시간이 줄어들고 새로운 퍼즐에도 전략을 적용'},
{code:'VM07-04',desc:'간단한 도면/설계도 보고 블록 구성 (예: 종이에 그려진 블록 구조물의 정면도·측면도를 보고, 동일한 블록으로 3D 구조물을 재현하는 과제. PX06-04의 사진(2D) 보고 만들기에서 도면(추상화된 2D) 보고 만들기로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 도면을 보고 유사한 구조물을 재현하려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'도면을 보고 블록을 조합하려는 시도가 관찰되지 않거나, 도면과 무관한 구조물을 만듦',s2:'도면의 전체 형태를 참조하여 유사한 구조물을 시도하나, 도면의 기호(정면/측면)를 해석하지 못해 3D 변환이 부정확',s3:'도면의 정면도를 참조하여 전체 구조를 대략적으로 재현하며, 측면도도 참조하려는 시도가 관찰됨',s4:'정면도와 측면도를 모두 참조하여 3D 구조물을 정확하게 재현'},
{code:'VM07-05',desc:'사람 그리기(10부분 이상 + 비례) (예: VM06-04의 8-10부분에서 부분 수가 증가하고, 머리·몸통·팔·다리의 비례가 대략적으로 실제와 유사해지는 단계)',acqTime:'6세-6세 6개월',redFlag:'7세까지 사람 그리기에서 8부분 미만이 표현되고, 머리·몸통이 비례 없이 그려지는 양상이 지속될 경우',unit:'질적',s1:'8-9부분이 표현되나 머리가 몸통보다 크거나 팔이 머리에서 직접 나오는 등 비례가 맞지 않음(VM06-04 s3 수준 이하)',s2:'10부분 이상이 표현되며 주요 세부(머리카락·옷·신발)가 포함되나, 머리와 몸통의 크기 비례가 부자연스러움',s3:'10부분 이상이 표현되고, 머리·몸통·팔·다리의 비례가 대략적으로 실제와 유사하며 세부(손가락, 목, 옷의 세부)가 안정적으로 포함',s4:'12부분 이상이 표현되고, 비례·세부·배치가 안정적이며 측면이나 동작(걷는 모습) 표현 시도가 관찰됨'}
],
fine:[
{code:'FM07-01',desc:'동적 삼지잡기 — 장시간 쓰기 유지 (예: 연필을 동적 삼지잡기로 잡고 학교 수업 시간(20-30분) 동안 글씨 쓰기·받아쓰기를 수행하면서 파지가 안정적으로 유지되는 과제. FM06-01의 안정화에서 장시간 유지로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 글씨 쓰기 10분 이내에 파지가 주먹 잡기로 변형되거나, 손가락 내 움직임 없이 손목 단위로만 쓰는 양상이 지속될 경우',unit:'질적',s1:'글씨 쓰기를 포함한 과제에서 손가락 내 움직임이 유지되나, 10분 이상 쓰면 피로로 파지가 주먹 잡기로 변형됨(FM06-01 s3 수준과 동일하면 진전 없음)',s2:'15-20분 동안 동적 삼지잡기가 유지되나, 쓰기 속도가 느려지고 글자 크기가 점차 커지는 피로 징후가 관찰됨',s3:'20-30분 동안 동적 삼지잡기가 대부분 유지되며, 파지 변형 없이 가독성이 유지됨',s4:'수업 시간 전체에 걸쳐 동적 삼지잡기가 안정적이며, 속도·가독성이 일정하게 유지됨'},
{code:'FM07-02',desc:'글씨 가독성(또래 수준) (예: 한글/숫자를 또래가 읽을 수 있는 수준으로 쓰되, 글자의 획순·비례·배치가 학교 학습에 지장을 주지 않는 가독성이 관찰 핵심)',acqTime:'6세-6세 6개월',redFlag:'7세까지 글씨의 가독성이 또래 수준에 현저히 미달하여, 본인이 쓴 글자를 본인도 읽지 못하는 양상이 지속될 경우',unit:'질적',s1:'글자의 주요 획이 인식되나 획순이 불규칙하고 글자 간 구분이 어려워 또래가 읽기 어려움',s2:'또래가 읽을 수 있으나 일부 글자에서 획이 빠지거나 좌우 반전(거울 글자)이 간헐적으로 관찰됨',s3:'대부분의 글자가 또래 수준의 가독성을 유지하며, 획순이 대체로 정확하고 좌우 반전이 거의 관찰되지 않음',s4:'글자의 획순·비례·배치가 안정적이며, 받아쓰기 등 속도 요구 상황에서도 가독성이 유지됨'},
{code:'FM07-03',desc:'신발 끈 묶기 독립 (예: FM06-05의 기본 매듭+나비 매듭 시도에서, 나비 매듭(리본)을 독립적으로 완성하여 신발 끈을 혼자 묶는 과제)',acqTime:'6세-6세 6개월',redFlag:'7세까지 기본 매듭(교차-통과-당기기)이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'기본 매듭(한 번 묶기)은 가능하나 나비 매듭에서 고리를 만드는 동작이 성립하지 않음(FM06-05 s3 수준)',s2:'나비 매듭의 고리를 만들려는 시도가 있으나, 고리가 풀리거나 한쪽 고리만 형성되어 완성되지 않음',s3:'나비 매듭을 완성하나 시간이 오래 걸리고 고리 크기가 불균형',s4:'나비 매듭을 독립적으로 빠르게 묶으며, 고리 크기가 균형 잡히고 묶인 상태가 안정적'},
{code:'FM07-04',desc:'작은 단추·후크 조작 (예: 셔츠의 작은 단추(지름 1cm 미만)나 바지의 후크(hook-and-eye)를 양손으로 잠그고 푸는 과제. FM06-03의 통합 잠금장치에서 가장 작고 정밀한 잠금장치로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 작은 단추(지름 1cm 미만)를 구멍에 끼우는 동작이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'작은 단추를 잡으나 구멍에 밀어넣는 동작이 성립하지 않거나, 후크의 갈고리를 고리에 끼우는 방향을 파악하지 못함',s2:'작은 단추를 구멍에 밀어넣으려는 시도가 간헐적으로 성공하나, 후크에서는 갈고리와 고리의 정렬이 맞지 않아 반복 실패',s3:'작은 단추와 후크 모두 잠그고 풀 수 있으나, 시간이 오래 걸리고 양손의 힘 조절이 간헐적으로 미숙',s4:'작은 단추와 후크를 유창하게 잠그고 풀며, 양손 협응이 안정적'},
{code:'FM07-05',desc:'손 안 조작(in-hand manipulation) (예: 한 손 안에서 동전·구슬·지우개 등의 작은 물건을 손가락 끝에서 손바닥으로 이동시키거나(translation), 손가락 사이에서 회전시키는(rotation) 과제. 물건을 다른 손이나 테이블 도움 없이 한 손 내에서 조작하는 미세운동 조절)',acqTime:'6세-6세 6개월',redFlag:'7세까지 한 손 안에서 작은 물건을 손가락 끝에서 손바닥으로 이동시키는 동작이 관찰되지 않고, 반대 손이나 테이블에 의존하는 양상이 지속될 경우',unit:'질적',s1:'한 손에 작은 물건을 쥐나, 손가락 끝에서 손바닥으로 이동시키는 동작이 관찰되지 않고 반대 손으로 건네받거나 테이블에 놓았다 다시 잡음',s2:'손가락 끝에서 손바닥으로의 이동(finger-to-palm translation)이 간헐적으로 성공하나, 이동 중 물건을 떨어뜨리는 빈도가 높음',s3:'finger-to-palm translation이 안정적이며, palm-to-finger translation(손바닥에서 손가락 끝으로)도 간헐적으로 성공하나 회전(rotation)은 미숙',s4:'translation과 rotation 모두 한 손 내에서 안정적으로 수행하며, 동전을 손가락 사이에서 돌리는 동작이 관찰됨'}
],
gross:[
{code:'GM07-01',desc:'앞으로 멀리뛰기 — 성숙 패턴 유지 (예: GM06-01의 성숙 패턴(팔 추진+무릎 굽혀 착지)이 안정적으로 유지되며, 이동 거리가 더 늘어나는 단계)',acqTime:'6세-6세 6개월',redFlag:'7세까지 전방 점프 시 팔 추진이 관찰되지 않고, 착지 시 매번 양손을 짚거나 넘어지는 양상이 지속될 경우',unit:'질적',s1:'전방 점프 시 팔 흔들기를 이용한 추진이 관찰되지 않고, 착지 시 무릎을 펴고 착지하여 충격 흡수가 미숙(GM06-01 s2 이하 수준)',s2:'팔 추진은 나타나나 무릎 굽혀 착지가 불안정하고, 반복 시 이동 거리가 불규칙',s3:'팔 추진+무릎 굽혀 착지의 성숙 패턴이 안정적이며, 이동 거리가 일정하고 착지 후 즉시 다른 동작으로 전환 가능',s4:'성숙 패턴이 자동화되어 연속 점프(2-3회)에서도 유지되며, 이동 거리가 동일 연령 또래 범위 내'},
{code:'GM07-02',desc:'한발 뛰기 — 전방 이동과 방향 전환 (예: 한쪽 발로 연속 뛰면서 전방으로 이동하고, 뛰는 중에 방향을 전환하는 과제. GM06-02의 양쪽 발 연속 뛰기에서 이동+방향 전환이 추가)',acqTime:'6세-6세 6개월',redFlag:'7세까지 한쪽 발로 전방 이동하면서 5회 이상 연속 뛰기가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'양쪽 발에서 연속 한발 뛰기는 가능하나, 뛰면서 전방 이동이 직선에서 벗어나거나 방향 전환 시 반대쪽 발을 내려놓음(GM06-02 s3-s4 수준에서 이동/방향 전환 미성숙)',s2:'한발 뛰기로 직선 전방 이동은 가능하나, 방향 전환(좌로/우로) 시 뛰기가 중단되거나 양발 점프로 전환',s3:'한발 뛰기로 전방 이동과 방향 전환이 모두 가능하나, 급격한 방향 전환에서 리듬이 흐트러짐',s4:'한발 뛰기로 전방 이동·방향 전환·속도 변화가 유연하며, 지그재그 경로에서도 한발 뛰기가 유지됨'},
{code:'GM07-03',desc:'공 던지기 — 목표 정확도 향상 (예: 약 3m 거리에 놓인 과녁(큰 바구니·벽 표적)을 향해 작은 공을 한 손으로 던져 목표에 근접시키되, GM06-03의 방향 조준에서 목표 명중 정확도로 확장)',acqTime:'6세-6세 6개월',redFlag:'7세까지 약 3m 거리의 큰 목표를 향해 공을 던질 때 공이 목표 방향으로 날아가지 않는 양상이 지속될 경우',unit:'질적',s1:'목표를 향해 던지나 공이 목표에서 크게 벗어나며, 던지기 시 반대쪽 발 내딛기(contralateral stepping)가 불안정(GM06-03 수준에 머무름)',s2:'목표 근처에 공이 도달하는 빈도가 증가하나, 명중 성공률이 낮고 던지기 거리와 방향이 불규칙',s3:'목표에 대한 명중 성공률이 높아지며, contralateral stepping과 체간 회전이 던지기에 통합되어 힘과 방향이 조절됨',s4:'다양한 거리와 크기의 목표에 대한 던지기 정확도가 높으며, 던지기 폼이 성숙하고 일관적'},
{code:'GM07-04',desc:'줄넘기 — 연속 수행과 변형 (예: BI07-01의 기본 줄넘기에서 연속 횟수가 증가하고, 한쪽 발 뛰기·양발 교대 뛰기 등 변형이 가능한 단계. 여기서는 점프 패턴 변형의 대근육 측면을 관찰)',acqTime:'6세-6세 6개월',redFlag:'7세까지 기본 줄넘기(양발 동시 점프)가 5회 이상 연속으로 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'기본 줄넘기(양발 동시 점프)가 5-8회 연속 가능하나, 한쪽 발 뛰기나 양발 교대 등 변형 시도가 관찰되지 않음(BI07-01 s3 수준에서 변형 미시도)',s2:'기본 줄넘기 10회 이상 연속 가능하며, 한쪽 발 뛰기를 시도하나 1-2회 후 양발로 복귀',s3:'기본 줄넘기 15회 이상 연속 가능하고, 한쪽 발 뛰기로 3-5회 연속 넘기가 가능',s4:'기본·한쪽 발·양발 교대 등 다양한 패턴으로 줄넘기를 수행하며, 패턴 간 전환이 자연스러움'},
{code:'GM07-05',desc:'자전거(보조바퀴 없이) — 복합 주행 (예: BI07-04의 직선 주행·기본 방향 전환에서, 급커브·장애물 회피·정지·속도 조절 등 복합 상황에서의 안정적 주행으로 확장. 여기서는 균형·속도 조절·반응 민첩성의 대근육 측면을 관찰)',acqTime:'6세-7세',redFlag:'7세까지 보조바퀴 없이 직선 주행도 불가능한 양상이 지속될 경우',unit:'질적',s1:'직선 주행과 완만한 커브는 가능하나, 급커브에서 넘어지거나 장애물 앞에서 멈추지 못함(BI07-04 s3 수준에서 복합 주행 미성숙)',s2:'급커브에서 속도를 줄이며 넘어지지 않고 전환 가능하나, 장애물 회피 시 급정지하여 발을 바닥에 대야 함',s3:'급커브·장애물 회피·정지가 대부분 안정적이나, 좁은 공간에서의 연속 방향 전환에서 간헐적으로 불안정',s4:'복합 주행 상황에서 균형·속도 조절·방향 전환·정지가 통합적으로 안정하게 수행됨'}
],
oral:[
{code:'OM07-01',desc:'모든 식품 질감 — 독립·성숙 섭취 (예: OM06-01의 성숙 패턴이 완전히 확립되어, 모든 질감·크기·경도의 음식을 독립적으로 안전하게 씹어 삼키며 새로운 음식에 대한 적응이 즉각적인 단계)',acqTime:'6세-6세 6개월',redFlag:'7세까지 식이 범위가 특정 질감에 제한되어 여러 질감의 음식을 지속적으로 거부하는 양상이 유지될 경우',unit:'질적',s1:'대부분의 질감에서 안전 섭취가 가능하나, 새로운 질감의 음식에서 첫 시도 시 뱉어내는 양상이 간헐적으로 관찰됨(OM06-01 s2-s3 수준과 동일하면 진전 없음)',s2:'새로운 질감의 음식에 빠르게 적응하며, 뱉어내는 양상이 거의 관찰되지 않으나 복합 질감(여러 질감이 한 입에 혼합)에서 간헐적으로 씹기 전략이 미숙',s3:'모든 질감·경도·복합 질감에서 성숙한 씹기 패턴이 관찰되며, 새로운 음식에 대한 적응이 즉각적',s4:'식이 범위에 제한이 관찰되지 않으며 씹기-삼키기가 완전히 자동화됨'},
{code:'OM07-02',desc:'풍선 독립 불기 (예: OM06-03의 풍선 불기 시도에서, 풍선을 혼자 입에 물고 묶을 수 있는 크기까지 안정적으로 부풀리는 단계)',acqTime:'6세-6세 6개월',redFlag:'7세까지 풍선을 불어도 적정 크기까지 부풀리지 못하는 양상이 지속될 경우',unit:'질적',s1:'풍선을 약간 부풀리나 묶을 수 있는 크기에 도달하기 전 호기가 중단되거나 입에서 풍선이 빠짐(OM06-03 s2-s3 수준과 동일하면 진전 없음)',s2:'풍선을 묶을 수 있는 크기까지 부풀리나, 3-4회 쉬어 불기가 필요하며 시간이 오래 걸림',s3:'풍선을 1-2회 연속 불기로 적정 크기까지 부풀리며, 입술 밀폐가 안정적',s4:'풍선을 빠르게 적정 크기까지 부풀리고, 혼자 묶을 수 있음'},
{code:'OM07-03',desc:'리코더 불기 — 음 전환 (예: 리코더를 불어 "도-레-미" 등 2-3개 음을 순서대로 내되, 호기 강도 유지와 손가락 구멍 개폐를 동시에 수행하는 구강-미세운동 통합 과제. OM06-02의 호기 조절+OM05-03의 하모니카 불기에서 손가락 조작이 추가)',acqTime:'6세-6세 6개월',redFlag:'7세까지 리코더에 불어도 소리가 나지 않거나, 손가락으로 구멍을 막는 동작이 불기와 동시에 수행되지 않는 양상이 지속될 경우',unit:'질적',s1:'리코더에 불어 소리를 내나 손가락으로 구멍을 막는 동작과 불기를 동시에 수행하지 못하여 한 음만 산출',s2:'손가락으로 구멍을 막아 2개의 음을 산출하나, 음 전환 시 불기가 중단되거나 손가락이 정확한 구멍을 막지 못함',s3:'2-3개의 음을 순서대로 전환하며 산출하나, 음 사이에 잡음이 끼이거나 불기가 끊김',s4:'3개 이상의 음을 부드럽게 전환하며, 간단한 멜로디 연주가 가능'},
{code:'OM07-04',desc:'식사 시 적절한 속도로 씹고 삼키기 (예: 식사를 또래와 비슷한 속도로 마치되, 음식을 충분히 씹어 삼키는 안전성과 식사 완료까지의 효율성이 균형을 이루는 과제)',acqTime:'6세-6세 6개월',redFlag:'7세까지 식사 시 음식을 씹지 않고 삼키려 하여 사레가 반복되거나, 또래보다 현저히 긴 식사 시간이 지속될 경우',unit:'질적',s1:'식사 시 음식을 충분히 씹지 않고 빨리 삼키려 하여 사레가 간헐적으로 관찰되거나, 반대로 매우 천천히 씹어 또래보다 현저히 오래 걸림',s2:'안전하게 씹어 삼키나 또래보다 식사 시간이 상당히 길며, 대화나 활동 중에는 씹기가 멈춤',s3:'또래와 비슷한 속도로 식사를 마치며, 대화 중에도 씹기-삼키기를 유지하나 복합 질감에서 약간 느려짐',s4:'다양한 음식·상황에서 적절한 속도로 안전하게 식사하며, 식사 예절을 유지'},
{code:'OM07-05',desc:'구강 근력·지구력 또래 수준 확인 (예: 딱딱한 사탕·얼음을 깨무는 턱 근력, 오래 씹기(껌)를 통한 구강 지구력, 빨대로 되직한 음료를 지속 흡인하는 흡인 근력이 또래 수준인지 관찰)',acqTime:'6세-6세 6개월',redFlag:'7세까지 딱딱한 음식을 깨무는 턱 근력이 현저히 약하거나, 껌을 2분 이상 씹지 못하는 양상이 지속될 경우',unit:'질적',s1:'딱딱한 사탕이나 얼음을 깨무는 동작이 관찰되지 않고, 녹을 때까지 빨거나 뱉어냄',s2:'딱딱한 사탕을 깨물 수 있으나 턱이 금방 피로해지며, 껌을 2-3분 이상 씹지 못하고 뱉어냄',s3:'딱딱한 사탕·얼음을 깨무는 턱 근력이 충분하고, 껌을 5분 이상 씹을 수 있으나 되직한 음료의 지속 흡인에서 간헐적으로 피로가 관찰됨',s4:'턱 근력·구강 지구력·흡인 근력이 모두 또래 수준이며, 다양한 과제에서 피로 없이 수행'}
]
},

postural:[
{code:'PC08-01',desc:'눈 감고 한발서기 — 유지 시간 연장 (예: PC07-01의 눈 감고 한발서기 안정화에서 유지 시간이 더 연장되고, 양팔을 체간에 붙인 조건에서도 눈 감고 한발서기가 가능한 단계)',acqTime:'7세-8세',redFlag:'9세까지 눈을 감은 상태에서(양팔은 자유) 한쪽 발로 잠시도 서 있지 못하는 양상이 지속될 경우',unit:'질적',s1:'눈 감고 한발서기가 양쪽 발에서 가능하나, 양팔을 벌려야 유지되며 체간 부착 시 즉시 균형을 잃음(PC07-01 s3 수준과 동일하면 진전 없음)',s2:'양팔을 체간에 붙인 상태에서 눈 감고 한발서기가 잠시 유지되나, 상체 동요가 크고 한쪽 발에서만 가능',s3:'양팔 체간 부착+눈 감기 조건에서 양쪽 발 모두 한발서기가 가능하며, 동요가 줄어듦',s4:'양팔 체간 부착+눈 감기 조건에서 안정적으로 장시간 유지되며, 지지 발의 미세 조정만으로 균형을 유지'},
{code:'PC08-02',desc:'평균대 위 옆걸음 보행(side-stepping) (예: 폭 약 6cm 평균대 위에서 좌우로 옆걸음(side-step)을 연속으로 걷되, 전방·후방 보행과 달리 측방 무게 중심 이동의 정밀한 조절이 요구되는 과제. PC07-02의 전진/후진에 측방이 추가)',acqTime:'7세-8세',redFlag:'9세까지 평균대 위에서 옆걸음 2보 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'평균대 위에서 옆걸음 시도 시 즉시 발이 벗어나거나 내려옴',s2:'옆걸음 2-3보가 가능하나, 발이 평균대 밖으로 벗어나는 빈도가 높고 양팔을 크게 벌림',s3:'옆걸음 5보 이상 연속 수행하며 평균대 위에 유지되나, 전방·후방 보행보다 현저히 불안정',s4:'좌우 옆걸음이 안정적이며, 전진→옆걸음→후진의 방향 전환이 평균대 위에서 연속적으로 가능'},

{code:'PX08-04',desc:'종이접기 5단계 이상 따라하기 (예: 종이 학·개구리 등 5단계 이상의 접기를 시범을 보고 순서대로 따라 접는 과제. PX07-03의 3단계에서 5단계로 확장되며, 이전 접기 결과 위에 다음 접기가 누적되는 복합 운동 순서화)',acqTime:'7세-8세',redFlag:'9세까지 시범을 보고 종이접기 3단계 이상을 따라 하지 못하는 양상이 지속될 경우',unit:'질적',s1:'3단계까지 시범을 따라 접으나, 4단계 이상에서 이전 접기의 방향 관계를 파악하지 못해 결과물이 시범과 상이(PX07-03 수준에 머무름)',s2:'4단계까지 따라 접으나, 5단계에서 접기 방향이 뒤바뀌거나 이전 접기를 풀어버림',s3:'5단계를 순서대로 따라 접으며 결과물이 시범과 대략적으로 일치하나, 접은 선의 정밀도가 단계가 진행될수록 저하',s4:'5단계 이상을 정확하게 따라 접으며, 접은 선이 또렷하고 결과물이 시범과 일치'},
{code:'PX08-05',desc:'글씨 쓰기 속도+가독성 균형 (예: 받아쓰기·시간 제한 과제에서 적절한 속도로 또래가 읽을 수 있는 글씨를 쓰되, FM07-01의 장시간 유지와 FM07-02의 가독성이 속도 요구 상황에서도 유지되는 과제)',acqTime:'7세-8세',redFlag:'9세까지 받아쓰기에서 속도와 가독성 중 하나를 희생하지 않으면 다른 하나를 유지하지 못하는 양상이 지속될 경우',unit:'질적',s1:'글씨 가독성은 유지되나 속도가 또래보다 현저히 느려, 받아쓰기에서 3-4단어 이상 뒤처짐',s2:'또래와 비슷한 속도로 쓰려 하면 글자 크기가 불규칙해지고 획이 뭉개져 가독성이 저하됨',s3:'받아쓰기에서 또래와 비슷한 속도를 유지하면서 가독성이 대부분 유지되나, 긴 문장에서 후반부의 글씨가 약간 흐트러짐',s4:'속도와 가독성이 균형 잡혀 받아쓰기·시간 제한 과제에서도 또래 수준의 속도와 가독성이 일관되게 유지'}
],
vmi:[
{code:'VM08-01',desc:'3D 도형(정육면체) 모방 그리기 (예: 평가자가 그린 정육면체를 보고, 2D 종이 위에 입체감(깊이·원근)이 표현되는 정육면체를 모방하여 그리는 과제. VM07-01의 마름모(2D 사선)에서 3D 원근 표현으로 확장 — Beery VMI 기준 정육면체 모방은 8-9세)',acqTime:'7세-8세',redFlag:'9세까지 3D 도형 모방에서 깊이를 표현하려는 시도(앞면 뒤로 선 뻗기)가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'시연 후 사각형이나 마름모를 그리며, 깊이를 표현하려는 시도가 관찰되지 않음',s2:'앞면 사각형을 그리고 뒤로 선을 뻗어 깊이를 표현하려는 시도가 있으나, 뒤쪽 면이 형성되지 않거나 원근이 부자연스러움',s3:'앞면과 뒷면이 연결되어 정육면체의 전체 형태가 인식 가능하나, 평행선이나 비례가 불규칙',s4:'정육면체의 앞면·뒷면·연결선이 대략적 원근법으로 그려져 입체감이 표현되며, 반복 시 형태가 유지됨'},
{code:'VM08-02',desc:'칸 안에 글씨 정확히 쓰기 (예: 모눈종이·칸 노트의 칸 안에 글자를 벗어나지 않게 쓰되, VM07-02의 줄 노트 글씨에서 칸이라는 더 제한된 공간 내 크기 조절로 확장)',acqTime:'7세-8세',redFlag:'9세까지 칸 노트에서 글자가 칸 안에 배치되지 않고, 칸의 존재와 무관하게 자유롭게 쓰는 양상이 지속될 경우',unit:'질적',s1:'줄 노트에서는 글자가 줄 안에 배치되나, 칸 노트에서는 글자가 칸 밖으로 크게 벗어남(VM07-02 수준에 머무름)',s2:'칸 안에 글자를 쓰려는 시도가 있으나, 글자 크기가 칸보다 크거나 칸의 일부만 채워져 불균형',s3:'대부분의 글자가 칸 안에 배치되며 크기가 칸에 맞추어 조절되나, 복잡한 글자(획이 많은 한글)에서 칸 밖으로 벗어남',s4:'모든 글자가 칸 안에 정확히 배치되며, 획이 많은 글자도 칸에 맞추어 크기가 조절됨'},
{code:'VM08-03',desc:'50조각 이상 퍼즐 완성 (예: 50조각 이상 직소 퍼즐을 전략적으로 완성하되, VM07-03의 30조각에서 50조각으로 확장되며 전략의 효율성이 관찰 핵심)',acqTime:'7세-8세',redFlag:'9세까지 30조각 퍼즐을 독립적으로 완성하지 못하는 양상이 지속될 경우',unit:'질적',s1:'30조각 이하에서만 독립 완성 가능(VM07-03 수준에 머무름)',s2:'40-45조각까지 독립적으로 맞추나 50조각에서 시행착오가 과도하여 힌트가 필요',s3:'50조각 퍼즐을 독립적으로 완성하며, 가장자리·색상·형태 전략이 체계적으로 관찰됨',s4:'50조각 이상 퍼즐을 효율적으로 완성하며, 새로운 퍼즐에도 전략을 빠르게 적용'},
{code:'VM08-04',desc:'복잡한 미로 풀기 — 사전 계획 (예: 3가지 이상 분기점이 있는 복잡한 미로를 풀되, VM06-05의 단순 미로에서 분기 수 증가와 시작 전 경로를 시각적으로 미리 계획하는 전략이 관찰되는 과제)',acqTime:'7세-8세',redFlag:'9세까지 3개 이상 분기점이 있는 미로에서 시행착오 없이는 2개 이상의 분기를 통과하지 못하는 양상이 지속될 경우',unit:'질적',s1:'미로 경로를 따라 그으며 분기점마다 시행착오로 진행하나, 사전 계획(시작 전 경로 확인)이 관찰되지 않음',s2:'시작 전 경로를 눈으로 따라가려는 시도가 관찰되나, 2-3개 분기점 이상에서 혼란되어 시행착오로 전환',s3:'시작 전 경로를 시각적으로 계획하여 3-4개 분기점까지 올바른 방향을 선택하며, 막다른 길에서 효율적으로 되돌아옴',s4:'복잡한 미로를 시작 전에 전체 경로를 계획하고, 최소한의 시행착오로 효율적으로 완성'},
{code:'VM08-05',desc:'도면/설명서 보고 구성(레고 등) — 다단계 (예: 레고·프라모델의 인쇄된 설명서를 보고 단계별로 조립하되, VM07-04의 간단한 도면에서 10단계 이상의 다단계 설명서로 확장)',acqTime:'7세-8세',redFlag:'9세까지 레고 등 설명서의 5단계 이상을 따라 조립하지 못하는 양상이 지속될 경우',unit:'질적',s1:'설명서의 처음 3-4단계까지 따라 조립하나, 이후 단계에서 부품 배치나 방향이 설명서와 달라져 조립이 진행되지 않음',s2:'10단계까지 따라 조립하나, 복잡한 단계(여러 부품 동시 조합)에서 설명서를 반복적으로 확인해야 하며 시간이 오래 걸림',s3:'10단계 이상의 설명서를 독립적으로 따라 조립하며, 복잡한 단계에서도 부품 배치가 설명서와 일치',s4:'다단계 설명서를 효율적으로 따라 조립하며, 설명서의 기호를 빠르게 해석하고 오류 발생 시 자기 교정이 관찰됨'}

fine:[

{code:'FM08-02',desc:'정밀 도구 사용(자, 각도기) (예: 자를 종이 위에 놓고 직선을 정확하게 긋거나, 각도기로 각도를 측정하여 표시하는 과제. 도구를 한 손으로 고정하고 반대 손으로 연필을 사용하는 양측 비대칭+정밀 협응)',acqTime:'7세-8세',redFlag:'9세까지 자를 종이 위에 놓고 직선을 긋는 동작에서 자가 반복적으로 밀려나는 양상이 지속될 경우',unit:'질적',s1:'자를 종이 위에 놓으나 연필로 선을 긋는 동안 자가 밀려나거나, 자를 잡은 손과 연필 손의 협응이 성립하지 않음',s2:'자를 고정한 채 직선을 긋는 동작이 대부분 성공하나, 선의 시작점이나 끝점이 자에서 벗어나며, 각도기는 아직 사용이 어려움',s3:'자로 정확한 직선을 긋고, 각도기를 놓아 각도를 측정하여 표시하나 정밀도가 간헐적으로 저하',s4:'자와 각도기를 정밀하게 사용하여 도형·각도를 정확하게 그리며, 도구 사용이 유창'},
