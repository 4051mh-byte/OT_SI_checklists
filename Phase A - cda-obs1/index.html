{code:'PC09-01',desc:'눈 감고 한발서기 — 장시간 안정 유지 (예: PC08-01의 양팔 체간 부착+눈 감기 조건에서 유지 시간이 더 연장되어, 시각 차단+감각 입력 제한 조건에서도 장시간 안정적으로 유지되는 단계)',acqTime:'9세-10세',redFlag:'10세까지 눈을 감은 상태(양팔 자유)에서 한발서기가 잠시도 유지되지 않는 양상이 지속될 경우',unit:'질적',s1:'양팔 체간 부착+눈 감기 조건에서 양쪽 발 유지 가능하나, 유지 시간이 짧고 한쪽 발에서만 안정적(PC08-01 s3 수준과 동일하면 진전 없음)',s2:'양쪽 발 모두에서 안정적이나 유지 시간이 또래 범위 하한',s3:'양쪽 발 모두에서 장시간 안정적으로 유지되며, 동요가 미미',s4:'감각 제한 조건에서도 장시간 안정적이며, 외부 교란(소리, 접촉)에도 즉시 교정하여 자세를 유지'},
{code:'PC09-02',desc:'평균대 위 복합 동작(돌기, 숙이기, 물건 주고받기) (예: 폭 약 6cm 평균대 위에서 180도 돌기·허리 숙여 바닥 물건 집기·양육자와 물건 주고받기 등 복합 동작을 수행하며 자세를 유지하는 과제. PC08-02의 전후좌우 보행에서 보행 중 복합 동작으로 확장)',acqTime:'9세-10세',redFlag:'10세까지 평균대 위에서 180도 돌기 시도 시 매번 내려오는 양상이 지속될 경우',unit:'질적',s1:'평균대 위 전후좌우 보행은 안정적이나, 보행 중 멈추어 180도 돌기를 시도하면 내려옴',s2:'멈추어 180도 돌기가 가능하나, 돌기 후 보행 재개 시 불안정하고 허리 숙이기에서는 내려옴',s3:'돌기·숙이기 모두 가능하며, 물건 주고받기도 간헐적으로 성공하나 동작 간 전환 시 약간의 동요',s4:'평균대 위에서 돌기·숙이기·물건 주고받기를 유창하게 연속 수행하며, 동작 간 전환이 부드러움'},
{code:'PC09-03',desc:'바로 누운 자세 굴곡(supine flexion) — 외부 저항 하 사지 교차 동작 유지 (예: PC08-03의 외부 저항 하 유지에서, 외부 저항+사지 교차 동작의 동시 수행으로 확장. 양육자가 밀기·당기기를 가하면서 아동이 좌우 교차 동작을 유지하는 최고 수준의 체간 굴곡근 과제)',acqTime:'9세-10세',redFlag:'10세까지 외부 저항 없이도 바로 누운 자세 굴곡 자세에서 사지 교차 동작이 관찰되지 않을 경우',unit:'질적',s1:'외부 저항 하 자세 유지는 가능하나, 저항+사지 교차 동시 수행에서 교차가 동측으로 회귀하거나 자세가 무너짐',s2:'저항+사지 교차 동시 수행이 간헐적으로 가능하나, 저항 방향이 바뀌면 교차가 중단됨',s3:'다양한 방향의 저항 하에서도 사지 교차 동작이 대부분 유지됨',s4:'외부 저항+사지 교차의 동시 수행이 자동적이며, 저항 강도·방향 변화에 즉시 적응'},
{code:'PC09-04',desc:'엎드린 자세 신전(prone extension) — 외부 저항 하 사지 교차 동작 유지 (예: PC08-04의 외부 저항 하 유지에서, 외부 저항+사지 교차의 동시 수행으로 확장)',acqTime:'9세-10세',redFlag:'10세까지 외부 저항 없이도 엎드린 자세 신전 자세에서 사지 교차가 관찰되지 않을 경우',unit:'질적',s1:'외부 저항 하 자세 유지는 가능하나 저항+교차 동시 수행에서 무너짐',s2:'간헐적으로 가능하나 저항 방향 변화에 적응 못함',s3:'다양한 방향의 저항 하에서도 교차 동작이 대부분 유지',s4:'자동적으로 적응하며 안정적 유지'},
{code:'PC09-05',desc:'탠덤 보행 — 눈 감고 전방+후방 안정 수행 (예: PC08-05의 눈 감고 전방 탠덤에서, 전방과 후방 모두 눈 감고 안정적으로 수행 가능한 최고 수준의 전정-고유수용 통합 과제)',acqTime:'9세-10세',redFlag:'10세까지 눈을 감고 전방 탠덤 보행에서 3걸음 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'눈 감고 전방 탠덤이 4-5걸음 가능하나, 후방 탠덤에서 눈을 감으면 1걸음도 성립하지 않음(PC08-05 s3 수준에서 후방+눈감기 미시도)',s2:'눈 감고 후방 탠덤 1-2걸음이 가능하나 일직선을 유지하지 못함',s3:'눈 감고 전방·후방 모두 4-5걸음 안정적으로 수행하며 일직선이 대략적으로 유지됨',s4:'눈 감고 전방·후방 탠덤 보행이 연속적으로 안정하며 전환(전방→후방)도 가능'}
],
bilateral:[
{code:'BI09-01',desc:'줄넘기 — 50회 이상 연속 + 다양한 패턴 (예: BI08-01의 20회 연속+속도 조절에서 50회 이상으로 확장되며, 교차·한발·양발 교대 등 다양한 패턴을 자유롭게 전환하는 단계)',acqTime:'9세-10세',redFlag:'10세까지 기본 줄넘기 20회 이상 연속 수행이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'기본 줄넘기 30회 이상 연속 가능하나 교차·한발 등 변형 패턴에서 5회 이상 연속이 어려움(GM08-04 수준에 머무름)',s2:'50회 이상 기본 연속+교차·한발 패턴 각각 5-8회 연속 가능하나 패턴 간 전환에서 줄에 걸림',s3:'50회 이상 연속하며 다양한 패턴 간 전환이 대부분 자연스러움',s4:'다양한 패턴을 자유롭게 전환하며 리듬적으로 연속 수행, 이중 돌리기도 시도 가능'},
{code:'BI09-02',desc:'양손 교대 드리블 — 안정적 이동 중 수행 (예: BI08-04의 제자리 교대 드리블에서, 걸으면서·달리면서 양손 교대 드리블을 수행하는 이동+양측 교대 통합 과제)',acqTime:'9세-10세',redFlag:'10세까지 제자리 양손 교대 드리블 5회 이상 연속이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'제자리 교대 드리블 10회 이상 가능하나, 걸으면서 교대 시 공을 잃음(BI08-04 s4 수준에서 이동 미통합)',s2:'걸으면서 교대 드리블이 간헐적으로 가능하나, 달리면서는 한 손 드리블로 회귀',s3:'걸으면서 양손 교대 드리블이 안정적이며, 달리면서도 간헐적으로 성공',s4:'달리면서 양손 교대 드리블이 안정적이며, 방향 전환 중에도 교대가 유지'},
{code:'BI09-03',desc:'복합 줄넘기(교차·이중 돌리기) 연속 수행 (예: BI09-01의 다양한 패턴에서 교차 넘기·이중 돌리기를 각각 5회 이상 연속 수행하는 고급 양측 협응 과제)',acqTime:'9세-10세',redFlag:'10세까지 교차 넘기 시도에서 1회도 성공하지 못하는 양상이 지속될 경우',unit:'질적',s1:'교차 넘기 1-2회 간헐적 성공, 이중 돌리기 시도 자체가 관찰되지 않음',s2:'교차 넘기 3-4회 연속 가능, 이중 돌리기 1회 간헐적 성공',s3:'교차 넘기 5회 이상 연속+이중 돌리기 2-3회 연속 가능',s4:'교차·이중 돌리기 모두 5회 이상 연속 가능하며 기본 패턴과 자유 전환'},
{code:'BI09-04',desc:'양손 복합 과제 자동화(키보드 타이핑) (예: 키보드를 양손으로 번갈아 눌러 단어를 타이핑하되, 자판을 보면서 양손의 독립적 운동이 자동화되는 과제. BI08-05의 종이 회전+가위질에서 디지털 도구의 양손 독립 운동으로 확장)',acqTime:'9세-10세',redFlag:'10세까지 양손 검지만으로 한 글자씩 찾아 누르는 방식(hunt-and-peck)에서 벗어나지 못하는 양상이 지속될 경우',unit:'질적',s1:'양손 검지로만 자판을 한 글자씩 찾아 누르며(hunt-and-peck), 양손의 독립적 역할 분화가 관찰되지 않음',s2:'양손의 여러 손가락을 사용하여 타이핑하려는 시도가 있으나, 한 손이 누르면 다른 손이 멈추는 교대 패턴',s3:'양손이 동시에 독립적으로 움직여 단어를 타이핑하며, 속도가 향상되나 오타가 빈번',s4:'양손 독립적 타이핑이 자동화되어 간단한 문장을 비교적 빠르게 입력하며 오타가 줄어듦'},
{code:'BI09-05',desc:'스포츠 경기 중 양측 협응 — 도구+공 동시 제어 (예: 배드민턴에서 한 손으로 라켓을 잡고 다른 손으로 셔틀콕을 던진 뒤 서브하거나, 탁구에서 한 손 라켓+반대 손 공 토스의 동시 제어가 요구되는 스포츠 과제)',acqTime:'9세-10세',redFlag:'10세까지 라켓으로 정지된 공을 치는 동작에서 라켓과 공의 접촉 타이밍이 반복적으로 맞지 않는 양상이 지속될 경우',unit:'질적',s1:'라켓을 잡고 공을 치려는 시도에서 라켓과 공의 타이밍이 맞지 않아 공을 맞추지 못함',s2:'서브 동작(공 토스+라켓 스윙)의 타이밍이 간헐적으로 맞아 서브에 성공하나, 랠리(상대가 쳐온 공 받아치기)에서는 어려움',s3:'서브와 랠리 모두 가능하며, 라켓과 공의 타이밍 조절이 대부분 적절',s4:'다양한 라켓 스포츠에서 도구+공 동시 제어가 유창하며, 전략적 배치(방향·속도 조절)도 시도'}
],
praxis:[
{code:'PX09-01',desc:'새로운 운동 기술 자기 주도 학습 (예: PX08-01의 시범 후 자기 교정에서, 영상(유튜브)이나 설명서를 보고 시범 없이 독학으로 새로운 운동 기술을 습득하는 자기 주도 학습)',acqTime:'9세-10세',redFlag:'10세까지 영상을 보고 시연된 동작의 핵심 요소를 파악하여 시도하지 못하는 양상이 지속될 경우',unit:'질적',s1:'영상을 보고 동작을 모방하려는 시도가 있으나, 영상의 동작을 자기 몸으로 전환하지 못하여 무관한 동작을 산출',s2:'영상의 핵심 동작을 파악하여 시도하나, 자기 교정이 부정확하여 반복해도 영상과의 차이가 줄어들지 않음',s3:'영상을 보고 핵심 동작을 파악하여 시도하며, 자기 교정을 통해 점진적으로 영상에 가까워짐',s4:'영상 관찰 → 분석 → 시도 → 자기 교정의 순환이 자발적이며, 다양한 운동 기술을 독학으로 습득'},

function renderTable(){

    <th style="width:90px">점수</th>

    <th style="width:200px">비고</th>
  </tr></thead><tbody>`;

  DOMAINS.forEach(d=>{
    const ditems=items[currentAge][d.id];
    const open=domainOpen[d.id];
    html+=`<tr class="domain-row" onclick="toggleDomain('${d.id}')">
      <td colspan="6" class="${d.hcls}">
        <span class="arrow ${open?'open':''}">&#9654;</span>
        ${d.name} (${d.eng})
        <span class="sensory">| ${d.sensory}</span>
        <span class="d-score" id="dscore_${d.id}">0/20 (0%)</span>

      html+=`<tr class="item-row item-${d.id}" style="${vis}">
        <td class="col-domain" data-label="영역">${d.name}${it.code?`<br><span class="item-code">${it.code}</span>`:''}</td>
        <td class="col-desc" data-label="관찰항목">${it.code?`<span class="item-code-inline">${it.code}</span> `:''}${it.desc}<br><small><b>0</b> ${it.unit==='질적'?'미출현':'불가'} · <b>1</b> ${it.s1} · <b>2</b> ${it.s2} · <b>3</b> ${it.s3} · <b>4</b> ${it.s4}</small></td>
        <td class="col-time" data-label="시기">${it.acqTime}</td>
        <td class="col-select" data-label="점수">
          <select onchange="setScore('${name}',this)">
            <option value="">-</option>
            <option value="0"${curVal===0?' selected':''}>0 (${it.unit==='질적'?'미출현':'불가'})</option>
            <option value="1"${curVal===1?' selected':''}>1</option>
            <option value="2"${curVal===2?' selected':''}>2</option>
            <option value="3"${curVal===3?' selected':''}>3</option>
            <option value="4"${curVal===4?' selected':''}>4</option>
          </select>
        </td>
        <td class="col-redflag" data-label="Red Flag">${it.redFlag}</td>
        <td class="col-note" data-label="비고"><textarea placeholder="메모" onchange="setNote('${name}',this.value)">${noteVal}</textarea></td>
      </tr>`;
    });
    html+=`<tr class="subtotal-row item-${d.id}" style="${open?'':'display:none'}">
      <td colspan="3">${d.name} 소계</td>
      <td id="sub_${d.id}"><span class="pct-val">0 / 20 (0%)</span></td>
      <td colspan="2"></td></tr>`;
  });
  html+=`</tbody>`;
  document.getElementById('mainTable').innerHTML=html;
  updateAllScores();
  applySelectStyles();
}


function setScore(name,sel){
  const val=sel.value;
  if(val===''){
    delete scoreData[name];
  }else{
    scoreData[name]=parseInt(val);
  }
  applySelectStyle(sel);
  updateAllScores();
}

function setNote(name,val){
  if(val.trim()){
    noteData[name]=val;
  }else{
    delete noteData[name];
  }
}

function applySelectStyle(sel){
  sel.classList.remove('scored-high','scored-mid','scored-low');
  const v=sel.value;
  if(v==='') return;
  const n=parseInt(v);
  if(n>=3) sel.classList.add('scored-high');
  else if(n===2) sel.classList.add('scored-mid');
  else sel.classList.add('scored-low');
}

function applySelectStyles(){
  document.querySelectorAll('.col-select select').forEach(applySelectStyle);
}

function toggleDomain(did){
  domainOpen[did]=!domainOpen[did];
  const vis=domainOpen[did]?'':'none';
  document.querySelectorAll(`.item-${did}`).forEach(r=>r.style.display=vis);
  const arrow=document.querySelector(`.domain-row .${DOMAINS.find(d=>d.id===did).hcls}`);
  if(arrow){
    const a=arrow.querySelector('.arrow');
    if(a) a.classList.toggle('open',domainOpen[did]);
  }
}

function getScores(){
  const result={};
  let total=0,max=0,totalCounted=0;
  DOMAINS.forEach(d=>{
    let sum=0,counted=0;
    for(let i=0;i<5;i++){
      const k=`r_${currentAge}_${d.id}_${i}`;
      if(scoreData[k]!==undefined){sum+=scoreData[k];counted++;}
    }
    const mx=counted*4;
    const pct=counted>0?Math.round(sum/mx*100):-1;
    result[d.id]={score:sum,max:mx,counted:counted,total:5,pct:pct,na:counted===0};
    if(counted>0){total+=sum;max+=mx;totalCounted+=counted;}
  });
  result._total={score:total,max:max,counted:totalCounted,pct:max>0?Math.round(total/max*100):0,na:totalCounted===0};
  return result;
}

function updateAllScores(){
  const s=getScores();
  DOMAINS.forEach(d=>{
    const ds=s[d.id];
    const el=document.getElementById(`dscore_${d.id}`);
    const sub=document.getElementById(`sub_${d.id}`);
    const label=ds.na?'미평가':`${ds.score}/${ds.max} (${ds.pct}%)`;
    const subLabel=ds.na?`<span class="pct-val" style="color:#999">미평가 (${ds.counted}/${ds.total}개 체크)</span>`:`<span class="pct-val">${ds.score} / ${ds.max} (${ds.pct}%) [${ds.counted}/${ds.total}개 체크]</span>`;
    if(el) el.textContent=label;
    if(sub) sub.innerHTML=subLabel;
  });
  updateAllBadges();
  const statsEl=document.getElementById('ageStats');
  if(statsEl){
    const t=s._total;
    const domainLabels=DOMAINS.map(d=>{
      const ds=s[d.id];
      return ds.na?`${d.name} 미평가`:`${d.name} ${ds.pct}%`;
    }).join(' | ');
    statsEl.innerHTML=t.na?'전체: 미평가':`전체: ${t.score}/${t.max} (${t.pct}%) | ${domainLabels}`;
  }
}

function updateAllBadges(){
  AGE_GROUPS.forEach(ag=>{
    const badge=document.getElementById('badge_'+ag.id);
    if(!badge) return;
    const ageItems=items[ag.id];
    if(!ageItems){badge.textContent='';return;}
    let checked=0,total=0,sum=0;
    DOMAINS.forEach(d=>{
      const arr=ageItems[d.id]||[];
      total+=arr.length;
      arr.forEach((_,i)=>{
        const v=scoreData['r_'+ag.id+'_'+d.id+'_'+i];
        if(v!==undefined){checked++;sum+=v;}
      });
    });
    if(checked===0){badge.textContent='';badge.style.color='';return;}
    const comp=Math.round(checked/total*100);
    const scorePct=Math.round(sum/(checked*4)*100);
    badge.textContent=` ${checked}/${total}·${scorePct}%`;
    badge.style.color=comp>=100?'#fff':'';
    badge.title=`체크 ${checked}/${total} (${comp}%) · 점수 ${scorePct}%`;
  });
}

function getJudge(pct){
  if(pct<0) return {text:'미평가',cls:'j-na'};
  if(pct>=85) return {text:'우수',cls:'j-excellent'};
  if(pct>=70) return {text:'적절',cls:'j-adequate'};
  if(pct>=50) return {text:'주의',cls:'j-caution'};
  if(pct>=30) return {text:'우려',cls:'j-concern'};
  return {text:'심각',cls:'j-critical'};
}
function barColor(pct){
  if(pct<0) return '#9e9e9e';
  if(pct>=85) return '#4caf50';if(pct>=70) return '#8bc34a';if(pct>=50) return '#ff9800';if(pct>=30) return '#ff5722';return '#d32f2f';
}

function calcAge(){
  const bd=document.getElementById('birthDate').value,ed=document.getElementById('evalDate').value;
  if(!bd||!ed) return;
  const b=new Date(bd),e=new Date(ed);
  const months=Math.floor((e-b)/(1000*60*60*24*30.44));
  document.getElementById('monthAge').value=`${months}개월 (${Math.floor(months/12)}세 ${months%12}개월)`;
}

function _saveData(){

    patient:{
      name:document.getElementById('childName').value,

function loadLocal(silent){
  try{
    const data=JSON.parse(localStorage.getItem('si_motor_v3'));
    if(!data){if(!silent) toast('저장된 데이터가 없습니다.');return;}
    if(data.patient){
      document.getElementById('childName').value=data.patient.name||'';
      document.getElementById('birthDate').value=data.patient.birth||'';
      document.getElementById('evalDate').value=data.patient.evalDate||'';
      document.getElementById('evaluator').value=data.patient.evaluator||'';
      document.getElementById('diagnosis').value=data.patient.diagnosis||'';
      calcAge();
    }
    if(data.currentAge&&AGE_GROUPS.find(a=>a.id===data.currentAge)) currentAge=data.currentAge;
    if(data.scores) Object.assign(scoreData,data.scores);
    if(data.notes) Object.assign(noteData,data.notes);
    if(data.sr&&typeof data.sr==='object') Object.assign(srData,data.sr);
    if(data.srData&&typeof data.srData==='object') Object.assign(srData,data.srData);
    if(!silent) toast('불러오기 완료');
  }catch(e){if(!silent) toast('불러오기 실패');}
}

function resetAll(){
  if(!confirm('모든 체크를 리셋하시겠습니까?')) return;
  Object.keys(scoreData).forEach(k=>delete scoreData[k]);
  Object.keys(noteData).forEach(k=>delete noteData[k]);
  Object.keys(srData).forEach(k=>delete srData[k]);
  localStorage.removeItem('si_motor_v3');
  renderTable();
  renderSRTable();
  updateAllBadges();
  toast('리셋 완료');
}

function exportJSON(){
  _saveData();
  const data={
    version:'si_motor_v3_sr',
    exportedAt:new Date().toISOString(),
    patient:{
      name:document.getElementById('childName').value,
      birth:document.getElementById('birthDate').value,
      evalDate:document.getElementById('evalDate').value,
      evaluator:document.getElementById('evaluator').value,
      diagnosis:document.getElementById('diagnosis').value
    },
    currentAge:currentAge,
    scores:{...scoreData},
    notes:{...noteData},
    sr:{...srData}
  };
  const sanitize=s=>(s||'').replace(/[^\w가-힣-]/g,'_').slice(0,30);
  const name=sanitize(document.getElementById('childName').value)||'unnamed';
  const date=(document.getElementById('evalDate').value||new Date().toISOString().slice(0,10)).replace(/-/g,'');
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`si_mc_sr_${name}_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('JSON 내보내기 완료');
}

function importJSON(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='application/json,.json';
  input.onchange=e=>{
    const f=e.target.files&&e.target.files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.version&&!['si_motor_v3','si_motor_v3_sr'].includes(data.version)){
          if(!confirm(`호환되지 않는 버전(${data.version})입니다. 그래도 가져오시겠습니까?`)) return;
        }
        if(!confirm('JSON을 가져오면 현재 입력 내용이 모두 덮어씌워집니다. 계속하시겠습니까?')) return;
        if(data.patient){
          document.getElementById('childName').value=data.patient.name||'';
          document.getElementById('birthDate').value=data.patient.birth||'';
          document.getElementById('evalDate').value=data.patient.evalDate||'';
          document.getElementById('evaluator').value=data.patient.evaluator||'';
          document.getElementById('diagnosis').value=data.patient.diagnosis||'';
          calcAge();
        }
        Object.keys(scoreData).forEach(k=>delete scoreData[k]);
        Object.keys(noteData).forEach(k=>delete noteData[k]);
        Object.keys(srData).forEach(k=>delete srData[k]);
        if(data.scores&&typeof data.scores==='object') Object.assign(scoreData,data.scores);
        if(data.notes&&typeof data.notes==='object') Object.assign(noteData,data.notes);
        if(data.sr&&typeof data.sr==='object') Object.assign(srData,data.sr);
        if(data.srData&&typeof data.srData==='object') Object.assign(srData,data.srData);
        if(data.currentAge&&AGE_GROUPS.find(a=>a.id===data.currentAge)){
          switchAge(data.currentAge);
        }else{
          renderTable();
        }
        renderSRTable();
        switchModule(activeModule||'MC');
        _saveData();
        updateAllBadges();
        toast('JSON 가져오기 완료');
      }catch(err){
        toast('JSON 파싱 실패: '+err.message);
      }
    };
    reader.readAsText(f,'utf-8');
  };
  input.click();
}

  if(mcWrap) mcWrap.style.display=isSR?'none':'';
  if(srArea){srArea.classList.toggle('show',isSR); if(isSR) renderSRTable();}
  if(ageBar) ageBar.style.display=isSR?'none':'';
  if(ageDesc) ageDesc.style.display=isSR?'none':'';
  if(ageStats) ageStats.style.display=isSR?'none':'';
  if(tabMC) tabMC.classList.toggle('active',!isSR);
  if(tabSR) tabSR.classList.toggle('active',isSR);
  const analysis=document.getElementById('analysisArea');
  if(analysis) analysis.classList.remove('show');
}

function getSRItem(code){return SR_ITEMS.find(it=>it.code===code);}
function makeSREntry(code){
  const it=getSRItem(code)||{};
  return Object.assign({code:code,sensorySystem:it.sensorySystem||'',inputCondition:it.inputCondition||'',responseType:[],score:undefined,latency:'',recoveryTime:'',supportLevel:'',participationImpact:'',note:''},srData[code]||{});
}
function ensureSREntry(code){
  if(!srData[code]) srData[code]=makeSREntry(code);
  return srData[code];
}
function cleanupSREntry(code){
  const e=srData[code];
  if(!e)return;
  const empty=(e.score===undefined||e.score==='')&&(!e.responseType||e.responseType.length===0)&&!e.latency&&!e.recoveryTime&&!e.supportLevel&&!e.participationImpact&&!e.note;
  if(empty) delete srData[code];
}
function setSRField(code,field,value){
  const e=ensureSREntry(code);
  if(field==='score'){
    if(value==='') delete e.score;
    else e.score=parseInt(value,10);
  }else{
    e[field]=value;
  }
  cleanupSREntry(code);
  _saveData();
  applySRScoreStyles();
}
function setSRResponseType(code,type,checked){
  const e=ensureSREntry(code);
  if(!Array.isArray(e.responseType))e.responseType=[];
  if(checked&&!e.responseType.includes(type))e.responseType.push(type);
  if(!checked)e.responseType=e.responseType.filter(t=>t!==type);
  cleanupSREntry(code);
  _saveData();
}
function srOpt(options,value){return `<option value="">-</option>`+options.map(o=>`<option value="${o}"${value===o?' selected':''}>${o}</option>`).join('');}
function renderSRTable(){

  SR_SYSTEMS.forEach(sys=>{

        <td><select class="sr-score-select" onchange="setSRField('${it.code}','score',this.value)"><option value="">-</option>${[4,3,2,1,0].map(n=>`<option value="${n}"${scoreVal===String(n)?' selected':''}>${SR_SCORE_LABELS[n]}</option>`).join('')}</select></td>
        <td><select onchange="setSRField('${it.code}','latency',this.value)">${srOpt(SR_LATENCY_OPTIONS,e.latency||'')}</select></td>

function applySRScoreStyles(){
  document.querySelectorAll('.sr-score-select').forEach(sel=>{
    sel.classList.remove('sr-score-high','sr-score-mid','sr-score-low');
    if(sel.value==='')return;
    const n=parseInt(sel.value,10);
    if(n>=3)sel.classList.add('sr-score-high');
    else if(n===2)sel.classList.add('sr-score-mid');
    else sel.classList.add('sr-score-low');
  });
}
function getSRRows(){
  return SR_ITEMS.map(it=>Object.assign({},it,makeSREntry(it.code))).filter(r=>{
    return r.score!==undefined||(Array.isArray(r.responseType)&&r.responseType.length>0)||r.latency||r.recoveryTime||r.supportLevel||r.participationImpact||r.note;
  });
}
function srRank(value,arr){const i=arr.indexOf(value);return i<0?-1:i;}
function srTypeChip(t){return `<span class="sr-chip ${String(t).toLowerCase()}">${t}</span>`;}
function analyzeSR(){
  const rows=getSRRows();
  const bySystem={};
  SR_SYSTEMS.forEach(sys=>bySystem[sys.id]={system:sys,n:0,types:{SOR:0,SUR:0,SEEK:0,MIX:0},severity:{SOR:0,SUR:0,SEEK:0,MIX:0},scores:[],minScore:null,worstRecovery:'',highestSupport:'',worstImpact:'',priority:0,items:[]});
  const typeTotals={SOR:0,SUR:0,SEEK:0,MIX:0};
  const typeSeverity={SOR:0,SUR:0,SEEK:0,MIX:0};
  let mixedRows=0,adaptiveSeeking=0,dysregulatedSeeking=0;
  rows.forEach(r=>{
    const sys=bySystem[r.systemId];
    if(!sys)return;
    sys.n++;sys.items.push(r);
    const sc=(r.score!==undefined)?Number(r.score):null;
    if(sc!==null){sys.scores.push(sc);sys.minScore=sys.minScore===null?sc:Math.min(sys.minScore,sc);}
    const severity=sc===null?1:(4-sc);
    const types=(Array.isArray(r.responseType)&&r.responseType.length)?r.responseType:[];
    if(types.length>1)mixedRows++;
    types.forEach(t=>{if(typeTotals[t]!==undefined){typeTotals[t]++;typeSeverity[t]+=severity;sys.types[t]++;sys.severity[t]+=severity;}});
    const rr=srRank(r.recoveryTime,SR_RECOVERY_OPTIONS), sr=srRank(r.supportLevel,SR_SUPPORT_OPTIONS), ir=srRank(r.participationImpact,SR_IMPACT_OPTIONS);
    if(rr>srRank(sys.worstRecovery,SR_RECOVERY_OPTIONS))sys.worstRecovery=r.recoveryTime;
    if(sr>srRank(sys.highestSupport,SR_SUPPORT_OPTIONS))sys.highestSupport=r.supportLevel;
    if(ir>srRank(sys.worstImpact,SR_IMPACT_OPTIONS))sys.worstImpact=r.participationImpact;
    const hasSeek=types.includes('SEEK');
    if(hasSeek){
      const positive=['참여 증가','참여 유지'].includes(r.participationImpact);
      const lowSupport=sr<=1||sr<0;
      const fastRecovery=rr<=1||rr<0;
      if(sc!==null&&sc>=3&&positive&&lowSupport&&fastRecovery)adaptiveSeeking++;
      if((sc!==null&&sc<=2)||rr>=3||sr>=3||ir>=3)dysregulatedSeeking++;
    }
  });
  Object.values(bySystem).forEach(sys=>{
    const min=sys.minScore===null?4:sys.minScore;
    const rr=srRank(sys.worstRecovery,SR_RECOVERY_OPTIONS);const sr=srRank(sys.highestSupport,SR_SUPPORT_OPTIONS);const ir=srRank(sys.worstImpact,SR_IMPACT_OPTIONS);
    const lowCount=sys.scores.filter(v=>v<=2).length;
    sys.priority=(4-min)*10+Math.max(rr,0)*2+Math.max(sr,0)*2+Math.max(ir,0)*2+lowCount*3+sys.n;
    sys.dominantTypes=Object.entries(sys.severity).filter(([_,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([k])=>k);
  });
  const sortedTypes=Object.entries(typeSeverity).sort((a,b)=>b[1]-a[1]||typeTotals[b[0]]-typeTotals[a[0]]);
  let profile='미평가', profileDetail='SR 항목이 입력되지 않아 감각조절 프로파일을 산출하지 않았다.';
  if(rows.length>0){
    const top=sortedTypes[0]||['',0], second=sortedTypes[1]||['',0];
    const topType=top[0];
    const closeSecond=second[1]>0&&(top[1]-second[1]<=2);
    if(mixedRows>=2||topType==='MIX'||closeSecond){profile='SR-MIX';profileDetail='복수 감각계 또는 맥락에서 과반응·저반응·추구 반응이 교차되어 단일 반응형으로 해석하지 않는다.';}
    else if(topType==='SEEK'&&adaptiveSeeking>dysregulatedSeeking){profile='Adaptive Seeking';profileDetail='감각추구가 과제 참여를 조직화하는 방향으로 작동하여, 적절한 강도와 종료 구조를 유지한다.';}
    else if(topType==='SEEK'&&dysregulatedSeeking>=adaptiveSeeking){profile='Dysregulated Seeking';profileDetail='감각추구가 과제 중단, 과각성 또는 회복 지연으로 연결되어 입력량·종료·안전 구조화가 필요하다.';}
    else if(topType==='SOR'){profile='SR-SOR 우세';profileDetail='일상 강도 입력 이후 회피·경직·과각성 또는 방어 반응이 우세하다.';}
    else if(topType==='SUR'){profile='SR-SUR 우세';profileDetail='입력 탐지와 반응 개시가 지연되거나 강한 입력 후에야 각성이 상승하는 양상이 우세하다.';}
    else if(topType==='SEEK'){profile='SR-SEEK 우세';profileDetail='강한 감각 입력을 반복적으로 요구하거나 입력 종료 조절이 필요한 양상이 우세하다.';}
  }
  return{rows,bySystem,typeTotals,typeSeverity,profile,profileDetail,mixedRows,adaptiveSeeking,dysregulatedSeeking};
}
function srInterventionText(sys,types){
  const t=types&&types.length?types[0]:'';
  if(sys.id==='vestibular'&&t==='SOR')return'느린 선형 입력부터 시작하고 회전·높이·불안정 면은 예고와 종료 신호를 포함해 단계화한다.';
  if(sys.id==='vestibular'&&t==='SEEK')return'고유수용 선행 입력 후 움직임 양을 제한하고, 종료 예고와 재진입 과제를 명확히 둔다.';
  if(sys.id==='proprioceptive'&&t==='SEEK')return'무거운 일·저항성 활동을 조절 루틴으로 사용하되 강도와 반복 횟수를 시각화한다.';
  if(sys.id==='proprioceptive'&&t==='SUR')return'명료한 저항성 입력과 신체 위치 피드백을 제공한 뒤 과제 참여 변화를 확인한다.';
  if(sys.id==='tactile'&&t==='SOR')return'도구 매개 접촉, 예고된 접촉, 건식에서 습식으로의 질감 단계화를 적용한다.';
  if(sys.id==='visual')return'시각 배경을 단순화하고 조명·대비·시각 단서량을 조절해 과제 지속성을 확인한다.';
  if(sys.id==='auditory'&&t==='SOR')return'갑작스런 소리를 줄이고 예측 가능한 청각 신호와 조용한 회복 공간을 제공한다.';
  if(t==='SUR')return'입력 강도와 단서의 명료도를 높이고 반응 잠복기와 과제 개시 변화를 추적한다.';
  if(t==='SEEK')return'추구 입력을 과제 전 조직화 루틴으로 제한하고 종료 후 전환 과제를 즉시 배치한다.';
  return'입력 조건·회복시간·지원수준을 분리 기록하며 과제 참여에 미치는 영향을 기준으로 입력 강도를 조정한다.';
}
function buildSRSentence(sysSummary){
  const sys=sysSummary.system;
  const types=sysSummary.dominantTypes.length?sysSummary.dominantTypes.map(srTypeChip).join(' '):'반응유형 미기록';
  const min=sysSummary.minScore===null?'미기록':sysSummary.minScore+'점';
  const recovery=sysSummary.worstRecovery||'미기록';
  const support=sysSummary.highestSupport||'미기록';
  const impact=sysSummary.worstImpact||'미기록';
  return `${sys.name} 입력 조건에서는 ${types} 양상이 관찰되며, 최저 조절수준은 ${min}, 회복시간은 ${recovery}, 지원수준은 ${support}, 과제 참여 영향은 ${impact}로 기록되었다. ${srInterventionText(sys,sysSummary.dominantTypes)}`;
}

    <div class="stat-item"><span class="stat-k">최고 영역</span><span class="stat-v">${DOMAINS[maxI].name} (${Math.max(...pcts)}%)</span></div>

    <div class="stat-item"><span class="stat-k">종합 판정</span><span class="stat-v"><span class="judge-badge ${tj.cls}">${tj.text} (${s._total.pct}%)</span></span></div>
    <div class="stat-item"><span class="stat-k">불균형</span><span class="stat-v">${gap>=40?'매우 불균형':gap>=25?'불균형':gap>=15?'경미한 격차':'균형'}</span></div>
  </div></div></div>`;

  // ── 총평 패널 ──
  const nm=document.getElementById('childName').value||'대상 아동';
  const oa=buildSIOverallAssessment(nm,age,s);
  html+=`<div class="a-card" style="margin-top:12px;border-left:4px solid #E65100">
    <div class="a-card-h" style="background:#E65100;color:#fff">📝 총평</div>
    <div class="a-card-b" style="background:#FFF8E1">
      <b style="font-size:13px">${oa.tier}</b>
      <div style="font-size:12px;line-height:1.75;margin-top:8px;color:#333">${oa.body}</div>
    </div>
  </div>`;

  area.innerHTML=html;
}

// ── SI 운동 총평 (서술형 3문단) ──
function buildSIOverallAssessment(name,age,s){
  const nm=name||'대상 아동';
  const ageTxt=age.label;
  const pct=s._total.pct;

  // 저점수 항목 수집 (score 0 또는 1 → 임상 우려)
  const rfItems=[];
  DOMAINS.forEach(d=>{
    if(s[d.id].na)return;
    for(let i=0;i<5;i++){
      const k=`r_${currentAge}_${d.id}_${i}`;
      const sc=scoreData[k];
      if(sc!==undefined&&sc<=1){
        const it=items[currentAge][d.id][i];
        if(it)rfItems.push({domain:d.name,item:it,score:sc});
      }
    }
  });

  // 4-tier 판정
  let tier;
  if(pct>=85&&rfItems.length===0)tier='✅ 양호';
  else if(pct>=70)tier='🟡 전반 양호 — 부분 감별 필요';
  else if(pct>=50)tier='🟠 관찰 필요 — 집중 중재 권고';
  else tier='🔴 정밀 평가 권고';

  // 영역 수준 표현
  function secLvl(p){
    if(p>=85)return'연령 기대 수준에 우수한 수행을 보였다';
    if(p>=70)return'연령 기대 수준에 적절한 수행을 보였다';
    if(p>=50)return'부분적으로 촉진이 필요하나 기본 수행이 가능한 수준이었다';
    if(p>=30)return'수행에 어려움이 관찰되며 지속적 지원이 필요한 수준이었다';
    return'대부분의 항목에서 수행이 이루어지지 않아 심각한 어려움이 관찰되었다';
  }

  // ── 문단 1: 영역별 달성률 개요 ──
  const secParts=[];
  DOMAINS.forEach(d=>{
    const ds=s[d.id];
    if(ds.na){secParts.push(`${d.name} 영역은 미평가로 결과를 도출할 수 없었다`);return;}
    secParts.push(`${d.name} 영역(달성률 ${ds.pct}%)에서는 ${secLvl(ds.pct)}`);
  });
  const para1=`본 ${nm} 아동은 ${ageTxt} 수준에서 실시한 SI 운동능력 임상 관찰 결과, 전체 달성률 ${pct}%로 나타났다. 영역별로 살펴보면, ${secParts.join('; ')}.`;

  // ── 문단 2: 임상 행동 관찰 (저점수 항목 기반) ──
  let para2='';
  if(rfItems.length>0){
    const byDomain={};
    rfItems.forEach(r=>{
      if(!byDomain[r.domain])byDomain[r.domain]=[];
      byDomain[r.domain].push(r);
    });
    const obsParts=[];
    Object.entries(byDomain).forEach(([dom,rfs])=>{
      const descs=rfs.slice(0,2).map(r=>r.item.desc.split('(')[0].trim());
      obsParts.push(`${dom} 영역에서 ${descs.join(', ')} 수행에 어려움을 보였다`);
    });
    para2=`평가 중 임상 관찰에서 ${obsParts.join('. ')}. `;
    const score0=rfItems.filter(r=>r.score===0);
    if(score0.length>0){
      const critDescs=score0.slice(0,2).map(r=>r.item.desc.split('(')[0].trim());
      para2+=`특히 ${critDescs.join(', ')} 항목에서 수행이 전혀 관찰되지 않아 임상적 추적 관찰이 필요하다.`;
    }
  }else{
    para2=`평가 중 관찰에서 대부분의 연령 기대 운동 행동이 자발적이고 일관되게 수행되었으며, 별도의 촉진 없이도 각 과제에 적절히 참여하는 모습이 관찰되었다.`;
  }

  // ── 문단 3: SI/OT 연결 권고 ──
  const weakDomains=DOMAINS.filter(d=>!s[d.id].na&&s[d.id].pct<50).map(d=>d.name);
  const siWeak=weakDomains.filter(n=>['자세 조절','양측 협응','운동 기획','대근육 운동'].includes(n));
  const otWeak=weakDomains.filter(n=>['시각-운동 통합','미세운동 조절','구강-운동'].includes(n));
  let para3;
  if(pct>=85&&rfItems.length===0){
    para3=`이상의 결과를 종합하면, ${nm} 아동의 SI 운동발달은 현 연령 기대 수준에 전반적으로 부합하는 것으로 판단된다. 현재의 감각통합치료(SI) 및 작업치료(OT) 지원 환경을 유지하면서 다음 발달 단계를 위한 심화 감각-운동 자극과 도전적 과제를 지속적으로 제공하는 것이 적절할 것으로 사료된다.`;
  }else if(pct>=70){
    const rfDoms=[...new Set(rfItems.map(r=>r.domain))].slice(0,3).join('·');
    para3=`이상의 결과를 종합하면, 전반적 운동 발달은 연령 기대 수준에 근접하나${rfDoms?' '+rfDoms+' 영역에서 임상적으로 유의한 관찰 소견이 확인되었다.':'.'} 감각통합치료(SI) 및 작업치료(OT) 접근을 통해 해당 영역의 발달 진행 여부를 추적 관찰하고, 감각-운동 통합 관점의 개별화된 중재 계획을 수립하는 것이 필요할 것으로 사료된다.`;
  }else if(pct>=50){
    const siLine=siWeak.length>0?`감각통합치료(SI)를 통한 ${siWeak.join('·')} 기능 향상`:'감각통합치료(SI)를 통한 감각 조절 및 자세 안정성 향상';
    const otLine=otWeak.length>0?`작업치료(OT) 내 기능적 과제 훈련을 통한 ${otWeak.join('·')} 촉진`:'작업치료(OT)를 통한 기능적 운동 수행 능력 향상';
    const wkStr=weakDomains.join('·')||'해당 영역';
    para3=`이상의 결과를 종합하면, ${nm} 아동은 ${wkStr} 영역을 중심으로 연령 기대 수준에 미치지 못하는 수행이 관찰되었다. 따라서 ${siLine}과 ${otLine}이 병행되는 개별화 중재 서비스가 필요할 것으로 사료된다. 4~6주간의 집중 중재 후 재평가를 통해 발달 개선 추이를 확인하는 것을 권고한다.`;
  }else{
    para3=`이상의 결과를 종합하면, ${nm} 아동의 SI 운동발달이 현 연령 기대 수준에 현저히 미치지 못하며, 복수의 영역에 걸쳐 심각한 어려움이 관찰되었다. 이는 단일 영역 중재만으로는 해결하기 어려운 복합적 감각-운동 발달 지연의 가능성을 시사한다. 따라서 소아과·발달심리·재활의학과 등의 종합 발달 평가 의뢰와 함께, 감각통합치료(SI) 및 작업치료(OT)를 포함한 통합적 감각-운동 중재 계획을 조속히 수립하는 것이 필요할 것으로 사료된다.`;
  }

  const body=[para1,para2,para3].filter(p=>p).join('<br><br>');
  return{tier,body};
}

function getRecAction(pct){
  if(pct>=85) return {text:'현 수준 유지, 보상적 강점으로 활용',cls:'rec-excellent'};
  if(pct>=70) return {text:'모니터링, 필요시 예방적 중재',cls:'rec-adequate'};
  if(pct>=50) return {text:'표적 SI 중재 필요',cls:'rec-caution'};
  if(pct>=30) return {text:'심층 평가 + 집중 SI 치료',cls:'rec-concern'};
  return {text:'다학제 의뢰 + 집중치료 + 환경수정',cls:'rec-critical'};
}

function togglePanel(id){
  const el=document.getElementById(id);
  if(el.classList.contains('show')){el.classList.remove('show');return;}
  // close other clinical panels
  document.querySelectorAll('.clinical-overlay').forEach(p=>p.classList.remove('show'));
  el.classList.add('show');
  // render content
  if(id==='mappingArea') renderMapping();
  else if(id==='dashboardArea') renderDashboard();
  else if(id==='reportArea'){
    const hasScore=Object.keys(scoreData).some(k=>k.startsWith(`r_${currentAge}_`))||getSRRows().length>0;
    if(!hasScore){el.classList.remove('show');toast('⚠ 먼저 MC 또는 SR 항목을 평가한 뒤 임상 보고서를 열어주세요.');return;}
    renderReport();
  }
  else if(id==='matrixArea') renderMatrix();
  else if(id==='profileArea') renderProfile();
  else if(id==='reasoningArea') renderReasoning();
  else if(id==='referenceArea') renderReference();
  else if(id==='goalArea') renderGoals();
}

function closePanel(id){document.getElementById(id).classList.remove('show');}

function renderGoals(){
  const el=document.getElementById('goalArea');
  const age=AGE_GROUPS.find(a=>a.id===currentAge);
  const s=getScores();
  const evaluated=DOMAINS.filter(d=>!s[d.id].na);
  let h=`<button class="co-close" onclick="closePanel('goalArea')">&times;</button>`;
  h+=`<div class="co-title">치료 목표 자동 제안 &mdash; ${age.label}</div>`;
  h+=`<div class="co-body">`;
  if(evaluated.length===0){
    h+=`<p style="padding:20px;text-align:center;color:#999">먼저 관찰 항목을 평가해 주세요. 점수 입력 후 자동으로 우선순위·단기/장기 목표·추천 활동이 생성됩니다.</p></div>`;
    el.innerHTML=h;
    return;
  }
  h+=`<div style="background:#fff3e0;border-left:4px solid #ff9800;padding:10px 14px;border-radius:4px;margin-bottom:14px;font-size:12px;color:#6d4c41">현재 점수에 근거해 우선순위가 높은 영역부터 단기·장기 목표와 추천 활동을 자동 생성합니다. 실제 임상에서는 아동의 맥락·흥미·가족 우선순위에 맞게 수정하여 사용하세요.</div>`;
  const sorted=evaluated.map(d=>({d,pct:s[d.id].pct,score:s[d.id].score,max:s[d.id].max})).sort((a,b)=>a.pct-b.pct);
  h+=`<div class="co-section">영역별 우선순위</div><table class="co-table"><tr><th>순위</th><th>영역</th><th>점수</th><th>%</th><th>판정</th></tr>`;
  sorted.forEach((x,i)=>{
    const j=getJudge(x.pct);
    h+=`<tr><td>${i+1}</td><td style="text-align:left;font-weight:700;color:${x.d.color}">${x.d.name}</td><td>${x.score}/${x.max}</td><td style="font-weight:700">${x.pct}%</td><td><span class="judge-badge ${j.cls}">${j.text}</span></td></tr>`;
  });
  h+=`</table>`;
  const needGoals=sorted.filter(x=>x.pct<85);
  if(needGoals.length===0){
    h+=`<div style="margin-top:14px;padding:16px;background:#e8f5e9;border:1px solid #4caf50;border-radius:6px;color:#2e7d32;font-weight:700">모든 평가 영역이 우수 수준입니다. 기능 유지 프로그램과 상위 기술 일반화를 권고합니다.</div>`;
  }else{
    h+=`<div class="co-section" style="margin-top:18px">영역별 목표 및 활동</div>`;
    needGoals.forEach(x=>{
      const bank=GOAL_BANK[x.d.id];
      const tier=x.pct<50?'low':'mid';
      const g=bank[tier];
      const arr=items[currentAge][x.d.id]||[];
      const weak=[];
      arr.forEach((it,i)=>{
        const k=`r_${currentAge}_${x.d.id}_${i}`;
        const v=scoreData[k];
        if(v!==undefined&&v<=2){
          const shortDesc=(it.desc||'').split('(')[0].trim();
          weak.push({code:it.code,desc:shortDesc,score:v});
        }
      });
      weak.sort((a,b)=>a.score-b.score);
      h+=`<div style="margin:12px 0;border:1px solid ${x.d.color};border-radius:6px;overflow:hidden">`;
      h+=`<div style="background:${x.d.color};color:#fff;padding:8px 12px;font-weight:700;display:flex;justify-content:space-between;align-items:center"><span>${x.d.name} (${x.d.eng})</span><span style="font-size:12px;opacity:.9">${x.pct}% · ${tier==='low'?'기초 단계':'중급 단계'}</span></div>`;
      h+=`<div style="padding:10px 14px;background:#fafafa;font-size:13px;line-height:1.6">`;
      h+=`<div style="margin-bottom:8px"><b style="color:#1565c0">■ 단기 목표 (3개월):</b> ${g.short}</div>`;
      h+=`<div style="margin-bottom:8px"><b style="color:#2e7d32">■ 장기 목표 (6-12개월):</b> ${g.long}</div>`;
      h+=`<div style="margin-bottom:8px"><b style="color:#6a1b9a">■ 추천 활동:</b><ul style="margin:4px 0 0 22px">${g.activities.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;
      if(weak.length){
        h+=`<div style="margin-top:10px;padding:8px 10px;background:#fff0f0;border-radius:4px"><b style="color:#c62828">■ 중점 관찰 항목 (점수 ≤ 2):</b><ul style="margin:4px 0 0 22px;color:#b71c1c;font-size:12px">${weak.map(w=>`<li><b>[${w.code}]</b> ${w.desc} <span style="background:#c62828;color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">점수 ${w.score}</span></li>`).join('')}</ul></div>`;
      }
      h+=`</div></div>`;
    });
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function renderReference(){
  const age=AGE_GROUPS.find(a=>a.id===currentAge);
  const tabs=[
    {n:1,label:'자동판정'},
    {n:2,label:'프로파일 차트'},
    {n:3,label:'임상추론'},
    {n:4,label:'연결 매핑표'},
    {n:5,label:'매트릭스'}
  ];
  let h=`<button class="co-close" onclick="closePanel('referenceArea')">&times;</button>`;
  h+=`<div class="co-title">임상 참조 &mdash; ${age.label}</div>`;
  h+=`<div style="display:flex;gap:3px;padding:8px 16px 0;background:#f5f5f5;border-bottom:1px solid #ddd;flex-wrap:wrap">`;
  tabs.forEach(t=>{
    const act=t.n===1;
    h+=`<button id="refBtn${t.n}" onclick="switchRef(${t.n})" style="padding:6px 14px;border:2px solid ${act?'#1565C0':'#ccc'};background:${act?'#1565C0':'#fff'};color:${act?'#fff':'#333'};cursor:pointer;border-radius:4px 4px 0 0;font-size:12px;font-weight:${act?'700':'400'}">${t.label}</button>`;
  });
  h+=`</div>`;
  h+=`<div id="refWrap" style="overflow:auto;max-height:70vh"></div>`;
  document.getElementById('referenceArea').innerHTML=h;
  switchRef(1);
}

function switchRef(n){
  for(let i=1;i<=5;i++){
    const btn=document.getElementById('refBtn'+i);
    if(!btn)return;
    const act=i===n;
    btn.style.background=act?'#1565C0':'#fff';
    btn.style.color=act?'#fff':'#333';
    btn.style.borderColor=act?'#1565C0':'#ccc';
    btn.style.fontWeight=act?'700':'400';
  }
  document.getElementById('refWrap').innerHTML='';
  if(n===1) renderDashboard('refWrap',true);
  else if(n===2) renderProfile('refWrap',true);
  else if(n===3) renderReasoning('refWrap',true);
  else if(n===4) renderMapping('refWrap',true);
  else if(n===5) renderMatrix('refWrap',true);
}

function isClusterActive(c,s){
  if(c.triggerCond==='자동연결') return 'auto';
  const threshold=c.triggerCond==='주의이하'?70:50;
  return c.trigger.some(t=>s[t].pct<threshold)?'active':'inactive';
}

function renderDashboard(targetId='dashboardArea',inTab=false){
  const s=getScores();
  const age=AGE_GROUPS.find(a=>a.id===currentAge);
  let h=inTab?'':`<button class="co-close" onclick="closePanel('dashboardArea')">&times;</button><div class="co-title">자동판정 대시보드 &mdash; ${age.label}</div>`;
  h+=`<div class="co-body">`;

  // Section A
  h+=`<div class="co-section">Section A &mdash; 영역별 종합 판정</div>`;
  h+=`<table class="co-table"><thead><tr><th>영역</th><th>만점</th><th>획득점수</th><th>달성률(%)</th><th>판정</th><th>해석</th><th>추천 감별질문</th><th>매트릭스 핵심 셀</th><th>중재활동 추천</th></tr></thead><tbody>`;
  DOMAINS.forEach(d=>{
    const m=MAPPING[d.id],sc=s[d.id],j=getJudge(sc.pct),ra=getRecAction(sc.pct);
    const interp=sc.pct>=85?'연령 기대 수준 달성':sc.pct>=70?'대체로 적절, 모니터링 필요':sc.pct>=50?'중재 필요 영역':sc.pct>=30?'심층 평가 권장':'즉각 중재 필요';
    h+=`<tr>
      <td style="font-weight:700;color:${d.color}">${d.name}</td>
      <td>${sc.max}</td><td>${sc.score}</td><td>${sc.pct}%</td>
      <td><span class="judge-badge ${j.cls}">${j.text}</span></td>
      <td style="font-size:11px">${interp}</td>
      <td>${m.diffQ.join(', ')}</td>
      <td style="font-size:10px">${m.matrixCells}</td>
      <td>${m.interventions.join(', ')}</td>
    </tr>`;
  });
  const tot=s._total,tj=getJudge(tot.pct);
  h+=`<tr style="background:#e3f2fd;font-weight:700"><td>전체</td><td>${tot.max}</td><td>${tot.score}</td><td>${tot.pct}%</td><td><span class="judge-badge ${tj.cls}">${tj.text}</span></td><td colspan="4"></td></tr>`;
  h+=`</tbody></table>`;

  // Section B
  h+=`<div class="co-section">Section B &mdash; 판정 기반 행동군집 자동 연결</div>`;
  h+=`<table class="co-table"><thead><tr><th>군집</th><th>행동명</th><th>질문범위</th><th>트리거 영역</th><th>활성화 조건</th><th>상태</th><th>SI 유형</th><th>감별 진단</th><th>참조 셀</th><th>감별 포인트</th></tr></thead><tbody>`;
  CLUSTERS.forEach(c=>{
    const status=isClusterActive(c,s);
    const cls=status==='active'?'cluster-active':status==='auto'?'cluster-auto':'cluster-inactive';
    const statusText=status==='active'?'🔴 활성':status==='auto'?'🟢 자동연결':'⚪ 비활성';
    const triggerNames=c.trigger.map(t=>DOMAINS.find(d=>d.id===t).name).join(', ');
    h+=`<tr class="${cls}">
      <td style="font-weight:700">${c.id}</td><td>${c.name}</td><td>${c.qRange}</td>
      <td>${triggerNames}</td><td>${c.triggerCond}</td><td>${statusText}</td>
      <td style="font-size:10px">${c.siType}</td><td>${c.diagCross}</td><td>${c.refCell}</td>
      <td style="font-size:10px;text-align:left">${c.diffPoint}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById(targetId).innerHTML=h;
}

function buildMatrixTable(rows,cols,data,s){
  const domainMap={'자세':'postural','양측':'bilateral','운동기획':'praxis','시각-운동':'vmi','미세':'fine','대근육':'gross','구강':'oral','전체':null};
  let h=`<table class="co-table"><thead><tr><th>진단</th>`;
  cols.forEach(c=>h+=`<th>${c}</th>`);
  h+=`</tr></thead><tbody>`;
  rows.forEach(row=>{
    h+=`<tr><td style="font-weight:700">${row}</td>`;
    (data[row]||[]).forEach(cell=>{
      let relevant=false;
      const ds=cell.domains.split(',');
      ds.forEach(dn=>{
        const did=domainMap[dn.trim()];
        if(did===null){if(DOMAINS.some(d=>s[d.id].pct<70)) relevant=true;}
        else if(did&&s[did]&&s[did].pct<70) relevant=true;
      });
      const hl=relevant?'matrix-highlight':'';
      h+=`<td class="matrix-cell ${hl}"><span class="star">${cell.star}</span><br>${cell.domains}<br><span style="font-size:9px;color:#888">${cell.trigger}</span></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

function drawRadar(s){
  const canvas=document.getElementById('radarCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2,R=Math.min(cx,cy)-60;
  const n=DOMAINS.length;
  ctx.clearRect(0,0,W,H);

  function angleFor(i){return (Math.PI*2*i/n)-Math.PI/2;}
  function pointAt(i,pct){const a=angleFor(i);return {x:cx+R*(pct/100)*Math.cos(a),y:cy+R*(pct/100)*Math.sin(a)};}

  // Reference circles
  [50,70,85,100].forEach(pct=>{
    ctx.beginPath();
    for(let i=0;i<=n;i++){const p=pointAt(i%n,pct);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
    ctx.closePath();
    if(pct===50){ctx.strokeStyle='#e53935';ctx.setLineDash([6,4]);}
    else if(pct===70){ctx.strokeStyle='#ff9800';ctx.setLineDash([6,4]);}
    else if(pct===85){ctx.strokeStyle='#4caf50';ctx.setLineDash([6,4]);}
    else{ctx.strokeStyle='#ccc';ctx.setLineDash([]);}
    ctx.lineWidth=1.2;ctx.stroke();ctx.setLineDash([]);
    // label
    if(pct<100){
      const lp=pointAt(0,pct);
      ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.fillText(pct+'%',lp.x+4,lp.y-2);
    }
  });

  // Axis lines and labels
  DOMAINS.forEach((d,i)=>{
    const p=pointAt(i,100);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.stroke();
    // labels
    const lp=pointAt(i,112);
    ctx.fillStyle=d.color;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.name,lp.x,lp.y);
  });

  // Data polygon
  const validPcts=DOMAINS.filter(d=>!s[d.id].na).map(d=>s[d.id].pct);
  const avgPct=validPcts.length>0?Math.round(validPcts.reduce((a,b)=>a+b,0)/validPcts.length):0;
  const fillColor=avgPct>=85?'rgba(76,175,80,0.25)':avgPct>=70?'rgba(139,195,74,0.25)':avgPct>=50?'rgba(255,152,0,0.25)':avgPct>=30?'rgba(255,87,34,0.25)':'rgba(211,47,47,0.25)';
  const strokeColor=avgPct>=85?'#4caf50':avgPct>=70?'#8bc34a':avgPct>=50?'#ff9800':avgPct>=30?'#ff5722':'#d32f2f';

  ctx.beginPath();
  DOMAINS.forEach((d,i)=>{const v=s[d.id].na?0:s[d.id].pct;const p=pointAt(i,v);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();ctx.fillStyle=fillColor;ctx.fill();ctx.strokeStyle=strokeColor;ctx.lineWidth=2.5;ctx.stroke();

  // Data points
  DOMAINS.forEach((d,i)=>{
    const isNA=s[d.id].na;
    const v=isNA?0:s[d.id].pct;
    const p=pointAt(i,v);
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=isNA?'#9e9e9e':d.color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=isNA?'#999':'#333';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(isNA?'미평가':v+'%',p.x,p.y-12);
  });

  // Legend
  ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='left';
  const ly=H-30;
  ctx.setLineDash([6,4]);
  [{c:'#e53935',t:'50% (심각/우려 경계)'},{c:'#ff9800',t:'70% (주의/적절 경계)'},{c:'#4caf50',t:'85% (적절/우수 경계)'}].forEach((l,i)=>{
    const lx=30+i*170;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+25,ly);ctx.strokeStyle=l.c;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#666';ctx.fillText(l.t,lx+30,ly+4);
  });
  ctx.setLineDash([]);
}

  // Step 1 - 영역별 판정 자동 요약

  DOMAINS.forEach(d=>{

    const status=sc.pct>=70?'✓ 양호':'⚠ 중재필요';

    h+=`<tr><td style="font-weight:700;color:${d.color}">${d.name}</td><td>${sc.pct}%</td>
      <td><span class="judge-badge ${j.cls}">${j.text}</span></td>
      <td style="color:${stColor};font-weight:700">${status}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  // Step 2 - SI 가설 자동 생성
  const needDomains=DOMAINS.filter(d=>s[d.id].pct<70).sort((a,b)=>s[a.id].pct-s[b.id].pct);
  h+=`<div class="reasoning-step"><h4>Step 2 &mdash; SI 가설 자동 생성</h4>`;
  if(needDomains.length===0){
    h+=`<p style="color:#4caf50;font-weight:700">모든 영역 70% 이상 — 추가 가설 불필요</p>`;
  }else{
    h+=`<table class="co-table"><thead><tr><th>가설순위</th><th>1차 SI 가설</th><th>근거영역</th><th>판정수준</th><th>감별질문 경로</th><th>매트릭스 참조 셀</th></tr></thead><tbody>`;
    needDomains.slice(0,3).forEach((d,i)=>{
      const m=MAPPING[d.id],sc=s[d.id],j=getJudge(sc.pct);
      h+=`<tr><td style="font-weight:700">${i+1}순위</td><td>${m.siType}</td>
        <td style="color:${d.color};font-weight:700">${d.name}</td>
        <td><span class="judge-badge ${j.cls}">${j.text}</span> (${sc.pct}%)</td>
        <td>${m.diffQ.join(', ')}</td><td>${m.matrixCells}</td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;

  // Step 3 - 중재 우선순위 자동 산출
  h+=`<div class="reasoning-step"><h4>Step 3 &mdash; 중재 우선순위 자동 산출</h4>`;
  const allIv=[];const seenIv=new Set();
  needDomains.forEach(d=>{
    MAPPING[d.id].interventions.forEach(iv=>{
      if(seenIv.has(iv)){
        const existing=allIv.find(x=>x.id===iv);
        if(existing) existing.freq++;
      }else{
        seenIv.add(iv);
        allIv.push({id:iv,domain:d.name,pct:s[d.id].pct,judge:getJudge(s[d.id].pct),siType:MAPPING[d.id].siType,freq:1});
      }
    });
  });
  allIv.sort((a,b)=>(a.pct-b.pct)||(b.freq-a.freq));

  if(allIv.length===0){
    h+=`<p style="color:#4caf50;font-weight:700">중재 필요 영역 없음</p>`;
  }else{
    h+=`<table class="co-table"><thead><tr><th>우선순위</th><th>셀ID</th><th>목적/SI유형</th><th>트리거영역</th><th>달성률</th><th>판정</th><th>참조빈도</th></tr></thead><tbody>`;
    allIv.forEach((iv,i)=>{
      h+=`<tr><td>${i+1}</td><td style="font-weight:700">${iv.id}</td><td style="font-size:10px">${iv.siType}</td>
        <td>${iv.domain}</td><td>${iv.pct}%</td>
        <td><span class="judge-badge ${iv.judge.cls}">${iv.judge.text}</span></td><td>${iv.freq}</td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;

  // Step 4 - 종합 임상추론 경로 요약
  h+=`<div class="reasoning-step"><h4>Step 4 &mdash; 종합 임상추론 경로 요약</h4>`;
  // Pattern
  const matchedP=PATTERNS.filter(p=>p.condition(s));
  const patternText=matchedP.length>0?matchedP.map(p=>p.name).join(', '):'특정 패턴 미해당';
  const needCount=needDomains.length;
  const hasWorst=needDomains.length>0?s[needDomains[0].id].pct:100;
  const sessionRec=hasWorst<30?'주 3회 45분 집중 치료':hasWorst<50?'주 2-3회 45분 집중 치료':hasWorst<70?'주 1-2회 치료':'현재 수준 유지/모니터링';

  // Recommended assessment tools based on domains
  const toolRecs=new Set(['COPM','GAS']);
  if(needDomains.some(d=>['postural','bilateral','gross'].includes(d.id))) toolRecs.add('BOT-2');
  if(needDomains.some(d=>['oral','fine'].includes(d.id))) toolRecs.add('SP-2');
  if(needDomains.some(d=>d.id==='vmi')) toolRecs.add('Beery VMI');
  if(needDomains.some(d=>d.id==='praxis')) toolRecs.add('SIPT/EASI');
  if(needCount>=5) toolRecs.add('Bayley-4');

  h+=`<table class="co-table">
    <tr><td style="font-weight:700;width:180px;background:#f5f5f5">패턴 분석</td><td style="text-align:left">${patternText}</td></tr>
    <tr><td style="font-weight:700;background:#f5f5f5">중재 필요 영역 수</td><td style="text-align:left">${needCount}개 / 7개 영역</td></tr>
    <tr><td style="font-weight:700;background:#f5f5f5">추천 세션 구성</td><td style="text-align:left">${sessionRec}</td></tr>
    <tr><td style="font-weight:700;background:#f5f5f5">추천 평가도구</td><td style="text-align:left">${[...toolRecs].join(', ')}</td></tr>
    <tr><td style="font-weight:700;background:#f5f5f5">활성화된 행동군집</td><td style="text-align:left">${CLUSTERS.filter(c=>isClusterActive(c,s)==='active').map(c=>c.id+' '+c.name).join(', ')||'없음'}</td></tr>
    <tr><td style="font-weight:700;background:#f5f5f5">자동연결 참조군집</td><td style="text-align:left">${CLUSTERS.filter(c=>isClusterActive(c,s)==='auto').map(c=>c.id+' '+c.name).join(', ')}</td></tr>
  </table>`;
  h+=`</div></div>`;
  document.getElementById(targetId).innerHTML=h;
}

// ── IndexedDB 공유 헬퍼 (OBS1) ──────────────────────────────
const OBS1_STORE='obs1';
let obs1ChildId=null;
const ChildDB=(()=>{
  const DN='si-cog-cda',V=1;let _db=null;
  function open(){
    if(_db)return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open(DN,V);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('children'))
          db.createObjectStore('children',{keyPath:'id',autoIncrement:true});
        ['obs1','obs2','std1','std2','rpt','ace'].forEach(s=>{
          if(!db.objectStoreNames.contains(s))
            db.createObjectStore(s,{keyPath:'childId'});
        });
      };
      r.onsuccess=e=>{_db=e.target.result;res(_db);};
      r.onerror=e=>rej(e.target.error);
    });
  }
  function tx(store,mode,fn){
    return open().then(db=>new Promise((res,rej)=>{
      const t=db.transaction(store,mode);
      const req=fn(t.objectStore(store));
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    }));
  }
  return{
    listChildren:()=>tx('children','readonly',s=>s.getAll()),
    addChild:name=>tx('children','readwrite',s=>s.add({name,createdAt:new Date().toISOString()})),
    deleteChild:id=>tx('children','readwrite',s=>s.delete(id)),
    saveData:(store,cid,data)=>tx(store,'readwrite',s=>s.put({childId:cid,data,savedAt:new Date().toISOString()})),
    loadData:(store,cid)=>tx(store,'readonly',s=>s.get(cid)).then(r=>r?r.data:null),
  };
})();

function setCbStatus(msg){const el=document.getElementById('cb-status');if(el)el.textContent=msg;}

async function saveToChildDB(){
  if(!obs1ChildId)return;
  const data={
    version:'si_motor_v3_sr',
    exportedAt:new Date().toISOString(),
    patient:{
      name:document.getElementById('childName').value,
      birth:document.getElementById('birthDate').value,
      evalDate:document.getElementById('evalDate').value,
      evaluator:document.getElementById('evaluator').value,
      diagnosis:document.getElementById('diagnosis').value
    },
    currentAge:currentAge,
    scores:{...scoreData},
    notes:{...noteData},
    sr:{...srData}
  };
  await ChildDB.saveData(OBS1_STORE,obs1ChildId,data);
  setCbStatus('저장됨 '+new Date().toLocaleTimeString());
}

async function refreshObs1ChildList(selectId){
  const children=await ChildDB.listChildren();
  const sel=document.getElementById('child-select');
  sel.innerHTML='<option value="">-- 아동 선택 --</option>';
  children.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.id;o.textContent=c.name;
    if(c.id===selectId)o.selected=true;
    sel.appendChild(o);
  });
}

async function onChildChange(){
  const sel=document.getElementById('child-select');
  const id=Number(sel.value)||null;
  obs1ChildId=id;
  if(!id){setCbStatus('');return;}
  const data=await ChildDB.loadData(OBS1_STORE,id).catch(()=>null);
  if(data){
    if(data.patient){
      document.getElementById('childName').value=data.patient.name||'';
      document.getElementById('birthDate').value=data.patient.birth||'';
      document.getElementById('evalDate').value=data.patient.evalDate||'';
      document.getElementById('evaluator').value=data.patient.evaluator||'';
      document.getElementById('diagnosis').value=data.patient.diagnosis||'';
      calcAge();
    }
    if(data.currentAge&&AGE_GROUPS.find(a=>a.id===data.currentAge)) currentAge=data.currentAge;
    if(data.scores) Object.assign(scoreData,data.scores);
    if(data.notes) Object.assign(noteData,data.notes);
    if(data.sr&&typeof data.sr==='object') Object.assign(srData,data.sr);
    renderTable();renderSRTable();updateAllBadges();
    toast('아동 데이터 불러옴');
  }
  setCbStatus(id?'선택됨':'');
}

async function addNewChild(){
  const name=prompt('새 아동 이름을 입력하세요:');
  if(!name||!name.trim())return;
  const id=await ChildDB.addChild(name.trim());
  await refreshObs1ChildList(id);
  obs1ChildId=id;
  document.getElementById('child-select').value=id;
  setCbStatus('새 아동 생성됨');
}

async function deleteCurrentChild(){
  if(!obs1ChildId){toast('아동을 먼저 선택하세요.');return;}
  const sel=document.getElementById('child-select');
  const name=sel.options[sel.selectedIndex]?.text||'선택된 아동';
  if(!confirm(`'${name}'의 모든 데이터를 삭제하시겠습니까?`))return;
  await ChildDB.deleteChild(obs1ChildId);
  obs1ChildId=null;
  await refreshObs1ChildList(null);
  setCbStatus('삭제됨');
}

// 초기 아동 목록 로드
(async()=>{ await refreshObs1ChildList(null).catch(()=>{}); })();

// PWA Service Worker 등록 + 자동 업데이트
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    // 페이지 로드 시마다 새 SW 확인
    reg.update().catch(()=>{});
    // 새 SW가 설치되면 즉시 적용 후 새로고침
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw) return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          nw.postMessage('SKIP_WAITING');
        }
      });
    });
    // 컨트롤러가 바뀌면(새 SW 활성화) 한 번만 새로고침
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(refreshing) return;
      refreshing=true;
      window.location.reload();
    });
  }).catch(()=>{});
}
