<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CDA-OBS1 · SI 운동능력 임상관찰 체크리스트</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196F3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CDA-OBS1">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#f5f5f5;color:#333;font-size:14px;line-height:1.5}
a{text-decoration:none;color:inherit}

/* === HEADER === */
.top-bar{background:#fff;border-bottom:2px solid #333;padding:10px 16px}
.top-bar h1{font-size:20px;color:#333;text-align:center}

/* === AGE CATEGORY LABELS === */
.age-category-bar{background:#fff;padding:8px 16px 0;border-bottom:1px solid #ddd}
.cat-labels{display:flex;gap:16px;margin-bottom:6px;flex-wrap:wrap}
.cat-label{font-size:13px;font-weight:700;padding:2px 0}
.cat-infant{color:#d35400}
.cat-preschool{color:#8e44ad}
.cat-early{color:#27ae60}
.cat-late{color:#2980b9}

/* === AGE TABS === */
.age-tabs-wrap{display:flex;flex-wrap:wrap;gap:3px;padding-bottom:8px}
.age-tab{padding:6px 14px;border:1px solid #bbb;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;background:#fff;transition:.15s;white-space:nowrap}
.age-tab:hover{background:#fffde7}
.age-tab.active{background:#f9a825;color:#fff;border-color:#f57f17;font-weight:700}
.age-tab .pct{font-size:10px;margin-left:3px;opacity:.8}

/* === LEGEND === */
.legend-bar{background:#fff;padding:8px 16px;border-bottom:1px solid #ddd;display:flex;flex-wrap:wrap;gap:16px;align-items:center;font-size:13px}
.legend-item{display:flex;align-items:center;gap:4px}
.dot-mastery{width:12px;height:12px;border-radius:50%;background:#4caf50;display:inline-block}
.dot-emerging{width:12px;height:12px;border-radius:50%;background:#ff9800;display:inline-block}
.dot-redflag{width:12px;height:12px;background:#e74c3c;display:inline-block}
.legend-note{font-size:11px;color:#888}

/* === TOOLBAR === */
.toolbar{background:#fff;padding:8px 16px;border-bottom:1px solid #ddd;display:flex;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100}
.tb-btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;color:#fff;transition:.15s;white-space:nowrap}
.tb-btn:hover{opacity:.85}
.tb-print{background:#78909c}.tb-analysis{background:#43a047}.tb-pdf{background:#1976d2}
.tb-word{background:#2e7d32}.tb-parent{background:#ef6c00}.tb-reset{background:#00897b}.tb-save{background:#6a1b9a}

/* === AGE DESC === */
.age-desc-box{margin:12px 16px 0;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:12px 16px}
.age-desc-title{font-size:15px;font-weight:700;color:#2e7d32;margin-bottom:4px}
.age-desc-text{font-size:13px;color:#555}
.age-stats{margin:8px 16px;background:#43a047;color:#fff;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;gap:16px;flex-wrap:wrap}

/* === SUBJECT INFO === */
.subject-bar{margin:8px 16px 0;background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:none}
.subject-bar label{font-size:12px;font-weight:600;color:#666;white-space:nowrap}
.subject-bar input{padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:130px}
.subject-bar input.auto-calc{background:#e3f2fd;font-weight:600;color:#1565c0;width:160px}
.subject-bar .field{display:flex;align-items:center;gap:4px}

/* === MAIN TABLE === */
.main-wrap{margin:0 16px 20px;background:#fff;border:1px solid #ccc;border-radius:0;overflow:visible}
.main-table{width:100%;border-collapse:collapse;table-layout:fixed}
.main-table th{background:#616161;color:#fff;padding:8px 6px;font-size:12px;text-align:center;border:1px solid #555;position:sticky;top:44px;z-index:10;overflow:hidden}
.main-table td{padding:6px 8px;border:1px solid #ddd;vertical-align:top;font-size:13px;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word}
/* domain row */
.domain-row{cursor:pointer;user-select:none}
.domain-row td{background:#f5f5f5;font-weight:700;font-size:13px;padding:8px 10px;color:#333}
.domain-row:hover td{background:#e0e0e0}
.domain-row .arrow{display:inline-block;transition:transform .2s;margin-right:4px;font-size:11px}
.domain-row .arrow.open{transform:rotate(90deg)}
.domain-row .sensory{font-size:11px;font-weight:400;color:#777;margin-left:8px}
.domain-row .d-score{font-weight:700;font-size:12px;float:right;color:#1565c0}
/* domain colors */
.dh-postural{border-left:4px solid #4caf50}
.dh-bilateral{border-left:4px solid #2196f3}
.dh-praxis{border-left:4px solid #e91e63}
.dh-vmi{border-left:4px solid #ff9800}
.dh-fine{border-left:4px solid #9c27b0}
.dh-gross{border-left:4px solid #009688}
.dh-oral{border-left:4px solid #ffc107}
/* item rows */
.item-row td.col-domain{font-size:11px;color:#555;text-align:center;font-weight:600;word-wrap:break-word;overflow-wrap:break-word}
.item-code{display:inline-block;font-family:'Consolas','Courier New',monospace;font-size:10px;font-weight:700;color:#1565c0;background:#e3f2fd;padding:1px 5px;border-radius:3px;letter-spacing:.2px;margin-top:2px}
.item-code-inline{display:inline-block;font-family:'Consolas','Courier New',monospace;font-size:11px;font-weight:700;color:#0d47a1;background:#e3f2fd;padding:1px 6px;border-radius:3px;margin-right:4px;letter-spacing:.2px}
.col-desc{word-wrap:break-word;overflow-wrap:break-word}
.col-desc small{color:#888;font-size:11px;line-height:1.3}
.col-time{text-align:center;font-size:11px}
.col-select{text-align:center;width:80px;padding:3px 4px!important}
.col-select select{font-size:12px;padding:2px 2px;border:1px solid #ccc;border-radius:4px;width:100%;background:#fff;cursor:pointer}
.col-select select.scored-high{background:#e8f5e9;border-color:#4caf50;font-weight:600}
.col-select select.scored-mid{background:#fff8e1;border-color:#ff9800;font-weight:600}
.col-select select.scored-low{background:#ffebee;border-color:#e74c3c;font-weight:600}
.col-redflag{font-size:11px;background:#fff0f0;color:#c62828;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;line-height:1.4}
.col-note{padding:3px 4px!important}
.col-note textarea{width:100%;height:40px;font-size:11px;border:1px solid #ccc;border-radius:3px;resize:vertical;padding:3px;font-family:inherit;box-sizing:border-box}
/* subtotal */
.subtotal-row td{background:#e3f2fd;font-weight:700;text-align:center;padding:8px!important;font-size:13px}
.subtotal-row .pct-val{color:#1565c0}

/* === Analysis === */
.analysis-overlay{display:none;margin:12px 16px}
.analysis-overlay.show{display:block}
.a-card{background:#fff;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;overflow:hidden}
.a-card-h{background:#f5f5f5;padding:10px 14px;font-weight:700;font-size:14px;border-bottom:1px solid #ddd}
.a-card-b{padding:14px}
.a-bar{margin-bottom:8px}
.a-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px}
.a-bar-track{height:16px;background:#eee;border-radius:8px;overflow:hidden}
.a-bar-fill{height:100%;border-radius:8px;transition:width .4s}
.judge-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
.j-excellent{background:#4caf50}.j-adequate{background:#8bc34a}.j-caution{background:#ff9800}.j-concern{background:#ff5722}.j-critical{background:#d32f2f}.j-na{background:#9e9e9e}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px}
.stat-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0}
.stat-k{color:#888}.stat-v{font-weight:700}
.long-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;overflow-x:auto;display:block}
.long-table th,.long-table td{border:1px solid #ddd;padding:4px;text-align:center}
.long-table th{background:#f5f5f5}

/* === Parent === */
.parent-area{display:none;margin:12px 16px}
.parent-area.show{display:block}

/* === Toast === */
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* === Clinical Overlay Panels === */
.clinical-overlay{display:none;margin:12px 16px;position:relative}
.clinical-overlay.show{display:block}
.co-close{position:absolute;top:8px;right:12px;background:#e53935;color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;z-index:5;line-height:28px;text-align:center}
.co-close:hover{background:#b71c1c}
.co-title{background:linear-gradient(135deg,#37474f,#546e7a);color:#fff;padding:14px 18px;font-size:16px;font-weight:700;border-radius:6px 6px 0 0}
.co-body{background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;padding:16px;overflow-x:auto}
.co-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.co-table th,.co-table td{border:1px solid #ddd;padding:6px 8px;text-align:center;vertical-align:middle}
.co-table th{background:#f5f5f5;font-weight:700;white-space:nowrap}
.co-table td{font-size:11px}
.co-section{margin:16px 0 8px;font-size:15px;font-weight:700;color:#37474f;border-bottom:2px solid #37474f;padding-bottom:4px}
.cluster-active{background:#fff3e0!important;border-left:3px solid #ff5722}
.cluster-inactive{opacity:.4}
.cluster-auto{background:#e8f5e9!important;border-left:3px solid #4caf50}
.matrix-highlight{background:#fff9c4!important;font-weight:700}
.matrix-cell{font-size:10px;line-height:1.4}
.star{color:#ff9800}
.profile-wrap{text-align:center;margin:12px 0}
.profile-wrap canvas{max-width:100%;border:1px solid #eee;border-radius:8px}
.pattern-match{background:#e8f5e9;border:1px solid #4caf50;border-radius:6px;padding:10px;margin:6px 0}
.pattern-nomatch{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:10px;margin:6px 0;opacity:.45}
.reasoning-step{background:#f5f5f5;border-radius:6px;padding:12px;margin:10px 0;border-left:4px solid #5c6bc0}
.reasoning-step h4{margin:0 0 8px;color:#5c6bc0}
.report-section{margin:16px 0;page-break-inside:avoid}
.report-section h3{background:#37474f;color:#fff;padding:8px 14px;margin:0;font-size:14px;border-radius:4px 4px 0 0}
.report-section .rs-body{border:1px solid #ddd;border-top:none;padding:12px;border-radius:0 0 4px 4px}
.report-obs{width:100%;min-height:50px;border:1px solid #ccc;border-radius:4px;padding:6px;font-size:12px;font-family:inherit;resize:vertical}
.rec-action{font-size:11px;padding:3px 8px;border-radius:10px;color:#fff;display:inline-block;white-space:nowrap}
.rec-excellent{background:#4caf50}.rec-adequate{background:#2196f3}.rec-caution{background:#ff9800}.rec-concern{background:#ff5722}.rec-critical{background:#d32f2f}


/* === MODULE TABS / SR MODULE === */
.module-tabs{background:#fff;padding:8px 16px;border-bottom:1px solid #ddd;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.module-tab{padding:8px 16px;border:1px solid #bbb;border-radius:18px;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#444;transition:.15s}
.module-tab.active{background:#263238;color:#fff;border-color:#263238}
.module-note{font-size:11px;color:#777;margin-left:4px}
.sr-area{display:none;margin:12px 16px 20px;background:#fff;border:1px solid #ccc;border-radius:6px;overflow:hidden}
.sr-area.show{display:block}
.sr-head{background:#4a148c;color:#fff;padding:12px 16px;font-size:15px;font-weight:700;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.sr-sub{font-size:11px;font-weight:400;opacity:.9}
.sr-guide{padding:10px 14px;background:#f3e5f5;border-bottom:1px solid #d1c4e9;font-size:12px;color:#4a148c;line-height:1.7}
.sr-scroll{overflow-x:auto}
.sr-table{width:100%;border-collapse:collapse;min-width:1180px;table-layout:fixed}
.sr-table th{background:#6a1b9a;color:#fff;padding:7px 6px;font-size:11px;border:1px solid #4a148c;text-align:center;position:sticky;top:44px;z-index:8}
.sr-table td{border:1px solid #ddd;padding:5px 6px;font-size:11px;vertical-align:top;word-break:keep-all;overflow-wrap:anywhere}
.sr-system-row td{font-weight:700;color:#fff;padding:7px 10px;font-size:12px}
.sr-code{font-family:Consolas,'Courier New',monospace;font-weight:700;color:#4a148c;background:#f3e5f5;border-radius:3px;padding:1px 5px;display:inline-block}
.sr-response{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:10px}
.sr-response label{display:flex;align-items:center;gap:2px;white-space:nowrap}
.sr-table select,.sr-table textarea{width:100%;font-family:inherit;font-size:11px;border:1px solid #ccc;border-radius:3px;padding:3px;background:#fff}
.sr-table textarea{height:42px;resize:vertical}
.sr-score-high{background:#e8f5e9!important;border-color:#4caf50!important;font-weight:700}
.sr-score-mid{background:#fff8e1!important;border-color:#ff9800!important;font-weight:700}
.sr-score-low{background:#ffebee!important;border-color:#e53935!important;font-weight:700}
.sr-chip{display:inline-block;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;margin:1px;background:#eee;color:#333}
.sr-chip.sor{background:#ffebee;color:#c62828}.sr-chip.sur{background:#e3f2fd;color:#1565c0}.sr-chip.seek{background:#e8f5e9;color:#2e7d32}.sr-chip.mix{background:#fff3e0;color:#ef6c00}
.sr-profile-box{border-left:4px solid #6a1b9a;background:#f3e5f5;border-radius:6px;padding:12px 14px;margin-bottom:12px;color:#3a0b63}
.sr-sentence{background:#fafafa;border:1px solid #e0e0e0;border-left:4px solid #6a1b9a;border-radius:4px;padding:8px 10px;margin:6px 0;font-size:12px;line-height:1.7}
@media(max-width:768px){.module-tabs{padding:6px 10px}.module-tab{font-size:12px;padding:6px 12px}.sr-area{margin:8px 10px 16px}.sr-table{min-width:1080px}.sr-head{font-size:14px}}

/* === Print === */
@media print{
.toolbar,.age-category-bar,.legend-bar,.no-print{display:none!important}
body{background:#fff;font-size:11px}
.main-table th{position:static}
.a-card,.main-wrap{box-shadow:none;page-break-inside:avoid}
.clinical-overlay{margin:0!important}
.clinical-overlay:not(.show){display:none!important}
.co-close{display:none!important}
.co-table th,.co-table td{font-size:10px;padding:3px 4px}
.report-section{page-break-inside:avoid}
.profile-wrap canvas{max-width:500px}
}

/* === Tablet === */
@media(max-width:1230px){
.main-table{table-layout:auto}
.main-table td,.main-table th{font-size:11px;padding:4px 3px}
.item-row td.col-domain{font-size:10px}
.col-desc small{font-size:9px}
.col-note textarea{width:100%!important;min-width:0!important}
.col-select select{font-size:10px;width:100%!important;min-width:0!important}
}
@media(max-width:1024px){
.main-table th:nth-child(5),.main-table th:nth-child(6){font-size:10px}
.col-redflag{font-size:10px}
.col-note textarea{height:32px}
}

/* === Mobile === */
@media(max-width:768px){
.top-bar h1{font-size:17px}
.cat-labels{gap:8px}
.age-tab{padding:5px 8px;font-size:11px}
.toolbar{padding:6px 10px;gap:4px}
.tb-btn{padding:5px 10px;font-size:11px}
.subject-bar{flex-direction:column;align-items:stretch;gap:6px}
.subject-bar .field{flex-wrap:wrap}
.subject-bar input{width:100%}
.age-desc-box{margin:8px 10px 0}
.age-stats{margin:6px 10px}
.main-wrap{margin:6px 10px 16px}
/* Card layout for items */
.main-table,.main-table thead,.main-table tbody,.main-table th,.main-table td,.main-table tr{display:block}
.main-table thead{position:absolute;top:-9999px;left:-9999px}
.item-row{border:1px solid #ddd;border-radius:6px;margin:6px 4px;padding:8px;background:#fff}
.item-row td{border:none;padding:3px 0;display:block}
.item-row td:before{content:attr(data-label);font-weight:700;font-size:11px;color:#999;display:block;margin-bottom:1px}
.item-row td.col-desc{font-weight:600;font-size:14px;border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:4px}
.item-row td.col-domain{font-size:11px;color:#1565c0;font-weight:700;padding:2px 0 4px}
.item-row td.col-select{width:auto!important}
.item-row td.col-select select{width:100%;min-width:80px;max-width:180px}
.item-row td.col-note textarea{width:100%;height:50px}
.col-desc small{white-space:normal;word-break:break-word;display:block;margin-top:3px}
.item-row td.col-redflag{background:#fff5f5;border-radius:4px;padding:6px;margin-top:4px}
.domain-row{border:none;margin:6px 4px}
.domain-row td{display:block;padding:10px 8px;border:none}
.subtotal-row{margin:4px}
.subtotal-row td{display:block;border:none;text-align:center}
.analysis-overlay{margin:8px 10px}
.stat-grid{grid-template-columns:1fr}
.long-table{font-size:9px}
}
@media(max-width:480px){
.top-bar h1{font-size:15px}
.age-tab{padding:4px 6px;font-size:10px}
.tb-btn{padding:4px 8px;font-size:10px}
}
/* child-bar */
.child-bar{background:#1565c0;color:#fff;padding:6px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px}
.child-bar select{padding:4px 8px;border:none;border-radius:4px;font-size:13px;min-width:130px;color:#333}
.cb-btn{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}
.cb-add{background:#43a047;color:#fff}.cb-del{background:#e53935;color:#fff}
.cb-st{font-size:11px;opacity:.75;margin-left:6px}
@media print{.child-bar{display:none!important}}
</style>
</head>
<body>

<div id="child-bar" class="child-bar no-print">
  <span>👶 아동:</span>
  <select id="child-select" onchange="onChildChange()"><option value="">-- 아동 선택 --</option></select>
  <button class="cb-btn cb-add" onclick="addNewChild()">+ 새 아동</button>
  <button class="cb-btn cb-del" onclick="deleteCurrentChild()">삭제</button>
  <span class="cb-st" id="cb-status"></span>
</div>

<div class="top-bar">
<h1>SI 운동능력 임상 관찰 체크리스트</h1>
</div>

<!-- Age Category + Tabs -->
<div class="age-category-bar no-print">
<div class="cat-labels">
<span class="cat-label cat-infant">영유아기</span>
<span class="cat-label cat-preschool">전학령기</span>
<span class="cat-label cat-early">학령 초기</span>
<span class="cat-label cat-late">학령 후기</span>
</div>
<div class="age-tabs-wrap" id="ageTabs"></div>
</div>

<!-- Toolbar -->
<div class="toolbar no-print">
<button class="tb-btn" style="background:#546e7a" onclick="savePDF()">인쇄/PDF</button>
<button class="tb-btn" style="background:#00838f" onclick="saveLocal()">임시저장</button>
<button class="tb-btn" style="background:#e65100" onclick="showAnalysis()">판정 분석</button>
<button class="tb-btn" style="background:#7b1fa2" onclick="showSRAnalysis()">SR 분석</button>
<button class="tb-btn" style="background:#2e7d32" onclick="togglePanel('goalArea')">치료 목표 제안</button>
<button class="tb-btn" style="background:#ad1457" onclick="togglePanel('reportArea')">임상 보고서</button>
<button class="tb-btn" style="background:#1565c0" onclick="togglePanel('referenceArea')">임상 참조</button>
<button class="tb-btn" style="background:#455a64" onclick="exportJSON()">JSON 내보내기</button>
<button class="tb-btn" style="background:#5d4037" onclick="importJSON()">JSON 가져오기</button>
<button class="tb-btn" style="background:#757575" onclick="resetAll()">체크 리셋</button>
<button class="tb-btn" style="background:#8d6e63" onclick="toggleParent()">부모용 체크리스트</button>
</div>

<!-- Module Tabs -->
<div class="module-tabs no-print">
  <button class="module-tab active" id="moduleTabMC" onclick="switchModule('MC')">MC 운동조절</button>
  <button class="module-tab" id="moduleTabSR" onclick="switchModule('SR')">SR 감각조절</button>
  <span class="module-note">MC 점수와 SR 점수는 합산하지 않습니다.</span>

  {id:'0-12m',label:'출생-12개월',cat:'infant',desc:'영아기 (0~12M) — 원시반사 소실, 감각탐색 우세',detail:'자세 조절의 두미 방향(cephalocaudal) 발달 시작. 원시반사 소실 후 수의적 운동 출현. 엎드린 자세 머리 들기→앉기→당겨 일으키기의 항중력 자세 발달. 양손 정중선 모으기, 한 손→다른 손 건네기의 양측 협응 출현. 전신 뻗기→의도적 잡기→놓기의 운동 기획 기초. 시선 추적→물건 잡기의 시각-운동 통합. 갈퀴잡기→집게잡기의 미세운동 전환. 빨기→숟가락 받기→손가락 음식 먹기의 구강-운동 발달.'},
  {id:'13-23m',label:'13-23개월',cat:'infant',desc:'걸음마기 (13~23M) — 독립 보행, 기초 운동 통합',detail:'독립 보행 확립 후 체간 직립 유지와 보행 안정화. 바로 누운 자세 굴곡·엎드린 자세 신전 자세 유지 시작. 양손 정중선 협응 활성화(블록 쌓기, 양손 끼적이기). 2-3단계 동작 모방, 2개 장애물 코스 시도. 수직선·수평선 끼적이기, 3-4조각 퍼즐. 손바닥잡기에서 손가락잡기로의 전환, 큰 구슬 끈 꿰기. 달리기·계단 오르기(marking time), 큰 공 밀기/차기. 컵 마시기, 포크 사용, 입술 폐쇄 안정화.'},
  {id:'2y',label:'2세',cat:'preschool',desc:'초기 유아기 (2세) — 양발 점프·도구 사용 시작',detail:'한발서기 시도, 폭 15cm 평균대 보행. 바로 누운 자세 굴곡·엎드린 자세 신전의 놀이 상호작용 중 유지. 양손 역할 분화(한 손 고정-다른 손 조작), 양발 점프 출현. 3단계 동작 모방, 3개 장애물 코스. 원 모방 시도, 수직선·수평선 모방, 4-6조각 퍼즐. 정적 삼지잡기 전환 시작, 중간 구슬 끈 꿰기. 달리기 안정화, 계단 교대발 시도, 세발자전거 페달링 시작. 회전 씹기 안정화, 빨대 흡인 조절, 침 흘림 감소.'},
  {id:'3y',label:'3세',cat:'preschool',desc:'후기 유아기 (3세) — 신체 조절 다양화',detail:'한발서기 안정화, 폭 10cm 평균대 보행, 바로 누운 자세 굴곡·엎드린 자세 신전 시간 연장. 계단 교대발(난간 지지), 큰 공 받기, 가위 자르기 시도. 3단계 동작 모방 안정화, 3-4개 장애물 코스, 구성 놀이 관념화. 원 모방 안정화, 십자 모방 시도, 6-8조각 퍼즐, 두족인(머리+다리) 그리기. 정적 삼지잡기 안정화, 큰 단추 끼우기. 한발 뛰기(hopping) 시도, 세발자전거 독립 주행. 질긴 음식 적응, 호기 강도 조절(비눗방울), 침 흘림 거의 소실.'},
  {id:'4y',label:'4세',cat:'early',desc:'학령전기 초기 (4세) — 양측 협응 정교화',detail:'한발서기 유지 시간 연장, 폭 8cm 평균대 보행, 바로 누운 자세 굴곡·엎드린 자세 신전 부가 동작 중 유지, 계단 교대발 난간 독립. 중간 크기 공 받기, 가위 직선 자르기, 블록 구조물 만들기, 풀칠/접기 양측 비대칭 협응, 갤럽(gallop) 수행. 4단계 동작 모방, 4-5개 장애물 코스, 블록 모델 보고 따라 만들기, 3-4단계 언어 지시 수행. 십자 모방 안정화, 사각형 모방, 10-12조각 퍼즐, 사람 그리기 4-6부분, 가위 원 자르기 시도. 동적 삼지잡기 출현, 작은 구슬 끈 꿰기, 중간 단추·지퍼 조작, 이름 따라쓰기 시도. 멀리뛰기 착지 안정, 한발 뛰기 연속, 공 던지기 정확도, 전방 구르기 시도, 바운스-캐치. 식이 범위 확대, 호기 지속 조절, 하모니카 불기, 입 다물고 씹기, 침 흘림 없음.'},

  {id:'6y',label:'6세',cat:'early',desc:'학령기 진입 (6세) — 복합 기술',detail:'눈 감고 한발서기 안정화, 평균대 폭 6cm 후진 보행, 바로 누운 자세 굴곡·엎드린 자세 신전 사지 교차 조합, 탠덤 보행 후진. 줄넘기 연속(팔 돌리기+점프 동시), 가위 복잡 모양 정밀 자르기, 점핑잭 리듬 변화 적응, 자전거(보조바퀴 없이), 칼+포크 다양한 경도. 6단계 동작 모방, 복합 스포츠 규칙(피구 등) 참여, 종이접기 3단계, 복합 자조 시간 관리, 새 운동 기술 시연 보고 따라하기. 마름모 모방(Beery VMI 6-7세), 글씨 크기·간격 조절, 30조각 퍼즐, 도면→3D 블록, 사람 그리기 10부분+비례. 동적 삼지잡기 장시간(20-30분), 글씨 가독성 또래 수준, 신발 끈 독립, 작은 단추·후크, 손 안 조작(in-hand manipulation). 멀리뛰기 성숙 패턴 유지, 한발 뛰기 이동+방향 전환, 공 목표 정확도, 줄넘기 변형, 자전거 복합 주행. 모든 질감 독립·성숙 섭취, 풍선 독립 불기, 리코더 음 전환, 식사 속도 조절, 구강 근력·지구력 또래 확인.'},

{code:'PC01-01',desc:'엎드린 자세(prone)에서 머리 들기 (예: 엎드린 자세에서 양육자의 얼굴이나 소리 나는 물건 방향으로 머리를 들어 시선을 맞추려는 시도)',acqTime:'1개월-3개월',redFlag:'3개월 이후에도 엎드린 자세에서 얼굴을 바닥면으로부터 들어올리려는 시도가 관찰되지 않거나, 들어올려도 머리 방향 조절 없이 한쪽으로만 떨어뜨리는 비대칭 패턴이 지속될 경우 — CDC(2025) "3개월까지 머리 들기 미출현" 기준 참조',unit:'초',s1:'순간적 들어올림 후 즉시 떨어뜨림',s2:'양육자와 짧은 시선 교환이 가능한 정도(약 3-5초 내외)',s3:'엎드린 채 주변을 둘러보며 탐색 가능(약 5-10초 내외)',s4:'엎드린 놀이 자세에서 머리를 안정적으로 유지하며 양손 활동 가능'},

{code:'PC01-03',desc:'독립 좌위(손 지지 없이 앉기) (예: 바닥에 손 지지 없이 앉은 채로 양손에 장난감을 들고 흔들거나 탐색하는 양손 놀이가 가능한 상태)',acqTime:'5개월-9개월',redFlag:'9개월 이후에도 양손 지지를 떼면 앉은 자세를 유지하지 못하여 양손 놀이가 불가능하거나, 앉는 동안 체간이 한쪽으로 과도하게 기울어 보호반응(protective extension) 없이 쓰러지는 양상이 반복될 경우 — CDC(2025) "9개월까지 독립 좌위" 기준 참조',unit:'초',s1:'손 지지를 떼면 곧바로 무너짐',s2:'한쪽 손에 장난감을 잡는 동안(약 5-10초 내외) 몸통이 흔들리며 보상적으로 다른 손을 바닥에 짚음',s3:'양손 놀이를 시도하나 몸통 회전 시 2-3회 중 1회 정도 균형을 잃어 한 손을 짚는 보상이 나타남(약 10-30초 내외 유지)',s4:'양손 놀이 중 몸통을 좌우로 돌려 장난감을 바꿔 잡아도 좌위 안정성이 유지됨'},
{code:'PC01-04',desc:'좌위 보호반응(protective extension) 출현 (예: 앉아 있다가 외부 힘이나 자세 변화로 중심을 잃었을 때, 넘어지는 방향으로 팔을 뻗어 손바닥을 짚으며 스스로 균형을 회복하려는 반응)',acqTime:'6개월-9개월',redFlag:'10개월 이후에도 앉은 자세에서 옆·앞으로 기울었을 때 팔을 뻗어 짚는 반응이 나타나지 않아 매번 그대로 쓰러지거나, 반응이 나타나더라도 한쪽 방향에서만 출현하고 반대쪽은 부재하는 비대칭 패턴이 관찰될 경우',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'},
{code:'PC01-05',desc:'가구 잡고 서기 시 몸통 안정 (예: 소파나 낮은 테이블 가장자리를 잡고 일어선 뒤, 한 손을 놓고 다른 쪽 손으로 탁자 위 물건을 탐색하려는 시도가 나타나는 상태)',acqTime:'9개월-12개월',redFlag:'12개월 이후에도 가구를 잡고 스스로 일어서려는 시도가 관찰되지 않거나, 일어서더라도 양손을 가구에서 뗄 수 없어 서 있는 동안 어떠한 탐색 활동도 불가능할 경우 — CDC(2025) "12개월까지 pull-to-stand" 기준 참조',unit:'초',s1:'잡고 일어서나 곧바로 주저앉음',s2:'가구를 양손으로 잡은 채 서 있을 수 있으나(약 5-10초 내외), 한 손이라도 놓으면 즉시 무너짐',s3:'한 손을 놓고 짧은 시간 탁자 위 물건에 손을 뻗는 탐색이 가능(약 10-20초 내외)',s4:'한 손 지지로 서서 다른 손으로 놀잇감을 자유롭게 조작하며 체중 이동 안정'}
],
bilateral:[
{code:'BI01-01',desc:'정중선(midline)에서 양손 모으기/맞잡기 (예: 누운 자세 또는 반기대 자세에서 양손이 몸의 정중선으로 모여 서로 닿거나 맞잡으며, 손가락끼리 만지는 촉각 탐색이 나타나는 상태)',acqTime:'3개월-4개월',redFlag:'5개월 이후에도 양손이 몸의 정중선에서 만나는 동작이 관찰되지 않아 양손 간 접촉·탐색이 부재하거나, 한쪽 팔만 움직이고 반대쪽은 체간 옆에 고정된 비대칭 양상이 지속될 경우 — CDC(2025) "정중선 양손 모으기" 기준 참조',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'BI01-02',desc:'양손으로 발 잡기 (예: 바로 누운 자세에서 고관절을 굴곡하여 양발을 들어 올린 뒤, 양손으로 발을 잡고 입으로 가져가거나 발가락을 만지며 탐색하는 상하지 협응 놀이)',acqTime:'4개월-6개월',redFlag:'7개월 이후에도 바로 누운 자세에서 양발을 시야 내로 들어올리지 못하거나, 들어올려도 손으로 발을 잡으려는 상하지 협응 시도가 관찰되지 않을 경우. 특히 고관절 굴곡 시 체간 신전이 과도하여 자세가 무너지는 보상 패턴에 주의 (→ PC01 자세조절 체간 굴곡 항목과 교차 확인)',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'},
{code:'BI01-03',desc:'한 손에서 다른 손으로 물건 전달(transfer) (예: 한 손에 쥔 딸랑이나 작은 블록을 반대쪽 손으로 의도적으로 건네받으며, 전달 과정에서 물건을 떨어뜨리지 않고 연속 조작하려는 시도)',acqTime:'5개월-9개월',redFlag:'9개월 이후에도 한 손에 쥔 물건을 반대쪽 손으로 건네받는 동작이 나타나지 않아, 물건을 옮기려면 한 손에서 놓은 뒤 다른 손으로 다시 집는 간접 방식만 사용하거나, 한쪽 손에만 물건을 쥔 채 반대쪽을 사용하지 않는 양상이 지속될 경우',unit:'회/5회',s1:'정중선에서 한 손→다른 손으로의 전달 시도 자체가 관찰되지 않음',s2:'전달 시도는 있으나 물건을 놓치는 빈도가 높음(5회 중 1-2회 성공)',s3:'대부분 전달 성공하나 정중선 교차 시 간헐적으로 어색함(5회 중 3-4회)',s4:'양손 간 전달이 유창하고 물건을 놓치지 않으며 연속 조작으로 이어짐(5회 중 5회)'},
{code:'BI01-04',desc:'양손으로 물건 맞부딪히기/박수 (예: 양손에 각각 블록이나 숟가락 등을 쥐고 정중선에서 의도적으로 맞부딪히거나, 빈손으로 짝짝이를 치며 소리를 즐기는 양측 동시 동작)',acqTime:'8개월-10개월',redFlag:'10개월 이후에도 양손을 정중선에서 동시에 부딪히는 동작(박수·물건 두드리기)이 나타나지 않거나, 시도하더라도 양손의 타이밍이 맞지 않아 빗나가는 양상이 반복되고 스스로 교정하려는 시도가 관찰되지 않을 경우',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'BI01-05',desc:'12개월 이전 편측 손 우세 미출현 확인 (예: 여러 방향에서 제시된 장난감에 대해 좌·우 어느 손이든 가까운 쪽으로 자연스럽게 뻗으며, 특정 한쪽 손만 고집하지 않는 양손 교대 사용 양상)',acqTime:'0~12개월 (지속관찰)',redFlag:'12개월 이전에 물건의 제시 위치와 관계없이 한쪽 손만 일관되게 사용하고 반대쪽 상지의 자발적 사용이 극히 드문 경우, 편측 신경학적 병변(편마비 등)의 초기 징후일 수 있어 신경학적 평가 의뢰 필요. AAP의 발달 선별 지침에 따르면 12개월 이전의 뚜렷한 손잡이 확립은 일반적이지 않음',unit:'질적',s1:'물건의 위치와 무관하게 거의 항상 한쪽 손만 사용하고 반대쪽 팔은 체간에 붙어 있음',s2:'주로 한쪽 손을 사용하나 반대쪽 손 사용이 간헐적으로 관찰됨',s3:'약간의 선호 경향은 있으나 양쪽 모두 자발적으로 사용',s4:'좌우 손 사용이 과제·위치에 따라 균등하게 분포'}
],
praxis:[
{code:'PX01-01',desc:'양육자 얼굴 움직임 모방 시도 (예: 양육자가 과장되게 혀를 내밀거나 입을 크게 벌리는 동작을 반복 시, 영아가 이를 응시한 뒤 자신의 입·혀를 움직여 비슷한 패턴을 산출하려는 시도가 관찰되는 상태)',acqTime:'2개월-4개월',redFlag:'6개월 이후에도 양육자의 과장된 구강·안면 동작을 응시하면서도 자신의 얼굴 근육을 움직여 따라하려는 운동 산출 시도가 전혀 관찰되지 않을 경우. 만약 양육자의 얼굴에 대한 시각적 주의 자체가 부재하다면 운동 기획 이전에 사회적 상호작용 및 시각 주의 문제와의 감별이 선행되어야 함',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'PX01-02',desc:'물건에 목적 있는 뻗기(reaching) 시도 (예: 시야 내에 놓인 관심 물건을 눈으로 고정한 뒤, 팔을 뻗어 손이 물건에 닿도록 방향과 거리를 조절하며 접근하려는 목적 지향적 동작)',acqTime:'3개월-6개월',redFlag:'6개월 이후에도 관심 물건을 향해 팔을 뻗어 접근하려는 의도적 시도가 관찰되지 않거나, 팔을 움직이더라도 물건의 위치와 무관한 방향으로만 휘저어 목표 지향성이 부재할 경우 — CDC(2025) "6개월까지 목적 있는 reaching" 기준 참조',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'},
{code:'PX01-03',desc:'손 흔들기(바이바이) 등 단순 제스처 모방 (예: 양육자가 "바이바이" 하며 손을 흔드는 것을 본 뒤, 영아가 맥락에 맞게 손을 흔들거나 짝짜꿍 등의 사회적 제스처를 모방하여 산출하는 동작)',acqTime:'9개월-12개월',redFlag:'12개월까지 바이바이·짝짜꿍·가리키기 등 관습적 제스처가 모방이나 자발적 형태로 관찰되지 않을 경우 모니터링 대상이며, 15개월까지 지속 부재 시 의뢰. 제스처 산출의 부재는 운동 기획 문제뿐 아니라 사회적 의사소통 발달 지연과의 감별이 필요 — CDC(2025) "12개월까지 제스처 사용 기대" 참조',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'PX01-04',desc:'간단한 인과 장난감 사용법 탐색 (예: 버튼을 누르면 소리가 나거나 뚜껑이 열리는 장난감에서, 영아가 우연한 성공 이후 동일한 동작을 반복하여 결과를 재현하려는 시도가 나타나는 상태)',acqTime:'9개월-12개월',redFlag:'15개월 이후에도 장난감의 작동 기전(누르기, 당기기, 돌리기 등)에 대한 의도적 탐색이 관찰되지 않고, 두드리기·입에 넣기 등 미분화된 감각 탐색 수준에 머물러 우연한 성공 후에도 동일 동작을 재현하려는 시도가 부재할 경우',unit:'단계',s1:'장난감을 두드리거나 입에 넣는 미분화된 탐색만 관찰됨',s2:'우연히 작동시킨 뒤 같은 동작을 1-2회 반복 시도하나 일관성 없음',s3:'인과관계를 파악하여 의도적으로 작동시키되 한 가지 방법에 고착됨',s4:'버튼·레버·뚜껑 등 복수의 작동 기전을 탐색하며 전략을 전환'},
{code:'PX01-05',desc:'익숙한 루틴에서 다음 단계 예측 동작 (예: 옷 입히기·기저귀 갈기 등 매일 반복되는 돌봄 루틴에서, 양육자의 다음 동작을 예측하여 스스로 팔을 소매 쪽으로 뻗거나 다리를 들어올리는 등 협조적 동작을 선제적으로 산출)',acqTime:'10개월-12개월',redFlag:'15개월 이후에도 매일 반복되는 돌봄 루틴(옷 입기, 기저귀 갈기, 목욕 등)에서 다음 단계를 예측하여 몸을 준비하는 협조적 동작이 전혀 관찰되지 않고, 양육자가 수동적으로 사지를 위치시켜야만 과정이 진행될 경우',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'}
],
vmi:[
{code:'VM01-01',desc:'사람/물체에 시각 고정(fixation) 유지 (예: 양육자가 수유나 안기 자세에서 자연스럽게 형성되는 얼굴 대 얼굴 거리(약 20-30cm 내외)에서 말을 걸 때, 영아가 얼굴을 향해 시선을 맞추고 잠시 동안 고정된 응시를 유지하는 상태)',acqTime:'1개월-3개월',redFlag:'3개월 이후에도 양육자의 얼굴이나 고대비 물체(흑백 패턴 등)에 대해 시선을 고정하려는 시도가 관찰되지 않거나, 빛 자극에는 반응하나 사람·물체에 대한 선택적 시각 주의가 부재할 경우 — 시각 경로 이상 및 사회적 주의 문제 감별을 위한 안과·발달 평가 의뢰 필요. CDC(2025)에 따르면 2개월경 사람 얼굴 주시가 기대되며, 3개월 이후에도 지속 부재 시 의뢰',unit:'초',s1:'시선이 얼굴 방향을 스치나 즉시 이탈하여 고정이 성립하지 않음',s2:'양육자와 짧은 시선 교환이 가능하나 외부 자극에 쉽게 이탈(약 2-3초 내외)',s3:'양육자가 말을 거는 동안 시선을 유지하며 표정 변화에 반응(약 4-5초 내외)',s4:'양육자의 표정·발성에 반응하며 안정적으로 응시를 유지하고, 시선을 이탈했다가 다시 되돌리는 재고정이 가능'},
{code:'VM01-02',desc:'시각 추적(visual tracking) 180° 부드러운 수행 (예: 영아의 정면에서 밝은 색 물체를 천천히 좌우로 이동시킬 때, 머리와 눈의 협응으로 물체를 정중선을 넘어 반대쪽까지 부드럽게 추적하는 동작)',acqTime:'2개월-4개월',redFlag:'5개월 이후에도 천천히 이동하는 물체를 눈으로 따라가지 못하거나, 정중선까지는 추적하나 정중선을 넘어가면 시선이 끊기고 반대쪽에서 새로 찾는 불연속적 추적 패턴이 지속될 경우. 추적 시 머리는 회전하나 안구 운동이 동반되지 않는 보상 양상에도 주의',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'VM01-03',desc:'시각 유도로 물건 정확히 잡기 (예: 눈으로 물건의 위치를 확인한 뒤 손을 뻗어, 물건의 크기와 위치에 맞게 손의 방향과 열림 정도를 조절하며 접근하여 쥐는 시각-운동 협응 동작)',acqTime:'4개월-6개월',redFlag:'6개월 이후에도 시야 내 물건을 보고 손을 뻗어 잡으려는 시도에서, 손이 물건의 위치로 수렴하지 못하고 반복적으로 빗나가거나, 물건을 응시하면서도 팔을 뻗으려는 시도 자체가 관찰되지 않을 경우',unit:'회/5회',s1:'물건을 향해 팔을 뻗으나 손이 물건에 도달하지 못하거나 빗나감(5회 중 성공 없음~1회)',s2:'물건에 손이 닿으나 쥐는 타이밍이 맞지 않아 놓치는 빈도가 높음(5회 중 2회)',s3:'대부분 성공적으로 잡으나 간헐적으로 손의 열림 정도가 물건 크기와 맞지 않는 미세 조절 실패가 관찰됨(5회 중 3-4회)',s4:'물건의 크기·위치에 따라 손의 접근 각도와 열림을 사전에 조절하여 유창하게 잡음'},
{code:'VM01-04',desc:'두 물체 중 원하는 것 시각 변별/선택 (예: 영아 앞에 두 가지 물건을 동시에 제시했을 때, 시선으로 번갈아 비교한 뒤 한쪽을 향해 의도적으로 손을 뻗어 선택하는 동작)',acqTime:'7개월-10개월',redFlag:'12개월 이후에도 두 물건 중 하나를 시각적으로 비교하여 선택하는 행동이 관찰되지 않고, 제시된 물건에 대해 무차별적으로 손을 뻗거나 어느 쪽에도 관심을 보이지 않을 경우',unit:'회/5회',s1:'두 물건을 번갈아 보지 않고 가까운 쪽이나 무작위로 손을 뻗어 의도적 선택이 관찰되지 않음',s2:'시선 비교가 간헐적으로 나타나나 손 뻗기가 시선 방향과 불일치하는 경우가 빈번(5회 중 1-2회 일치)',s3:'대부분 시선 방향과 일치하는 선택을 보이나 간헐적으로 반대쪽으로 손이 향함(5회 중 3-4회)',s4:'시선으로 비교한 뒤 일관되게 선호 물건을 향해 정확히 손을 뻗음'},
{code:'VM01-05',desc:'컵/상자에 물건 넣기(container play) (예: 열린 상자나 컵 안에 작은 블록을 하나씩 의도적으로 넣고, 넣은 뒤 결과를 확인하거나 쏟아내고 다시 넣는 담기-비우기 순환 놀이)',acqTime:'10개월-12개월',redFlag:'15개월 이후에도 열린 용기 안에 물건을 의도적으로 넣는 동작이 관찰되지 않고, 물건을 쥐고 흔들거나 두드리는 미분화 탐색에 머물러 "넣기-빼기"의 공간적 관계 탐색이 부재할 경우',unit:'개',s1:'용기 근처에서 물건을 놓치거나 용기 밖으로 떨어뜨려 담기가 성립하지 않음(0-1개)',s2:'용기 안에 넣으나 놓는 위치 조절이 미숙하여 일부만 성공(2개)',s3:'연속적으로 담되 간헐적으로 용기 가장자리에 부딪혀 밖으로 튕겨나감(3개)',s4:'용기의 크기·깊이에 맞게 손의 높이와 놓는 타이밍을 조절하며 연속 담기가 유창(4개 이상)'}
],
fine:[
{code:'FM01-01',desc:'손바닥 잡기(palmar grasp) 의도적 수행 (예: 딸랑이나 굵은 막대형 장난감을 손바닥 전체로 감싸 쥔 뒤, 흔들어 소리를 내거나 입으로 가져가는 등 쥔 상태에서 후속 탐색 활동이 이어지는 상태)',acqTime:'3개월-6개월',redFlag:'6개월 이후에도 손에 닿은 물건을 감싸 쥐는 동작이 반사적 수준에 머물러, 쥔 물건을 의도적으로 유지하며 흔들기·입으로 가져가기 등 후속 탐색으로 이어지지 않을 경우. 물건이 손에 닿아도 손가락이 열린 채 감싸지 못하는 양상이 지속될 경우',unit:'초',s1:'물건이 손에 닿으면 쥐나 즉시 놓쳐 후속 탐색이 불가',s2:'쥔 채 입으로 가져가려는 시도는 있으나 도중에 놓침(약 3-5초 내외 유지)',s3:'쥐고 흔들거나 입으로 가져가는 탐색이 가능하나 자세 변화 시 놓침(약 5-10초 내외 유지)',s4:'쥔 물건을 자유롭게 흔들고, 입으로 탐색하고, 반대쪽 손으로 전달하는 연속 활동이 가능'},
{code:'FM01-02',desc:'노쪽 손가락 잡기(radial-palmar grasp) (예: 성인 엄지손톱 크기 정도의 작은 블록을 잡을 때, 손의 새끼손가락(자쪽) 쪽이 아닌 엄지(노쪽) 쪽 손바닥과 손가락으로 물건을 감싸 쥐는 패턴이 출현하는 상태)',acqTime:'5개월-7개월',redFlag:'9개월 이후에도 블록이나 작은 물건을 잡을 때 새끼손가락 쪽(자쪽, ulnar side)으로만 감싸 쥐고 엄지 쪽(노쪽, radial side)으로의 전환이 관찰되지 않을 경우',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'FM01-03',desc:'하위 집게잡기(inferior pincer grasp) (예: 작은 간식(뻥튀기, 별사탕 등 아동 식품)을 엄지와 검지의 측면부를 맞대어 집어올리되, 아직 손가락 끝이 아닌 손가락 옆면을 사용하는 과도기적 집기 패턴)',acqTime:'7개월-9개월',redFlag:'10개월 이후에도 작은 물건을 집을 때 엄지와 다른 손가락의 대립(opposition)이 전혀 나타나지 않고 손바닥 전체로 긁어모으는 갈퀴잡기(raking grasp)만 사용하여, 자기 섭식 시 작은 간식을 스스로 집어 입으로 가져가지 못할 경우',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'FM01-04',desc:'정밀 집게잡기(neat pincer grasp) (예: 작은 시리얼 알갱이나 바닥의 작은 부스러기나 실밥 크기의 물건을 엄지와 검지의 끝(지문 부위)을 정확히 맞대어 집어올리는 정밀한 잡기 패턴)',acqTime:'10개월-12개월',redFlag:'12개월 이후에도 엄지와 검지 끝을 맞대어 작은 물건을 정밀하게 집는 동작이 관찰되지 않아, 자기 섭식 시 작은 음식 조각을 손가락 끝으로 집어올리지 못하고 손바닥으로 움켜쥐거나 테이블에 눌러 밀어서 잡는 보상 전략만 사용할 경우 — CDC(2025) "12개월까지 집게잡기(pincer grasp)" 기준 참조',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'FM01-05',desc:'손-입 탐색 수행 (예: 쥔 장난감이나 자신의 손가락을 입으로 가져가 빨거나 씹으며, 구강 내 촉각·고유수용 감각을 통해 물건의 질감·형태·크기를 탐색하는 감각운동 놀이)',acqTime:'3개월-5개월',redFlag:'5개월 이후에도 손에 쥔 물건이나 자신의 손가락을 입으로 가져가려는 시도가 관찰되지 않거나, 물건이 입 주변에 닿으면 고개를 돌리거나 울음으로 회피 반응을 보일 경우. 만약 손-입 경로 자체는 가능하나 구강 접촉 시에만 회피한다면, 운동 문제 이전에 구강 촉각 과반응 여부의 감별이 선행되어야 함',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'}
],
gross:[
{code:'GM01-01',desc:'양방향(바로 누운 자세↔엎드린 자세) 구르기 (예: 등에서 배로, 배에서 등으로 양방향 뒤집기가 가능하며, 한쪽 방향으로 굴러간 뒤 다시 원래 자세로 되돌아오는 자세 전환이 자유로운 상태)',acqTime:'4개월-7개월',redFlag:'7개월 이후에도 등→배 또는 배→등 어느 한 방향으로도 스스로 뒤집는 동작이 관찰되지 않거나, 한 방향(예: 등→배)만 가능하고 반대 방향은 전혀 시도하지 않아 바닥 놀이 중 자세 전환이 양육자 도움 없이 불가능할 경우 — CDC(2025) "6개월까지 양방향 구르기 시작" 기준 참조',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'GM01-02',desc:'배밀이/사지기기(creeping) 수행 (예: 배를 바닥에서 떼고 양손과 양무릎으로 체중을 지지한 채 목표 지점을 향해 이동하는 사지 교대 이동 패턴)',acqTime:'7개월-10개월',redFlag:'9개월 이후에도 원하는 물건이나 양육자를 향해 어떤 형태로든(배밀이, 엉덩이 끌기, 네발기기 등) 스스로 이동하려는 의도적 시도가 관찰되지 않고, 한 자리에서 울거나 손 뻗기만으로 요구를 표현할 경우 — CDC(2025) "9개월까지 이동 수단 출현" 기준 참조',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'GM01-03',desc:'가구 잡고 일어서기(pull-to-stand) (예: 소파나 낮은 테이블의 가장자리를 양손으로 잡고, 무릎 꿇기→반 무릎 서기→서기의 순서로 스스로 일어서는 자세 전환 동작)',acqTime:'8개월-12개월',redFlag:'12개월 이후에도 소파나 테이블 등 안정적인 지지면이 있음에도 스스로 잡고 일어서려는 시도가 관찰되지 않거나, 시도하더라도 양팔의 당기는 힘에만 의존하고 하지의 체중 지지가 동반되지 않아 서기 자세로의 전환이 성립하지 않을 경우 — CDC(2025) "12개월까지 pull-to-stand" 기준 참조',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'},
{code:'GM01-04',desc:'가구 잡고 옆걸음(cruising) (예: 소파나 낮은 가구의 가장자리를 한 손 또는 양손으로 잡은 채 옆으로 발을 떼어 이동하며, 가구를 따라 원하는 물건이나 양육자에게 접근하려는 측방 이동)',acqTime:'9개월-12개월',redFlag:'15개월 이후에도 가구를 잡고 선 상태에서 측방으로 발을 떼어 이동하는 동작이 관찰되지 않고, 서 있는 지점에서 양발이 바닥에 고정된 채 상체만 기울여 물건에 닿으려 하거나, 앉은 뒤 기어서 이동하는 방식으로만 위치를 전환할 경우',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'GM01-05',desc:'원시반사 소실 및 연령 적합 자세 정렬 (예: 머리를 한쪽으로 돌렸을 때 같은 쪽 팔다리가 자동으로 뻗는 양상(ATNR)이나, 머리를 숙이거나 젖힐 때 팔다리가 연동하여 굽혀지거나 펴지는 양상(STNR)이 소실되어, 머리 움직임과 독립적으로 사지를 조절할 수 있는 상태)',acqTime:'4개월-9개월',redFlag:'해당 소실 시기(ATNR: 4-6개월, STNR: 6-9개월) 이후에도 머리 위치 변화에 따라 사지가 자동으로 연동되는 패턴이 지속되어, 네발기기 시 머리를 들면 팔이 펴지고 다리가 접혀 진행이 붕괴되거나, 앉은 자세에서 고개를 돌리면 같은 쪽 팔이 뻗으며 쥔 물건을 놓치는 양상이 반복될 경우 — 원시반사의 지속적 잔존이 확인될 경우 신경학적 평가 의뢰(AAP)',unit:'질적',s1:'머리 회전이나 자세 변화 시 사지의 자동적 연동 패턴이 다수 관찰되어 수의적 동작을 방해',s2:'특정 자세(예: 네발기기, 앉기)에서 2-3가지 반사적 연동 패턴이 간헐적으로 관찰됨',s3:'대부분의 자세에서 수의적 조절이 가능하나 피로 시 또는 특정 자세에서 1가지 잔존 패턴이 나타남',s4:'머리 움직임과 사지 동작이 독립적으로 조절되며 반사적 연동 패턴 미관찰'}
],
oral:[
{code:'OM01-01',desc:'빨기-삼키기-호흡 협응(suck-swallow-breathe coordination) (예: 수유 시 빨기-삼키기-호흡의 세 가지 동작이 리듬적으로 교대하며(통상 연속 3-5회 빨기 후 삼킴-호흡 사이클), 사레 들림이나 호흡 중단 없이 수유가 안정적으로 진행되는 상태)',acqTime:'0개월-1개월',redFlag:'만삭 출생아에서 수유 시 빨기-삼키기-호흡의 리듬이 성립하지 않아 수유 중 반복적으로 사레가 들리거나, 수유를 위해 호흡을 멈추는 양상이 관찰되거나, 젖꼭지를 물고도 흡인력이 발생하지 않아 수유 자체가 진행되지 않을 경우 — 수유 곤란이 지속될 경우 신경학적, 구조적, 구강운동 원인의 복합 평가를 위해 즉시 의뢰(AAP)',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'OM01-02',desc:'구강 탐색(oral exploration) (예: 손에 쥔 장난감이나 천 조각 등을 입에 넣어 빨거나 씹으며, 혀와 입술로 물건의 질감·형태·온도를 탐색하는 구강 감각운동 활동)',acqTime:'3개월-5개월',redFlag:'5개월 이후에도 손에 쥔 물건을 입으로 가져가려는 시도가 관찰되지 않거나, 물건이 입술이나 혀에 닿으면 고개를 돌리고 울거나 구역질 반응을 보이는 일관된 회피 패턴이 나타날 경우. 만약 손-입 경로 자체는 가능하나 구강 접촉 시에만 회피한다면, 운동 문제 이전에 구강 촉각 과반응 여부의 감별이 선행되어야 함',unit:'질적',s1:'최대도움',s2:'중간도움',s3:'최소도움',s4:'독립수행'},
{code:'OM01-03',desc:'숟가락으로 퓌레 섭취 시 상순 닦아내기 (예: 양육자가 숟가락으로 퓌레를 입에 넣어줄 때, 윗입술이 능동적으로 내려와 숟가락 위의 음식을 닦아내며, 입을 벌린 채 수동적으로 밀어넣어지는 것이 아닌 능동적 상순 참여가 관찰되는 상태)',acqTime:'5개월-7개월',redFlag:'9개월 이후에도 숟가락이 입에 접근하면 고개를 돌리거나 입을 다무는 거부 반응이 지속되거나, 숟가락을 받아들이더라도 윗입술이 내려오지 않아 양육자가 윗잇몸에 문질러 넣어야만 섭취가 가능한 수동적 패턴이 지속될 경우. 만약 손가락 섭식(finger feeding)은 수용하나 숟가락에만 거부한다면, 숟가락의 질감이나 크기에 대한 구강 촉각 과반응 여부의 감별이 선행되어야 함',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'OM01-04',desc:'으깨기 패턴(munching pattern) 출현 (예: 잘 익힌 당근이나 바나나 조각 등 부드러운 고형식을 입에 넣었을 때, 턱이 상하로 리듬적으로 움직이며 음식을 으깨는 초기 저작 패턴이 나타나는 상태)',acqTime:'6개월-9개월',redFlag:'9개월 이후에도 부드러운 고형식을 입에 넣었을 때 턱의 상하 운동이 나타나지 않고, 혀로 밀어내거나 그대로 삼키려는 시도만 관찰되어 퓌레 이상의 질감으로 이유식 진행이 이루어지지 않을 경우. 만약 고형식을 입에 넣는 것은 수용하나 턱의 상하 운동만 부재한다면, 감각적 거부와 구강 운동 계획 문제의 감별이 선행되어야 함',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'},
{code:'OM01-05',desc:'혀의 측방 이동(tongue lateralization) (예: 잇몸 위에 놓인 부드러운 음식 조각을 혀가 좌우로 밀어 씹는 쪽으로 이동시키며, 음식을 구강 내에서 능동적으로 재배치하는 혀 운동)',acqTime:'9개월-12개월',redFlag:'12개월 이후에도 입 안의 음식을 혀로 좌우 잇몸 쪽으로 이동시키지 못하여, 음식이 혀 위 중앙에 머문 채 그대로 삼키려 하거나 입 밖으로 밀어내는 양상이 반복될 경우. 측방 이동 부재가 확인될 경우, 고형식이 충분히 저작되지 않은 채 삼켜져 질식 위험이 있으므로 이유식 질감 단계를 측방 이동 출현 시까지 유지하고 구강운동 평가를 의뢰한다',unit:'질적',s1:'매우미숙',s2:'미숙',s3:'대체로능숙',s4:'능숙'}
]
},
'13-23m':{
postural:[
{code:'PC02-01',desc:'독립 보행 시 안정성 (예: 평평한 실내 바닥에서 양손의 지지 없이 연속적으로 걸음을 이어가며, 일정한 거리(약 2-3m 이상)를 넘어짐 없이 목적지까지 이동하는 상태)',acqTime:'12개월-18개월',redFlag:'18개월 이후에도 가구 지지 없이 스스로 걸음을 떼지 못하거나, 보행을 시도하더라도 한쪽 다리만 앞으로 내디디고 반대쪽은 끌거나 접히는 양상이 지속될 경우 — CDC(2025) "18개월까지 독립 보행" 기준에 따라 최우선 의뢰',unit:'질적',s1:'잡지 않고 발을 떼면 1-2걸음 내에 주저앉거나 가구로 되돌아감',s2:'짧은 거리(약 3-5걸음)는 독립 보행이 가능하나 넓은 보폭·벌린 양팔·잦은 휘청거림 등 초기 보행 양상이 두드러짐',s3:'연속 보행이 유창하며 속도·방향을 조절할 수 있으나 바닥 상태 변화나 장애물에 취약하여 간헐적으로 휘청거림',s4:'양팔을 자연스럽게 내린 안정된 보행 자세로 실내를 자유롭게 이동하며 물건을 들고도 보행이 유지됨'},
{code:'PC02-02',desc:'쪼그려 앉았다 재기립(squat-to-stand) (예: 바닥에 떨어진 장난감을 줍기 위해 선 자세에서 무릎과 고관절을 굽혀 쪼그려 앉은 뒤, 장난감을 쥔 채 손 지지 없이 다시 일어서 보행으로 이어가는 자세 전환 동작)',acqTime:'13개월-18개월',redFlag:'23개월 이후에도 선 자세에서 바닥 물건을 집을 때 쪼그려 앉았다 다시 일어서는 전환 패턴이 관찰되지 않고, 엉덩이를 바닥에 붙여 앉거나 무릎을 꿇는 방식으로만 바닥에 접근하는 양상이 지속될 경우',unit:'회/5회',s1:'쪼그려 앉기 자체가 성립하지 않아 바닥 물건을 집으려면 주저앉거나 무릎을 꿇어야 함(5회 중 0-1회 성공)',s2:'쪼그려 앉기는 가능하나 일어설 때 손을 바닥이나 가구에 짚는 보상이 필요(5회 중 2회 성공)',s3:'대부분 손 지지 없이 재기립하나 무거운 물건을 들거나 빠른 속도에서 간헐적으로 균형을 잃음(5회 중 3-4회 성공)',s4:'쪼그려 앉기-서기-보행 전환이 유창하며 양손에 물건을 들고도 안정적 수행(5회 중 5회 성공)'},
{code:'PC02-03',desc:'걸으며 방향 전환 시 균형 유지 (예: 걷던 중 양육자가 반대 방향에서 이름을 부르거나 손짓할 때, 걸음을 멈추지 않거나 짧은 정지 후 몸통과 발을 함께 회전시켜 부르는 쪽으로 방향을 바꾸는 동작)',acqTime:'18개월-23개월',redFlag:'23개월 이후에도 걷는 도중 방향을 바꾸려 할 때 반복적으로 넘어지거나, 방향 전환 자체를 회피하여 매번 멈추고 앉은 뒤 다시 일어서는 우회 전략만 사용할 경우. 한쪽 방향(예: 좌회전)은 가능하나 반대 방향은 일관되게 실패하는 비대칭 패턴이 관찰될 경우 일측 전정 기능이나 신경학적 편측성 문제와의 감별이 선행되어야 함',unit:'질적',s1:'보행 중 방향 전환 시도 자체가 성립하지 않아, 방향을 바꾸려면 완전히 멈춘 뒤 앉았다 다시 일어나 출발하는 우회 전략만 사용',s2:'방향 전환을 시도하나 체중 이동이 미숙하여 회전 중 주저앉거나 넘어지는 빈도가 높음',s3:'대부분 넘어지지 않고 방향을 바꾸나 회전 각도가 클수록(예: 180°) 휘청거림이 관찰됨',s4:'보행 속도나 회전 각도에 관계없이 유창하게 방향을 바꾸며 물건을 들고도 안정적 수행'},
{code:'PC02-04',desc:'엎드린 자세 신전(prone extension) 유지 (예: 바닥에 엎드린 자세에서 양팔을 앞으로 뻗고 양다리를 뒤로 뻗어 몸통을 활처럼 들어올린 채, 양육자와 시선을 맞추거나 노래·손유희 놀이를 이어가며 자세를 유지하는 상태)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 엎드린 자세에서 팔과 다리를 동시에 들어올리는 동작이 놀이 시작 전에 무너져 자세 유지 자체가 성립하지 않거나, 팔은 들어올리나 다리는 바닥에 붙은 채 움직이지 않는 양상이 지속될 경우. 만약 자세는 취하나 좌우 또는 상하 활성화가 일관되게 비대칭이라면 체간 신전근의 편측 약화 여부에 대한 감별이 선행되어야 함',unit:'질적',s1:'엎드린 자세에서 팔과 다리를 동시에 들어올리는 동작 자체가 성립하지 않거나, 순간적으로 들어올렸다가 놀이가 시작되기 전에 무너짐',s2:'팔과 다리를 들어올리나 짧은 시간만 유지되어 양육자와의 시선 교환이나 짧은 놀이 한 차례(약 4-6초 내외) 전에 자세가 무너짐',s3:'동요 한 소절을 부르는 동안(약 7-10초 내외) 자세 유지가 가능하나, 팔과 다리 중 일부가 먼저 떨어져 좌우·상하 활성화가 고르지 않음',s4:'동요 여러 소절이나 반복적 놀이 상호작용 동안(약 10초 이상) 양팔·양다리·체간 신전이 고른 활성화로 안정적으로 유지됨'},
{code:'PC02-05',desc:'밀고 당기는 장난감 잡고 보행 안정 (예: 끌차·유모차 장난감 등의 손잡이를 잡고 밀거나, 줄이 달린 장난감을 당기며 걷는 동안, 장난감의 속도·방향 변화에 맞추어 체간을 조절하며 보행을 지속하는 상태)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 바퀴 달린 장난감이나 줄 달린 장난감을 잡고 걷는 동작이 성립하지 않아, 장난감을 잡는 순간 서기 자세가 무너지거나 장난감을 잡고 선 채로 장난감만 움직일 뿐 몸의 이동이 동반되지 않을 경우',unit:'질적',s1:'최대도움(장난감을 잡는 순간 서기 자체가 무너져 양육자의 몸통 지지가 필요)',s2:'중간도움(양육자가 손잡이를 함께 잡아주면 몇 걸음 이동 가능)',s3:'최소도움(혼자 밀거나 당기며 걷되 장난감이 방향을 벗어나면 멈추고 재조정 필요)',s4:'독립수행(장난감의 속도·방향 변화에 따라 체간을 능동적으로 조절하며 회전·후진도 수행)'}
],
bilateral:[
{code:'BI02-01',desc:'양손으로 큰 공 안거나 굴리기 (예: 아동의 가슴 폭 정도 크기의 공을 양팔로 동시에 감싸 안은 뒤, 양육자를 향해 바닥에 굴려 보내거나 되돌려받는 상호작용 놀이)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 공을 양팔로 감싸 안는 대칭적 동작이 성립하지 않아, 공의 크기와 무관하게 한쪽 팔만 사용하거나 공 위에 몸을 눌러 붙잡는 방식만 관찰될 경우',unit:'회/5회',s1:'공을 양팔로 감싸 안는 동작 자체가 성립하지 않아 한 손으로 공을 밀거나 공 위에 몸을 던져 눌러잡는 양상만 나타남(5회 중 0-1회 성공)',s2:'양팔로 안기는 가능하나 굴리기로 이어지지 않아 공을 안은 채로 떨어뜨리거나 놓쳐버림(5회 중 2회 성공)',s3:'대부분 양팔로 안아 굴리기까지 이어지나, 공이 한쪽으로 치우쳐 있을 때 반대쪽 팔의 참여가 지연되어 비대칭 동작이 간헐적으로 관찰됨(5회 중 3-4회 성공)',s4:'공의 위치가 정중선을 벗어나도 양팔이 함께 참여하며 공을 안고 굴려 되돌려주는 상호작용을 연속적으로 수행(5회 중 5회 성공)'},
{code:'BI02-02',desc:'한 손 고정/다른 손 조작 역할 분화 (예: 한 손으로 컵·상자 등 용기를 잡아 고정한 상태에서, 반대쪽 손으로 블록을 집어 안에 넣거나, 그림책의 플랩을 열거나, 상자의 뚜껑을 들어올리는 등 양손이 서로 다른 역할을 동시에 수행하는 동작)',acqTime:'13개월-18개월',redFlag:'23개월 이후에도 용기를 손으로 들어 고정한 상태에서 반대쪽 손으로 내용물을 조작하는 기능이 성립하지 않아, 바닥에 놓인 용기 안에만 물건을 넣거나 플랩·뚜껑을 열 때 양손이 같은 방향으로 움직여 조작이 이루어지지 않는 양상이 지속될 경우',unit:'질적',s1:'한 손으로 물건을 고정하는 개념 자체가 성립하지 않아, 용기를 바닥에 놓고 한 손씩 교대로 사용하거나 양손으로 같은 동작만 반복',s2:'용기를 잡는 시도는 있으나 조작하는 손이 움직이면 고정하던 손도 함께 움직여 역할 분화가 무너짐',s3:'대부분 역할 분화가 유지되나 조작이 복잡해지면(예: 작은 블록 여러 개 연속 넣기) 고정하던 손의 힘이 풀려 용기가 기울어짐',s4:'양손의 역할을 안정적으로 분화하여 고정-조작을 유창하게 수행하며 용기의 크기나 위치 변화에도 자세를 조절'},
{code:'BI02-03',desc:'양손으로 블록 쌓기 (예: 한 손으로 아래 블록의 위치를 고정한 뒤, 반대쪽 손으로 윗블록을 올려놓는 양손 협응 동작. 2.5-3cm 크기의 나무·플라스틱 블록 사용)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 블록 2개를 연속으로 쌓는 동작이 성립하지 않아, 블록을 세로로 올려놓는 동작이 관찰되지 않고 옆으로 늘어놓거나 두드리는 수준에 머무를 경우 — Bayley-III 및 CDC 기준상 18개월에 2-3개, 24개월에 6개 쌓기가 기대됨',unit:'개',s1:'블록을 집어 다른 블록 위에 올리는 시도 자체가 성립하지 않거나 올리더라도 즉시 무너져 쌓기가 성립하지 않음(1개)',s2:'아래 블록을 고정하지 않은 채 쌓아 첫 블록 위에 하나만 간신히 올림(2개)',s3:'아래를 고정하며 3개까지 쌓으나 수직 정렬이 어긋나 기울어진 탑 형태로 쌓임(3개, 해당 연령 정상 수준)',s4:'양손의 고정-조작 분화가 안정적으로 이루어져 4개 이상 연속 쌓기에 성공(4개 이상)'},
{code:'BI02-04',desc:'양발 모아 제자리 뛰기 시도 (예: 양발을 동시에 바닥에서 떼어 제자리에서 살짝 튀어오르거나, 낮은 단(약 5-10cm 높이)에서 양발을 가깝게 모아 내려서는 양측 대칭 동작)',acqTime:'18개월-23개월',redFlag:'2세 6개월까지 양발을 동시에 바닥에서 떼는 시도 자체가 전혀 관찰되지 않고, 점프해 보라는 언어 지시나 양육자의 시연에도 한쪽 발을 들어올리거나 제자리 걷기로만 반응할 경우. 만약 양발 떼기는 시도하나 체간이 앞으로 무너지며 반복적으로 넘어지는 양상이 동반된다면 체간 신전 조절과의 감별이 선행되어야 함',unit:'질적',s1:'양발을 동시에 바닥에서 떼는 동작 자체가 성립하지 않아, 한쪽 발만 들거나 걷기 동작으로 대체됨',s2:'양발 떼기를 시도하나 한쪽 발이 먼저 떨어져 실제로는 점프라기보다 step으로 이어지는 양상이 두드러짐',s3:'양발이 거의 동시에 떨어지나 체공 시간이 매우 짧고 착지 시 흔들림이 관찰되며, 착지 후 양육자의 손을 짚거나 다음 동작으로 이어가기 전 짧은 정지가 필요',s4:'양발을 동시에 떼고 양발로 동시에 착지하며, 착지 후 비교적 안정적으로 자세를 유지'},
{code:'BI02-05',desc:'양손으로 박수를 리듬에 맞춰 연속 수행 (예: 양육자가 부르는 동요의 리듬에 맞추어 양손을 정중선에서 연속적으로 맞부딪히며, 노래가 이어지는 동안 박수를 지속하는 양측 대칭 동작)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 노래나 양육자의 시연이 제시될 때 양손을 정중선에서 연속적으로 맞부딪히는 박수가 전혀 이어지지 않고, 단발성 박수 한 번 후에 중단되거나 양손을 교차하지 않고 한 손만 움직이는 양상이 지속될 경우',unit:'회',s1:'양손이 정중선에서 만나 맞부딪히는 박수 형태가 성립하지 않아, 한 손으로 다른 손을 치거나 양손이 빗나가는 비대칭 동작만 관찰됨(1-2회)',s2:'정중선에서 양손이 맞부딪히는 박수는 가능하나 짧게 끊기며 노래가 끝나기 전에 멈춤(3-4회)',s3:'정중선에서 양손이 정확히 맞부딪히며 연속 수행하나, 자신의 속도로만 박수 치고 노래의 빠르기 변화와는 무관(5-6회)',s4:'연속 박수가 안정적이며 노래가 빨라지거나 느려질 때 박수 속도를 일부 조정하려는 시도가 관찰됨(7회 이상)'}
],
praxis:[
{code:'PX02-01',desc:'단순 도구 사용 모방 (예: 양육자가 빗으로 머리를 빗는 동작을 보여주면, 아동이 빗을 건네받아 자신의 머리에 대고 빗질하는 동작을 산출하거나, 전화기를 귀에 대고 옹알이하는 등 도구의 기능에 맞는 동작을 모방하여 재현하는 상태)',acqTime:'13개월-18개월',redFlag:'23개월 이후에도 양육자가 반복적으로 시연한 뒤 도구를 건네주더라도, 도구의 기능에 맞는 동작(빗질, 전화 대기 등)을 산출하려는 시도가 관찰되지 않고 미분화 탐색(입에 넣기, 두드리기)에 머무를 경우',unit:'질적',s1:'도구를 건네받으면 입에 넣거나 두드리는 미분화 탐색만 관찰되며, 양육자의 시연을 보고도 도구의 기능적 사용 동작을 산출하려는 시도가 부재',s2:'양육자의 시연 직후 도구를 적절한 신체 부위 방향으로 가져가는 시도는 있으나 동작의 방향이나 위치가 부정확(예: 빗을 얼굴에 대거나, 전화기를 이마에 대는 등)',s3:'도구를 기능에 맞는 신체 부위에 대고 적절한 동작을 산출하나 시연 없이는 자발적 사용이 관찰되지 않음',s4:'양육자의 시연 없이도 도구를 보면 자발적으로 기능에 맞는 동작을 산출'},
{code:'PX02-02',desc:'양육자 집안일 모방 (예: 양육자가 빗자루로 바닥을 쓰는 것을 본 뒤, 아동이 빗자루를 잡고 앞뒤로 움직이며 쓸기 흉내를 내거나, 걸레·행주를 잡고 테이블을 문지르는 등 대근육 수준의 가사 동작을 모방하여 재현하는 상태)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 양육자의 가사 동작(쓸기, 닦기, 쏟기 등)을 관찰한 뒤 도구를 잡고 비슷한 동작을 산출하려는 시도가 전혀 관찰되지 않을 경우. 만약 도구를 잡고 움직이는 시도는 있으나 도구의 기능과 무관한 동작(빗자루를 수직으로 들고 행진하기 등)만 반복한다면 운동 기획(motor planning) 중 관념화(ideation) 단계의 어려움이 의심됨 — CDC(2025) "18개월까지 다른 사람의 행동을 따라하려는 시도" 기준 참조',unit:'질적',s1:'양육자의 가사 동작을 관찰하더라도 도구를 잡고 비슷한 동작을 산출하려는 시도가 관찰되지 않으며, 도구를 건네받으면 운반하거나 미분화 탐색(두드리기, 끌기)에 머무름',s2:'도구를 잡고 양육자와 비슷한 방향으로 움직이려는 시도는 있으나 쓸기의 전후 이동 패턴이 출현하지 않고 한 곳에서 반복적으로 상하 두드리거나 도구를 들고 제자리에서 흔드는 수준에 머무름',s3:'가사 동작의 기본 패턴(앞뒤 쓸기, 좌우 닦기)을 모방하여 산출하나 도구의 접촉면이 바닥·테이블에 닿지 않는 등 공간적 정확도가 부족',s4:'도구의 접촉면을 바닥·테이블에 적절히 대고 가사 동작의 방향·리듬을 양육자와 유사하게 재현하며, 양육자와 함께 하는 놀이로 확장'},
{code:'PX02-03',desc:'장애물을 넘거나 기어 지나가기 (예: 거실 바닥에 놓인 쿠션(높이 약 15-20cm)을 기어올라 넘거나, 의자 아래 공간이나 아동용 터널을 통과하는 등 신체 크기와 장애물 크기를 비교하여 이동 전략을 선택하는 운동 기획 과제)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 바닥의 낮은 장애물(쿠션, 베개 등 높이 약 15-20cm)을 넘거나 통과하려는 시도가 관찰되지 않고, 장애물 앞에서 멈추어 양육자의 도움 없이는 이동이 재개되지 않는 양상이 지속될 경우',unit:'질적',s1:'장애물 앞에서 멈추어 서거나 우회하지 못하고 울거나 양육자에게 도움을 요청하며, 넘기·기어가기·돌아가기 등 어떠한 해결 전략도 자발적으로 시도하지 않음',s2:'하나의 전략(예: 기어 넘기)만 반복적으로 시도하며, 그 전략이 실패해도(예: 높이가 너무 높아 올라가지 못해도) 다른 전략(돌아가기, 아래로 기어가기)으로 전환하지 않음',s3:'장애물의 특성에 따라 2가지 이상의 전략(높은 장애물 기어 넘기, 낮은 공간 엎드려 통과하기, 돌아가기 등)을 사용하나 전략 선택이 장애물 특성과 항상 일치하지는 않음(예: 걸어 넘을 수 있는 낮은 쿠션에도 엎드려 기어가기를 선택)',s4:'장애물의 높이·넓이를 관찰한 뒤 적절한 전략(높은 것은 기어 넘기, 낮은 공간은 몸을 낮추어 통과, 큰 것은 돌아가기)을 선택하여 수행하며, 한 전략이 실패하면 다른 전략으로 전환'},
{code:'PX02-04',desc:'새로운 장난감 관찰 후 조작법 시도 — 관념화(ideation) (예: 처음 보는 팝업 장난감에서 버튼·레버·다이얼 등 여러 작동 기전을 시각적으로 관찰한 뒤, 눌러보기·당겨보기·돌려보기 등 다양한 접근 방식을 자발적으로 시도하여 장난감을 작동시키려는 탐색적 문제 해결 과정)',acqTime:'18개월-23개월',redFlag:'2세 6개월 이후에도 새로운 장난감의 작동 기전에 대해 다양한 조작 방식을 시도하는 탐색적 문제 해결이 관찰되지 않고, 익숙한 장난감에서 이미 학습한 한 가지 동작만 반복하거나 미분화 탐색(두드리기, 입에 넣기)에 머무를 경우. 만약 양육자가 시연하면 즉시 모방하여 작동시키나 시연 없이 새로운 장난감에서는 자발적 조작 시도가 부재하는 양상이 관찰된다면, 모방 실행은 가능하되 자발적 관념화(ideation)의 어려움과의 감별이 선행되어야 함',unit:'질적',s1:'새로운 장난감을 받으면 미분화 탐색(입에 넣기, 두드리기, 던지기)에 머물며 장난감의 작동 기전을 관찰하거나 다양한 조작 방식을 시도하려는 양상이 관찰되지 않음',s2:'장난감을 시각적으로 관찰하는 시간이 나타나나, 조작 시도가 한 가지 방식(예: 누르기)에 고착되어 실패해도 같은 방식만 반복',s3:'2-3가지 조작 방식을 시도하며 실패 후 다른 방식으로 전환하나, 전환 사이에 긴 정지가 있거나 양육자의 힌트(가리키기 등)가 필요',s4:'장난감의 작동 부위를 시각적으로 탐색한 뒤 다양한 조작 방식을 자발적으로 시도하며, 실패 시 빠르게 대안 전략으로 전환하여 작동에 성공'},
{code:'PX02-05',desc:'"~해 줘" 지시에 따라 한 단계 운동 수행 (예: "공 가져와"라는 언어 지시를 듣고, 공이 있는 위치로 이동하여 공을 집어 양육자에게 돌아오는 일련의 운동 순서를 계획하고 실행하는 과제)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 "공 가져와", "신발 가져와" 등의 한 단계 언어 지시에 대해 대상 물건을 향한 이동·집기·되돌아오기의 운동 순서가 관찰되지 않을 경우. 만약 지시의 대상 물건을 시선으로 찾거나 가리키는 반응은 있으나 운동 실행이 뒤따르지 않는다면 언어 이해는 가능하되 운동 순서 실행의 어려움으로 볼 수 있으며, 지시 자체에 대한 반응(시선 이동, 가리키기 등)도 부재하다면 수용 언어 이해와의 감별이 선행되어야 함 — CDC(2025) "18개월까지 한 단계 지시 이해" 기준 참조',unit:'질적',s1:'언어 지시 후 운동 반응이 관찰되지 않거나 지시와 무관한 동작(제자리에서 다른 장난감 조작 등)을 수행',s2:'지시의 대상 물건을 시선으로 찾거나 물건 방향으로 이동하는 시도는 있으나, 물건을 집은 뒤 양육자에게 돌아오는 후속 단계로 이어지지 않음',s3:'지시에 따라 물건을 찾아 가져오는 전체 순서를 수행하나, 물건이 시야 밖에 있거나 다른 방에 있을 경우 수행이 중단됨',s4:'물건이 시야 내에 있을 때 지시에 따라 찾아 가져오는 순서를 유창하게 수행하며, 대상 물건이 달라지는 한 단계 변형 지시("공 가져와" → "신발 가져와" 등)에도 유연하게 적용'}
],
vmi:[
{code:'VM02-01',desc:'컵에 블록 넣고 빼기 — 담기 놀이(container play) (예: 열린 컵이나 작은 양동이에 블록(약 2.5-3cm 크기)을 하나씩 의도적으로 넣은 뒤 쏟아내고 다시 넣는 순환 놀이를 반복하며, 담는 개수를 점차 늘려가는 시각-운동 협응 활동)',acqTime:'12개월-18개월',redFlag:'18개월 이후에도 열린 용기에 블록을 연속적으로 넣고 쏟아내는 순환 놀이가 관찰되지 않고, 블록 1개를 넣는 수준에 머물거나 용기 안에 넣은 블록을 꺼내어 다시 넣는 반복 탐색으로 확장되지 않을 경우. 만약 큰 블록은 담으나 작은 블록(약 2.5cm 이하)에서 담기가 실패하는 양상이 나타난다면, 시각-운동 통합 이전에 미세운동 조절(FM02 참조)과의 교차 확인이 필요',unit:'개',s1:'블록을 용기 근처에서 놓쳐 담기가 성립하지 않거나, 용기 안에 넣는 시도 없이 블록을 던지거나 두드리는 미분화 탐색에 머무름(0-1개)',s2:'용기 안에 넣기는 가능하나 손의 높이·놓는 타이밍 조절이 미숙하여 용기 가장자리에 부딪혀 일부만 성공(2-3개)',s3:'연속적으로 담되 블록 크기가 작아지거나 용기 입구가 좁아지면 성공률이 저하(4-5개)',s4:'용기의 크기·깊이에 맞게 손의 높이와 놓는 타이밍을 조절하며 유창하게 연속 담기를 수행하고, 쏟아내기-다시 담기 순환이 놀이로 정착(6개 이상)'},
{code:'VM02-02',desc:'크레용으로 끼적이기(scribble) 자발적 수행 (예: 굵은 크레용(지름 약 1-1.5cm)을 쥐고 종이 위에 전후·좌우·원형 등의 선 흔적을 자발적으로 남기며, 흔적이 생기는 결과를 확인하고 반복하는 시각-운동 피드백 놀이)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 굵은 크레용을 종이에 대고 이동시켜 선 흔적을 남기는 동작이 관찰되지 않고, 크레용을 쥐고 두드리거나 입에 넣는 미분화 탐색에 머무를 경우 — CDC(2025) "18개월까지 끼적이기 시작" 기준 참조',unit:'질적',s1:'크레용을 건네받으면 입에 넣거나 두드리는 미분화 탐색만 관찰되며, 종이 위에 눌러 흔적을 남기려는 시도가 부재',s2:'크레용을 종이에 대고 누르는 시도는 있으나 이동 동작이 동반되지 않아 점 수준의 흔적만 남거나, 필압이 불충분하여 흔적이 거의 나타나지 않음',s3:'종이 위에 전후 또는 좌우 방향의 선 흔적을 남기며 끼적이기가 성립하나, 크레용을 쥔 손의 이동 범위가 좁아 종이의 한 부분에만 흔적이 집중됨',s4:'종이의 여러 영역에 걸쳐 다양한 방향(전후·좌우·원형)의 끼적이기 흔적을 남기며, 흔적이 생기는 결과를 시각적으로 확인하고 반복하는 순환이 관찰됨'},
{code:'VM02-03',desc:'모양판 퍼즐 맞추기 시도 (예: 원·네모·세모의 3가지 기본 도형이 파인 모양판(formboard)에서, 도형 조각을 들어올린 뒤 해당 홈에 맞추어 끼워넣으려는 시각-공간 매칭 과제)',acqTime:'18개월-23개월',redFlag:'2세 6개월 이후에도 가장 단순한 도형(원)조차 모양판의 해당 홈에 맞추어 끼워넣으려는 시도가 관찰되지 않고, 조각을 홈 위에 무작위로 올려놓거나 모양판을 두드리는 수준에 머무를 경우',unit:'질적',s1:'도형 조각을 모양판 위에 올려놓으나 홈에 맞추려는 시도가 관찰되지 않고, 조각을 무작위로 놓거나 두드리는 수준에 머무름',s2:'홈에 조각을 맞추려는 시도는 있으나 도형의 방향을 회전시키지 못하여, 원(방향 무관)만 성공하고 네모·세모에서는 실패를 반복',s3:'원과 네모를 성공적으로 끼워넣으며 세모에서는 방향 조절에 시행착오가 관찰되나 반복 시도 후 성공',s4:'원·네모·세모 3가지 기본 도형을 시행착오 없이 또는 최소한의 시행착오로 정확히 끼워넣음'},
{code:'VM02-04',desc:'큰 구멍에 도형 통과시키기 — 도형 분류함(shape sorter) (예: 도형 분류함의 동그라미·네모·세모 구멍에 해당 블록을 맞추어 밀어넣는 과제. 모양판 퍼즐(VM02-03)과 달리 3차원 공간에서의 도형 회전과 밀어넣기가 요구됨)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 도형 블록과 구멍의 시각적 대응(matching)을 시도하지 않아 가장 단순한 구멍(원)에도 블록을 맞추어 밀어넣으려는 시도가 관찰되지 않고, 블록을 구멍 위에 올려놓거나 분류함의 뚜껑을 열어 직접 넣는 우회 전략만 사용할 경우',unit:'질적',s1:'도형 블록을 분류함의 구멍에 대응시키려는 시도가 관찰되지 않고, 블록을 구멍 위에 올려놓거나 분류함을 두드리는 수준에 머무름',s2:'블록을 구멍에 맞추려는 시도는 있으나 무작위로 여러 구멍에 대어보며 시행착오가 과도하고, 원(방향 무관)만 간헐적으로 성공',s3:'원과 네모를 각각의 구멍에 맞추어 통과시키며, 세모에서는 블록을 회전시키는 시행착오가 관찰되나 반복 시도 후 성공',s4:'3가지 기본 도형을 각각의 구멍에 빠르게 대응시켜 통과시키며, 시행착오가 최소화됨'},
{code:'VM02-05',desc:'세로선/가로선 모방 시도 (예: 평가자가 종이에 세로선을 또렷하게 그어 보여준 뒤, 아동이 굵은 크레용(지름 약 1-1.5cm)으로 위에서 아래 방향의 선을 모방하여 그으려는 시도. 끼적이기(VM02-02)와 달리 특정 방향의 선을 시각적 모델에 맞추어 재현하는 과제)',acqTime:'20개월-24개월 (시도 출현 20m 전후, 세로선 모방 성공은 24m 전후 — Beery VMI, Bayley-III 참조)',redFlag:'2세 6개월 이후에도 평가자가 세로선을 시연한 뒤 아동이 모방하여 위에서 아래(또는 아래에서 위) 방향의 선을 그으려는 시도가 관찰되지 않고, 시연과 무관한 자유 끼적이기만 산출될 경우. 만약 끼적이기(VM02-02)는 자발적으로 수행하나 시연된 선을 모방하는 과제에서만 실패한다면, 시각-운동 통합 이전에 시각적 모델 주의(visual attention to model)의 문제와의 감별이 선행되어야 함',unit:'질적',s1:'평가자의 시연을 관찰한 뒤에도 자유 끼적이기와 구분되지 않는 무방향적 흔적만 산출하며, 시연된 선의 방향을 따라가려는 시도가 관찰되지 않음',s2:'시연된 선의 대략적 방향(세로 또는 가로)으로 크레용을 이동시키는 시도는 있으나, 선의 시작점에서 끝점까지 연속적으로 이어지지 않고 중간에 끊기거나 곡선으로 이탈',s3:'세로선 또는 가로선 중 하나의 방향에서 시작점-끝점이 연결되는 대략적인 직선을 산출하나, 다른 방향에서는 아직 시도가 부정확',s4:'세로선과 가로선 모두 시연된 방향과 일치하는 대략적 직선을 산출하며, 시연 후 즉시 모방하여 재현'}
],
fine:[
{code:'FM02-01',desc:'숟가락 들기/자가 섭취 시도 (예: 아동용 숟가락을 손바닥 잡기(palmar grasp) 또는 손가락 잡기로 쥐고, 그릇에서 음식을 떠서 입으로 가져가려는 자가 섭식 시도. 숟가락이 뒤집히거나 음식이 흘리는 것은 이 연령에서 정상적이며, 숟가락→입 경로의 성립 여부가 관찰 핵심)',acqTime:'12개월-18개월',redFlag:'23개월 이후에도 숟가락을 그릇에 넣어 음식을 떠서 입으로 가져가는 경로가 성립하지 않아, 자가 섭식이 손가락 섭식(finger feeding)에만 의존하거나 양육자가 떠먹여야만 식사가 진행될 경우. 만약 숟가락을 쥐고 그릇에 넣는 동작은 가능하나 입까지의 경로에서 숟가락이 반복적으로 뒤집힌다면, 전완 회외(supination) 조절에 대한 별도 관찰이 필요',unit:'질적',s1:'숟가락을 건네받으면 두드리거나 던지는 미분화 탐색에 머물며, 그릇에 넣어 음식을 떠려는 시도가 관찰되지 않음',s2:'숟가락을 그릇에 넣는 시도는 있으나 떠서 입으로 가져가는 경로가 성립하지 않아, 숟가락이 뒤집혀 음식이 대부분 흘리거나 입까지 도달하지 못함',s3:'숟가락→그릇→입 경로가 성립하여 음식의 일부가 입에 도달하나, 숟가락이 기울어 흘리는 양이 많고 한 번의 섭식 시도마다 양육자의 그릇 고정 보조가 필요',s4:'숟가락으로 떠서 입으로 가져가는 경로가 안정적이며, 흘리는 양이 줄어들고 양육자의 그릇 고정 없이도 수 숟갈 연속 섭식이 가능'},
{code:'FM02-02',desc:'블록 쌓기 정밀성 (예: 나무·플라스틱 블록(약 2.5-3cm 크기)을 수직으로 쌓아올릴 때, 아래 블록 위에 윗블록을 놓는 시각-운동 정밀 조절. BI02-03의 양손 협응 쌓기와 달리 여기서는 놓기 동작의 정밀성과 힘 조절이 관찰 핵심)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 블록 2개를 연속으로 쌓는 동작이 성립하지 않아, 블록을 세로로 올려놓는 동작이 관찰되지 않고 옆으로 늘어놓거나 두드리는 수준에 머무를 경우 — Bayley-III 및 CDC 기준상 18개월에 2-3개, 24개월에 6개 쌓기가 기대됨',unit:'개',s1:'블록을 다른 블록 위에 올리는 시도 자체가 성립하지 않거나, 올리더라도 놓는 순간 과도한 힘으로 밀어 즉시 무너짐(1개)',s2:'블록을 위에 올려놓을 수 있으나, 놓는 위치가 중심에서 벗어나 2개 이상 쌓기가 어려움(2개)',s3:'놓기 동작의 힘과 위치 조절이 개선되어 3개까지 쌓으나 수직 정렬이 어긋나 기울어진 탑 형태(3개, 해당 연령 정상 수준)',s4:'블록의 중심을 맞추어 놓는 정밀 조절이 안정적이며 4개 이상 연속 쌓기가 가능(4개 이상)'},
{code:'FM02-03',desc:'큰 크레용 파지 전환(손바닥 잡기→손가락 잡기) (예: 굵은 크레용(지름 약 1-1.5cm)을 처음에는 손바닥 전체로 감싸 쥐다가(palmar-supinate grasp), 점차 손가락 쪽으로 잡는 위치가 이동하여 손가락으로 감싸 쥐는 패턴(digital-pronate grasp)이 출현하는 전환 과정)',acqTime:'13개월-20개월',redFlag:'23개월 이후에도 크레용을 주먹 전체로 감싸 쥐는 패턴(fist grip)에서 벗어나지 않아 손가락의 분화된 참여가 관찰되지 않고, 어깨 단위의 대근육 동작으로만 끼적이기가 이루어질 경우',unit:'질적',s1:'크레용을 주먹 전체로 감싸 쥐며(fist grip) 손가락의 분화된 참여가 관찰되지 않아, 어깨·팔꿈치 단위의 대근육 동작으로만 끼적이기가 이루어짐',s2:'손바닥 잡기(palmar-supinate grasp)로 크레용을 쥐며 전완이 엎침(pronation)된 상태에서 손목·팔꿈치 단위의 움직임이 관찰됨',s3:'손가락 쪽으로 잡는 위치가 이동하기 시작하여 손가락으로 감싸 쥐는 패턴(digital-pronate grasp)이 간헐적으로 출현하나, 피로 시 손바닥 잡기로 회귀',s4:'손가락으로 감싸 쥐는 패턴(digital-pronate grasp)이 안정적으로 유지되며, 손목 단위의 움직임이 관찰되어 끼적이기의 선 조절이 개선됨'},
{code:'FM02-04',desc:'책 페이지 넘기기(2-3장씩) (예: 두꺼운 보드북의 페이지를 엄지와 나머지 손가락으로 잡아 한 번에 2-3장씩 넘기며, 넘긴 뒤 그림을 보고 가리키거나 옹알이하는 등 내용 탐색으로 이어지는 상태)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 보드북의 두꺼운 페이지를 잡아서 넘기는 동작이 관찰되지 않고, 책을 펼쳐놓은 채 양육자가 넘겨주기를 기다리거나 책 전체를 들어 흔드는 미분화 탐색에 머무를 경우',unit:'질적',s1:'책 페이지를 넘기려는 시도가 관찰되지 않거나, 페이지 전체를 손바닥으로 눌러 구기거나 잡아당기는 미분화 동작만 관찰됨',s2:'페이지의 모서리나 가장자리를 잡으려는 시도는 있으나 한 번에 여러 장이 뭉쳐 넘겨지거나 페이지가 찢어지는 양상이 빈번',s3:'보드북의 두꺼운 페이지를 2-3장씩 넘기며 대부분 성공하나, 얇은 종이 페이지에서는 여러 장이 뭉쳐 넘겨짐',s4:'보드북 페이지를 안정적으로 넘기며 넘긴 뒤 그림을 탐색하는 순환이 관찰되고, 얇은 종이 페이지에서도 2-3장씩 넘기는 시도가 나타남'},
{code:'FM02-05',desc:'뚜껑 없는 컵으로 마시기 (예: 양손으로 열린 컵(open cup)의 양쪽 손잡이나 컵 몸통을 잡고 입으로 가져가 기울여 마시되, 컵을 기울이는 각도와 속도를 조절하여 과도한 흘림 없이 음용하려는 시도)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 열린 컵(open cup)을 잡고 입에 대어 기울여 마시는 경로가 성립하지 않아, 뚜껑·빨대가 있는 컵에만 의존하거나 양육자가 컵을 잡고 기울여주어야만 음용이 가능할 경우. 만약 컵을 입에 대는 경로는 가능하나 기울이는 과정에서 액체가 입 밖으로 흘러나오는 양상이 지속된다면, 구순 폐쇄(lip closure)의 어려움에 대해 구강-운동(OM02) 영역과의 교차 확인이 필요',unit:'질적',s1:'열린 컵을 건네받으면 컵을 잡으나 입으로 가져가지 않거나, 컵을 과도하게 기울여 대부분의 액체가 쏟아짐',s2:'컵을 입에 대고 기울이는 경로는 성립하나 기울이는 각도 조절이 미숙하여 한 모금 마실 때마다 턱과 옷에 상당량이 흘림',s3:'컵을 기울이는 각도를 조절하여 흘림이 줄어들고 수 모금 연속 음용이 가능하나, 컵을 내려놓을 때 흘리거나 컵을 놓치는 경우가 간헐적으로 관찰됨',s4:'양손으로 열린 컵을 잡고 연속 음용이 안정적이며 흘림이 최소화되고, 마신 뒤 컵을 바닥이나 테이블 위에 내려놓는 동작이 가능'}
],
gross:[
{code:'GM02-01',desc:'안정적 독립 보행 (예: 평평한 실내 바닥에서 양손의 지지 없이 연속적으로 걸음을 이어가며, 물건을 한 손에 들고도 보행이 유지되고 장애물이나 가구를 피하여 방향을 조절하는 상태. PC02-01의 독립 보행 "시작" 이후 보행의 "안정화" 단계를 관찰)',acqTime:'12개월-18개월',redFlag:'18개월 이후에도 가구 지지 없이 연속 보행이 주된 이동 수단으로 사용되지 않고, 기어가기·배밀이·엉덩이 끌기에 의존하는 양상이 지속될 경우 — CDC(2025) "18개월까지 독립 보행" 기준에 따라 최우선 의뢰. 만약 독립 보행은 가능하나 한쪽 발을 끌거나 한쪽으로 기울어지는 비대칭 보행 패턴이 지속된다면 신경학적 편측성 문제와의 감별이 선행되어야 함',unit:'질적',s1:'독립 보행이 출현했으나 주된 이동 수단으로 사용되지 않아 대부분의 이동을 기어가기·엉덩이 끌기에 의존하며, 보행 시도 시 보폭이 불규칙하고 2-3걸음 내에 이동이 중단됨',s2:'독립 보행이 주된 이동 수단이나 넓은 보폭(wide base)·벌린 양팔(high guard)·발 전체 착지(flat-footed)의 초기 보행 패턴이 두드러지고, 손에 물건을 들면 보행 리듬이 흐트러짐',s3:'보폭이 좁아지고 양팔이 내려간 성숙 보행 패턴으로 전환되어 물건을 들고도 보행이 유지되나, 경사면이나 울퉁불퉁한 바닥에서 보폭·속도 조절이 미숙하여 간헐적으로 휘청거림',s4:'다양한 바닥 조건(카펫, 마루, 잔디 등)에서 보폭·속도를 적응적으로 조절하며, 장애물을 피하는 경로 수정이 보행 중단 없이 자연스럽게 이루어짐'},
{code:'GM02-02',desc:'계단 오르기(양손 잡고/한 손 잡고) (예: 난간이나 양육자의 손을 잡고 한 칸씩 계단을 올라가되, 한 발을 올려놓은 뒤 같은 단에 다른 발을 모아놓는(marking time) 방식으로 상승하는 동작)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 난간이나 양육자의 손을 잡은 상태에서 계단의 첫 번째 단에 한쪽 발을 올려놓는 동작이 관찰되지 않거나, 올려놓더라도 체중을 이동시켜 다음 단으로 진행하지 못하고 매번 양육자가 안아올려야 하는 양상이 지속될 경우',unit:'질적',s1:'계단 앞에서 발을 올리려는 시도가 관찰되지 않거나, 양손으로 난간·양육자를 잡아도 한쪽 발을 첫 번째 단에 올려놓지 못함',s2:'양손으로 난간·양육자를 잡으면 한 발씩 올려 1-2단 오를 수 있으나, 3단 이상에서 멈추거나 주저앉음',s3:'한 손으로 난간을 잡고 연속적으로 계단을 오르며(marking time 방식), 중간에 멈추지 않고 한 층을 완료',s4:'한 손 지지만으로 계단을 안정적으로 오르며, 오르는 속도가 일정하고 계단 중간에서 뒤를 돌아보는 등의 부가 동작에도 자세가 유지됨'},
{code:'GM02-03',desc:'큰 공 앞으로 차기(standing kick) (예: 바닥에 정지된 큰 공(지름 약 15-20cm)을 한쪽 발로 밀어차되, 차는 동안 반대쪽 발로 서서 균형을 유지하는 한발 지지-한발 스윙의 양측 비대칭 동작)',acqTime:'18개월-23개월',redFlag:'23개월 이후에도 바닥에 정지된 공을 발로 차려는 시도가 관찰되지 않고, 공 앞에서 멈추어 손으로 집거나 밟는 양상만 나타날 경우. 만약 차기 시도는 있으나 한쪽 발로 서는 동안 반복적으로 넘어진다면, 한발 지지 균형(PC02 참조)과의 교차 확인이 필요',unit:'질적',s1:'공을 발로 차려는 시도 자체가 관찰되지 않고, 공 앞에서 멈추거나 공을 밟고 넘어지는 양상만 나타남',s2:'공을 향해 발을 내미는 시도는 있으나 발이 공에 닿기 전에 균형을 잃거나, 공에 닿더라도 밀기에 가까워 공이 거의 이동하지 않음',s3:'한쪽 발로 공을 앞으로 밀어차는 동작이 성립하여 공이 전방으로 이동하나, 차는 발의 스윙이 작고 차는 순간 반대쪽 발의 균형이 흔들림',s4:'한쪽 발의 스윙으로 공을 앞으로 명확하게 차며, 차는 동안 반대쪽 발로 안정적으로 서 있고 차는 방향의 조절이 가능'},
{code:'GM02-04',desc:'뒤로 걷기 (예: 양육자의 손을 잡지 않고 뒤를 보지 않은 채 3-4걸음 이상 후방으로 이동하는 동작. 전방 보행과 달리 시각 피드백 없이 고유수용 감각에 의존한 발 배치가 요구됨)',acqTime:'15개월-23개월',redFlag:'23개월 이후에도 후방으로 걸음을 떼려는 시도가 관찰되지 않고, 뒤로 이동해야 하는 상황(예: 장난감 끌기)에서 몸을 돌려 전방 보행으로만 대체하는 양상이 지속될 경우',unit:'질적',s1:'뒤로 걸으려는 시도가 관찰되지 않거나, 뒤로 한 걸음을 떼는 순간 균형을 잃어 주저앉거나 뒤로 넘어짐',s2:'뒤로 1-2걸음은 가능하나 발 배치가 불규칙하고 매 걸음 사이에 긴 정지가 필요하며, 3걸음 이상 연속 진행이 어려움',s3:'뒤로 3-4걸음 연속 진행이 가능하나 보폭이 불규칙하고 간헐적으로 뒤돌아보며 시각 확인을 필요로 함',s4:'뒤를 보지 않고도 여러 걸음 연속으로 후방 보행이 가능하며 보폭이 비교적 일정'},
{code:'GM02-05',desc:'달리기 시도 (예: 빠른 걸음에서 점차 양발이 동시에 바닥에서 떨어지는 순간(flight phase)이 나타나며, 양육자를 향해 뛰어가거나 놀이 중 빠르게 이동하려는 달리기의 초기 형태)',acqTime:'18개월-23개월',redFlag:'23개월 이후에도 빠른 이동이 필요한 놀이 상황(공 쫓기, 양육자에게 달려가기 등)에서 보행 속도를 높이려는 시도가 관찰되지 않고, 일정한 속도의 보행만 유지하거나 속도를 높이면 반복적으로 넘어지는 양상이 지속될 경우',unit:'질적',s1:'빠른 이동이 필요한 상황에서도 보행 속도를 높이지 못하거나, 속도를 높이려 하면 발이 엉켜 넘어지는 양상이 반복됨',s2:'빠른 걸음(fast walk)이 관찰되나 양발이 동시에 바닥에서 떨어지는 순간(flight phase)이 아직 나타나지 않아 달리기와 구분되지 않는 급행보 수준',s3:'양발이 동시에 바닥에서 떨어지는 순간이 간헐적으로 관찰되어 달리기의 초기 형태가 성립하나, 팔 흔들기가 비대칭이거나 정지 시 2-3걸음 미끄러져 멈춤',s4:'양발이 바닥에서 떨어지는 flight phase가 안정적으로 관찰되며, 달리다가 멈추거나 방향을 바꾸는 전환이 가능'}
],
oral:[
{code:'OM02-01',desc:'컵 마시기 시 유출 감소 정도 (예: 열린 컵(open cup)으로 액체를 마실 때, 입술이 컵 가장자리를 감싸며 닫혀(lip closure) 턱과 옷으로 흘러내리는 양이 점차 줄어드는 구순 조절의 발달 과정)',acqTime:'13개월-18개월',redFlag:'23개월 이후에도 열린 컵으로 마실 때 매 모금마다 상당량의 액체가 양쪽 입꼬리로 흘러나오는 양상이 지속되어, 구순 폐쇄(lip closure) 없이 액체가 중력에 의해 입 밖으로 유출되는 패턴이 반복될 경우. 만약 컵이 아닌 빨대나 젖병에서는 유출이 관찰되지 않는다면, 빨대·젖병과 달리 컵 가장자리를 상순·하순으로 감싸 밀착시키는 구순 조절이 요구되는 컵 특이적 어려움과의 감별이 필요',unit:'질적',s1:'컵을 입에 대고 기울이면 액체가 양쪽 입꼬리로 흘러나와 대부분이 턱·옷으로 유출되며, 입술이 컵 가장자리를 감싸는 구순 폐쇄(lip closure)가 관찰되지 않음',s2:'윗입술이 컵 가장자리에 닿으나 아랫입술의 폐쇄가 불완전하여 매 모금 소량이 흘러나오며, 기울이는 각도가 과도할 때 유출량이 증가',s3:'구순 폐쇄가 대부분의 모금에서 유지되어 흘림이 간헐적이며, 컵을 기울이는 속도가 빨라질 때만 유출이 관찰됨',s4:'구순 폐쇄가 안정적으로 유지되어 흘림이 거의 없으며, 컵을 내려놓을 때도 입안의 액체를 삼킨 뒤 컵을 떼는 순서가 관찰됨'},
{code:'OM02-02',desc:'연식/반고형식 다양한 질감 수용 (예: 부드러운 과일(바나나, 딸기), 익힌 채소, 빵, 국수 등 다양한 질감의 음식을 거부 없이 입에 넣어 씹고 삼키며, 퓌레·유동식에서 고형식으로의 질감 확대가 진행되는 상태)',acqTime:'13개월-18개월',redFlag:'18개월 이후에도 퓌레·유동식 이외의 질감을 입에 넣으면 구역질·뱉기·울음 등의 거부 반응이 일관되게 나타나 고형식 전환이 진행되지 않을 경우. 만약 특정 질감(예: 섬유질, 끈적한 질감)에서만 선택적으로 거부하고 다른 질감은 수용한다면, 전반적 구강 과민(oral hypersensitivity)과 질감 특이적 감각 회피(texture-specific avoidance)의 감별이 필요',unit:'질적',s1:'퓌레나 유동식 이외의 질감이 입에 들어오면 구역질(gagging)·뱉기·울음 등 일관된 거부 반응을 보이며, 고형식 섭취가 성립하지 않음',s2:'부드러운 고형식(바나나, 두부 등)은 수용하나 섬유질이 있는 음식(채소, 고기)이나 바삭한 질감(과자, 토스트)에서는 거부 반응이 지속',s3:'대부분의 질감을 수용하나 새로운 질감의 음식을 처음 접할 때 초기 거부(고개 돌림, 입 다물기) 후 반복 제시 시 수용하는 패턴',s4:'부드러운 음식부터 단단한 음식까지 다양한 질감을 거부 없이 수용하며, 새로운 질감의 음식에도 탐색적으로 접근'},
{code:'OM02-03',desc:'회전 씹기(rotary chewing) 출현 (예: 고기나 섬유질 있는 채소를 섭취할 때, 턱이 상하 운동(munching)에서 좌우·대각선 방향의 회전 운동(rotary chewing)으로 전환되어, 음식물이 어금니 영역으로 이동하며 분쇄되는 성숙한 저작 패턴의 출현)',acqTime:'15개월-20개월',redFlag:'23개월 이후에도 모든 음식에서 턱의 상하 운동(munching)만 관찰되고 좌우·대각선 방향의 회전 운동이 출현하지 않아, 고기·채소 등 섬유질 음식의 분쇄가 불가능하여 유동식·퓌레 수준의 질감에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'음식을 씹을 때 턱의 상하 운동(munching)만 관찰되며, 좌우 또는 대각선 방향의 턱 운동이 부재하여 음식물이 분쇄되지 않은 채 삼키거나 뱉어냄',s2:'간헐적으로 턱의 좌우 이동이 관찰되나 상하 운동이 주된 패턴이며, 단단한 음식(고기, 당근 등)에서는 분쇄가 불충분하여 큰 덩어리째 삼키거나 뱉어냄',s3:'부드러운 고형식(빵, 바나나)에서는 회전 씹기 패턴이 안정적이나, 단단한 음식에서는 상하 씹기로 회귀하는 양상이 관찰됨',s4:'부드러운 음식부터 단단한 음식까지 회전 씹기 패턴이 안정적으로 관찰되며, 음식의 질감에 따라 씹기 강도와 속도를 조절'},
{code:'OM02-04',desc:'빨대 음용 시작 (예: 빨대컵에 담긴 물이나 주스를 빨대를 통해 빨아올리되, 흡인(suction)과 삼킴(swallow)의 협응이 이루어져 사레 들림 없이 연속 음용이 가능한 상태)',acqTime:'13개월-18개월',redFlag:'23개월 이후에도 빨대를 입에 물고 흡인하여 액체를 올리는 동작이 성립하지 않아, 빨대컵 음용이 불가능하고 젖병이나 열린 컵에만 의존하는 양상이 지속될 경우. 만약 흡인 자체는 가능하나 삼킴 시 사레가 반복된다면, 흡인-삼킴-호흡 협응(OM01-01 참조)의 지연과의 교차 확인이 필요',unit:'질적',s1:'빨대를 입에 물지만 흡인 동작이 발생하지 않아 액체가 올라오지 않거나, 빨대를 씹기만 함',s2:'흡인이 간헐적으로 발생하여 소량의 액체가 올라오나 삼킴과의 협응이 미숙하여 사레가 들리거나 입 밖으로 흘러나옴',s3:'흡인-삼킴 협응이 대부분의 시도에서 성립하여 연속 음용이 가능하나, 빠르게 빨면 사레가 간헐적으로 관찰됨',s4:'빨대를 통한 연속 음용이 안정적이며 흡인 강도를 조절하여 사레 들림 없이 수용'},
{code:'OM02-05',desc:'침 흘림(drooling) 감소 정도 (예: 놀이·보행 등 일상 활동 중 턱과 옷이 침으로 젖는 양이 눈에 띄게 줄어들어, 턱받이(bib) 없이도 옷이 마른 상태를 유지하는 시간이 길어지는 상태)',acqTime:'18개월-23개월',redFlag:'23개월 이후에도 깨어 있는 시간 대부분에서 침이 턱 아래로 지속적으로 흘러내려 턱받이 교체가 빈번한 양상이 이 나는 시기가 아닌 때에도 지속될 경우. 만약 수면 시나 안정 시에는 침 흘림이 없으나 보행·달리기·놀이 등 대근육 활동 시에만 침 흘림이 증가하는 양상이 관찰된다면, 활동 중 구순 폐쇄가 유지되지 않는 양상과의 감별이 필요',unit:'질적',s1:'깨어 있는 시간 대부분에서 침이 턱 아래로 흘러내려 턱받이 교체가 빈번하며, 구순 폐쇄(lip closure)가 안정 시에도 유지되지 않음',s2:'안정된 놀이 시에는 침 흘림이 줄어드나 보행·달리기 등 대근육 활동 시 또는 집중 시 침 흘림이 증가하여 턱받이가 필요',s3:'대부분의 활동에서 침 흘림이 관찰되지 않으나, 새로운 과제에 집중하거나 이 나는 시기에 간헐적으로 증가',s4:'깨어 있는 시간 동안 침 흘림이 거의 관찰되지 않으며 턱받이 없이 활동이 가능'}
]
},
'2y':{
postural:[
{code:'PC03-01',desc:'한발서기 시도 (예: 평평한 바닥에서 양육자의 손잡이 없이 한쪽 발을 바닥에서 떼어 반대쪽 발로만 서 있으려는 시도. 이 연령에서는 잠시 유지하는 수준이 정상 범위이며, 안정적인 한발서기는 3세 이후에 확립됨)',acqTime:'2세-2세 6개월',redFlag:'3세까지 평평한 바닥에서 한쪽 발을 바닥에서 떼어 잠시라도 한발로 서려는 시도 자체가 관찰되지 않을 경우',unit:'질적',s1:'한쪽 발을 바닥에서 떼려는 시도 자체가 관찰되지 않거나, 떼는 순간 즉시 다시 내려놓아 한발 지지가 성립하지 않음',s2:'한쪽 발을 바닥에서 떼어 반대쪽 발로 서려는 시도가 관찰되나 양육자의 손이나 벽에 손을 대지 않으면 즉시 균형을 잃음',s3:'지지 없이 한쪽 발로 잠시(동요 한 박자 정도) 서 있을 수 있으나 상체 흔들림이 크고 들어올린 발이 빠르게 내려옴',s4:'지지 없이 한쪽 발로 서서 동요 한 소절 정도의 시간 동안 자세를 유지하며, 양쪽 발 모두에서 시도 가능'},
{code:'PC03-02',desc:'낮은 평균대(바닥 선) 위 보행 (예: 바닥에 붙인 테이프(폭 약 5cm)나 그려진 선을 따라 걸으며, 발이 선 위에서 벗어나지 않도록 시각적으로 확인하며 보행하는 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 바닥 선을 따라 걸으려는 시도에서 발을 선 위에 올리려는 의도적 조절이 관찰되지 않고, 선의 존재와 무관한 자유 보행만 나타날 경우',unit:'질적',s1:'선을 따라 걸으려는 시도가 관찰되지 않거나, 선의 존재와 무관하게 자유롭게 걸어다님',s2:'선 위에 발을 올리려는 시도는 있으나 2-3걸음 내에 선 밖으로 벗어나며, 벗어난 뒤에도 선으로 되돌아오려는 교정이 관찰되지 않음',s3:'선 위를 5-6걸음 연속으로 걸으며 발이 벗어나면 시각적으로 확인하고 되돌아오는 교정이 관찰되나, 보행 속도가 현저히 느려지고 양팔을 벌려 균형을 잡음',s4:'선 위를 따라 연속적으로 걸으며 간헐적으로만 벗어나고, 벗어나도 즉시 교정하여 선 위로 복귀'},
{code:'PC03-03',desc:'바로 누운 자세 굴곡(supine flexion) 유지 (예: 바닥에 등을 대고 누운 자세에서 머리와 양다리를 동시에 들어올려 몸을 공처럼 말며, 양육자와의 놀이 상호작용(예: "배 위에 공 올려놓기" 놀이) 동안 자세를 유지하는 체간 굴곡근 활성화 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 등을 대고 누운 자세에서 머리와 양다리를 동시에 들어올리는 동작이 놀이 시작 전에 무너져 자세 유지 자체가 성립하지 않거나, 머리만 들고 다리는 바닥에 남는 분절적 활성화만 관찰될 경우. 만약 자세는 취하나 좌우 활성화가 일관되게 비대칭이라면 체간 굴곡근의 편측 약화 여부에 대한 감별이 선행되어야 함',unit:'질적',s1:'등을 대고 누운 자세에서 머리와 다리를 동시에 들어올리는 동작 자체가 성립하지 않거나, 머리를 들면 다리가 바닥에 남고 다리를 들면 머리가 바닥에 눕는 분절적 활성화만 관찰됨',s2:'머리와 다리를 동시에 들어올리는 동작이 순간적으로 관찰되나, 놀이가 시작되기 전에 자세가 무너져 놀이 상호작용으로 이어지지 않음',s3:'양육자와의 짧은 놀이 상호작용 한 차례 동안 자세를 유지하나, 머리 또는 다리 중 한쪽이 먼저 떨어지며 좌우 비대칭이 관찰됨',s4:'양육자와의 놀이 상호작용 여러 차례 동안 머리·양다리·체간 굴곡이 고르게 유지되며, 자세 유지 중 양손으로 물건을 잡는 부가 동작이 가능'},
{code:'PC03-04',desc:'엎드린 자세 신전(prone extension) 유지 (예: 바닥에 엎드린 자세에서 양팔을 앞으로 뻗고 양다리를 뒤로 뻗어 몸통을 활처럼 들어올린 채, 양육자와의 "비행기 놀이" 등 놀이 상호작용 동안 자세를 유지하는 체간 신전근 활성화 과제. PC02-04의 연속 발달)',acqTime:'2세-2세 6개월',redFlag:'3세까지 엎드린 자세에서 팔과 다리를 동시에 들어올리는 동작이 놀이 시작 전에 무너져 자세 유지 자체가 성립하지 않을 경우. PC02-04(13-23m)에서 관찰되던 수준과 비교하여 진전이 없거나 오히려 유지 시간이 감소했다면 재평가가 필요',unit:'질적',s1:'엎드린 자세에서 팔과 다리를 동시에 들어올리는 동작 자체가 성립하지 않거나, 순간적으로 들어올렸다가 놀이 시작 전에 무너짐',s2:'팔과 다리를 동시에 들어올리나 짧은 놀이 상호작용이 시작되기 전에 자세가 무너지며, 양팔 또는 양다리 중 일부가 먼저 떨어짐',s3:'양육자와의 놀이 상호작용 동안 자세 유지가 가능하나, 팔과 다리의 활성화가 고르지 않아 좌우 흔들림이 관찰됨',s4:'놀이 상호작용 여러 차례 동안 양팔·양다리·체간 신전이 고른 활성화로 안정적으로 유지되며, 자세 유지 중 머리를 돌려 양육자와 시선을 교환하는 부가 동작이 가능'},
{code:'PC03-05',desc:'작은 의자에서 안정적으로 앉기 (예: 유아용 의자에 발바닥이 바닥에 닿은 채로 앉아, 양손으로 테이블 위 활동(끼적이기, 블록 쌓기 등)을 수행하는 동안 체간이 의자 등받이나 테이블에 기대지 않고 직립을 유지하는 상태)',acqTime:'2세-2세 6개월',redFlag:'3세까지 유아용 의자에 앉아 양손 활동을 수행할 때 체간이 등받이나 테이블에 기대지 않으면 직립을 유지하지 못하여, 양손 활동(끼적이기, 블록 놀이 등)이 좌위 불안정으로 인해 중단되는 양상이 반복될 경우',unit:'질적',s1:'의자에 앉으나 체간이 전방 또는 측방으로 기울어져 양손 활동이 불가능하며, 테이블이나 등받이에 기대야만 앉기가 유지됨',s2:'체간 직립으로 앉아 있을 수 있으나 양손 활동을 시작하면 체간이 기울어져 한 손을 의자나 테이블에 짚는 보상이 필요',s3:'양손 활동 중 체간 직립이 대부분 유지되나, 활동이 길어지면 점차 체간이 전방으로 구부러지거나 측방으로 기울어짐',s4:'양손 활동 동안 체간 직립이 안정적으로 유지되며, 몸통을 좌우로 돌려 옆에 놓인 물건을 가져오는 동작에도 좌위가 흔들리지 않음'}
],
bilateral:[
{code:'BI03-01',desc:'양손으로 큰 공 던지기(overhead throw) (예: 아동 가슴 폭 정도 크기의 공을 양손으로 머리 위로 들어올린 뒤, 양팔을 앞으로 동시에 내려보내며 양육자를 향해 던지는 양측 대칭 동작)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양손으로 공을 머리 위로 들어올려 전방으로 던지는 동작이 관찰되지 않고, 공을 양손으로 밀어내거나 바닥에 굴리는 방식에만 머무를 경우',unit:'질적',s1:'공을 양손으로 머리 위로 드는 시도가 관찰되지 않거나, 들어올리더라도 던지기 동작으로 이어지지 않고 공을 놓쳐 뒤로 떨어뜨림',s2:'공을 머리 위로 들어올려 앞으로 보내려는 시도는 있으나, 양팔의 타이밍이 맞지 않아 공이 한쪽으로 치우쳐 날아가거나 바닥에 떨어뜨림',s3:'양팔을 동시에 내려보내며 공이 전방으로 이동하는 던지기가 성립하나, 공의 방향이 불규칙하고 던지는 거리가 짧음',s4:'양팔의 타이밍이 일치하여 공이 양육자 방향으로 안정적으로 날아가며, 던지기-받기 상호작용이 가능'},
{code:'BI03-02',desc:'양발 모아 제자리 점프 수행 (예: 양발을 동시에 바닥에서 떼어 제자리에서 뛰어오르며, 양발로 동시에 착지하는 양측 대칭 동작. BI02-04의 "시도"에서 "수행"으로 진전된 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양발이 동시에 바닥에서 떨어지는 제자리 점프가 성립하지 않고, 한쪽 발만 들거나 걷기 동작으로만 대체하는 양상이 지속될 경우 — CDC(2025) "2세까지 양발 점프 시도" 기준 참조',unit:'질적',s1:'양발을 동시에 바닥에서 떼는 동작이 성립하지 않아, 한쪽 발만 들거나 걷기 동작으로 대체됨(BI02-04 s1 수준과 동일하면 진전 없음)',s2:'양발이 동시에 바닥에서 떨어지는 체공(flight phase)이 나타나나, 착지 시 한쪽 발이 먼저 닿거나 체간이 앞으로 무너져 양손을 짚음',s3:'양발 동시 이륙-양발 동시 착지가 대부분 성공하며, 착지 후 자세를 유지하나 연속 점프(2-3회)에서는 리듬이 흐트러짐',s4:'양발 동시 이륙-착지가 안정적이며, 연속 3-5회 제자리 점프가 리듬적으로 가능'},
{code:'BI03-03',desc:'블록 6-8개 쌓기 (예: 나무·플라스틱 블록(약 2.5-3cm 크기)을 양손을 번갈아 사용하여 6-8개까지 쌓아올리되, 아래 블록을 고정하는 손과 위에 올리는 손의 교대 역할 분화가 관찰되는 양측 협응 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 블록 4개 미만으로만 쌓기가 가능하고, 쌓기 시도에서 양손의 역할 교대(한 손 고정-다른 손 올리기)가 관찰되지 않을 경우 — Bayley-III 기준 24개월에 6개, 30개월에 8개 쌓기가 기대됨',unit:'개',s1:'블록을 세로로 올려놓는 시도가 관찰되나 2개 이상 쌓기가 성립하지 않거나, 양손 중 한 손만 사용하고 반대쪽은 참여하지 않음(1-2개)',s2:'양손이 참여하나 고정-올리기의 역할 교대가 불안정하여 쌓는 도중 아래 블록이 밀려 무너짐(3-4개)',s3:'고정하는 손과 올리는 손의 역할 교대가 대부분 안정적이며, 수직 정렬이 개선되어 5-6개까지 쌓기 성공(5-6개, 해당 연령 정상 수준)',s4:'양손 교대 역할 분화가 유창하여 블록 7개 이상을 연속으로 쌓으며, 기울어진 탑을 한 손으로 교정하는 시도가 관찰됨(7개 이상)'},
{code:'BI03-04',desc:'양손으로 종이 찢기 (예: 양손으로 종이의 양쪽을 잡고, 한 손은 고정하고 다른 손은 반대 방향으로 당겨 종이를 찢는 양측 비대칭 동작. 양손이 서로 반대 방향으로 힘을 가하는 분화된 역할 수행이 요구됨)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양손으로 종이를 잡고 반대 방향으로 당겨 찢는 동작이 관찰되지 않고, 한 손으로만 잡아당기거나 양손이 같은 방향으로만 움직이는 양상이 지속될 경우',unit:'질적',s1:'종이를 양손으로 잡으나 양손이 같은 방향으로 당겨 찢기가 성립하지 않거나, 한 손으로만 종이를 잡아당기고 반대쪽은 놓아버림',s2:'양손이 반대 방향으로 당기려는 시도는 있으나, 한 손의 고정력이 부족하여 종이가 빠져나가거나 구겨짐',s3:'양손을 반대 방향으로 당겨 종이를 찢는 동작이 성립하나, 찢기 시작점을 조절하지 못하여 무작위 위치에서 찢어짐',s4:'양손의 고정-당기기 역할이 안정적으로 분화되어 종이를 의도한 방향으로 찢을 수 있으며, 연속적으로 여러 조각을 찢는 놀이로 확장'},
{code:'BI03-05',desc:'한 손 용기 잡고 다른 손으로 붓기 시도 (예: 한 손으로 컵을 잡아 고정한 상태에서 반대쪽 손으로 작은 주전자·물병을 기울여 컵에 물을 부으려는 양측 비대칭 동작. BI02-02의 고정-조작 역할 분화의 확장으로, 두 용기를 동시에 다루는 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 두 용기를 각 손에 하나씩 잡고 한쪽에서 다른 쪽으로 부으려는 시도가 관찰되지 않고, 용기 하나를 놓아야만 다른 용기를 조작하는 교대 방식에만 의존하는 양상이 지속될 경우',unit:'질적',s1:'두 용기를 동시에 잡는 동작 자체가 성립하지 않아, 컵을 바닥에 놓고 양손으로 주전자만 기울이거나 주전자를 놓고 컵만 잡음',s2:'양손에 각각 용기를 잡으나, 붓는 손이 기울이기 시작하면 고정하는 손의 컵도 함께 기울어져 물이 엎질러짐',s3:'컵을 고정한 채 주전자를 기울여 물이 컵 안으로 들어가나, 기울이는 각도·속도 조절이 미숙하여 컵 밖으로 넘치는 양이 많음',s4:'컵을 안정적으로 고정하며 주전자의 기울이는 각도를 조절하여 컵에 물을 부을 수 있고, 넘침이 최소화됨'}
],
praxis:[
{code:'PX03-01',desc:'2단계 동작 모방(시범 → 따라하기) (예: 양육자가 "손뼉 치고 → 만세"를 순서대로 시연하면, 아동이 동일한 순서로 두 가지 동작을 연속 수행하는 순서적 운동 모방 과제. PX02-01의 단순 도구 모방에서 복수 동작의 순서 기억+실행으로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양육자가 반복 시연한 2단계 동작 순서를 모방하여 재현하는 과제에서, 첫 번째 동작만 모방하고 두 번째 동작으로의 전환이 관찰되지 않는 양상이 지속될 경우. 만약 각 동작을 개별적으로는 모방하나 순서적 연결이 실패한다면, 운동 순서화(motor sequencing)의 어려움과의 감별이 필요',unit:'질적',s1:'양육자의 시연 후 첫 번째 동작도 모방하지 못하거나, 시연과 무관한 동작을 산출',s2:'첫 번째 동작은 모방하나 두 번째 동작이 누락되거나, 첫 번째 동작을 반복하며 순서 전환이 이루어지지 않음',s3:'두 가지 동작을 모두 산출하나 순서가 뒤바뀌거나, 두 동작 사이에 긴 정지가 필요하여 연속성이 부족',s4:'두 가지 동작을 시연된 순서대로 연속적으로 수행하며, 동작 조합이 달라져도(예: "발 구르기 → 머리 만지기") 적용 가능'},
{code:'PX03-02',desc:'간단한 장애물 코스 수행 (예: 거실에 배치된 쿠션(높이 약 15-20cm) 위로 기어올라 넘기 → 터널(의자 아래 공간) 통과하기 → 낮은 단(약 10cm) 내려오기의 2-3개 장애물로 구성된 순서적 이동 과제. PX02-03의 단일 장애물에서 복수 장애물 연속 수행으로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 2-3개 장애물로 구성된 간단한 코스에서 첫 장애물만 수행하고 나머지로의 전환이 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'첫 번째 장애물에서 멈추어 다음 장애물로의 이동이 자발적으로 이어지지 않고, 양육자의 안내 없이는 코스가 진행되지 않음',s2:'장애물 한 개씩은 개별적으로 수행하나, 다음 장애물로 넘어가는 전환 시 방향을 잃거나 코스를 이탈하여 양육자의 방향 안내가 필요',s3:'2-3개 장애물을 순서대로 수행하며 코스를 완주하나, 장애물 사이에서 멈추어 다음 전략을 계획하는 정지가 필요',s4:'장애물 코스를 유창하게 연속 수행하며, 장애물 간 전환이 정지 없이 이어지고 반복 시 속도가 빨라짐'},
{code:'PX03-03',desc:'인형에게 먹이기 등 상징놀이 (예: 곰 인형을 의자에 앉힌 뒤 빈 숟가락으로 밥 먹이는 시늉을 하거나, 인형에게 컵을 대어 물 마시는 시늉을 하는 등 실제 물건이 없는 상황을 "~인 척" 하며 재현하는 탈맥락적 놀이 행동)',acqTime:'2세-2세 6개월',redFlag:'3세까지 실제 물건 없이 "~인 척"하는 가작화(pretense)가 관찰되지 않고, 물건의 기능적 사용(PX02-01 수준: 빗으로 빗기, 전화기 귀에 대기)에만 머무를 경우 — CDC(2025) "24개월까지 상징놀이 출현" 기준 참조',unit:'질적',s1:'인형이나 물건을 기능적으로 사용(빗으로 빗기, 전화기 귀에 대기)하나, 실제 물건 없이 "~인 척"하는 가작화(pretense)가 관찰되지 않음',s2:'단일 상징 행위(빈 숟가락으로 먹이기)가 간헐적으로 나타나나, 한 가지 행위만 반복하고 다른 상징 행위로 확장되지 않음',s3:'2-3가지 상징 행위를 산출하며(먹이기, 재우기, 씻기기 등) 인형을 중심으로 짧은 놀이 시퀀스가 관찰되나, 양육자의 놀이 제안이 있어야 확장',s4:'자발적으로 다양한 상징 행위를 조합하여 놀이 시퀀스를 구성하며(인형 먹이기 → 닦아주기 → 재우기), 새로운 상황을 만들어내는 창의적 확장이 관찰됨'},
{code:'PX03-04',desc:'2단계 언어 지시에 따른 운동 수행 (예: "공 집어서 바구니에 넣어"라는 2단계 언어 지시를 듣고, 공을 찾아 집기 → 바구니로 이동하여 넣기의 두 가지 운동 순서를 계획하고 실행하는 과제. PX02-05의 1단계 지시에서 2단계로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 2단계 언어 지시에서 첫 번째 단계만 수행하고 두 번째 단계로의 전환이 관찰되지 않는 양상이 지속될 경우. 만약 1단계 지시(PX02-05)는 유창하게 수행하나 2단계에서만 실패한다면 운동 순서화 또는 작업기억의 어려움과의 감별이 필요하며, 1단계 지시도 여전히 수행하지 못한다면 수용 언어 이해와의 감별이 선행되어야 함',unit:'질적',s1:'2단계 지시 후 첫 번째 단계(공 집기)도 수행하지 못하거나, 지시와 무관한 동작을 산출(PX02-05 s1 수준과 동일하면 진전 없음)',s2:'첫 번째 단계(공 집기)는 수행하나 두 번째 단계(바구니에 넣기)가 누락되어 공을 들고 서 있거나 양육자를 바라봄',s3:'두 단계를 모두 수행하나 순서가 뒤바뀌거나, 첫 단계 완료 후 "그 다음 뭐야?"와 같은 반복 확인이 필요',s4:'2단계 지시를 듣고 두 단계를 순서대로 유창하게 수행하며, 유사한 구조의 다른 2단계 지시("신발 가져와서 현관에 놔")에도 적용 가능'},
{code:'PX03-05',desc:'새로운 놀이 기구 사용법 탐색 (예: 처음 보는 미끄럼틀에서 어디로 올라가고 어디에 앉아 내려오는지를 시각적으로 관찰한 뒤, 양육자의 시연 없이 스스로 올라가는 방법을 시도하고 미끄러져 내려오는 일련의 운동 순서를 자발적으로 계획하는 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 처음 보는 놀이 기구(미끄럼틀, 아동용 정글짐 등)에서 양육자의 시연이나 신체적 안내 없이는 어떻게 올라가야 하는지를 자발적으로 시도하지 못하는 양상이 지속될 경우. 만약 기구에 대한 시각적 관찰은 하나 접근 자체를 거부한다면, 운동 기획 이전에 감각 방어(높이에 대한 전정 과반응, 질감에 대한 촉각 과반응)와의 감별이 선행되어야 함',unit:'질적',s1:'새로운 놀이 기구 앞에서 멈추어 서거나 양육자에게 매달리며, 기구에 접근하거나 탐색하려는 시도 자체가 관찰되지 않음',s2:'기구에 접근하여 만지거나 올라가려는 시도는 있으나, 어디를 잡고 어디에 발을 올려야 하는지 운동 계획이 성립하지 않아 양육자가 신체적으로 안내해야 함',s3:'시각적 관찰 후 올라가기를 자발적으로 시도하며, 시행착오를 통해 올라가기에 성공하나 내려오는 방법에서는 양육자의 도움이 필요',s4:'올라가기-앉기-내려오기의 전체 순서를 자발적으로 계획하여 수행하며, 반복 시 속도와 유창성이 증가'}
],
vmi:[
{code:'VM03-01',desc:'수직선/수평선 모방 그리기 (예: 평가자가 종이에 세로선 또는 가로선을 또렷하게 그어 보여준 뒤, 아동이 크레용으로 시연된 방향과 일치하는 직선을 모방하여 그리는 과제. VM02-05의 "시도"에서 "성공적 모방"으로 진전된 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 평가자가 시연한 세로선·가로선을 모방하여 해당 방향의 대략적 직선을 그으려는 시도에서, 시연과 무관한 자유 끼적이기만 산출되는 양상이 지속될 경우 — Beery VMI 기준 세로선 모방은 24개월, 가로선 모방은 30개월 전후 참조',unit:'질적',s1:'평가자의 시연을 관찰한 뒤에도 자유 끼적이기와 구분되지 않는 무방향적 흔적만 산출됨(VM02-05 s1 수준과 동일하면 진전 없음)',s2:'시연된 방향(세로 또는 가로)으로 크레용을 이동시키나, 선의 시작점에서 끝점까지 연속적으로 이어지지 않고 중간에 끊기거나 곡선으로 이탈',s3:'세로선과 가로선 중 하나에서 시작점-끝점이 연결되는 대략적 직선을 산출하나, 다른 방향에서는 아직 부정확',s4:'세로선과 가로선 모두 시연된 방향과 일치하는 직선을 안정적으로 산출하며, 시연 후 즉시 모방 가능'},
{code:'VM03-02',desc:'3-4조각 모양판 퍼즐 완성 (예: 원·네모·세모·별의 4가지 도형이 파인 모양판(formboard)에서, 도형 조각을 해당 홈에 맞추어 회전시키며 끼워넣어 퍼즐을 완성하는 과제. VM02-03의 3가지 기본 도형에서 4가지 도형(별 추가)으로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 가장 단순한 도형(원)을 해당 홈에 맞추어 끼우는 동작이 일관되게 성공하지 못하고, 무작위로 여러 홈에 대어보는 수준에 머무를 경우',unit:'질적',s1:'도형 조각을 홈에 맞추려는 시도에서, 원(방향 무관)도 간헐적으로만 성공하고 나머지 도형은 무작위로 홈에 대어보는 수준',s2:'원과 네모를 해당 홈에 맞추어 끼우나, 세모·별에서는 방향 회전이 이루어지지 않아 반복 실패',s3:'원·네모·세모를 성공적으로 끼우며, 별에서는 시행착오를 통해 방향을 조절하여 성공',s4:'4가지 도형 모두 최소한의 시행착오로 해당 홈에 끼우며, 도형을 뒤집거나 회전시키는 전략이 관찰됨'},
{code:'VM03-03',desc:'원형 끼적이기(circular scribble) (예: 크레용을 종이 위에 대고 연속적인 원형·나선형 동작으로 둥글게 돌려 그리며, 직선 끼적이기(VM02-02)와 구분되는 곡선형 흔적을 자발적으로 산출하는 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 크레용을 원형으로 돌리는 동작이 관찰되지 않고, 직선 방향의 끼적이기만 지속될 경우',unit:'질적',s1:'크레용을 종이에 대고 전후·좌우 직선 방향으로만 이동시키며 원형 동작이 관찰되지 않음',s2:'크레용을 원형으로 돌리려는 시도가 간헐적으로 나타나나 완전한 원주를 그리지 못하고 반원 또는 호(arc) 수준에 머무름',s3:'연속적인 나선형·원형 흔적이 산출되나 크기가 불규칙하고 종이의 한 영역에만 집중됨',s4:'종이의 여러 영역에 걸쳐 다양한 크기의 원형 끼적이기가 자발적으로 산출되며, 간헐적으로 시작점과 끝점이 만나는 폐합 도형에 가까운 흔적이 관찰됨'},
{code:'VM03-04',desc:'4-6조각 간단한 그림 퍼즐 시도 (예: 동물 그림이 인쇄된 4-6조각 직소 퍼즐(jigsaw puzzle)을 그림 단서를 보고 맞추려는 시도. VM03-02의 도형 모양판(각 조각이 독립적으로 홈에 들어감)과 달리 조각 간 연결 관계를 파악해야 하는 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 4조각 그림 퍼즐에서 조각 간 연결 관계를 파악하려는 시도(조각을 다른 조각 옆에 대어보기)가 관찰되지 않을 경우',unit:'질적',s1:'퍼즐 조각을 집으나 다른 조각과 연결시키려는 시도가 관찰되지 않고, 조각을 무작위로 놓거나 쌓거나 던지는 수준에 머무름',s2:'퍼즐 조각을 다른 조각 옆에 대어보려는 시도는 있으나, 그림 단서를 활용하지 않고 무작위로 대어보는 시행착오가 과도',s3:'그림 단서(색상, 그림의 연속성)를 참조하여 일부 조각(2-3조각)을 맞추나, 나머지는 양육자의 힌트(가리키기 등)가 필요',s4:'4조각 퍼즐을 그림 단서를 참조하여 대부분 독립적으로 완성하며, 5-6조각에서도 시행착오를 통해 완성 시도'},
{code:'VM03-05',desc:'구슬/링 끼우기(큰 구멍) (예: 굵은 막대(지름 약 1-1.5cm)에 큰 고리(구멍 지름 약 2-3cm)를 위에서 아래로 끼워넣되, 고리의 구멍을 막대에 맞추어 정렬하는 시각-운동 협응 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 큰 고리(구멍 지름 약 2-3cm)를 굵은 막대에 끼우는 동작이 관찰되지 않고, 고리를 막대 위에 올려놓거나 옆에 놓는 수준에 머무를 경우',unit:'질적',s1:'고리를 막대 위에 올려놓으려는 시도가 관찰되지 않거나, 고리의 구멍이 아닌 면을 막대에 대어 끼우기가 성립하지 않음',s2:'고리의 구멍을 막대 방향으로 가져가는 시도는 있으나 구멍과 막대의 정렬이 맞지 않아 고리가 막대 옆으로 미끄러지는 실패가 빈번',s3:'고리를 막대에 끼우는 동작이 대부분 성공하나, 고리의 크기가 작아지거나 막대가 가늘어지면 정렬 실패가 증가',s4:'큰 고리를 막대에 유창하게 연속 끼우며, 고리의 크기 순서(큰 것→작은 것)를 맞추려는 시도가 관찰됨'}
],
fine:[
{code:'FM03-01',desc:'숟가락 사용 자가 섭취 — 흘림 감소 (예: 아동용 숟가락으로 밥·죽·반찬을 떠서 입으로 가져가되, FM02-01에서 관찰된 숟가락 경로의 성립을 넘어 흘림이 현저히 줄어들고 식사의 대부분을 숟가락으로 독립적으로 수행하는 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 숟가락으로 식사의 절반 이상을 독립적으로 수행하지 못하고, 식사의 대부분을 양육자가 떠먹이거나 손가락 섭식에 의존하는 양상이 지속될 경우',unit:'질적',s1:'숟가락→그릇→입 경로는 성립하나 매 숟갈 흘리는 양이 많아 식사의 절반 이상을 양육자가 떠먹여야 함(FM02-01 s3 수준과 동일하면 진전 없음)',s2:'숟가락 경로에서 흘림이 줄어들어 식사의 절반 이상을 독립 섭식하나, 국물이나 미끄러운 반찬에서 숟가락이 기울어 흘리는 양이 증가',s3:'밥·죽 등 되직한 음식은 흘림 없이 독립 섭식하며, 국물 음식에서만 간헐적으로 흘림이 관찰됨',s4:'다양한 질감의 음식을 숟가락으로 독립 섭식하며 흘림이 최소화되고, 식사 시간 내내 양육자의 보조 없이 식사를 완료'},
{code:'FM03-02',desc:'블록 6-8개 쌓기 정밀성 (예: 나무·플라스틱 블록(약 2.5-3cm 크기)을 6-8개까지 쌓아올리되, BI03-03의 양손 협응(역할 분화)이 아닌 놓기 동작의 힘 조절과 수직 정렬의 정밀성이 관찰 핵심. FM02-02의 4개 쌓기에서 6-8개 쌓기로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 블록 4개 미만으로만 쌓기가 가능하고, 놓기 동작에서 블록의 중심을 맞추려는 정밀 조절이 관찰되지 않을 경우 — Bayley-III 기준 24개월 6개, 30개월 8개 참조',unit:'개',s1:'블록 2-3개까지만 쌓기 가능하며, 놓는 순간 과도한 힘으로 밀거나 중심에서 벗어나 4개 이상 진행이 반복적으로 실패(1-3개)',s2:'블록 4-5개까지 쌓으나 높아질수록 놓는 위치의 정밀성이 저하되어 탑이 기울어지거나 무너짐(4-5개)',s3:'블록 6개까지 수직 정렬을 유지하며 쌓기 성공하나, 7개 이상에서 손의 떨림이나 놓는 위치의 미세 오차로 무너짐(6개, 해당 연령 정상 수준)',s4:'블록 7-8개를 수직 정렬이 유지되는 안정적인 탑으로 쌓으며, 무너져도 즉시 다시 시도하는 지속성이 관찰됨(7-8개)'},
{code:'FM03-03',desc:'큰 구슬 끈 꿰기 시도 (예: 굵은 끈(지름 약 3-4mm)에 큰 나무 구슬(구멍 지름 약 8-10mm)을 한 손으로 잡고, 반대쪽 손으로 끈 끝을 구슬 구멍에 통과시키는 양손 정밀 협응 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 굵은 끈과 큰 구슬(구멍 지름 약 8-10mm)을 사용해도 끈을 구멍에 통과시키는 동작이 관찰되지 않을 경우',unit:'질적',s1:'구슬을 한 손으로 잡고 반대쪽 손으로 끈을 구멍에 대려는 시도가 관찰되지 않거나, 양손이 각각 구슬과 끈을 잡으나 두 손을 정중선으로 모으는 동작이 성립하지 않음',s2:'구슬 구멍에 끈 끝을 대려는 시도는 있으나 끈 끝과 구멍의 정렬이 맞지 않아 반복 실패하며, 끈이 구멍을 통과해도 반대쪽에서 잡아당기지 못해 빠져나옴',s3:'끈을 구슬 구멍에 통과시키고 반대쪽에서 잡아당기는 전체 순서가 성립하여 1-2개를 꿰나, 구슬을 잡는 손의 고정이 불안정하여 3개 이상 연속 꿰기가 어려움',s4:'구슬을 안정적으로 잡고 끈을 통과시켜 3개 이상 연속 꿰기가 가능하며, 양손의 역할(고정-통과)이 유창하게 교대됨'},
{code:'FM03-04',desc:'크레용 잡기 전환(digital-pronate → static tripod 출현) (예: 크레용을 손가락으로 감싸 쥐던 패턴(digital-pronate grasp, FM02-03 s4)에서, 엄지·검지·중지의 세 손가락 끝으로 크레용을 잡는 정적 삼지 잡기(static tripod grasp)가 간헐적으로 출현하는 전환 과정)',acqTime:'2세-2세 6개월',redFlag:'3세까지 크레용을 주먹이나 손바닥 전체로 감싸 쥐는 패턴(fist/palmar grasp)에서 벗어나지 않아, 손가락의 분화된 참여가 관찰되지 않을 경우',unit:'질적',s1:'크레용을 주먹이나 손바닥 전체로 감싸 쥐는 패턴(fist/palmar grasp)에서 벗어나지 않아 FM02-03의 진전이 관찰되지 않음',s2:'손가락으로 감싸 쥐는 패턴(digital-pronate grasp)이 안정적으로 유지되나, 세 손가락으로의 전환 시도가 관찰되지 않음(FM02-03 s4 수준)',s3:'끼적이기 시작 시 세 손가락(엄지·검지·중지)으로 크레용을 잡으려는 시도가 간헐적으로 출현하나, 곧 digital-pronate 패턴으로 회귀',s4:'정적 삼지 잡기(static tripod grasp)가 끼적이기 세션의 상당 부분에서 유지되며, 손목 단위의 움직임으로 선 조절이 개선됨'},
{code:'FM03-05',desc:'양말/신발 벗기 시도 (예: 바닥에 앉은 자세에서 한쪽 발의 양말을 발끝 방향으로 잡아당겨 벗거나, 벨크로(찍찍이) 신발의 끈을 떼고 발을 빼는 자조 활동. 양손의 협응(한 손으로 양말/신발을 잡고 반대쪽으로 당기기)과 운동 순서화(끈 떼기→잡기→당기기)가 요구됨)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양말을 잡아당겨 벗으려는 시도 자체가 관찰되지 않고, 자조 활동에 대한 자발적 시도가 전반적으로 부재할 경우',unit:'질적',s1:'양말이나 신발을 벗으려는 시도 자체가 관찰되지 않고, 양육자가 벗겨주기를 기다리거나 발을 내밀며 도움을 요청',s2:'양말의 끝을 잡아당기거나 신발을 흔들어 빼려는 시도는 있으나, 양말이 발뒤꿈치에 걸려 진행이 중단되거나 신발 끈을 떼지 못해 실패',s3:'양말을 발끝까지 잡아당겨 벗는 동작이 성공하나, 신발의 벨크로를 떼고 발을 빼는 순서에서는 양육자의 언어 안내("끈 먼저 떼어")가 필요',s4:'양말과 벨크로 신발을 독립적으로 벗으며, 양쪽 발 모두에서 수행 가능'}
],
gross:[
{code:'GM03-01',desc:'달리기(팔 흔들며 안정적) (예: 평평한 바닥에서 양팔을 자연스럽게 교대로 흔들며 달리되, GM02-05의 초기 달리기(flight phase 출현)에서 팔 흔들기 교대·멈추기·방향 전환이 안정화된 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 달리기 시 양발의 flight phase가 관찰되지 않고 빠른 걸음(fast walk) 수준에 머무르거나, 달리다 멈추지 못하여 반복적으로 넘어지거나 부딪히는 양상이 지속될 경우',unit:'질적',s1:'달리기 시 양팔이 대칭적으로 벌어진 채(high guard) 교대 흔들기가 관찰되지 않거나, 달리다 멈추지 못하고 벽이나 가구에 부딪히는 양상이 반복됨(GM02-05 s3 수준과 동일하면 진전 없음)',s2:'양팔의 교대 흔들기가 간헐적으로 나타나나 비대칭이며, 멈추기는 가능하나 2-3걸음 미끄러져 정지',s3:'양팔을 교대로 흔들며 달리고 멈추기·방향 전환이 가능하나, 속도가 빨라지면 팔 흔들기가 비대칭으로 회귀하거나 방향 전환 시 휘청거림',s4:'양팔 교대 흔들기가 안정적이며 달리기 중 멈추기·방향 전환·속도 조절이 유연하여 장애물을 피하며 달리는 것이 가능'},
{code:'GM03-02',desc:'계단 오르기(난간 잡고, 양발 같은 칸 — marking time) (예: 한 손으로 난간을 잡고 한 칸씩 올라가되, 한 발을 올린 뒤 같은 칸에 다른 발을 모아놓는 방식으로 상승하는 동작. GM02-02의 양손 잡고 오르기에서 한 손 지지·연속 오르기의 안정화 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 한 손으로 난간을 잡고 계단을 연속적으로 오르는 동작이 관찰되지 않고, 양손으로 난간을 잡거나 양육자가 안아올려야 하는 양상이 지속될 경우',unit:'질적',s1:'난간을 잡아도 첫 번째 단에 발을 올리는 동작이 성립하지 않거나, 1-2단만 오른 뒤 멈추어 앉음(GM02-02 s1-s2 수준과 동일하면 진전 없음)',s2:'한 손으로 난간을 잡고 연속적으로 오르나, 중간에 멈추어 난간을 양손으로 잡아야 하는 빈도가 높고 속도가 매우 느림',s3:'한 손 난간 지지로 한 층을 연속 완주하며 marking time 방식이 안정적이나, 계단 내려오기에서는 양손 지지가 필요하거나 엉덩이를 대고 내려오는 방식을 사용',s4:'한 손 난간 지지로 오르기와 내려오기 모두 marking time 방식으로 안정적으로 수행하며, 오르기 속도가 일정'},
{code:'GM03-03',desc:'공 앞으로 차기(walking kick) — 이동 중 차기 (예: 걸어가면서 정지된 큰 공(지름 약 15-20cm)을 만나면 멈추지 않고 한쪽 발로 밀어차는 동작. GM02-03의 서서 차기(standing kick)에서 보행 중 차기로의 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 정지 상태에서의 서서 차기(standing kick)도 성립하지 않고, 공을 발로 차려는 시도가 관찰되지 않는 양상이 지속될 경우',unit:'질적',s1:'걸어가다 공 앞에서 멈추어 서서 차는 방식(standing kick)에 머물며, 보행 중 차기로의 전환이 관찰되지 않음(GM02-03 수준과 동일하면 진전 없음)',s2:'걸어가면서 공을 향해 발을 내미는 시도는 있으나 공에 도달하기 전에 멈추거나, 공을 밟고 넘어지는 양상이 관찰됨',s3:'보행 중 공을 차는 동작이 성립하여 공이 전방으로 이동하나, 차기 직전에 보행 속도가 현저히 느려지고 차는 방향이 불규칙',s4:'걸어가면서 보행 리듬을 크게 방해하지 않고 공을 전방으로 차며, 차는 발과 방향의 조절이 가능'},
{code:'GM03-04',desc:'양발 모아 점프(바닥에서) — 착지 안정화 (예: 바닥에서 양발을 동시에 떼어 뛰어오른 뒤, 양발로 동시에 착지하여 넘어지지 않고 자세를 유지하는 양측 대칭 동작. BI03-02의 제자리 점프와 동일 과제이나, 여기서는 착지 후 자세 안정성과 반복 수행의 대근육 측면을 관찰)',acqTime:'2세-2세 6개월',redFlag:'3세까지 양발 모아 점프 시 착지 순간 양손을 바닥에 짚거나 넘어지는 양상이 반복되어, 착지 후 선 자세를 독립적으로 유지하지 못하는 양상이 지속될 경우. 양발 동시 이륙 자체가 성립하지 않는 경우에는 BI03-02 참조',unit:'질적',s1:'양발 동시 이륙이 성립하지 않거나, 이륙 후 착지 시 양손을 바닥에 짚거나 넘어짐(BI03-02 s1-s2 수준과 동일하면 진전 없음)',s2:'양발 동시 이륙-착지가 가능하나, 착지 시 체간이 앞으로 기울어 한두 걸음 앞으로 나가야 균형을 유지',s3:'착지 후 그 자리에서 자세를 유지하며 넘어지지 않고, 낮은 단(약 5-10cm 높이)에서 양발 모아 뛰어내리기도 가능',s4:'제자리 점프 착지가 안정적이며, 낮은 단에서 뛰어내리기·앞으로 짧은 거리 점프 이동이 가능'},
{code:'GM03-05',desc:'세발자전거 타기 시도(앉아서 발로 밀기) (예: 세발자전거 안장에 앉아 양발을 번갈아 바닥에 대고 밀어 전진하는 이동 방식. 페달 구동은 3세 이후에 기대되며, 이 연령에서는 앉아서 발로 미는 방식으로 방향 조절과 전진이 가능한 수준을 관찰)',acqTime:'2세-2세 6개월',redFlag:'3세까지 세발자전거 안장에 앉아 발로 바닥을 밀어 전진하려는 시도가 관찰되지 않을 경우. 만약 안장에 앉는 것 자체를 거부한다면, 운동 기획 이전에 감각 방어(안장 질감에 대한 촉각 과반응, 불안정한 탈것에 대한 전정 과반응)와의 감별이 선행되어야 함',unit:'질적',s1:'세발자전거 안장에 앉으나 발로 바닥을 밀어 전진하려는 시도가 관찰되지 않거나, 앉은 자세에서 균형을 잡지 못해 양쪽으로 기울어짐',s2:'발로 바닥을 밀어 약간 전진하나, 한쪽 발만 사용하여 한 방향으로만 회전하거나 곧 멈춤',s3:'양발을 번갈아 밀어 전진하며 짧은 거리를 이동하나, 핸들을 돌려 방향을 조절하는 동작은 아직 미숙',s4:'양발 번갈아 밀기로 연속 전진하며, 핸들을 돌려 대략적인 방향 조절이 가능'}
],
oral:[
{code:'OM03-01',desc:'다양한 질감 고형식 씹기 (예: 사과 조각, 당근 스틱, 고기 등 단단한 고형식을 회전 씹기(rotary chewing)로 분쇄하여 삼키되, OM02-03의 회전 씹기 출현에서 단단한 음식으로의 적용 범위 확대 단계)',acqTime:'2세-2세 6개월',redFlag:'3세까지 단단한 고형식(사과, 당근 등)을 입에 넣으면 분쇄하지 않고 뱉어내거나 큰 덩어리째 삼키려는 양상이 지속되어, 부드러운 음식이나 잘게 썬 음식에만 의존하는 식이 패턴이 유지될 경우',unit:'질적',s1:'부드러운 고형식(바나나, 두부)에서만 회전 씹기가 관찰되고, 단단한 음식(사과, 당근, 고기)은 입에 넣은 뒤 뱉어내거나 분쇄하지 않은 채 삼키려 함(OM02-03 s3 수준과 동일하면 진전 없음)',s2:'단단한 음식을 입에 넣어 씹으려는 시도는 있으나, 상하 씹기(munching)로 회귀하여 분쇄가 불충분하고 큰 덩어리째 삼키거나 뱉어냄',s3:'대부분의 단단한 음식에서 회전 씹기로 분쇄하여 삼키나, 섬유질이 많은 고기나 질긴 채소에서는 오래 씹다가 뱉어내는 양상이 관찰됨',s4:'다양한 질감·경도의 음식을 회전 씹기로 분쇄하여 삼키며, 음식의 경도에 따라 씹기 강도와 횟수를 조절하는 양상이 관찰됨'},
{code:'OM03-02',desc:'컵 마시기 — 흘림 최소화 (예: 양손 또는 한 손으로 열린 컵(open cup)을 잡고 마시되, OM02-01의 구순 폐쇄 출현에서 흘림이 거의 없는 안정적 컵 음용 단계로 진전)',acqTime:'2세-2세 6개월',redFlag:'3세까지 열린 컵으로 마실 때 매 모금 상당량이 흘러내리는 양상이 지속되어, 뚜껑·빨대 컵에만 의존하는 패턴이 유지될 경우',unit:'질적',s1:'열린 컵으로 마실 때 매 모금 상당량이 턱·옷으로 흘러내리며, 구순 폐쇄(lip closure)가 불안정(OM02-01 s1-s2 수준과 동일하면 진전 없음)',s2:'구순 폐쇄가 대부분의 모금에서 유지되나, 컵을 기울이는 각도가 커질 때 또는 음용 후 컵을 떼는 순간에 흘림이 관찰됨',s3:'흘림이 간헐적으로만 관찰되며, 컵을 떼는 순간 입안의 액체를 삼킨 뒤 떼는 순서가 정착',s4:'흘림이 거의 관찰되지 않으며, 한 손으로 컵을 잡고 마시는 시도가 나타남'},
{code:'OM03-03',desc:'불기 시도(촛불/비눗방울) (예: 생일 케이크의 촛불이나 비눗방울 도구 앞에서 입술을 오므려 "후" 하고 공기를 내보내는 구강 호기(oral expiration) 조절 과제)',acqTime:'2세-2세 6개월',redFlag:'3세까지 입술을 오므려 공기를 앞으로 내보내는 구강 호기 동작이 관찰되지 않아, 촛불을 흔들리게 하는 수준의 공기 흐름도 산출하지 못하는 양상이 지속될 경우',unit:'질적',s1:'촛불이나 비눗방울 도구 앞에서 입술을 오므려 공기를 내보내려는 시도가 관찰되지 않거나, 소리("후")는 내나 실제 공기 흐름이 발생하지 않아 촛불이 흔들리지 않음',s2:'입술을 오므려 공기를 내보내는 동작이 간헐적으로 성공하여 촛불이 흔들리나, 호기의 강도와 방향이 불규칙하여 촛불을 끄는 데 여러 번의 시도가 필요',s3:'촛불을 1-2번의 시도로 끌 수 있으나, 비눗방울에서는 호기의 강도가 과도하여 비눗물이 흩어지거나 호기가 너무 약하여 방울이 형성되지 않음',s4:'촛불 끄기와 비눗방울 만들기 모두 가능하며, 호기의 강도를 과제에 맞게 조절하는 양상이 관찰됨'},
{code:'OM03-04',desc:'빨대로 다양한 점도의 음료 음용 (예: 물뿐 아니라 요거트·스무디 등 점도가 높은 음료를 빨대를 통해 빨아올리되, OM02-04의 빨대 음용 시작에서 흡인 강도를 점도에 맞게 조절하는 단계로 확장)',acqTime:'2세-2세 6개월',redFlag:'3세까지 묽은 액체(물, 주스) 이외의 점도에서 빨대 음용이 불가능하고, 요거트 수준의 점도에서도 흡인하지 못하는 양상이 지속될 경우',unit:'질적',s1:'물이나 묽은 주스는 빨대로 마시나, 요거트·스무디 등 점도가 높은 음료에서는 흡인력이 부족하여 빨아올리지 못함(OM02-04 수준에 머무름)',s2:'점도가 높은 음료를 빨아올리려는 시도는 있으나, 흡인과 삼킴의 타이밍이 맞지 않아 사레가 들리거나 빨대를 물었다 놓기를 반복',s3:'요거트 수준의 점도까지 빨아올려 마시나, 더 되직한 음료(걸쭉한 스무디)에서는 흡인이 중단되거나 빨대를 빼고 숟가락으로 전환',s4:'다양한 점도의 음료를 빨대로 빨아올려 마시며, 점도에 따라 흡인 강도를 조절하는 양상이 관찰됨'},
{code:'OM03-05',desc:'침 흘림(drooling) 현저한 감소 (예: 깨어 있는 시간 동안 놀이·보행·식사 등 대부분의 일상 활동에서 침 흘림이 거의 관찰되지 않아, 턱받이 없이 하루를 보내는 것이 가능한 수준. OM02-05의 활동별 차이에서 전반적 감소로 진전)',acqTime:'2세-2세 6개월',redFlag:'3세 이후에도 이 나는 시기가 아닌 때에 깨어 있는 시간 대부분에서 침 흘림이 지속되어 턱받이가 필요한 양상이 유지될 경우',unit:'질적',s1:'깨어 있는 시간 대부분에서 침 흘림이 지속되어 턱받이 교체가 빈번(OM02-05 s1 수준과 동일하면 진전 없음)',s2:'안정 시와 식사 시에는 침 흘림이 관찰되지 않으나, 대근육 활동·집중 과제·새로운 과제 수행 시 침 흘림이 재출현',s3:'대부분의 활동에서 침 흘림이 관찰되지 않으나, 과도한 신체 활동 후 또는 피로 시 간헐적으로 관찰',s4:'깨어 있는 시간 동안 침 흘림이 거의 관찰되지 않으며 턱받이 없이 하루 활동이 가능'}
]
},
'3y':{
postural:[
{code:'PC04-01',desc:'한발서기 안정화 (예: 평평한 바닥에서 지지 없이 한쪽 발을 들고 반대쪽 발로만 서 있되, PC03-01의 "시도"에서 자세를 안정적으로 유지하는 단계로 진전. 이 연령에서 한발서기는 동요하면서도 넘어지지 않고 유지하는 수준이 기대됨)',acqTime:'3세-3세 6개월',redFlag:'4세까지 지지 없이 한쪽 발로 잠시라도 서 있는 자세가 성립하지 않고, 발을 들어올리는 즉시 넘어지거나 반대쪽 발을 내려놓는 양상이 지속될 경우. 만약 한쪽 발에서만 지속적으로 실패한다면 일측 하지 근력 또는 편측 전정 기능과의 감별이 선행되어야 함',unit:'질적',s1:'한쪽 발을 들어올려도 즉시 균형을 잃어 1초 미만에 반대쪽 발을 내려놓으며, PC03-01 s2 수준과 동일하면 진전 없음',s2:'지지 없이 한발로 서서 상체 동요가 크지만 넘어지지 않고 잠시 유지하며, 들어올린 발이 지지 발에 기대는 보상이 관찰됨',s3:'한발서기 중 상체 동요가 줄어들고 양팔을 벌려 균형을 잡으며 유지 시간이 길어지나, 양쪽 발 간 유지 시간의 비대칭이 관찰됨',s4:'양쪽 발 모두에서 안정적인 한발서기가 가능하며, 한발서기 중 머리를 돌려 양육자를 바라보는 부가 동작이 가능'},
