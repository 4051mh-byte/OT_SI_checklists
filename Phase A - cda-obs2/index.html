<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;padding:10px}
h1{font-size:20px;color:#1B4F72;margin-bottom:3px}
.sub{font-size:11px;color:#666;margin-bottom:10px}
.group-label{font-size:11px;font-weight:700;margin:6px 0 2px;padding:2px 6px;border-radius:3px;display:inline-block}
.gl-tod{background:#FFF3E0;color:#E65100}.gl-pre{background:#E8F5E9;color:#2E7D32}.gl-sch1{background:#E3F2FD;color:#1565C0}.gl-sch2{background:#F3E5F5;color:#6A1B9A}

.age-tab.pre{border-bottom:3px solid #2E7D32}.age-tab.pre.active{background:#2E7D32}
.age-tab.s7{border-bottom:3px solid #1565C0}.age-tab.s7.active{background:#1565C0}
.age-tab.old{border-bottom:3px solid #6A1B9A}.age-tab.old.active{background:#6A1B9A}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;font-size:13px}
.legend span{padding:2px 8px;border-radius:3px}
.leg-m{background:#E8F5E9;font-weight:600}.leg-e{background:#FFF9C4;font-weight:600}.leg-r{background:#FFC7CE;color:#c00;font-weight:600}
.pbtn{padding:6px 14px;background:#333;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;margin:4px}
.info-bar{background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:7px 10px;margin:6px 0;font-size:12px;line-height:1.7}
.count-bar{background:#EBF5FB;border-left:4px solid #2196F3;padding:5px 10px;border-radius:4px;margin:4px 0;font-size:12px}
.patient{font-size:11px;color:#555;margin:3px 0}
table{border-collapse:collapse;width:100%;background:#fff;margin-bottom:6px;border:1px solid #bbb}
th{background:#1B4F72;color:#fff;padding:7px 4px;text-align:center;font-size:12px;border:1px solid #0e3557}
.btn-bar{position:-webkit-sticky;position:sticky;top:0;z-index:20;background:#f0f2f5;padding:4px 10px 4px;border-bottom:1px solid #ddd;margin:0 -10px 6px;}
td{border:1px solid #ccc;padding:5px 4px;vertical-align:top;font-size:13px;line-height:1.45}
.d{font-weight:700;text-align:center;font-size:11px;width:7%}.sk{width:23%}.tm{text-align:center;font-size:11px;width:6%}.st{text-align:center;width:3%}
.ck{text-align:center;width:3.5%;font-size:14px;cursor:pointer;user-select:none}.ob{font-size:11px;color:#444;width:18%}.cr{font-size:10px;color:#555;width:10%;background:#F5F9FF}.rf{font-size:11px;width:22%}
.ck-btn{display:inline-block;width:22px;height:22px;line-height:22px;border-radius:4px;border:1.5px solid #bbb;cursor:pointer;font-size:13px;text-align:center;transition:.15s;background:#fff}
.ck-btn:hover,.ck-btn:focus{border-color:#1B4F72;background:#E3F2FD;outline:none}
.ck-btn:focus-visible{box-shadow:0 0 0 2px #1B4F72}
.ck-btn.sel-o{background:#4CAF50;color:#fff;border-color:#388E3C;font-weight:700}
.ck-btn.sel-t{background:#FF9800;color:#fff;border-color:#F57C00;font-weight:700}
.ck-btn.sel-x{background:#F44336;color:#fff;border-color:#D32F2F;font-weight:700}
.pi{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:6px 0;padding:8px 10px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:12px}
.pi label{font-weight:600;color:#1B4F72;white-space:nowrap}.pi input{border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px;outline:none}
.pi input:focus{border-color:#1B4F72;box-shadow:0 0 0 2px rgba(27,79,114,.15)}
.pi .age-display{background:#E8F5E9;padding:2px 8px;border-radius:4px;font-weight:700;color:#2E7D32;min-width:80px;text-align:center}
.result-panel{margin:8px 0;padding:10px;border-radius:6px;font-size:12px;line-height:1.7}
.rp-good{background:#E8F5E9;border-left:4px solid #4CAF50}.rp-warn{background:#FFF9C4;border-left:4px solid #FF9800}.rp-bad{background:#FFC7CE;border-left:4px solid #F44336}
.prog-bar{height:14px;border-radius:7px;background:#e0e0e0;overflow:hidden;margin:2px 0}.prog-fill{height:100%;border-radius:7px;transition:width .3s}
.sec-result{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.b-green{background:#E8F5E9;color:#2E7D32}.b-yellow{background:#FFF9C4;color:#F9A825}.b-red{background:#FFC7CE;color:#c00}
.mastered{background:#E8F5E9}.emerging{background:#FFF9C4}.rf-t{background:#FFC7CE;color:#c00}
tr:hover td{background:#f0f6ff}tr:hover td.mastered{background:#d0ead3}tr:hover td.emerging{background:#fff3b0}tr:hover td.rf-t{background:#ffd5d5!important}
.sec td{background:#D6E4F0;font-weight:700;color:#1B4F72;font-size:11px;padding:5px 8px;border-bottom:2px solid #1B4F72;cursor:pointer;user-select:none}
.sec:hover td{background:#C5D8EB}
.sec-arrow{display:inline-block;transition:transform .2s;margin-right:5px;font-size:10px}
.sec-arrow.open{transform:rotate(90deg)}
.note{font-size:11px;color:#555;margin:3px 0}
@media(max-width:640px){.pbtn{font-size:11px;padding:4px 8px;margin:2px}.btn-bar{flex-wrap:wrap;display:flex;}.ck-btn{width:18px;height:18px;line-height:18px;font-size:11px}}
.tab-pct{display:inline-block;margin-left:4px;padding:0 5px;border-radius:3px;font-size:10px;font-weight:700;vertical-align:middle}
.tab-pct.pct-done{background:#4CAF50;color:#fff}.tab-pct.pct-mid{background:#FF9800;color:#fff}.tab-pct.pct-low{background:#9E9E9E;color:#fff}
@media print{.age-tabs,.legend,.pbtn,.no-print,.group-label,.btn-bar{display:none!important}body{background:#fff;padding:2px;font-size:11px}th{font-size:10px;padding:3px}td{font-size:11px;padding:3px;word-wrap:break-word;overflow-wrap:break-word}tr{page-break-inside:avoid}.pi input{border:none;font-weight:700}.ck-btn{border:1px solid #999;font-size:10px;width:16px;height:16px;line-height:16px}.rf{max-width:200px;word-wrap:break-word;overflow-wrap:break-word}}
</style>
</head>
<body>
<h1>기초인지 임상관찰 체크리스트</h1>

<span class="group-label gl-tod no-print">영유아기</span>
<span class="group-label gl-pre no-print">전학령기</span>
<span class="group-label gl-sch1 no-print">학령 초기</span>
<span class="group-label gl-sch2 no-print">학령 후기</span>
<div class="age-tabs" id="tabs"></div>
<div class="legend no-print"><span class="leg-m">● 습득 기대</span><span class="leg-e">◐ 출현 중</span><span class="leg-r">■ Red Flag</span></div>
<div class="no-print note">● 항목에서 <b>X/△</b> → <b>정밀 평가 권고</b> | ◐ 항목에서 <b>X</b> → <b>지속 관찰</b></div>
<div class="btn-bar">
<button class="pbtn no-print" style="background:#546E7A" onclick="downloadPDF()">🖨 인쇄/PDF</button>
<button class="pbtn no-print" style="background:#333" onclick="saveData()">💾 임시저장</button>
<button class="pbtn no-print" style="background:#1B4F72" onclick="analyze()">📊 판정 분석</button>
<button class="pbtn no-print" style="background:#1565C0" onclick="openReport()">📋 임상 보고서</button>
<button class="pbtn no-print" style="background:#888" onclick="resetChecks()">🔄 현재 탭 리셋</button>
<button class="pbtn no-print" style="background:#00796B" onclick="exportJSON()">📤 내보내기</button>
<button class="pbtn no-print" style="background:#00796B" onclick="document.getElementById('json-import-input').click()">📥 가져오기</button>
<button class="pbtn no-print" style="background:#AD1457" onclick="showGoals()">🎯 치료 목표</button>
<button class="pbtn no-print" style="background:#6A1B9A" onclick="downloadParent()">👨‍👩‍👧 부모용 체크리스트</button>
</div>
<input type="file" id="json-import-input" accept=".json" style="display:none" onchange="importJSON(this)">
<span id="save-msg" style="font-size:11px;color:#2E7D32;margin:2px 0 4px 2px;display:block;min-height:14px"></span>
<!-- 환자 정보: 탭 전환 시 재건되지 않도록 #out 밖에 영구 배치 -->
<div class="pi" id="pi-wrap">
  <label>아동명</label><input type="text" id="inp-name" style="width:100px" placeholder="이름 입력"/>
  <label>생년월일</label><input type="date" id="inp-dob" style="width:130px" onchange="onDobChange()"/>
  <span class="age-display" id="age-calc">생년월일 입력</span>
  <label>평가일</label><input type="date" id="inp-edate" style="width:130px"/>
  <label>평가자</label><input type="text" id="inp-eval" style="width:80px" placeholder="이름"/>
  <label>Stage</label><input type="text" id="inp-stage" style="width:50px" placeholder="1~4"/>
</div>
<div id="out"></div>
<div id="result"></div>

<script>
// A 배열: 총 23개 연령대 (인덱스 0~22). 아래 번호는 0-기반 인덱스와 동일.
const A=[
// 0. 2세 전반
{name:'2세 전반',range:'24~27M',ref:'감각운동→전조작기 전환',type:'tod',desc:'대상영속성 완성기, 감각탐색 중심 인지. 단순 1단계 지시 수행, 사물 명명 시작, 크기(큰/작은) 변별 출현.',items:[

{section:'주의력'},
{d:'공동주의',sk:'성인이 손가락으로 가리킨 대상을 따라보기',t:'24~27M',st:'m',obs:'성인이 손가락으로 사물을 가리킴 → 아동이 가리킨 대상으로 시선을 돌려 주시하는지 3회 관찰. 성공 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'27M까지 0/3회(N) → ASD 선별 평가 권고'},
{d:'선택적',sk:'소리 나는 장난감 1개에 시선 향하기',t:'24~27M',st:'m',obs:'소리 나는 장난감 2개를 좌우에 동시 제시 → 목표 장난감 쪽으로 시선을 돌려 주시하는지 3회 관찰. 성공 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'27M까지 0/3회(N) → 감각처리/청각 선별 평가 권고'},
{d:'지속적',sk:'단일 놀이를 중간 이탈 없이 유지',t:'24~27M',st:'m',obs:'블록 쌓기 등 단일 놀이 제공 → 이탈 없이 놀이를 이어가는지 3회 관찰. 이탈 없이 유지한 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'27M까지 0/3회(N) — 놀이 시작 직후 이탈 반복 → 주의력 추가 관찰'},
{d:'전환',sk:'새 자극 제시 시 시선 이동(2개 사물 간 교대)',t:'24~27M',st:'e',obs:'장난감 A와 B를 교대 제시 → 시선 전환 횟수 관찰. 6회 교대 중 전환 횟수 기록',cr:'6회: M≥4 / E=1~3 / N=0',rf:'31M까지 0/6회(N) → 감각처리/주의 평가 권고'},
{section:'기억력'},
{d:'대상영속',sk:'눈앞에서 숨긴 물건을 탐색하여 찾기',t:'24~27M',st:'m',obs:'아동이 보는 앞에서 장난감을 컵 A 아래에 숨기기 → 컵 A를 들어 찾는지 관찰. 5회 시행 중 정확 탐색 횟수 기록',cr:'5회: M≥3 / E=1~2 / N=0',rf:'27M까지 0/5회(N) — 탐색 행동 자체 없음 또는 A-not-B만 반복 → 발달 평가 권고'},
{d:'단기기억',sk:'방금 본 사물 1개를 이름으로 말하기',t:'24~27M',st:'m',obs:'친숙한 사물 3개 보여준 후 가리기 → "뭐 있었지?" 질문에 사물 이름 1개 이상 말하는지 3회 관찰. 정답 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'27M까지 0/3회(N) — 무반응 또는 무관한 발성만'},
{d:'절차기억',sk:'일상 루틴의 다음 단계를 예측하는 행동',t:'24~27M',st:'e',obs:'식사 전 → 자발적으로 손씻기 장소로 이동하는지 관찰. 3회 일상 상황 중 예측 행동 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'31M까지 0/3회(N) — 예측 행동 전혀 없음'},
{section:'지각/변별'},
{d:'크기변별',sk:'크기가 명확히 다른 2개 사물 중 지시한 쪽 고르기',t:'24~27M',st:'m',obs:'큰 공(약 15cm)과 작은 공(약 5cm) → "큰 거 줘" 지시 시 정확 선택 관찰. 5회 시행 중 정확 횟수 기록',cr:'5회: M≥3 / E=1~2 / N=0',rf:'27M까지 0~2/5회(E 이하) — 무작위 수준 → 인지 발달 평가 권고'},
{d:'형태변별',sk:'도형판에 원형 조각 맞춰 넣기',t:'24~27M',st:'e',obs:'도형 삽입판(원, 사각, 삼각) → 원형 조각을 원형 구멍에 삽입하는지 관찰. 3회 시행 중 성공 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'31M까지 0/3회(N) — 맞추려는 시도 전혀 없음'},
{d:'색상변별',sk:'같은 색 블록끼리 모으기(2색)',t:'24~27M',st:'e',obs:'빨강/파랑 블록 각 3개 + 접시 2개 → 모델링 후 같은 색 접시에 분류하는지 관찰. 6개 중 정확 분류 수 기록',cr:'6개: M≥4 / E=1~3 / N=0',rf:'31M까지 0/6개(N) — 무작위 배치만'},
{d:'위치개념',sk:'"안에 넣어" 지시에 사물을 용기 내부에 놓기',t:'24~27M',st:'m',obs:'"상자 안에 넣어" 지시 → 블록을 상자 내부에 놓는지 관찰. 5회 시행 중 정확 횟수 기록',cr:'5회: M≥3 / E=1~2 / N=0',rf:'27M까지 0/5회(N) — 용기 밖에만 놓음 → 수용언어/인지 평가 권고'},
{d:'같다/다르다',sk:'동일한 실물끼리 짝짓기 시도',t:'24~27M',st:'e',obs:'같은 사과 2개 + 바나나 1개 → "같은 거 찾아봐" 지시 시 짝짓기 시도 관찰. 3회 시행 중 시도 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'31M까지 0/3회(N) — 짝짓기 시도 전혀 없음'},
{section:'사고/추론'},
{d:'분류',sk:'모델링 후 같은 색 블록끼리 모으기 시도',t:'24~27M',st:'e',obs:'빨강/파랑 블록 → 시범 후 같은 색 모으기 시도 관찰. 3회 시행 중 시도 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'31M까지 0/3회(N) — 시범 후에도 시도 없음'},
{d:'일대일대응',sk:'인형 각각에 컵 1개씩 나눠주기 시도',t:'24~27M',st:'e',obs:'인형 3개 + 컵 3개 → "하나씩 줘봐" 지시 후 정확 대응 관찰. 3세트 중 정확 대응 수 기록',cr:'3세트: M≥2 / E=1 / N=0',rf:'31M까지 0/3세트(N) — 몰아놓기 또는 무작위만'},
{d:'수량',sk:'1개와 여러 개의 양적 차이에 반응',t:'24~27M',st:'e',obs:'1개 vs 5개 → "많이 있는 거 어디야?" 질문에 반응 관찰. 3회 시행 중 정확 선택 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'31M까지 0/3회(N) — 차별적 반응 전혀 없음'},
{d:'인과',sk:'동작과 결과의 연결을 기대하는 행동',t:'24~27M',st:'m',obs:'전등 스위치 → 조작 후 결과 기대 행동(쳐다보기, 미소 등) 관찰. 3회 조작 중 기대 행동 횟수 기록',cr:'3회: M≥2 / E=1 / N=0',rf:'27M까지 0/3회(N) → 인지 발달 평가 권고'},
{d:'문제해결',sk:'장애물을 치우고 원하는 사물 획득 시도',t:'24~27M',st:'m',obs:'투명 컵으로 장난감 덮기 → 컵 치우기 관찰. 5회 시행 중 성공 횟수 기록',cr:'5회: M≥3 / E=1~2 / N=0',rf:'27M까지 0/5회(N) — 치우려는 시도 전혀 없음 → 인지 발달 평가 권고'},

function init(){
  const c=document.getElementById('tabs');
  A.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='age-tab '+a.type+(i===0?' active':'');
    b.textContent=a.name;
    b.onclick=()=>{cur=i;document.querySelectorAll('.age-tab').forEach((t,j)=>t.classList.toggle('active',j===i));document.getElementById('result').innerHTML='';render()};
    c.appendChild(b);
    checks[i]={};
  });
}

function calcAge(dob){
  if(!dob)return'';
  const b=new Date(dob),t=new Date();
  if(isNaN(b))return'';
  let y=t.getFullYear()-b.getFullYear(),m=t.getMonth()-b.getMonth();
  if(m<0){y--;m+=12;}
  if(t.getDate()<b.getDate()&&m>0)m--;
  else if(t.getDate()<b.getDate()&&m===0){y--;m=11;}
  const totalM=y*12+m;
  return `만 ${y}세 ${m}개월 (${totalM}M)`;
}

function onDobChange(){
  const v=document.getElementById('inp-dob').value;
  const el=document.getElementById('age-calc');
  el.textContent=calcAge(v)||'생년월일 입력';
}

// M(개월) → 년 개월 변환: "27M" → "2년 3개월", "12M" → "1년", "6M" → "6개월"
function fmtM(text){
  if(!text)return text;
  return text.replace(/(?<![A-Za-z])(\d+)M(?![A-Za-z])/g,function(_,n){
    const m=parseInt(n);
    const y=Math.floor(m/12), mo=m%12;
    if(y===0) return mo+'개월';
    if(mo===0) return y+'년';
    return y+'년 '+mo+'개월';
  });
}

function toggleSection(secName){
  const key=`${cur}-${secName}`;
  const wasOpen=sectionOpen[key]!==false;
  sectionOpen[key]=!wasOpen;
  const vis=sectionOpen[key]?'':'none';
  document.querySelectorAll(`tr[data-sec="${secName}"]`).forEach(r=>r.style.display=vis);
  const secId=secName.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const arrow=document.getElementById(`sarr-${cur}-${secId}`);
  if(arrow)arrow.classList.toggle('open',sectionOpen[key]);
}

function toggleCheck(ageIdx,itemIdx,type){
  if(checks[ageIdx][itemIdx]===type) checks[ageIdx][itemIdx]=null;
  else checks[ageIdx][itemIdx]=type;
  // 해당 행의 버튼만 업데이트
  ['o','t','x'].forEach(t=>{
    const btn=document.getElementById(`ck-${ageIdx}-${itemIdx}-${t}`);
    if(btn){
      const cls=t==='o'?'sel-o':t==='t'?'sel-t':'sel-x';
      if(checks[ageIdx][itemIdx]===t) btn.classList.add(cls);
      else btn.classList.remove(cls);
    }
  });
  updateTabBadge(ageIdx);
}

// ── 탭 체크율 배지 ──
function updateTabBadge(i){
  const tab=document.querySelectorAll('.age-tab')[i];
  if(!tab)return;
  let badge=tab.querySelector('.tab-pct');
  let idx=0,total=0,done=0;
  A[i].items.forEach(it=>{
    if(it.section)return;
    if(!it.meta){
      total++;
      if(checks[i]&&checks[i][idx]!=null)done++;
    }
    idx++;
  });
  if(total===0){if(badge)badge.remove();return;}
  const pct=Math.round(done/total*100);
  if(!badge){badge=document.createElement('span');badge.className='tab-pct';tab.appendChild(badge);}
  badge.textContent=pct+'%';
  badge.className='tab-pct '+(pct===100?'pct-done':pct>=50?'pct-mid':'pct-low');
}
function updateAllTabBadges(){A.forEach((_,i)=>updateTabBadge(i));}

// ── 판정(cr) 파싱 ──
// "5회: M≥4 / E=1~3 / N=0" → {trials:5, mThreshold:4, kind:'count'}
// "관찰: M=자발+일관 / E=간헐적 / N=없음" → {trials:null, mThreshold:null, kind:'obs'}
function parseCr(cr){
  if(!cr)return {trials:null,mThreshold:null,kind:'unknown'};
  const m=cr.match(/(\d+)(?:회|개|세트).*?M[≥>=]+\s*(\d+)/u);
  if(m)return {trials:+m[1],mThreshold:+m[2],kind:'count'};
  if(cr.includes('관찰'))return {trials:null,mThreshold:null,kind:'obs'};
  return {trials:null,mThreshold:null,kind:'unknown'};
}

// ── O/△/X → M/E/N 매핑 ──
// 각 체크값을 MEN 코드로 변환 ('M'|'E'|'N'|null=미평가)
function checkToMen(check){
  if(check==='o')return 'M';
  if(check==='t')return 'E';
  if(check==='x')return 'N';
  return null; // 미평가
}
function menScore(men){
  if(men==='M')return 2;
  if(men==='E')return 1;
  if(men==='N')return 0;
  return null;
}

// ── SVG 레이더(방사형) 차트 ──
// order: 6개 영역 순서 고정 (누락 영역은 0%)
const RADAR_AXES=['주의력','기억력','지각/변별','사고/추론','실행기능','복합집행기능','메타인지','언어인지'];
function renderRadarSVG(sections, size=300){
  const cx=size/2, cy=size/2;
  const r=size*0.38;
  const axes=RADAR_AXES;
  const n=axes.length;
  // angle per axis (top-first, clockwise)
  const angleOf=(i)=>-Math.PI/2 + (2*Math.PI*i/n);
  const pt=(i,pct)=>{
    const a=angleOf(i);
    return [cx+Math.cos(a)*r*pct, cy+Math.sin(a)*r*pct];
  };
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="background:#fff">`;
  // rings (25/50/75/100)
  [0.25,0.5,0.75,1].forEach(p=>{
    const pts=axes.map((_,i)=>pt(i,p).join(',')).join(' ');
    svg+=`<polygon points="${pts}" fill="none" stroke="#ccc" stroke-width="1"/>`;
  });
  // ring labels (25/50/75/100) on vertical (first) axis
  [0.25,0.5,0.75,1].forEach(p=>{
    svg+=`<text x="${cx+3}" y="${cy - r*p + 3}" font-size="9" fill="#999">${Math.round(p*100)}</text>`;
  });
  // axes lines
  axes.forEach((_,i)=>{
    const [x,y]=pt(i,1);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#bbb" stroke-width="1"/>`;
  });
  // data polygon (null achRate → 0으로 처리, 레이블은 N/A)
  const data=axes.map(ax=>{
    const s=sections[ax];
    if(!s||s.achRate===null)return null;
    return s.achRate/100;
  });
  // fill color = 평가된 영역 평균 (null 제외)
  const evalData=data.filter(v=>v!==null);
  const mean=evalData.length>0?evalData.reduce((a,b)=>a+b,0)/evalData.length:0;
  const pct=mean*100;
  const fill=pct>=70?'rgba(76,175,80,0.35)':pct>=40?'rgba(255,152,0,0.35)':'rgba(244,67,54,0.35)';
  const stroke=pct>=70?'#2E7D32':pct>=40?'#F57C00':'#C62828';
  const dataPts=data.map((v,i)=>pt(i,v===null?0:v).join(',')).join(' ');
  svg+=`<polygon points="${dataPts}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
  // data points
  data.forEach((v,i)=>{
    const [x,y]=pt(i,v===null?0:v);
    svg+=`<circle cx="${x}" cy="${y}" r="3" fill="${v===null?'#bbb':stroke}"/>`;
  });
  // axis labels (outside)
  axes.forEach((name,i)=>{
    const [x,y]=pt(i,1.18);
    const s=sections[name];
    const rate=s&&s.achRate!==null?s.achRate:null;
    const labelColor=rate===null?'#999':rate>=70?'#2E7D32':rate>=40?'#F57C00':'#C62828';
    svg+=`<text x="${x}" y="${y}" font-size="11" font-weight="700" fill="#333" text-anchor="middle" dominant-baseline="middle">${name}</text>`;
    svg+=`<text x="${x}" y="${y+13}" font-size="10" font-weight="700" fill="${labelColor}" text-anchor="middle" dominant-baseline="middle">${rate!==null?rate+'%':'N/A'}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

  {kw:['이야기 회상','문장 따라 말하기','이야기 기억','지연회상','서술'],cq:['CQ11','CQ41'],label:'언어기억/서술 감별'},

  {kw:['메타인지','자기점검','자기 점검','오류','자기평가','전략 선택','예측','복습','이해도','FOK','강점','약점','자기옹호'],cq:['CQ21','CQ22','CQ58'],label:'메타인지 감별'},
];

function lookupCQ(rfText){
  if(!rfText)return null;
  const hits=[];
  RF_CQ_MAP.forEach(m=>{
    for(const k of m.kw){
      if(rfText.includes(k)){hits.push(m);break;}
    }
  });
  if(hits.length===0)return null;
  // dedupe by label
  const seen=new Set();
  return hits.filter(h=>{if(seen.has(h.label))return false;seen.add(h.label);return true;});
}

// ── 임상추론 패널 (PC v3 PART VIII 의사결정 흐름) ──
function buildClinicalReasoning(ageData,sections,total){
  const stageLabel=(ageData.ref||'').trim()||ageData.type;
  const att=sections['주의력'];
  const mem=sections['기억력'];
  const per=sections['지각/변별'];
  const rea=sections['사고/추론'];
  const ef =sections['실행기능'];
  const cef=sections['복합집행기능'];
  const meta=sections['메타인지'];
  const lang=sections['언어인지'];
  const lines=[];
  const rateStr=total.achRate!==null?`${total.achRate}%`:'N/A(미평가)';
  lines.push(`<b>① Stage 판정</b>: <span style="color:#1B4F72;font-weight:700">${stageLabel}</span> — 달성률 ${rateStr} (M${total.M}/E${total.E}/N${total.N}/X${total.X})`);
  const secLine=(sec,label,cqRange)=>{
    if(!sec||!sec.max)return;
    if(sec.achRate===null){lines.push(`<b>${label}</b>: <span style="color:#999">미평가</span>`);return;}
    const s=sec.achRate<70?`→ <span class="badge b-yellow">${cqRange} 감별 권고</span>`:'→ 연령 기대 수준';
    lines.push(`<b>${label}</b>: ${sec.achRate}% ${s}`);
  };
  secLine(att,'② ATT 평가 (주의력)','CQ1~CQ8');
  secLine(mem,'③ MEM 평가 (기억력)','CQ9~CQ16');
  secLine(per,'④ 지각/변별 평가','CQ23·CQ25·CQ27');
  secLine(rea,'⑤ 사고/추론 평가','CQ31~CQ40');
  secLine(ef,'⑥ EF 평가 (기초 실행기능)','CQ17~CQ22');
  secLine(cef,'⑦ 복합 EF 평가','CQ19·CQ21·CQ22');
  secLine(meta,'⑧ 메타인지 평가','CQ21·CQ22·CQ58');
  secLine(lang,'⑨ 언어인지 평가','CQ41~CQ50');
  // 중재 권고
  const weak=Object.entries(sections).filter(([k,s])=>s.max>0&&s.achRate!==null&&s.achRate<70).map(([k])=>k);
  if(weak.length>0){
    lines.push(`<b>⑩ 기저 중재</b>: ${weak.join('·')} 영역 — 환경 구조화 + 전략 교수 + 감각 전제조건 조정 (4~6주)`);
    lines.push(`<b>⑪ 재평가</b>: 4주 후 CPT + 숫자폭 + 지시 수행률 + 자기점검률 재측정`);
  } else if(total.achRate>=70&&total.rfCount===0){
    lines.push(`<b>⑩ 중재 권고</b>: 현재 발달 수준 유지 — Stage 전환 준비 가능`);
  } else {
    lines.push(`<b>⑩ 중재 권고</b>: Red Flag 영역 우선 감별 후 개별 중재 계획 수립`);
  }
  return lines.join('<br>');
}

// ── 총평 자동 생성 (서술형 3문단 구조) ──
function buildOverallAssessment(name,ageData,sections,total){
  const nm=name||'대상 아동';
  const ageTxt=`${ageData.name} (${ageData.range})`;
  const SEC_ORDER=['주의력','기억력','지각/변별','사고/추론','실행기능','복합집행기능','메타인지','언어인지'];
  const weakSecs=Object.entries(sections).filter(([k,s])=>s.max>0&&s.achRate!==null&&s.achRate<50).map(([k,s])=>k);
  const highRFCount=total.rfList.filter(r=>r.severity==='high').length;
  let tier;
  if(total.achRate===null){tier='⚪ 평가 불가';}
  else if(total.achRate>=70&&highRFCount===0){tier='✅ 양호';}
  else if(total.achRate>=70&&highRFCount>0){tier='🟡 전반 양호 — 부분 감별 필요';}
  else if(total.achRate>=40){tier='🟠 관찰 필요 — 집중 중재 권고';}
  else{tier='🔴 정밀 평가 권고';}

  if(total.achRate===null){
    return{tier,body:`${nm} 아동의 ${ageTxt} 수준 평가에서 체크된 항목이 부족하여 판정을 도출하기 어렵습니다. 미평가 영역을 체크한 후 재판정을 권고합니다.`};
  }

  // ── 영역별 수준 표현 ──
  function secLvl(r){
    if(r>=80)return'연령 기대 수준에 적절한 수행을 보였다';
    if(r>=70)return'대체로 연령 기대 수준에 부합하였다';
    if(r>=60)return'연령 기대 수준에 근접하나 일부 항목에서 출현 수준의 수행을 보였다';
    if(r>=50)return'출현 수준으로 촉진이 제공될 때 수행이 가능한 항목이 다수였다';
    if(r>=40)return'연령 기대 수준에 미치지 못하는 수행을 보이며 지연이 관찰되었다';
    if(r>=20)return'다수의 항목에서 수행이 이루어지지 않아 현저한 지연이 관찰되었다';
    return'대부분의 항목에서 수행이 이루어지지 않아 심각한 지연이 관찰되었다';
  }

  // ── 문단 1: 평가 결과 개요 ──
  const evalN=total.M+total.E+total.N;
  const secParts=[];
  for(const sk of SEC_ORDER){
    const s=sections[sk];
    if(!s||s.max===0)continue;
    if(s.achRate===null){secParts.push(`${sk} 영역은 미평가로 결과를 도출할 수 없었다`);continue;}
    const rfNote=s.rfCount>0?` (Red Flag ${s.rfCount}건 포함)`:'';
    secParts.push(`${sk} 영역(달성률 ${s.achRate}%)에서는 ${secLvl(s.achRate)}${rfNote}`);
  }
  const para1=`본 ${nm} 아동은 ${ageTxt} 수준에서 실시한 기초인지 임상 관찰 결과, 총 ${evalN}개의 평가 항목 중 전체 달성률 ${total.achRate}%(숙달 ${total.M}개, 출현 ${total.E}개, 미출현 ${total.N}개)로 나타났다. 영역별로 살펴보면, ${secParts.join('; ')}.`;

  // ── 문단 2: RF 기반 임상 행동 관찰 ──
  const highRFs=total.rfList.filter(r=>r.severity==='high');
  const midRFs=total.rfList.filter(r=>r.severity==='mid');
  let para2='';
  if(highRFs.length>0||midRFs.length>0){
    const rfBySec={};
    [...highRFs,...midRFs].forEach(r=>{
      if(!rfBySec[r.section])rfBySec[r.section]=[];
      rfBySec[r.section].push(r);
    });
    // RF 텍스트에서 '— 행동 설명 →' 추출 (없으면 '')
    function rfDesc(r){
      const t=r.item.rf||'';
      const dm=t.match(/[—\-]\s*([^→\n]{5,}?)(?:\s*→|$)/);
      return dm?dm[1].trim():'';
    }
    const obsParts=[];
    for(const sk of SEC_ORDER){
      const rfs=rfBySec[sk];
      if(!rfs||rfs.length===0)continue;
      // 관찰 문단: sk(행동 기술명) 사용 → 자연스러운 문장
      const skList=rfs.slice(0,3).map(r=>r.item.sk);
      const uniq=[...new Set(skList)];
      obsParts.push(`${sk} 영역에서 ${uniq.join(', ')} 수행에 어려움을 보였다`);
    }
    if(obsParts.length>0){
      para2=`평가 중 임상 관찰에서 ${obsParts.join('. ')}. `;
      if(highRFs.length>0){
        // 하이라이트: RF 텍스트의 행동 서술 우선, 없으면 sk
        const ex=highRFs.slice(0,2).map(r=>rfDesc(r)||r.item.sk).filter(x=>x);
        if(ex.length>0)para2+=`특히 숙달기대 항목에서 ${ex.join(', ')} 등의 소견이 확인되어 임상적 추적 관찰이 필요하다.`;
      }
    }
  }else if(total.achRate!==null && total.achRate>=70){
    para2=`평가 중 관찰에서 대부분의 연령 기대 행동이 자발적이고 일관되게 수행되었으며, 별도의 촉진 없이도 과제에 적절히 참여하는 모습을 보였다.`;
  }

  // ── 문단 3: 결론 및 권고 (OT/SI 연결) ──
  // 약점 영역별 SI 연관 키워드 구성
  const siDomains=weakSecs.filter(k=>['주의력','지각/변별','실행기능'].includes(k));
  const otDomains=weakSecs.filter(k=>['기억력','사고/추론','복합집행기능','메타인지','언어인지'].includes(k));
  function mkSILine(){
    if(siDomains.length>0)
      return `감각통합치료(SI)를 통한 ${siDomains.join('·')} 기능 향상`;
    return '감각통합치료(SI)를 통한 감각 조절 및 주의력 지원';
  }
  function mkOTLine(){
    if(otDomains.length>0)
      return `작업치료(OT) 내 구조화된 인지 활동을 통한 ${otDomains.join('·')} 촉진`;
    return '작업치료(OT)를 통한 인지 기능 전반의 구조화된 지원';
  }
  let para3;
  if(total.achRate>=70&&highRFCount===0){
    para3=`이상의 결과를 종합하면, ${nm} 아동의 기초인지 발달은 현 연령 기대 수준에 전반적으로 부합하는 것으로 판단된다. 현재의 작업치료(OT) 및 감각통합치료(SI) 지원 환경을 유지하면서 다음 발달 단계를 위한 심화 인지 자극과 도전적 과제를 지속적으로 제공하는 것이 적절할 것으로 사료된다.`;
  }else if(total.achRate>=70&&highRFCount>0){
    const rfSecs=[...new Set(total.rfList.filter(r=>r.severity==='high').map(r=>r.section))].join('·');
    para3=`이상의 결과를 종합하면, 전반적 인지 발달은 연령 기대 수준에 근접하나 ${rfSecs} 영역에서 임상적으로 유의한 관찰 소견이 확인되었다. 작업치료(OT) 및 감각통합치료(SI) 접근을 통해 해당 영역의 발달 지연 여부를 추적 관찰하고, 감각-인지 통합 관점의 개별화된 중재 계획을 수립하는 것이 필요할 것으로 사료된다.`;
  }else if(total.achRate>=40){
    const wkList=weakSecs.join('·')||'해당 영역';
    para3=`이상의 결과를 종합하면, ${nm} 아동은 ${wkList} 영역을 중심으로 연령 기대 수준에 미치지 못하는 수행이 관찰되었다. 따라서 ${mkSILine()}과 ${mkOTLine()}이 병행되는 개별화 중재 서비스가 필요할 것으로 사료된다. 4~6주간의 집중 중재 후 재평가를 통해 발달 개선 추이를 확인하는 것을 권고한다.`;
  }else{
    para3=`이상의 결과를 종합하면, ${nm} 아동의 기초인지 발달이 현 연령 기대 수준에 현저히 미치지 못하며, 복수의 영역에 걸쳐 심각한 지연 소견이 관찰되었다. 이는 단일 영역 중재만으로는 해결하기 어려운 복합적 발달 지연의 가능성을 시사한다. 따라서 소아과·발달심리·재활의학과 등의 종합 발달 평가 의뢰와 함께, 작업치료(OT) 및 감각통합치료(SI)를 포함한 통합적 인지 중재 계획을 조속히 수립하는 것이 필요할 것으로 사료된다.`;
  }

  const body=[para1,para2,para3].filter(p=>p).join('<br><br>');
  return{tier,body};
}

// ── 영역명 정규화: 세부 제목이 붙어도 분석 축은 동일하게 묶음 ──
function canonicalSectionName(name){
  if(!name)return name;
  if(name.startsWith('주의력'))return '주의력';
  if(name.startsWith('기억력'))return '기억력';
  if(name.startsWith('지각'))return '지각/변별';
  if(name.startsWith('사고'))return '사고/추론';
  if(name.startsWith('실행기능'))return '실행기능';
  if(name.startsWith('언어인지'))return '언어인지';
  if(name.startsWith('복합집행기능'))return '복합집행기능';
  if(name.startsWith('메타인지'))return '메타인지';
  return name;
}

// ── 현재 연령의 영역별 매트릭스 데이터 산출 ──
// 반환: {sections:{주의력:{M,E,N,X,score,max,achRate,rfCount,rfList}, ...}, total:{M,E,N,X,score,max,achRate,rfCount}}
function computeMatrix(ageIdx){
  const a=A[ageIdx];
  const ck=checks[ageIdx]||{};
  const sections={};
  let currentSection='';
  let rIdx=-1;
  a.items.forEach(it=>{
    if(it.section){
      currentSection=canonicalSectionName(it.section);
      if(!sections[currentSection])sections[currentSection]={items:[],M:0,E:0,N:0,X:0,score:0,max:0,rfList:[]};
      return;
    }
    rIdx++;
    if(it.meta){return;} // 전환판단 등 메타항목은 점수·RF 계산 제외
    if(!currentSection){currentSection='기타';if(!sections[currentSection])sections[currentSection]={items:[],M:0,E:0,N:0,X:0,score:0,max:0,rfList:[]};}
    const sec=sections[currentSection];
    const men=checkToMen(ck[rIdx]);
    const entry={item:it,check:ck[rIdx]||null,men,rIdx};
    sec.items.push(entry);
    sec.max+=2;
    if(men==='M'){sec.M++;sec.score+=2;}
    else if(men==='E'){sec.E++;sec.score+=1;}
    else if(men==='N'){sec.N++;}
    else{sec.X++;}
    // Red Flag: st='m' & N → 정밀평가(high), st='m' & E → 주의(mid), st='e' & N → 지속관찰(low)
    if(it.st==='m' && men==='N'){
      sec.rfList.push({...entry,section:currentSection,severity:'high'});
    } else if(it.st==='m' && men==='E'){
      sec.rfList.push({...entry,section:currentSection,severity:'mid'});
    } else if(it.st==='e' && men==='N'){
      sec.rfList.push({...entry,section:currentSection,severity:'low'});
    }
  });
  // 영역별 achRate (미평가 X 제외: evalMax = max - X*2)
  Object.keys(sections).forEach(k=>{
    const s=sections[k];
    const evalMax=s.max-s.X*2;
    s.achRate=evalMax>0?Math.round(s.score/evalMax*100):null;
    s.rfCount=s.rfList.filter(r=>r.severity==='high').length;
  });
  // total
  const total={M:0,E:0,N:0,X:0,score:0,max:0,rfCount:0,rfList:[]};
  Object.values(sections).forEach(s=>{
    total.M+=s.M;total.E+=s.E;total.N+=s.N;total.X+=s.X;
    total.score+=s.score;total.max+=s.max;
    total.rfList=total.rfList.concat(s.rfList);
  });
  const totalEvalMax=total.max-total.X*2;
  total.achRate=totalEvalMax>0?Math.round(total.score/totalEvalMax*100):null;
  total.rfCount=total.rfList.filter(r=>r.severity==='high').length;
  return {sections,total};
}

// ── Stage 전환 판정 (영역별 최소 기준 + Stage별 차등) ──
function computeStageTransition(a,sections,total){
  if(total.achRate===null)return{ready:false,reasons:['체크된 항목 없음']};
  const reasons=[];
  if(total.achRate<70)reasons.push(`전체 달성률 ${total.achRate}% (70% 미만)`);
  if(total.rfCount>0)reasons.push(`high RF ${total.rfCount}건`);
  // 영역별 최소 50% (미평가 제외)
  const belowMin=Object.entries(sections)
    .filter(([k,s])=>s.achRate!==null&&s.achRate<50)
    .map(([k,s])=>`${k}(${s.achRate}%)`);
  if(belowMin.length>0)reasons.push(`영역 최소 미달: ${belowMin.join(', ')}`);
  // Stage별 핵심 영역 차등 기준
  const type=a.type||'';
  const ref=(a.ref||'').toLowerCase();
  if(type==='pre'||(type==='s7'&&ref.includes('stage 2'))){
    // Stage 2→3: 학습 준비도 핵심 영역 60%+
    [['주의력',60],['기억력',60],['실행기능',60],['복합집행기능',50],['메타인지',50]].forEach(([k,min])=>{
      const s=sections[k];
      if(s&&s.achRate!==null&&s.achRate<min)
        reasons.push(`${k} ${s.achRate}% (S2→S3 기준 ${min}% 미달)`);
    });
  } else if(type==='old'){
    // Stage 3→4: 사고/추론·실행기능·기억력 60%+
    [['사고/추론',60],['실행기능',60],['복합집행기능',60],['메타인지',60],['기억력',60]].forEach(([k,min])=>{
      const s=sections[k];
      if(s&&s.achRate!==null&&s.achRate<min)
        reasons.push(`${k} ${s.achRate}% (S3→S4 기준 ${min}% 미달)`);
    });
  } else if(type==='tod'){
    // Stage 1→2: 주의력·기억력 50%+
    [['주의력',50],['기억력',50]].forEach(([k,min])=>{
      const s=sections[k];
      if(s&&s.achRate!==null&&s.achRate<min)
        reasons.push(`${k} ${s.achRate}% (S1→S2 기준 ${min}% 미달)`);
    });
  }
  return{ready:reasons.length===0,reasons};
}

function analyze(){
  const a=A[cur];
  const real=a.items.filter(x=>!x.section);
  const ck=checks[cur]||{};
  const name=document.getElementById('inp-name')?.value||'(미입력)';
  const ageText=document.getElementById('age-calc')?.textContent||'';

  const realItems=real.filter(x=>!x.meta);
  let unchecked=0;
  realItems.forEach((_,i)=>{if(!ck[i])unchecked++;});
  if(unchecked===realItems.length){
    document.getElementById('result').innerHTML=`<div class="result-panel rp-warn">⚠️ 체크된 항목이 없습니다. O/△/X를 먼저 체크해주세요.</div>`;
    return;
  }
  const checkedCount=realItems.length-unchecked;
  const minRequired=Math.ceil(realItems.length*0.3);
  const lowCoverageWarn=checkedCount<minRequired?`<div class="result-panel rp-warn" style="font-size:11px">⚠️ 평가 항목 커버리지가 낮습니다 (${checkedCount}/${realItems.length}개 체크). 전체 항목의 30% 미만 평가 시 달성률 신뢰도가 낮아집니다.</div>`:'';


  const {sections,total}=computeMatrix(cur);
  const secKeys=Object.keys(sections);

  let html=lowCoverageWarn;
  html+=`<div style="margin:10px 0"><b style="font-size:14px;color:#1B4F72">📋 ${name} — ${a.name} (${a.range}) 판정 결과</b>`;
  if(ageText)html+=`<br><span style="font-size:12px;color:#555">${ageText}</span>`;
  html+=`</div>`;

  // ── 1. 발달 매트릭스 테이블 ──
  html+=`<div class="result-panel" style="background:#fff;border-left:4px solid #1B4F72;margin-top:6px">`;
  html+=`<b style="font-size:13px;color:#1B4F72">📊 발달 매트릭스 (Stage × 영역)</b>`;
  html+=`<table style="width:100%;border-collapse:collapse;margin-top:6px;font-size:11px">`;
  html+=`<thead><tr style="background:#1B4F72;color:#fff"><th style="padding:4px;border:1px solid #999">영역</th><th style="padding:4px;border:1px solid #999">M<br><span style="font-size:9px;font-weight:400">숙달</span></th><th style="padding:4px;border:1px solid #999">E<br><span style="font-size:9px;font-weight:400">출현</span></th><th style="padding:4px;border:1px solid #999">N<br><span style="font-size:9px;font-weight:400">미출현</span></th><th style="padding:4px;border:1px solid #999">X<br><span style="font-size:9px;font-weight:400">미평가</span></th><th style="padding:4px;border:1px solid #999">점수</th><th style="padding:4px;border:1px solid #999">달성률</th><th style="padding:4px;border:1px solid #999">RF</th></tr></thead><tbody>`;
  secKeys.forEach(sk=>{
    const s=sections[sk];
    const color=s.achRate===null?'#999':s.achRate>=70?'#4CAF50':s.achRate>=40?'#FF9800':'#F44336';
    const rfMark=s.rfCount>0?`<span style="color:#c00;font-weight:700">⚠${s.rfCount}</span>`:'—';
    const rateCell=s.achRate!==null?`${s.achRate}%`:`<span style="color:#999">N/A</span>`;
    html+=`<tr><td style="padding:4px 6px;border:1px solid #ccc;font-weight:600">${sk}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;background:#E8F5E9">${s.M}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;background:#FFF9C4">${s.E}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;background:#FFC7CE">${s.N}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;color:#999">${s.X}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center">${s.score}/${s.max}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;font-weight:700;color:${color}">${rateCell}</td>`;
    html+=`<td style="padding:4px;border:1px solid #ccc;text-align:center">${rfMark}</td></tr>`;
  });
  // Total row
  const totColor=total.achRate===null?'#999':total.achRate>=70?'#4CAF50':total.achRate>=40?'#FF9800':'#F44336';
  const totRateCell=total.achRate!==null?`${total.achRate}%`:`<span style="color:#999">N/A</span>`;
  const totRfMark=total.rfCount>0?`<span style="color:#c00;font-weight:700">⚠${total.rfCount}</span>`:'—';
  html+=`<tr style="background:#EBF5FB;font-weight:700"><td style="padding:4px 6px;border:1px solid #999">전체</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.M}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.E}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.N}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.X}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.score}/${total.max}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center;color:${totColor}">${totRateCell}</td>`;
  html+=`<td style="padding:4px;border:1px solid #999;text-align:center">${totRfMark}</td></tr>`;
  html+=`</tbody></table></div>`;

  // ── 1-1. 레이더 프로파일 ──
  html+=`<div class="result-panel" style="background:#fff;border-left:4px solid #1B4F72;margin-top:6px;text-align:center">`;
  html+=`<b style="font-size:13px;color:#1B4F72">🕸 영역별 프로파일 (레이더)</b>`;
  html+=`<div style="margin-top:4px">${renderRadarSVG(sections)}</div>`;
  html+=`</div>`;

  // ── 2. 종합 판정 + Stage 전환 판단 ──
  const highRFn=total.rfList.filter(r=>r.severity==='high').length;
  let verdict='', verdictClass='';
  if(total.achRate===null){
    verdict='평가 불가 — 체크된 항목이 없어 판정할 수 없습니다. 모든 영역을 체크한 후 재판정해주세요.';
    verdictClass='rp-warn';
  } else if(total.achRate>=70&&highRFn===0){
    verdict='양호 — 해당 연령대 인지 발달 수준에서 큰 문제가 관찰되지 않습니다.';
    verdictClass='rp-good';
  } else if(total.achRate>=70&&highRFn>0){
    verdict='전반 양호 — 부분 감별 필요 — 달성률 70% 이상이나 고위험 Red Flag('+highRFn+'개)가 확인되었습니다. 해당 항목 정밀 평가를 권고합니다.';
    verdictClass='rp-warn';
  } else if(total.achRate>=40){
    verdict='관찰 필요 — 일부 영역에서 또래 대비 지연이 관찰됩니다. 지속적 모니터링 및 미달 영역 집중 중재를 권고합니다.';
    verdictClass='rp-warn';
  } else {
    verdict='정밀 평가 권고 — 전반적 인지 발달 지연 가능성이 있습니다. 관련 전문가(소아과/발달심리/재활의학과) 의뢰를 권고합니다.';
    verdictClass='rp-bad';
  }
  const rateDisp=total.achRate!==null?`${total.achRate}%`:'N/A';
  html+=`<div class="result-panel ${verdictClass}" style="margin-top:6px">`;
  html+=`<b style="font-size:13px">종합 판정</b><br>`;
  const countItems=realItems.filter(it=>parseCr(it.cr).kind==='count').length;
  const obsItems=realItems.filter(it=>parseCr(it.cr).kind==='obs').length;
  html+=`<b>달성률: ${rateDisp}</b> (점수 ${total.score}/${total.max} — M:${total.M} E:${total.E} N:${total.N} X:${total.X})`;
  html+=`<span style="font-size:10px;color:#777;margin-left:8px">채점형 ${countItems}개 · 관찰형 ${obsItems}개</span>`;
  html+=`<br>${verdict}`;
  if(a.ref && /Stage\s*\d/.test(a.ref)){
    const st=computeStageTransition(a,sections,total);
    if(st.ready){
      html+=`<br><b style="color:#1B4F72">Stage 전환 판단:</b> <span style="color:#2E7D32;font-weight:700">✅ 전환 가능</span> <span style="font-size:10px;color:#555">(전체 70%+ · RF 0 · 영역 최소 기준 충족)</span>`;
    } else {
      html+=`<br><b style="color:#1B4F72">Stage 전환 판단:</b> <span style="color:#c00;font-weight:700">⏳ 전환 보류</span> <span style="font-size:10px;color:#c00">— ${st.reasons.join(' / ')}</span>`;
    }
  }
  html+=`</div>`;

  // ── 3. Red Flag 상세 ──
  const highRF=total.rfList.filter(r=>r.severity==='high');
  const midRF=total.rfList.filter(r=>r.severity==='mid');
  const lowRF=total.rfList.filter(r=>r.severity==='low');
  if(total.rfList.length>0){
    html+=`<div class="result-panel rp-bad" style="margin-top:6px">`;
    html+=`<b style="font-size:13px">⚠️ Red Flag 항목 (${total.rfList.length}개)</b><br>`;
    if(highRF.length>0){
      html+=`<div style="margin:4px 0"><span class="badge b-red">정밀평가 권고 (●숙달 → N미출현: ${highRF.length}개)</span></div>`;
      highRF.forEach(r=>{
        const cqs=lookupCQ(r.item.rf);
        let cqHtml='';
        if(cqs){
          cqHtml=`<br><span style="color:#1B4F72;font-size:10px">🔗 감별 CQ: ${cqs.map(c=>`<b>${c.cq.join('→')}</b>(${c.label})`).join(' · ')}</span>`;
        }
        html+=`<div style="font-size:11px;margin:3px 0;padding:4px 8px;background:#fff5f5;border-radius:3px"><b>[${r.section}] ${r.item.d}</b> — ${r.item.sk}<br><span style="color:#c00">→ ${r.item.rf}</span>${cqHtml}</div>`;
      });
    }
    if(midRF.length>0){
      html+=`<div style="margin:4px 0"><span class="badge b-yellow">주의 관찰 (●숙달 → E출현: ${midRF.length}개)</span></div>`;
      midRF.forEach(r=>{
        html+=`<div style="font-size:11px;margin:2px 0;padding-left:8px">• [${r.section}] <b>${r.item.d}</b> — ${r.item.sk}</div>`;
      });
    }
    if(lowRF.length>0){
      html+=`<div style="margin:4px 0"><span class="badge b-yellow">지속 관찰 (◐출현 → N미출현: ${lowRF.length}개)</span></div>`;
      lowRF.forEach(r=>{
        html+=`<div style="font-size:11px;margin:2px 0;padding-left:8px">• [${r.section}] <b>${r.item.d}</b> — ${r.item.sk}</div>`;
      });
    }
    html+=`</div>`;
  } else {
    html+=`<div class="result-panel rp-good" style="margin-top:6px">✅ Red Flag 항목 없음 — 정밀 평가 권고 대상 없습니다.</div>`;
  }

  // ── 4. 임상추론 경로 (PC v3) ──
  html+=`<div class="result-panel" style="background:#F0F9FF;border-left:4px solid #0288D1;margin-top:6px">`;
  html+=`<b style="font-size:13px;color:#01579B">🧭 임상추론 경로 (PC v3 PART VIII)</b><br>`;
  html+=`<div style="font-size:11px;line-height:1.7;margin-top:4px">${buildClinicalReasoning(a,sections,total)}</div>`;
  html+=`</div>`;

  // ── 5. 총평 (5-tier verdict) ──
  const oa=buildOverallAssessment(name,a,sections,total);
  html+=`<div class="result-panel" style="background:#FFF8E1;border-left:4px solid #F57C00;margin-top:6px">`;
  html+=`<b style="font-size:13px;color:#E65100">📝 총평</b><br>`;
  html+=`<b>${oa.tier}</b><br>`;
  html+=`<div style="font-size:11px;line-height:1.65;margin-top:4px">${oa.body}</div>`;
  html+=`</div>`;

  // ── 6. 권고사항 ──
  html+=`<div class="result-panel" style="background:#F3E5F5;border-left:4px solid #7C4DFF;margin-top:6px">`;
  html+=`<b style="font-size:13px;color:#4A148C">💡 권고사항</b><br>`;
  const weakSections=secKeys.filter(sk=>sections[sk].max>0&&sections[sk].achRate!==null&&sections[sk].achRate<50);
  if(weakSections.length>0){
    html+=`<b>집중 중재 필요 영역:</b> `;
    html+=weakSections.map(sk=>`${sk}(${sections[sk].achRate}%)`).join(', ');
    html+=`<br>`;
  }
  if(total.achRate!==null&&total.achRate<70&&total.E>=total.N){
    html+=`촉진 시 수행 가능한 항목(E:${total.E})이 미출현(N:${total.N})보다 많거나 같으므로, 체계적 중재 시 개선 가능성이 높습니다.<br>`;
  }
  if(total.achRate!==null&&total.achRate<40){
    html+=`전반적 발달 지연 양상 — 종합 발달 평가 후 개별화 중재 계획 수립을 권고합니다.`;
  }
  html+=`</div>`;

  document.getElementById('result').innerHTML=html;
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}

function getPatientInfo(){
  return {
    name:document.getElementById('inp-name')?.value||'',
    dob:document.getElementById('inp-dob')?.value||'',
    edate:document.getElementById('inp-edate')?.value||'',
    evaluator:document.getElementById('inp-eval')?.value||'',
    stage:document.getElementById('inp-stage')?.value||''
  };
}

function setPatientInfo(info){
  if(!info)return;
  setTimeout(()=>{
    const n=document.getElementById('inp-name');if(n)n.value=info.name||'';
    const d=document.getElementById('inp-dob');if(d){d.value=info.dob||'';onDobChange();}
    const e=document.getElementById('inp-edate');if(e)e.value=info.edate||'';
    const ev=document.getElementById('inp-eval');if(ev)ev.value=info.evaluator||'';
    const s=document.getElementById('inp-stage');if(s)s.value=info.stage||'';
  },50);
}

function flashMsg(msg,color){
  const el=document.getElementById('save-msg');
  el.textContent=msg;el.style.color=color||'#2E7D32';
  setTimeout(()=>{el.textContent='';},3000);
}

function saveData(){
  try{
    const obj={version:'v5',savedAt:new Date().toISOString(),currentTab:cur,patient:getPatientInfo(),checks:JSON.parse(JSON.stringify(checks)),sectionOpen:JSON.parse(JSON.stringify(sectionOpen))};
    localStorage.setItem('cognition_checklist',JSON.stringify(obj));
    flashMsg('✅ 임시저장 완료! ('+new Date().toLocaleTimeString()+')','#2E7D32');
  }catch(e){flashMsg('❌ 저장 실패: '+e.message,'#c00');}
}

function resetChecks(){
  if(!confirm('현재 탭('+A[cur].name+')의 체크를 모두 초기화할까요?\n다른 탭의 데이터는 유지됩니다.'))return;
  checks[cur]={};
  render();
  updateTabBadge(cur);
  document.getElementById('result').innerHTML='';
  flashMsg('🔄 현재 탭 체크 초기화 완료','#888');
}

// ── JSON 내보내기/가져오기 ──
function exportJSON(){
  const pi=getPatientInfo();
  const pName=pi.name||'아동';
  const a=A[cur];
  const dateStr=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const {sections:_sec}=computeMatrix(cur);
  const sectionScores={};
  Object.keys(_sec).forEach(s=>{if(_sec[s].max>0)sectionScores[s]={achRate:_sec[s].achRate!==null?Math.round(_sec[s].achRate):0,rfCount:_sec[s].rfCount||0};});
  const obj={version:'v5',savedAt:new Date().toISOString(),currentTab:cur,activeTabName:A[cur]?A[cur].name:'',sectionScores,patient:pi,checks:JSON.parse(JSON.stringify(checks)),sectionOpen:JSON.parse(JSON.stringify(sectionOpen))};
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;link.download=`인지체크_${pName}_${a.name}_${dateStr}.json`;
  document.body.appendChild(link);link.click();
  document.body.removeChild(link);URL.revokeObjectURL(url);
  flashMsg('📤 JSON 내보내기 완료','#00796B');
}
function importJSON(el){
  const file=el.files[0];
  if(!file)return;
  if(!confirm('현재 모든 탭의 데이터를 가져오는 파일로 교체합니다.\n계속하시겠습니까?')){el.value='';return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const obj=JSON.parse(e.target.result);
      if(obj.checks&&typeof obj.checks==='object'){
        A.forEach((_,i)=>{checks[i]={};});
        Object.keys(obj.checks).forEach(k=>{
          checks[k]={};
          Object.keys(obj.checks[k]).forEach(j=>{checks[k][j]=obj.checks[k][j];});
        });
      }
      if(obj.sectionOpen)Object.assign(sectionOpen,obj.sectionOpen);
      if(typeof obj.currentTab==='number'){
        cur=obj.currentTab;
        document.querySelectorAll('.age-tab').forEach((t,j)=>t.classList.toggle('active',j===cur));
      }
      render();
      updateAllTabBadges();
      if(obj.patient){
        const n=document.getElementById('inp-name');if(n)n.value=obj.patient.name||'';
        const d=document.getElementById('inp-dob');if(d){d.value=obj.patient.dob||'';onDobChange();}
        const ed=document.getElementById('inp-edate');if(ed)ed.value=obj.patient.edate||'';
        const ev=document.getElementById('inp-eval');if(ev)ev.value=obj.patient.evaluator||'';
        const s=document.getElementById('inp-stage');if(s)s.value=obj.patient.stage||'';
      }
      flashMsg('📥 JSON 가져오기 완료','#2E7D32');
    }catch(err){flashMsg('⚠ JSON 읽기 오류: '+err.message,'#c00');}
  };
  reader.readAsText(file,'UTF-8');
  el.value='';
}

// ── 공통: 현재 탭 HTML 테이블 생성 ──
function buildTableHTML(opts){
  const a=A[cur];const ck=checks[cur]||{};
  const pi=getPatientInfo();
  const ageText=pi.dob?calcAge(pi.dob):'';
  const showRF=opts.showRF!==false;
  const showStatus=opts.showStatus!==false;
  const showTime=opts.showTime!==false;
  const showChecks=opts.showChecks!==false;
  const isParent=opts.isParent||false;

  let h=`<div style="font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:12px;color:#1a1a1a;padding:10px">`;
  h+=`<h2 style="font-size:16px;color:#1B4F72;margin-bottom:2px">${isParent?'기초인지 관찰 체크리스트 (부모/보호자용)':'기초인지 임상관찰 체크리스트'}</h2>`;

  h+=`<table style="width:100%;border-collapse:collapse;font-size:11px;margin:6px 0"><tr>`;
  if(isParent){
    h+=`<td style="border:1px solid #ccc;padding:5px 8px"><b>아동명:</b> <input type="text" style="border:none;border-bottom:1px solid #999;width:130px;font-size:11px;padding:1px 4px;outline:none" placeholder="　　　　　　"></td>`;
    h+=`<td style="border:1px solid #ccc;padding:5px 8px"><b>생년월일:</b> <input type="text" style="border:none;border-bottom:1px solid #999;width:130px;font-size:11px;padding:1px 4px;outline:none" placeholder="　　　　　　"></td>`;
    h+=`<td style="border:1px solid #ccc;padding:5px 8px"><b>평가일:</b> <input type="text" style="border:none;border-bottom:1px solid #999;width:130px;font-size:11px;padding:1px 4px;outline:none" placeholder="　　　　　　"></td>`;
  }else{
    h+=`<td style="border:1px solid #ccc;padding:4px"><b>아동명:</b> ${pi.name||'___'}</td>`;
    h+=`<td style="border:1px solid #ccc;padding:4px"><b>생년월일:</b> ${pi.dob||'___'} ${ageText?'('+ageText+')':''}</td>`;
    h+=`<td style="border:1px solid #ccc;padding:4px"><b>평가일:</b> ${pi.edate||'___'}</td>`;
    h+=`<td style="border:1px solid #ccc;padding:4px"><b>평가자:</b> ${pi.evaluator||'___'}</td>`;
  }
  h+=`</tr></table>`;
  if(!isParent)h+=`<div style="background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:6px;margin:4px 0;font-size:11px"><b>${a.name}</b> (${a.range}) — ${a.ref}<br>${a.desc}</div>`;

  if(isParent){
    h+=`<div style="font-size:10px;color:#555;margin:4px 0">아이를 일상에서 관찰하며 해당되는 칸에 ✓ 표시해주세요. <b>O</b>=혼자서 잘 함 | <b>△</b>=도움 받으면 함 | <b>X</b>=아직 못 함</div>`;
  }

  const showCr=opts.showCr!==false && !isParent;
  const thBg=isParent?'background:#EBEBEB;color:#222':'background:#1B4F72;color:#fff';
  const thBd=isParent?'border:1px solid #bbb':'border:1px solid #0e3557';
  h+=`<table style="width:100%;border-collapse:collapse;border:1px solid #999;margin:4px 0">`;
  h+=`<thead><tr style="${thBg};font-size:10px">`;
  h+=`<th style="${thBd};padding:5px;width:7%">영역</th>`;
  h+=`<th style="${thBd};padding:5px;width:${isParent?'45%':'22%'}">관찰 기술</th>`;
  if(showTime)h+=`<th style="${thBd};padding:5px;width:5%">시기</th>`;
  if(showStatus)h+=`<th style="${thBd};padding:5px;width:3%">상태</th>`;
  h+=`<th style="${thBd};padding:5px;width:4%">O</th>`;
  h+=`<th style="${thBd};padding:5px;width:4%">△</th>`;
  h+=`<th style="${thBd};padding:5px;width:4%">X</th>`;
  h+=`<th style="${thBd};padding:5px;width:${isParent?'35%':'18%'}">관찰 포인트</th>`;
  if(showCr)h+=`<th style="${thBd};padding:5px;width:10%">판정 기준</th>`;
  if(showRF)h+=`<th style="${thBd};padding:5px;width:22%">Red Flag 기준</th>`;
  h+=`</tr></thead><tbody>`;

  let idx=0;
  a.items.forEach(it=>{
    if(it.section){
      const cols=2+(showTime?1:0)+(showStatus?1:0)+3+(showCr?1:0)+(showRF?1:0);
      h+=`<tr><td colspan="${cols}" style="background:#D6E4F0;font-weight:700;color:#1B4F72;font-size:11px;padding:4px 8px;border:1px solid #999">▸ ${it.section}</td></tr>`;
      return;
    }
    const cv=showChecks?ck[idx]||null:null;
    const oMark=cv==='o'?'<b style="color:#2E7D32">✔</b>':'☐';
    const tMark=cv==='t'?'<b style="color:#F57C00">✔</b>':'☐';
    const xMark=cv==='x'?'<b style="color:#c00">✔</b>':'☐';
    const bg=it.st==='m'?'#f0faf0':'#fffde7';
    const stIcon=it.st==='m'?'<span style="color:green">●</span>':'<span style="color:#F9A825">◐</span>';
    h+=`<tr>`;
    h+=`<td style="border:1px solid #ccc;padding:3px;text-align:center;font-weight:700;font-size:10px">${it.d}</td>`;

// ── Word용 레이더 대체 테이블 (SVG 미지원 환경) ──
function renderRadarTable(sections){
  const axes=RADAR_AXES;
  let h=`<table style="width:100%;border-collapse:collapse;font-size:11px;margin:8px 0">`;
  h+=`<thead><tr style="background:#1B4F72;color:#fff">`;
  h+=`<th style="padding:4px;border:1px solid #999;text-align:left">영역</th>`;
  h+=`<th style="padding:4px;border:1px solid #999;width:60px">달성률</th>`;
  h+=`<th style="padding:4px;border:1px solid #999">그래프 (■=10%)</th>`;
  h+=`</tr></thead><tbody>`;
  axes.forEach(ax=>{
    const s=sections[ax];
    const rate=s&&s.achRate!==null?s.achRate:null;
    const color=rate===null?'#999':rate>=70?'#2E7D32':rate>=40?'#F57C00':'#C62828';
    const rateStr=rate!==null?`${rate}%`:'N/A';
    const filled=rate!==null?Math.round(rate/10):0;
    const bar='■'.repeat(filled)+'□'.repeat(10-filled);
    h+=`<tr><td style="padding:4px;border:1px solid #ccc;font-weight:600">${ax}</td>`;
    h+=`<td style="padding:4px;border:1px solid #ccc;text-align:center;font-weight:700;color:${color}">${rateStr}</td>`;
    h+=`<td style="padding:4px;border:1px solid #ccc;font-family:'Courier New',monospace;letter-spacing:1px;color:${color}">${bar}</td></tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

// ── 임상 보고서 HTML 빌더 (Word/PDF 공용) ──
function buildClinicalReport(forWord=false){
  const pi=getPatientInfo();
  const a=A[cur];
  const {sections,total}=computeMatrix(cur);
  const secKeys=Object.keys(sections);
  const ageText=document.getElementById('age-calc')?.textContent||'';
  const todayStr=new Date().toISOString().slice(0,10);
  const evalDate=pi.edate||todayStr;
  const nm=pi.name||'(미입력)';
  let h=`<div style="font-family:'Malgun Gothic',sans-serif;font-size:12px;line-height:1.6">`;
  h+=`<h2 style="text-align:center;border-bottom:2px solid #1B4F72;padding-bottom:6px;color:#1B4F72;margin:0 0 10px 0">기초인지 임상관찰 체크리스트 평가 보고서</h2>`;
  // 기본 정보
  h+=`<table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:11px">`;
  h+=`<tr><td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px;width:20%"><b>아동명</b></td><td style="border:1px solid #999;padding:4px 8px;width:30%">${nm}</td>`;
  h+=`<td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px;width:20%"><b>생년월일</b></td><td style="border:1px solid #999;padding:4px 8px;width:30%">${pi.dob||'-'} ${ageText?'('+ageText+')':''}</td></tr>`;
  h+=`<tr><td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px"><b>평가일</b></td><td style="border:1px solid #999;padding:4px 8px">${evalDate}</td>`;
  h+=`<td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px"><b>평가자</b></td><td style="border:1px solid #999;padding:4px 8px">${pi.evaluator||'-'}</td></tr>`;
  h+=`<tr><td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px"><b>연령대</b></td><td style="border:1px solid #999;padding:4px 8px">${a.name} (${a.range})</td>`;
  h+=`<td style="background:#EBF5FB;border:1px solid #999;padding:4px 8px"><b>발달 단계</b></td><td style="border:1px solid #999;padding:4px 8px">${a.ref||a.type}</td></tr>`;
  h+=`</table>`;
  // 영역별 결과 매트릭스
  h+=`<h3 style="color:#1B4F72;border-left:4px solid #1B4F72;padding-left:8px;margin:12px 0 6px">■ 영역별 평가 결과</h3>`;
  h+=`<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#1B4F72;color:#fff">`;
  h+=`<th style="padding:4px;border:1px solid #999">영역</th><th style="padding:4px;border:1px solid #999">M(숙달)</th><th style="padding:4px;border:1px solid #999">E(출현)</th><th style="padding:4px;border:1px solid #999">N(미출현)</th><th style="padding:4px;border:1px solid #999">X(미평가)</th><th style="padding:4px;border:1px solid #999">점수</th><th style="padding:4px;border:1px solid #999">달성률</th><th style="padding:4px;border:1px solid #999">RF</th></tr></thead><tbody>`;
  secKeys.forEach(sk=>{
    const s=sections[sk];
    const rpt=s.achRate!==null?`${s.achRate}%`:'N/A';
    h+=`<tr><td style="padding:4px;border:1px solid #999;font-weight:600">${sk}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.M}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.E}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.N}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.X}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.score}/${s.max}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center;font-weight:700">${rpt}</td>`;
    h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${s.rfCount>0?'⚠'+s.rfCount:'-'}</td></tr>`;
  });
  const totRpt=total.achRate!==null?`${total.achRate}%`:'N/A';
  h+=`<tr style="background:#EBF5FB;font-weight:700"><td style="padding:4px;border:1px solid #999">전체</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.M}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.E}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.N}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.X}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.score}/${total.max}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${totRpt}</td>`;
  h+=`<td style="padding:4px;border:1px solid #999;text-align:center">${total.rfCount>0?'⚠'+total.rfCount:'-'}</td></tr>`;

  h+=forWord?renderRadarTable(sections):`<div style="text-align:center;margin:10px 0">${renderRadarSVG(sections,260)}</div>`;

  const highRF=total.rfList.filter(r=>r.severity==='high');

    h+=`<h3 style="color:#C62828;border-left:4px solid #C62828;padding-left:8px;margin:12px 0 6px">■ Red Flag 항목 상세</h3>`;

      h+=`<li style="margin:4px 0"><b>[${r.section} — ${r.item.d}]</b> ${r.item.sk}<br>`;
      h+=`<span style="color:#c00">→ ${r.item.rf}</span>`;

  const oa=buildOverallAssessment(nm,a,sections,total);
  h+=`<h3 style="color:#E65100;border-left:4px solid #F57C00;padding-left:8px;margin:12px 0 6px">■ 총평</h3>`;
  h+=`<div style="padding:8px 12px;background:#FFF8E1;border:1px solid #FFD54F;border-radius:4px;font-size:11px;line-height:1.7">`;
  h+=`<b>${oa.tier}</b><br>${oa.body}</div>`;
  // 권고사항
  const weak=secKeys.filter(sk=>sections[sk].max>0&&sections[sk].achRate!==null&&sections[sk].achRate<50);
  h+=`<h3 style="color:#4A148C;border-left:4px solid #7C4DFF;padding-left:8px;margin:12px 0 6px">■ 권고 사항</h3>`;
  h+=`<ol style="font-size:11px;padding-left:20px;line-height:1.7">`;

  if(weak.length>0)h+=`<li>집중 중재 필요 영역: ${weak.map(sk=>`${sk}(${sections[sk].achRate}%)`).join(', ')} — 환경 구조화 + 전략 교수 (4~6주)</li>`;
  if(total.achRate<70)h+=`<li>4주 후 재평가 (CPT / 숫자폭 / 지시 수행률)</li>`;
  if(total.achRate>=70&&total.rfCount===0)h+=`<li>현재 발달 수준 유지 — Stage 전환 준비 가능, 다음 단계 과제 점진 도입</li>`;
  if(total.achRate<40)h+=`<li>종합 발달 평가(소아과/발달심리/재활의학과) 의뢰</li>`;
  h+=`</ol>`;
  h+=`<div style="text-align:right;margin-top:20px;font-size:11px;color:#555">보고서 작성: ${todayStr} · 평가자 ${pi.evaluator||'-'}</div>`;
  h+=`</div>`;
  return h;
}

// ── 치료 목표 자동 제안 ──
function buildGoals(){
  const a=A[cur];
  let idx=0,curSec='';
  const intensive=[],reinforce=[],observe=[];
  a.items.forEach(it=>{
    if(it.section){curSec=it.section;return;}
    if(!it.meta){
      const cv=checks[cur][idx];
      if(cv==='x'&&it.st==='m')intensive.push({sec:curSec,it});
      else if(cv==='t'&&it.st==='m')reinforce.push({sec:curSec,it});
      else if(cv==='x'&&it.st==='e')observe.push({sec:curSec,it});
    }
    idx++;
  });
  return {intensive,reinforce,observe};
}
function showGoals(){
  const {intensive,reinforce,observe}=buildGoals();
  const a=A[cur];
  const nm=getPatientInfo().name||'아동';
  if(intensive.length+reinforce.length+observe.length===0){
    flashMsg('⚠ 목표 생성 조건에 해당하는 항목이 없습니다 (체크 후 시도해주세요)','#888');
    return;
  }
  let h=`<div class="result-panel rp-warn">`;
  h+=`<b>🎯 치료 목표 자동 제안 — ${nm} (${a.name})</b>`;
  h+=`<div style="font-size:10px;color:#777;margin:2px 0 8px">🔴 집중중재: 습득기대(●)+X &nbsp;|&nbsp; 🟠 강화중재: 습득기대(●)+△ &nbsp;|&nbsp; 🔵 지속관찰: 출현중(◐)+X</div>`;
  if(intensive.length>0){
    h+=`<div style="font-weight:700;color:#c00;margin:6px 0 3px">🔴 집중 중재 목표 (${intensive.length}개) — 4주 내 달성 목표</div>`;
    h+=`<ol style="padding-left:18px;margin:0;font-size:12px">`;
    intensive.forEach(({sec,it})=>{
      h+=`<li style="margin:4px 0"><span style="color:#999;font-size:10px">[${sec}]</span> <b>${it.d}</b>: ${it.sk}</li>`;
    });
    h+=`</ol>`;
  }
  if(reinforce.length>0){
    h+=`<div style="font-weight:700;color:#E65100;margin:6px 0 3px">🟠 강화 중재 목표 (${reinforce.length}개) — 독립 수행 강화</div>`;
    h+=`<ol style="padding-left:18px;margin:0;font-size:12px">`;
    reinforce.forEach(({sec,it})=>{
      h+=`<li style="margin:4px 0"><span style="color:#999;font-size:10px">[${sec}]</span> <b>${it.d}</b>: ${it.sk}</li>`;
    });
    h+=`</ol>`;
  }
  if(observe.length>0){
    h+=`<div style="font-weight:700;color:#1565C0;margin:6px 0 3px">🔵 지속 관찰 목표 (${observe.length}개) — 출현 촉진</div>`;
    h+=`<ol style="padding-left:18px;margin:0;font-size:12px">`;
    observe.forEach(({sec,it})=>{
      h+=`<li style="margin:4px 0"><span style="color:#999;font-size:10px">[${sec}]</span> <b>${it.d}</b>: ${it.sk}</li>`;
    });
    h+=`</ol>`;
  }
  h+=`<div style="font-size:10px;color:#777;margin:8px 0 2px;border-top:1px solid #ddd;padding-top:5px">※ 자동 생성된 초안입니다. 담당 치료사가 임상 판단으로 수정·확정해주세요.</div>`;
  h+=`</div>`;
  document.getElementById('result').innerHTML=h;
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

init();render();

// 페이지 로드 시 자동 복원
(function(){
  const stored=localStorage.getItem('cognition_checklist');
  if(stored){
    try{
      const obj=JSON.parse(stored);
      if(obj.version&&obj.version!=='v5'){console.warn('저장 데이터 버전 불일치('+obj.version+') — 체크 데이터만 복원합니다.');}
      if(obj.checks&&typeof obj.checks==='object'){
        Object.keys(obj.checks).forEach(k=>{
          checks[k]={};
          Object.keys(obj.checks[k]).forEach(j=>{checks[k][j]=obj.checks[k][j];});
        });
      }
      if(obj.sectionOpen){
        Object.assign(sectionOpen,obj.sectionOpen);
      }
      if(typeof obj.currentTab==='number'){
        cur=obj.currentTab;
        document.querySelectorAll('.age-tab').forEach((t,j)=>t.classList.toggle('active',j===cur));
      }
      render();
      updateAllTabBadges();
      if(obj.patient){
        setTimeout(()=>{
          const n=document.getElementById('inp-name');if(n)n.value=obj.patient.name||'';
          const d=document.getElementById('inp-dob');if(d){d.value=obj.patient.dob||'';onDobChange();}
          const e=document.getElementById('inp-edate');if(e)e.value=obj.patient.edate||'';
          const ev=document.getElementById('inp-eval');if(ev)ev.value=obj.patient.evaluator||'';
          const s=document.getElementById('inp-stage');if(s)s.value=obj.patient.stage||'';
        },50);
      }
    }catch(e){}
  }
  // 자동저장 (90초마다, 알림 없이)
  setInterval(()=>{
    try{const obj={version:'v5',savedAt:new Date().toISOString(),currentTab:cur,patient:getPatientInfo(),checks:JSON.parse(JSON.stringify(checks)),sectionOpen:JSON.parse(JSON.stringify(sectionOpen))};localStorage.setItem('cognition_checklist',JSON.stringify(obj));}catch(e){}
  },90000);
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // 페이지 로드 시마다 최신 SW 확인
      reg.update().catch(()=>{});
      // 새 SW 설치 감지 → 즉시 적용 요청
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage('SKIP_WAITING');
          }
        });
      });
      // 컨트롤러 교체 시 새로고침 (최초 설치 제외)
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }).catch(()=>{});
  });
}
</script>
